name: K6 Full Load Tests (with External Services)

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type (load, stress, spike)'
        required: false
        default: 'load'
        type: choice
        options:
          - load
          - stress
          - spike

# Explicit permissions (Least Privilege Principle - Issue #1455)
permissions:
  contents: read        # Required: Checkout code
  actions: write        # Required: Upload/download artifacts (actions/upload-artifact@v4)

env:
  API_BASE_URL: http://localhost:5080
  TEST_GAME_ID: '00000000-0000-0000-0000-000000000001'
  # Database credentials - use secrets in CI, fallback to defaults for local runs
  TEST_POSTGRES_USER: ${{ secrets.TEST_POSTGRES_USER || 'postgres' }}
  TEST_POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD || 'postgres' }}
  TEST_DB_NAME: meepleai_test

jobs:
  k6-full-load-tests:
    name: K6 Full Load Tests (Comprehensive)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ secrets.TEST_POSTGRES_USER || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD || 'postgres' }}
          POSTGRES_DB: meepleai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      qdrant:
        image: qdrant/qdrant:v1.12.5
        ports:
          - 6333:6333
          - 6334:6334

      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        volumes:
          - ollama-data:/root/.ollama

      n8n:
        image: n8nio/n8n:latest
        ports:
          - 5678:5678
        env:
          N8N_BASIC_AUTH_ACTIVE: false
          N8N_DIAGNOSTICS_ENABLED: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup backend environment
        uses: ./.github/actions/setup-backend
        with:
          dotnet-version: '9.0.x'
          working-directory: apps/api

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Initialize Ollama embedding model
        run: |
          echo "⏳ Waiting for Ollama to be ready..."
          for i in {1..30}; do
            if curl -f http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "✅ Ollama is ready"
              break
            fi
            echo "Waiting for Ollama... ($i/30)"
            sleep 2
          done

          echo "📥 Downloading nomic-embed-text model (this may take 2-3 minutes)..."
          curl -X POST http://localhost:11434/api/pull -d '{"name": "nomic-embed-text"}' || echo "⚠️ Model pull failed, continuing..."

          echo "✅ Ollama initialization complete"
        timeout-minutes: 5

      - name: Verify n8n availability
        run: |
          echo "⏳ Waiting for n8n to be ready..."
          for i in {1..20}; do
            if curl -f http://localhost:5678 > /dev/null 2>&1; then
              echo "✅ n8n is ready"
              exit 0
            fi
            echo "Waiting for n8n... ($i/20)"
            sleep 2
          done
          echo "⚠️ n8n not ready, but continuing (optional service)"

      - name: Build API
        working-directory: apps/api/src/Api
        run: dotnet build --configuration Release --no-restore

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef --version 9.0.11

      - name: Create test database
        run: |
          PGPASSWORD="${{ secrets.TEST_POSTGRES_PASSWORD || 'postgres' }}" psql -h localhost -U "${{ secrets.TEST_POSTGRES_USER || 'postgres' }}" -c "CREATE DATABASE meepleai_test;" || true

      # Issue #1817: Add database connectivity validation before migrations
      - name: Verify database connectivity
        run: |
          echo "🔍 Testing PostgreSQL connection..."
          PGPASSWORD="${{ secrets.TEST_POSTGRES_PASSWORD || 'postgres' }}" psql -h localhost -U "${{ secrets.TEST_POSTGRES_USER || 'postgres' }}" -d meepleai_test -c "SELECT version();"
          echo "✅ Database connection successful"

      # Issue #1817: Use --connection flag to explicitly pass connection string
      # This prevents EF Core from defaulting to incorrect 'root' user
      - name: Apply migrations
        working-directory: apps/api/src/Api
        run: |
          dotnet ef database update --configuration Release \
            --connection "${{ secrets.TEST_DB_CONNECTION_STRING || 'Host=localhost;Port=5432;Database=meepleai_test;Username=postgres;Password=postgres' }}"

      - name: Seed test data
        working-directory: apps/api/src/Api
        run: |
          # Run integration tests that seed the database with test data
          dotnet test --filter "FullyQualifiedName~SeedTestData" --no-build --configuration Release || echo "Test seed not found, database will be seeded on first request"
        env:
          ConnectionStrings__Postgres: ${{ secrets.TEST_DB_CONNECTION_STRING || 'Host=localhost;Port=5432;Database=meepleai_test;Username=postgres;Password=postgres' }}

      - name: Start API server
        working-directory: apps/api/src/Api
        run: |
          nohup dotnet run --configuration Release > ../../../../api.log 2>&1 &
          echo $! > ../../../../api.pid
        env:
          ConnectionStrings__Postgres: ${{ secrets.TEST_DB_CONNECTION_STRING || 'Host=localhost;Port=5432;Database=meepleai_test;Username=postgres;Password=postgres' }}
          ConnectionStrings__Redis: 'localhost:6379'
          ConnectionStrings__Qdrant: 'http://localhost:6333'
          OLLAMA_BASE_URL: 'http://localhost:11434'
          N8N_BASE_URL: 'http://localhost:5678'
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: 'http://0.0.0.0:5080'

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:5080/health; then
              echo "✅ API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "❌ API failed to start"
          echo "Last 100 lines of API logs:"
          tail -n 100 api.log || echo "⚠️ Could not read api.log"
          exit 1

      - name: Run k6 full load tests
        working-directory: tests/k6
        timeout-minutes: 25
        run: |
          TEST_TYPE="${{ github.event.inputs.test_type || 'load' }}"

          echo "Running K6 Full Load tests with TEST_TYPE=${TEST_TYPE}"
          echo "🔴 Strict thresholds enforced (http_req_failed < 2%, rag_confidence > 65%)"

          # Create reports directory
          mkdir -p reports

          # Run comprehensive load tests with all services
          k6 run --env TEST_TYPE=${TEST_TYPE} scenarios/all.js
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
          TEST_USER_EMAIL: 'test@meepleai.dev'
          TEST_USER_PASSWORD: 'Test123!'
          TEST_GAME_ID: ${{ env.TEST_GAME_ID }}
          WEBSOCKET_URL: 'ws://localhost:5080/ws'

      - name: Debug API logs on failure
        if: failure()
        run: |
          echo "========================================="
          echo "API Logs"
          echo "========================================="
          tail -n 200 api.log 2>/dev/null || echo "⚠️ No API logs found at api.log"
          echo ""
          echo "========================================="
          echo "Health Check Status"
          echo "========================================="
          curl -v http://localhost:5080/health 2>&1 || echo "⚠️ Health check failed"
          echo ""
          echo "========================================="
          echo "Process Status"
          echo "========================================="
          ps aux | grep -i dotnet || echo "⚠️ No dotnet processes found"

      - name: Generate HTML report
        if: always()
        working-directory: tests/k6
        run: |
          if [ -f reports/summary.json ]; then
            node utils/generate-report.js reports/summary.json
          else
            echo "⚠️ No summary.json found, skipping HTML report generation"
          fi

      - name: Upload performance reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: k6-full-load-reports-${{ github.run_number }}
          path: tests/k6/reports/
          retention-days: 30

      - name: Archive API logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: api-logs-full-load-${{ github.run_number }}
          path: api.log
          retention-days: 7

      - name: Cleanup resources
        if: always()
        run: |
          # Stop API server
          if [ -f api.pid ]; then
            kill $(cat api.pid) 2>/dev/null || true
            rm api.pid
          fi

          # Cleanup any remaining dotnet processes
          pkill -f "dotnet.*Api" 2>/dev/null || true

          # Clean database
          PGPASSWORD="${{ secrets.TEST_POSTGRES_PASSWORD || 'postgres' }}" psql -h localhost -U "${{ secrets.TEST_POSTGRES_USER || 'postgres' }}" -c "DROP DATABASE IF EXISTS meepleai_test;" 2>/dev/null || true

          # Flush Redis
          redis-cli FLUSHALL 2>/dev/null || true

          echo "✅ Cleanup complete"
