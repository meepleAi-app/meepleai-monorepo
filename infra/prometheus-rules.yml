  # ========================================
  # 2FA Security Alert Rules (SEC-08)
  # Issue #1788: Enhanced Security Monitoring
  # ========================================

  - name: meepleai_2fa_security_recording_rules
    interval: 15s
    rules:
      # 2FA failure rate (failures per second)
      - record: meepleai:2fa:failure_rate:5m
        expr: |
          rate(meepleai_2fa_failed_totp_attempts_total[5m]) +
          rate(meepleai_2fa_failed_backup_attempts_total[5m])
        labels:
          service: meepleai-api
          category: security

      # 2FA success rate percentage
      - record: meepleai:2fa:success_rate:5m
        expr: |
          100 * (
            sum(rate(meepleai_2fa_successful_totp_total[5m]) + rate(meepleai_2fa_successful_backup_total[5m]))
            /
            sum(
              rate(meepleai_2fa_successful_totp_total[5m]) +
              rate(meepleai_2fa_successful_backup_total[5m]) +
              rate(meepleai_2fa_failed_totp_attempts_total[5m]) +
              rate(meepleai_2fa_failed_backup_attempts_total[5m])
            )
          ) OR on() vector(0)
        labels:
          service: meepleai-api
          category: security

      # Replay attack rate
      - record: meepleai:2fa:replay_attacks:5m
        expr: |
          rate(meepleai_2fa_replay_attacks_blocked_total[5m])
        labels:
          service: meepleai-api
          category: security

  - name: meepleai_2fa_security_critical_alerts
    interval: 30s
    rules:
      # CRITICAL: High rate of failed 2FA attempts (> 10/min sustained)
      - alert: High2FAFailureRate
        expr: |
          meepleai:2fa:failure_rate:5m > 0.167
        for: 2m
        labels:
          severity: critical
          service: meepleai-api
          category: security
          attack_type: brute_force
        annotations:
          summary: "High rate of failed 2FA attempts detected"
          description: |
            2FA failure rate is {{ $value | humanize }} failures/sec (threshold: 0.167/sec = 10/min).
            This indicates a potential brute force attack on user accounts.
            Verify account lockout mechanisms and consider IP blocking.
          runbook_url: "https://docs.meepleai.dev/runbooks/2fa-brute-force"
          dashboard_url: "http://localhost:3001/d/2fa-security-monitoring"

      # CRITICAL: Replay attack detected
      - alert: TotpReplayAttackDetected
        expr: |
          increase(meepleai_2fa_replay_attacks_blocked_total[1m]) > 0
        labels:
          severity: critical
          service: meepleai-api
          category: security
          attack_type: replay
        annotations:
          summary: "TOTP replay attack blocked"
          description: |
            {{ $value }} replay attack(s) blocked in the last minute.
            Attacker attempted to reuse a valid TOTP code within the 60-second window.
            This is a sophisticated attack indicating compromised credentials or session hijacking.
            Review audit logs and consider forcing password reset for affected users.
          runbook_url: "https://docs.meepleai.dev/runbooks/2fa-replay-attack"
          dashboard_url: "http://localhost:3001/d/2fa-security-monitoring"

      # CRITICAL: Distributed brute force attack (multiple users targeted)
      - alert: Distributed2FABruteForce
        expr: |
          count(
            sum by (user_id) (
              increase(meepleai_2fa_failed_totp_attempts_total[5m]) > 5
            )
          ) > 3
        for: 2m
        labels:
          severity: critical
          service: meepleai-api
          category: security
          attack_type: distributed_brute_force
        annotations:
          summary: "Distributed brute force attack on 2FA detected"
          description: |
            {{ $value }} user accounts experiencing simultaneous failed 2FA attempts.
            This indicates a coordinated attack, possibly from a botnet or distributed attacker.
            Consider implementing IP rate limiting or temporary 2FA endpoint restrictions.
          runbook_url: "https://docs.meepleai.dev/runbooks/2fa-distributed-attack"
          dashboard_url: "http://localhost:3001/d/2fa-security-monitoring"

      # CRITICAL: 2FA success rate critically low
      - alert: Low2FASuccessRate
        expr: |
          meepleai:2fa:success_rate:5m < 50
        for: 5m
        labels:
          severity: critical
          service: meepleai-api
          category: security
        annotations:
          summary: "2FA success rate is critically low"
          description: |
            2FA success rate is {{ $value | humanizePercentage }} (threshold: 50%).
            More than half of 2FA attempts are failing.
            Check for attacks, TOTP time sync issues, or UX problems.
          runbook_url: "https://docs.meepleai.dev/runbooks/2fa-low-success"
          dashboard_url: "http://localhost:3001/d/2fa-security-monitoring"

