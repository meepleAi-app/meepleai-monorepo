# Redis configuration for MeepleAI
# Static settings — password injected at startup via --requirepass
# See docker-compose.yml redis service for usage

# Persistence: AOF only (no RDB snapshots to reduce I/O)
# Disable RDB snapshots explicitly (AOF covers durability)
save ""
appendonly yes

# Memory limits
maxmemory 768mb
maxmemory-policy allkeys-lru

# Performance tuning
# Keep TCP connections alive (seconds); reduces connection overhead
tcp-keepalive 300
# Increase event-loop frequency for lower latency (default: 10)
hz 100
# Non-blocking lazy frees to avoid latency spikes during eviction/expiry/del
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
