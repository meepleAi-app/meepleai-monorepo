name: Branch Policy

on:
  pull_request:
    branches:
      - main
      - main-staging
      - main-dev

jobs:
  notify-start:
    continue-on-error: true
    uses: ./.github/workflows/notify-slack.yml
    with:
      event: started
      workflow_name: "Branch Policy"
      environment: automation
      branch: ${{ github.head_ref || github.ref_name }}
      actor: ${{ github.actor }}
      commit_sha: ${{ github.sha }}
      commit_message: ${{ github.event.head_commit.message || 'Manual trigger' }}
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      job_list: '["validate-source-branch"]'
      caller_workflow_id: ${{ github.workflow_id }}
    secrets:
      SLACK_GITNOTIFY_WEBHOOK_URL: ${{ secrets.SLACK_GITNOTIFY_WEBHOOK_URL }}

  validate-source-branch:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Validate PR source branch
        env:
          BASE_BRANCH: ${{ github.base_ref }}
          SOURCE_BRANCH: ${{ github.head_ref }}
        run: |
          echo "PR: $SOURCE_BRANCH -> $BASE_BRANCH"

          # ============================================
          # MAIN branch policy
          # ============================================
          # main can only be updated from main-staging
          if [[ "$BASE_BRANCH" == "main" ]]; then
            if [[ "$SOURCE_BRANCH" != "main-staging" ]]; then
              echo "::error::Branch 'main' can only be updated from 'main-staging'"
              echo "::error::Attempted merge from: $SOURCE_BRANCH"
              echo ""
              echo "Workflow: feature -> frontend-dev/backend-dev -> main-dev -> main-staging -> main"
              exit 1
            fi
            echo "✅ Valid: main-staging -> main"
          fi

          # ============================================
          # MAIN-STAGING branch policy
          # ============================================
          # main-staging can only be updated from main-dev
          if [[ "$BASE_BRANCH" == "main-staging" ]]; then
            if [[ "$SOURCE_BRANCH" != "main-dev" ]]; then
              echo "::error::Branch 'main-staging' can only be updated from 'main-dev'"
              echo "::error::Attempted merge from: $SOURCE_BRANCH"
              echo ""
              echo "Workflow: feature -> frontend-dev/backend-dev -> main-dev -> main-staging -> main"
              exit 1
            fi
            echo "✅ Valid: main-dev -> main-staging"
          fi

          # ============================================
          # MAIN-DEV branch policy
          # ============================================
          # main-dev can be updated from:
          # - frontend-dev, backend-dev (primary paths)
          # - feature/* branches (hotfixes, backend features)
          # - fix/*, docs/*, refactor/*, chore/* branches
          if [[ "$BASE_BRANCH" == "main-dev" ]]; then
            ALLOWED_PATTERNS="^(frontend-dev|backend-dev|feature/|fix/|docs/|test/|refactor/|chore/|release/|merge/)"

            if ! echo "$SOURCE_BRANCH" | grep -qE "$ALLOWED_PATTERNS"; then
              echo "::error::Branch 'main-dev' can only be updated from allowed branches"
              echo "::error::Attempted merge from: $SOURCE_BRANCH"
              echo ""
              echo "Allowed patterns:"
              echo "  - frontend-dev"
              echo "  - backend-dev"
              echo "  - feature/*"
              echo "  - fix/*"
              echo "  - docs/*"
              echo "  - test/*"
              echo "  - refactor/*"
              echo "  - chore/*"
              echo "  - release/*"
              echo "  - merge/*"
              exit 1
            fi
            echo "✅ Valid: $SOURCE_BRANCH -> main-dev"
          fi

          echo ""
          echo "Branch policy validated successfully"

  notify-end:
    if: always()
    needs: [validate-source-branch]
    continue-on-error: true
    uses: ./.github/workflows/notify-slack.yml
    with:
      event: ${{ contains(toJSON(needs), '"result":"failure"') && 'failed' || contains(toJSON(needs), '"result":"cancelled"') && 'cancelled' || 'completed' }}
      workflow_name: "Branch Policy"
      environment: automation
      branch: ${{ github.head_ref || github.ref_name }}
      actor: ${{ github.actor }}
      commit_sha: ${{ github.sha }}
      commit_message: ${{ github.event.head_commit.message || 'Manual trigger' }}
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets:
      SLACK_GITNOTIFY_WEBHOOK_URL: ${{ secrets.SLACK_GITNOTIFY_WEBHOOK_URL }}
