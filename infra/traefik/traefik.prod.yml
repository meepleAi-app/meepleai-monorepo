# Traefik v3.2 Production Configuration for meepleai.io
#
# This file replaces traefik.yml for production deployment
# Features:
# - HTTPS with Let's Encrypt automatic certificates
# - HTTP to HTTPS redirect
# - Security headers
# - Rate limiting ready
#
# Usage:
#   Copy to traefik.yml or mount as volume override

# API & Dashboard - SECURED
api:
  dashboard: true
  # Dashboard requires authentication via middleware (see docker-compose labels)

# Entry Points
entryPoints:
  # HTTP - redirects to HTTPS
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  # HTTPS - main entry point
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
        domains:
          - main: "meepleai.io"
            sans:
              - "*.meepleai.io"
      middlewares:
        - security-headers@file

# Logging - Production settings
log:
  level: INFO
  filePath: "/var/log/traefik/traefik.log"
  format: json
  maxSize: 100
  maxBackups: 5
  maxAge: 30
  compress: true

# Access Logs - with sensitive header filtering
accessLog:
  filePath: "/var/log/traefik/access.log"
  format: json
  bufferingSize: 100
  fields:
    headers:
      defaultMode: keep
      names:
        Authorization: drop
        Cookie: drop
        Set-Cookie: drop

# Providers
providers:
  # Docker Provider via Socket Proxy (SECURE)
  docker:
    endpoint: "tcp://docker-socket-proxy:2375"
    exposedByDefault: false
    network: "meepleai"
    watch: true

  # File Provider (dynamic configuration)
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

# Let's Encrypt Certificate Resolver
certificatesResolvers:
  letsencrypt:
    acme:
      email: "admin@meepleai.io"  # CHANGE TO YOUR EMAIL
      storage: "/letsencrypt/acme.json"
      # Production server (remove caServer line for production)
      # caServer: "https://acme-staging-v02.api.letsencrypt.org/directory"
      httpChallenge:
        entryPoint: web

  # Alternative: DNS Challenge for wildcard certs (requires Cloudflare)
  # letsencrypt-dns:
  #   acme:
  #     email: "admin@meepleai.io"
  #     storage: "/letsencrypt/acme-dns.json"
  #     dnsChallenge:
  #       provider: cloudflare
  #       delayBeforeCheck: 10
  #       resolvers:
  #         - "1.1.1.1:53"
  #         - "8.8.8.8:53"

# Metrics for Prometheus
metrics:
  prometheus:
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0

# Global settings
global:
  checkNewVersion: false
  sendAnonymousUsage: false
