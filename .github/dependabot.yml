version: 2
updates:
  # .NET dependencies - Security updates (daily)
  - package-ecosystem: "nuget"
    directory: "/apps/api"
    schedule:
      interval: "daily"
      time: "00:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    reviewers:
      - "DegrassiAaron"
    labels:
      - "dependencies"
      - "dotnet"
      - "security"
      - "automerge"
    commit-message:
      prefix: "fix(deps)"
      include: "scope"
    # Only security updates in daily runs
    groups:
      security-patches:
        patterns:
          - "*"
        update-types:
          - "patch"
    versioning-strategy: "increase-if-necessary"

  # .NET dependencies - Regular updates (weekly)
  - package-ecosystem: "nuget"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "DegrassiAaron"
    labels:
      - "dependencies"
      - "dotnet"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Group minor and patch updates together
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    versioning-strategy: "increase"
    ignore:
      # Ignore EF Core major updates (requires manual migration planning)
      - dependency-name: "Microsoft.EntityFrameworkCore*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Npgsql.EntityFrameworkCore.PostgreSQL"
        update-types: ["version-update:semver-major"]
      # Skip patch updates (handled by daily security updates)
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]

  # Frontend dependencies - Security updates (daily)
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "daily"
      time: "00:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    reviewers:
      - "DegrassiAaron"
    labels:
      - "dependencies"
      - "frontend"
      - "security"
      - "automerge"
    commit-message:
      prefix: "fix(deps)"
      include: "scope"
    # Only security patch updates in daily runs
    groups:
      security-patches:
        patterns:
          - "*"
        update-types:
          - "patch"
    versioning-strategy: "increase-if-necessary"

  # Frontend dependencies - Regular updates (weekly)
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "DegrassiAaron"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Group minor updates
    groups:
      minor-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
    versioning-strategy: "increase"
    ignore:
      # Ignore major version updates (requires manual review and testing)
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      # Skip patch updates (handled by daily security updates)
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "00:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    reviewers:
      - "DegrassiAaron"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

  # Docker dependencies
  - package-ecosystem: "docker"
    directory: "/infra"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "00:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    reviewers:
      - "DegrassiAaron"
    labels:
      - "dependencies"
      - "docker"
      - "security"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
