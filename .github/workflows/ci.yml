name: CI

on:
  pull_request:
    branches: [main, main-staging]
    # Issue #850: skip CI on docs-only PRs. ci.yml is not in required-status
    # checks on either branch (verified 2026-05-13), and the legacy CI suite
    # is not relevant for documentation/license/gitignore changes.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  push:
    # Spec R2 — CI optimization (2026-04-09): ci.yml must run on push to
    # main-staging so deploy-staging.yml can gate on its conclusion via
    # workflow_run. Only main-staging is listed here to avoid duplicate
    # CI runs on every push to other branches (the pull_request trigger
    # already covers feature branches via the PR flow).
    branches: [main-staging]
  workflow_dispatch:
  workflow_call:  # Allow reuse by deploy-staging.yml

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Minimal required permissions
permissions:
  contents: read
  pull-requests: write
  checks: write

  actions: read
jobs:
  # Quick path filtering to skip unchanged areas
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      python: ${{ steps.filter.outputs.python }}
      infra: ${{ steps.filter.outputs.infra }}
      runner: ${{ steps.select-runner.outputs.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            frontend:
              - 'apps/web/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'
              - '.github/actions/setup-frontend/**'
              - '.github/actions/setup-playwright/**'
            backend:
              - 'apps/api/**'
              - 'global.json'
            python:
              - 'apps/orchestration-service/**'
            infra:
              - 'infra/**'
              - 'docker-compose*.yml'

      - name: Select runner (GitHub-hosted for all CI jobs)
        id: select-runner
        run: |
          echo "runner=ubuntu-latest" >> $GITHUB_OUTPUT
          echo "🏃 Using GitHub-hosted runner"

  # Build .NET solution once and share via artifact across all backend test jobs.
  # Eliminates ~5× redundant `dotnet build` (was 5 jobs × ~5min each = ~25min CPU).
  # Pattern: Build Once, Test Many (Fowler). Coverage switches to dotnet-coverage
  # wrapper (runtime, --no-build friendly) in consumer jobs.
  # Spec: docs/for-developers/specs/2026-05-25-ci-build-once-test-many.md
  build-backend:
    name: Build Backend
    runs-on: ${{ needs.changes.outputs.runner }}
    needs: changes
    timeout-minutes: 15
    # Runs when backend OR frontend changes: e2e job needs the API even when
    # only the frontend changed (it starts the backend to test against).
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install PDF Dependencies
        run: sudo apt-get update && sudo apt-get install -y libgdiplus

      - name: Setup Backend
        uses: ./.github/actions/setup-backend
        with:
          dotnet-version: '9.0.x'
          working-directory: apps/api

      - name: Build Solution (Release)
        run: dotnet build MeepleAI.Api.sln --no-restore --configuration Release

      - name: Package build artifacts
        # Tar+zstd preserves symlinks and timestamps; small overhead vs raw upload
        # but avoids the artifact-v4+ silent permission stripping on bin/ executables.
        shell: bash
        run: |
          echo "📦 Packaging backend build artifacts..."
          tar --use-compress-program='zstd -3 -T0' \
              -cf /tmp/backend-build.tar.zst \
              --exclude='**/TestResults' \
              --exclude='**/coverage' \
              src/Api/bin src/Api/obj \
              src/Api.Analyzers/bin src/Api.Analyzers/obj \
              tests/Api.Tests/bin tests/Api.Tests/obj \
              tests/Api.Analyzers.Tests/bin tests/Api.Analyzers.Tests/obj
          ls -lh /tmp/backend-build.tar.zst
          echo "✅ Backend artifact packaged"

      - name: Upload backend artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-build-${{ github.run_id }}
          path: /tmp/backend-build.tar.zst
          retention-days: 1
          compression-level: 0  # already zstd-compressed

  # Build Next.js once with default config (no fixture flag) and share via
  # artifact. Consumed by `frontend-bundle-size` and `e2e`. NOT used by
  # `frontend-a11y` which needs NEXT_PUBLIC_VISUAL_TEST_FIXTURE_ENABLED=1
  # (constant-folded at build time → separate artifact in build-frontend-a11y).
  # Spec: docs/for-developers/specs/2026-05-25-ci-build-once-test-many.md
  build-frontend:
    name: Build Frontend
    runs-on: ${{ needs.changes.outputs.runner }}
    needs: changes
    timeout-minutes: 15
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: '20'
          pnpm-version: '10'
          working-directory: apps/web
          frozen-lockfile: 'true'

      - name: Build (default config)
        run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8080

      - name: Package frontend build
        shell: bash
        run: |
          echo "📦 Packaging frontend .next/ ..."
          tar --use-compress-program='zstd -3 -T0' \
              -cf /tmp/frontend-build.tar.zst \
              .next
          ls -lh /tmp/frontend-build.tar.zst
          echo "✅ Frontend artifact packaged"

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build-${{ github.run_id }}
          path: /tmp/frontend-build.tar.zst
          retention-days: 1
          compression-level: 0

  # Build Next.js with NEXT_PUBLIC_VISUAL_TEST_FIXTURE_ENABLED=1 for the
  # a11y suite. Separate from build-frontend because Next.js constant-folds
  # NEXT_PUBLIC_* env vars at build time — same artifact cannot serve both
  # configs. Net change: 4× pnpm build → 2× builds (still −50% CPU).
  build-frontend-a11y:
    name: Build Frontend (a11y config)
    runs-on: ${{ needs.changes.outputs.runner }}
    needs: changes
    timeout-minutes: 15
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: '20'
          pnpm-version: '10'
          working-directory: apps/web
          frozen-lockfile: 'true'

      - name: Build (a11y config — visual-test fixture enabled)
        run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8080
          # Wave B.1 (#633): enable visual-test fixture so e2e/a11y/games-library.spec.ts
          # can scan /games?tab=library default + filtered-empty surfaces without a backend.
          # Constant-folded at build time; STATE_OVERRIDE_ENABLED also unlocks `?state=...`
          # URL hatch under prod NODE_ENV.
          NEXT_PUBLIC_VISUAL_TEST_FIXTURE_ENABLED: '1'

      - name: Package frontend (a11y) build
        shell: bash
        run: |
          echo "📦 Packaging frontend (a11y) .next/ ..."
          tar --use-compress-program='zstd -3 -T0' \
              -cf /tmp/frontend-build-a11y.tar.zst \
              .next
          ls -lh /tmp/frontend-build-a11y.tar.zst
          echo "✅ Frontend (a11y) artifact packaged"

      - name: Upload frontend (a11y) artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build-a11y-${{ github.run_id }}
          path: /tmp/frontend-build-a11y.tar.zst
          retention-days: 1
          compression-level: 0

  # Frontend Lint — fast-fail check (~1 min). Independent job so lint
  # errors abort early without waiting on the 9-min vitest matrix.
  # Onda A refactor 2026-05-25: split from monolithic 'frontend' job
  # (was 27.9 min wall-clock, lint+typecheck+test+coverage serialized).
  frontend-lint:
    name: Frontend - Lint
    runs-on: ${{ needs.changes.outputs.runner }}
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: '20'
          pnpm-version: '10'
          working-directory: apps/web
          frozen-lockfile: 'true'

      - name: Lint
        run: pnpm lint
        # Note: package.json lint script has --max-warnings=15 for security false positives

      # DS-2 (token canonicalization, 2026-05-12):
      # Non-blocking inventory of `local/no-hardcoded-color-utility` violations.
      # Produces audits/2026-05-12-token-violations.{json,md} for cluster
      # prioritization in DS-3 and subsequent migration PRs (DS-4..DS-11).
      # Switched to blocking (`--max-warnings 0`) in DS-12.
      - name: Token vocabulary inventory (non-blocking)
        run: pnpm lint:tokens
        continue-on-error: true

      - name: Upload token violations report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: token-violations-${{ github.run_number }}
          path: |
            audits/2026-05-12-token-violations.json
            audits/2026-05-12-token-violations.md
          retention-days: 14

  # Frontend Typecheck — fast-fail check (~1 min). Independent job for
  # parallel execution with lint.
  frontend-typecheck:
    name: Frontend - Typecheck
    runs-on: ${{ needs.changes.outputs.runner }}
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: '20'
          pnpm-version: '10'
          working-directory: apps/web
          frozen-lockfile: 'true'

      - name: Typecheck
        run: pnpm typecheck

  # Frontend Unit Tests — sharded across 3 threads (matches dev-fast.yml pattern).
  # Pre-Onda-A: 25 min sequential vitest run. Post: ~9 min parallel.
  # MSW (Mock Service Worker) is configured globally in vitest.setup.tsx —
  # tests use MSW to simulate API responses for both unit and integration testing.
  # Coverage: each shard uploads its own coverage with a shard-tagged flag;
  # codecov merges server-side via the `frontend` flag (parent).
  frontend-test:
    name: Frontend - Unit Tests (shard ${{ matrix.shard }}/3)
    runs-on: ${{ needs.changes.outputs.runner }}
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: '20'
          pnpm-version: '10'
          working-directory: apps/web
          frozen-lockfile: 'true'

      - name: Unit & Integration Tests (Vitest shard ${{ matrix.shard }}/3)
        # Bypass the `pnpm test:coverage` wrapper to forward --shard cleanly.
        # Vitest 3.x supports deterministic file-level sharding via --shard.
        # Coverage stays enabled per shard; codecov merges on upload.
        run: pnpm exec vitest run --shard ${{ matrix.shard }}/3 --coverage
        env:
          NODE_ENV: test
          CI: true

      - name: Upload Coverage (shard ${{ matrix.shard }})
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: apps/web/coverage/lcov.info
          flags: frontend,frontend-shard-${{ matrix.shard }}
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # Backend Unit Tests (fast, no service containers needed)
  # Build-Once refactor 2026-05-25: consumes upstream `build-backend` artifact
  # instead of running its own restore+build (~4-5 min saved per CI run).
  backend-unit:
    name: Backend - Unit Tests
    runs-on: ${{ needs.changes.outputs.runner }}
    needs: [changes, build-backend]
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install PDF Dependencies
        run: sudo apt-get update && sudo apt-get install -y libgdiplus

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Download backend artifact
        uses: actions/download-artifact@v7
        with:
          name: backend-build-${{ github.run_id }}
          path: /tmp/

      - name: Extract backend artifact
        shell: bash
        working-directory: apps/api
        run: |
          echo "📂 Extracting backend build artifact..."
          tar --use-compress-program='zstd -d' -xf /tmp/backend-build.tar.zst
          echo "✅ Backend artifact extracted"

      - name: Install dotnet-coverage
        run: |
          dotnet tool install --global dotnet-coverage
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Run Unit Tests with Coverage
        timeout-minutes: 30
        env:
          CI: true
        run: |
          echo "🧪 Running unit tests with dotnet-coverage..."
          mkdir -p coverage
          dotnet-coverage collect \
            "dotnet test MeepleAI.Api.sln \
              --filter Category=Unit \
              --settings tests/Api.Tests/unit.runsettings \
              --no-build \
              --configuration Release \
              --blame-hang-timeout 5min" \
            -f cobertura \
            -o coverage/unit-coverage.xml
          echo "✅ Unit tests passed"

      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: apps/api/coverage/unit-coverage.xml
          flags: backend-unit,backend
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # Backend Integration Tests (requires service containers, runs in parallel with unit tests)
  # Phase 2+3: 4 parallel threads per shard, 3-shard matrix for ~4-12x total speedup
  #
  # Spec R1 — CI optimization (2026-04-09): backend-integration runs ONLY on
  # release-candidate PRs (target main-staging or main) and on workflow_dispatch
  # / workflow_call (from deploy-staging.yml). Feature PRs against main-dev
  # skip this job to keep wall-clock under 10min on the commit stage. Coverage
  # is regained at the acceptance stage when merging into main-staging.
  #
  # Build-Once refactor 2026-05-25: each of 3 shards consumes the upstream
  # build-backend artifact (~30s download) instead of running its own
  # dotnet build (~5 min). Coverage switched from coverlet.msbuild (build-time
  # instrumentation, incompatible with --no-build) to dotnet-coverage wrapper
  # (runtime profiler), matching the backend-unit pattern.
  backend-integration:
    name: Backend - Integration (${{ matrix.shard.name }})
    runs-on: ${{ needs.changes.outputs.runner }}
    needs: [changes, build-backend]
    if: |
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'workflow_call'
      || (
        (github.base_ref == 'main-staging' || github.base_ref == 'main')
        && needs.changes.outputs.backend == 'true'
      )
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: "KnowledgeBase"
            filter_extra: "&(FullyQualifiedName~KnowledgeBase|FullyQualifiedName~DocumentProcessing|FullyQualifiedName~Authentication)"
            coverage_file: "integration-coverage-shard1.xml"
          - name: "Games"
            filter_extra: "&(FullyQualifiedName~SharedGameCatalog|FullyQualifiedName~GameManagement|FullyQualifiedName~Administration)"
            coverage_file: "integration-coverage-shard2.xml"
          - name: "Core"
            filter_extra: "&FullyQualifiedName!~KnowledgeBase&FullyQualifiedName!~DocumentProcessing&FullyQualifiedName!~Authentication&FullyQualifiedName!~SharedGameCatalog&FullyQualifiedName!~GameManagement&FullyQualifiedName!~Administration"
            coverage_file: "integration-coverage-shard3.xml"

    services:
      postgres:
        image: pgvector/pgvector:pg16  # Issue #3547: Use pgvector image for Vector column support
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: meepleai_test
        # Fix: Default max_connections=100 causes "too many clients" with 4 parallel test threads.
        # Each shard runs ~35 test classes, each with its own connection pool.
        # 200 connections provides headroom for parallel execution.
        # Note: GitHub Actions service containers pass extra options as Docker args,
        # but postgres command args must go after the image entrypoint.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --shm-size=256mb
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install PDF Dependencies
        run: sudo apt-get update && sudo apt-get install -y libgdiplus

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Download backend artifact
        uses: actions/download-artifact@v7
        with:
          name: backend-build-${{ github.run_id }}
          path: /tmp/

      - name: Extract backend artifact
        shell: bash
        working-directory: apps/api
        run: |
          echo "📂 Extracting backend build artifact..."
          tar --use-compress-program='zstd -d' -xf /tmp/backend-build.tar.zst
          echo "✅ Backend artifact extracted"

      - name: Install dotnet-coverage
        run: |
          dotnet tool install --global dotnet-coverage
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Pre-Test Cleanup
        shell: bash
        run: |
          echo "🧹 Cleaning up orphaned Testcontainers..."
          containers=$(docker ps -a --filter "label=org.testcontainers=true" -q 2>/dev/null)
          if [ -n "$containers" ]; then
            echo "$containers" | xargs docker rm -f 2>/dev/null || true
            echo "✅ Cleaned up orphaned containers"
          else
            echo "✅ No orphaned containers found"
          fi

      - name: Install Redis CLI
        run: sudo apt-get update && sudo apt-get install -y redis-tools

      - name: Wait for Services
        timeout-minutes: 3
        run: |
          echo "⏳ Waiting for PostgreSQL..."
          until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done
          echo "✅ PostgreSQL ready"

          echo "⏳ Waiting for Redis..."
          until redis-cli -h localhost -p 6379 ping > /dev/null 2>&1; do sleep 1; done
          echo "✅ Redis ready"

      - name: Create CI Secret Files
        working-directory: .
        run: |
          echo "🔧 Creating CI secret files for integration tests..."
          mkdir -p infra/secrets
          printf 'POSTGRES_USER=postgres\nPOSTGRES_PASSWORD=testpass\nPOSTGRES_DB=meepleai_test\n' > infra/secrets/database.secret
          printf 'REDIS_PASSWORD=redis-ci-test\n' > infra/secrets/redis.secret
          printf 'JWT_SECRET_KEY=ci-test-jwt-secret-key-minimum-32-chars-long\nJWT_ISSUER=meepleai-ci-test\nJWT_AUDIENCE=meepleai-ci-test\n' > infra/secrets/jwt.secret
          printf 'ADMIN_EMAIL=admin@test.local\nADMIN_PASSWORD=CiTestPassword123!\nADMIN_DISPLAY_NAME=CI Admin\nINITIAL_ADMIN_EMAIL=admin@test.local\nINITIAL_ADMIN_DISPLAY_NAME=CI Admin\n' > infra/secrets/admin.secret
          printf 'EMBEDDING_SERVICE_URL=http://localhost:8000\n' > infra/secrets/embedding-service.secret
          echo "✅ CI secret files created"

      - name: Verify PostgreSQL Connection Limits
        env:
          PGPASSWORD: testpass
        run: |
          echo "🔧 Verifying PostgreSQL max_connections..."
          psql -h localhost -U postgres -d meepleai_test -c "SHOW max_connections;"
          echo "✅ Default max_connections=100 — connection pools limited via MaxPoolSize in conn strings"

      # Build step removed (2026-05-25 Build-Once refactor) — backend binaries
      # are downloaded from the upstream `build-backend` job artifact above.

      # Issue #3102: Exclude tests that use their own Testcontainers - they conflict with CI service containers.
      # - UploadPdfMidPhaseCancellationTests: Uses SharedTestcontainersFixture
      # - FrontendSdk tests: Use FrontendSdkTestFactory with own containers
      # - ArbitroAgentIntegrationTests: Uses SharedTestcontainersFixture with orchestration-service (Issue #3871)
      # These tests run in the dedicated backend-e2e-tests.yml workflow instead.
      - name: Run Integration Tests
        # PR #1505 (2026-05-25): raised from 30→45 minutes. The GameRef
        # fixture-drift cleanup unblocked ~150 previously-failing tests so
        # the suite now actually runs to completion (it used to short-circuit
        # on the first wave of failures at ~25 min). 45 min keeps headroom
        # for transient Testcontainers churn on the GitHub-hosted runner.
        timeout-minutes: 45
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: meepleai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          # MaxPoolSize=2 + ClearAllPools() in teardown prevents accumulation within max_connections=100
          ConnectionStrings__Postgres: Host=localhost;Port=5432;Database=meepleai_test;Username=postgres;Password=testpass;MaxPoolSize=2;Timeout=30;Command Timeout=60
          REDIS_URL: localhost:6379,allowAdmin=true
          OPENROUTER_API_KEY: test-key
          CI: true
          # Issue #3102: Disable rate limiting middleware for integration tests to prevent 429 errors
          DISABLE_RATE_LIMITING: "true"
          # Issue #CI-Optimization: Pass external service URLs so SharedTestcontainersFixture
          # skips container startup and uses CI service containers directly
          # MaxPoolSize=2 + ClearAllPools() in test teardown — matches fixture code
          TEST_POSTGRES_CONNSTRING: Host=localhost;Port=5432;Database=meepleai_test;Username=postgres;Password=testpass;MaxPoolSize=2;Timeout=30;Command Timeout=60
          TEST_REDIS_CONNSTRING: localhost:6379,allowAdmin=true
        run: |
          echo "🧪 Running integration tests - shard: ${{ matrix.shard.name }} (4 parallel threads)..."
          mkdir -p coverage
          # PR #1505 (2026-05-25): target tests/Api.Tests/Api.Tests.csproj explicitly.
          # Without this `dotnet test` walks the solution and also invokes
          # Api.Analyzers.Tests.dll, which has zero tests matching
          # Category=Integration → "No test matches the given testcase filter" →
          # the assembly returns exit 1 (vstest treats no-match-on-non-empty
          # assembly as an error) → the whole step fails even though
          # Api.Tests.dll has Passed=N, Failed=0.
          #
          # Build-Once refactor (2026-05-25): switched from coverlet.msbuild
          # (-p:CollectCoverage=true) to dotnet-coverage wrapper so the tests
          # can run with --no-build using the upstream build-backend artifact.
          # Coverlet.msbuild requires build-time instrumentation; dotnet-coverage
          # is a runtime profiler attached to the dotnet test process.
          dotnet-coverage collect \
            "dotnet test tests/Api.Tests/Api.Tests.csproj \
              --filter \"Category=Integration&FullyQualifiedName!~UploadPdfMidPhaseCancellationTests&FullyQualifiedName!~FrontendSdk&FullyQualifiedName!~ArbitroAgent${{ matrix.shard.filter_extra }}\" \
              --settings tests/Api.Tests/integration.runsettings \
              --logger \"console;verbosity=minimal\" \
              --no-build \
              --configuration Release \
              --blame-hang-timeout 5min \
              --blame-hang-dump-type mini" \
            -f cobertura \
            -o coverage/${{ matrix.shard.coverage_file }}
          echo "✅ Integration tests passed - shard: ${{ matrix.shard.name }}"

      - name: Upload Coverage
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: apps/api/coverage/${{ matrix.shard.coverage_file }}
          flags: backend-integration-${{ matrix.shard.name }}
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # Python Services: Pytest for orchestration-service
  python-tests:
    name: Python - Orchestration Service Tests
    runs-on: ${{ needs.changes.outputs.runner }}
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: apps/orchestration-service
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/orchestration-service/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run Arbitro Agent Tests
        run: |
          python -m pytest tests/test_arbitro_agent.py \
            --cov=src \
            --cov-report=term \
            --cov-report=xml:coverage.xml \
            -v
        env:
          CI: true
        # Note: Coverage requirement removed - test isolation makes 85% threshold impractical
        # Coverage is still measured and reported to Codecov for monitoring

      - name: Upload Python Coverage
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: apps/orchestration-service/coverage.xml
          flags: python,arbitro
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # Stage 6: E2E Tests (Critical paths only)
  # Full E2E suite with 4-shard parallel execution runs separately in e2e-tests.yml
  #
  # Build-Once refactor 2026-05-25: consumes upstream build-backend +
  # build-frontend artifacts instead of running its own builds (~7 min saved).
  e2e:
    name: E2E - Critical Paths
    runs-on: ${{ needs.changes.outputs.runner }}
    needs: [changes, build-backend, build-frontend]
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'

    # Service containers for backend (required for E2E tests)
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: meepleai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_test_password
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ===== Backend Setup =====
      - name: Wait for Services
        working-directory: .
        timeout-minutes: 2
        run: |
          echo "⏳ Waiting for PostgreSQL..."
          until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done
          echo "✅ PostgreSQL ready"

          echo "⏳ Waiting for Redis..."
          for i in {1..30}; do
            if nc -z localhost 6379 2>/dev/null; then
              echo "✅ Redis ready"
              break
            fi
            sleep 1
          done

      - name: Create CI Secret Files
        working-directory: .
        run: |
          mkdir -p infra/secrets
          printf 'POSTGRES_USER=postgres\nPOSTGRES_PASSWORD=postgres_test_password\nPOSTGRES_DB=meepleai_test\n' > infra/secrets/database.secret
          printf 'REDIS_PASSWORD=redis-ci-test\n' > infra/secrets/redis.secret
          printf 'JWT_SECRET_KEY=ci-test-jwt-secret-key-minimum-32-chars-long\nJWT_ISSUER=meepleai-ci-test\nJWT_AUDIENCE=meepleai-ci-test\n' > infra/secrets/jwt.secret
          printf 'ADMIN_EMAIL=admin@test.local\nADMIN_PASSWORD=CiTestPassword123!\nADMIN_DISPLAY_NAME=CI Admin\nINITIAL_ADMIN_EMAIL=admin@test.local\nINITIAL_ADMIN_DISPLAY_NAME=CI Admin\n' > infra/secrets/admin.secret
          printf 'EMBEDDING_SERVICE_URL=http://localhost:8000\n' > infra/secrets/embedding-service.secret

      # Use the full composite action (not just setup-dotnet) because
      # `dotnet ef database update --no-build` (Run Database Migrations step
      # below) needs Microsoft.EntityFrameworkCore.Design restored into
      # ~/.nuget/packages/. Design-time tools are NOT part of the bin/obj
      # artifact from build-backend. Cost: ~30s of cached NuGet restore.
      - name: Setup Backend (restore NuGet for EF design-time tools)
        uses: ./.github/actions/setup-backend
        with:
          dotnet-version: '9.0.x'
          working-directory: apps/api

      - name: Download backend artifact
        uses: actions/download-artifact@v7
        with:
          name: backend-build-${{ github.run_id }}
          path: /tmp/

      - name: Extract backend artifact
        shell: bash
        working-directory: apps/api
        run: |
          echo "📂 Extracting backend build artifact (overwrites any cached bin/obj)..."
          tar --use-compress-program='zstd -d' -xf /tmp/backend-build.tar.zst
          echo "✅ Backend artifact extracted"

      - name: Install EF Core Tools
        run: |
          dotnet tool install --global dotnet-ef
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Run Database Migrations
        working-directory: apps/api/src/Api
        run: dotnet ef database update --no-build --configuration Release
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: meepleai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_test_password

      - name: Start Backend API
        working-directory: apps/api/src/Api
        run: |
          dotnet run --no-build --configuration Release --no-launch-profile > /tmp/api.log 2>&1 &
          echo $! > api.pid
          echo "API started with PID $(cat api.pid)"
        env:
          ASPNETCORE_ENVIRONMENT: CI
          ASPNETCORE_URLS: "http://localhost:8080"
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: meepleai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_test_password
          REDIS_URL: "localhost:6379"
          OPENROUTER_API_KEY: "test-key-for-ci-placeholder"
          LOCAL_EMBEDDING_URL: "http://localhost:8000"  # Override default docker hostname

      - name: Wait for API Health
        working-directory: .
        timeout-minutes: 2
        run: |
          echo "⏳ Waiting for API to be healthy..."
          for i in {1..40}; do
            if curl -sf http://localhost:8080/health/live > /dev/null 2>&1; then
              echo "✅ API live after ~$((i*3))s"
              curl -sf http://localhost:8080/health/ready > /dev/null 2>&1 && echo "✅ Core services ready" || echo "⚠️ Some core services degraded (non-blocking)"
              exit 0
            fi
            if [ $((i % 5)) -eq 0 ]; then
              echo "  Still waiting... (attempt $i/40)"
              if [ -f apps/api/src/Api/api.pid ] && ! kill -0 $(cat apps/api/src/Api/api.pid) 2>/dev/null; then
                echo "❌ API process died. Last 30 lines of log:"
                tail -30 /tmp/api.log 2>/dev/null || echo "(no log file)"
                exit 1
              fi
            fi
            sleep 3
          done
          echo "❌ API failed to start within 2 minutes"
          echo "=== Last 50 lines of API log ==="
          tail -50 /tmp/api.log 2>/dev/null || echo "(no log file)"
          echo "=== Checking if process is alive ==="
          if [ -f apps/api/src/Api/api.pid ]; then
            kill -0 $(cat apps/api/src/Api/api.pid) 2>/dev/null && echo "Process alive but not responding" || echo "Process dead"
          fi
          echo "=== Checking port 8080 ==="
          ss -tlnp | grep 8080 || echo "Nothing listening on 8080"
          exit 1

      # ===== Frontend Setup =====
      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend
        with:
          working-directory: apps/web
          frozen-lockfile: 'true'

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          working-directory: apps/web

      - name: Download frontend artifact
        uses: actions/download-artifact@v7
        with:
          name: frontend-build-${{ github.run_id }}
          path: /tmp/

      - name: Extract frontend artifact
        shell: bash
        working-directory: apps/web
        run: |
          echo "📂 Extracting frontend build artifact..."
          tar --use-compress-program='zstd -d' -xf /tmp/frontend-build.tar.zst
          echo "✅ Frontend artifact extracted"

      - name: Setup Test Environment
        run: cp .env.test.example .env.test

      - name: Run E2E Tests (Smoke)
        timeout-minutes: 15
        run: pnpm test:e2e --project=desktop-chrome e2e/smoke.spec.ts
        env:
          CI: true

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_number }}
          path: apps/web/playwright-report/
          retention-days: 7

  # Frontend Accessibility Gate (Issue #601)
  # Runs Playwright + axe-core against public routes for WCAG 2.1 AA compliance.
  # STATUS: BLOCKING (continue-on-error removed Phase D #1094-closure, 2026-05-18).
  #
  # History (chronological):
  #   - #807 (closed 2026-05-09): SP6 v2 token redesign — entity tokens AA on light;
  #     base text/bg pairs AA on both themes.
  #   - #808 (closed): SP6 freeze lifted post-#807.
  #   - #752 (CLOSED 2026-05-12 via #876): D.2 Foundation dark-mode contrast —
  #     text-slate-500 on dark backgrounds fixed via semantic token migration.
  #     Was the original blocker for this gate; was superseded by #1094.
  #   - #1094 (CLOSED 2026-05-18 via Phase A.live v11): canonical A11y restoration
  #     plan executed across Phase 0 (preface) → A (per-node inventory) → B (cluster
  #     grouping) → C (Real-C-A through Real-C-misc + ARIA defects fix) → D (this
  #     gate flip). Final v11 axe run: 0 color-contrast + 0 ARIA violations across
  #     96 a11y tests. Trajectory v4 baseline 103 color-contrast + ~11 ARIA → v11 0
  #     (-100%). PRs landed under #1094 closure: #1219, #1224, #1225, #1226, #1227,
  #     #1228, #1231, #1232, #1235, #1237, #1248, #1249, #1252, #1254, #1256,
  #     #1257, #1260. Audit doc: docs/for-developers/audits/a11y-color-contrast-restoration.md
  #   - #1015 (OPEN — complementary, NOT a substitute): release-level baseline-diff
  #     gating for PRs that introduce NEW violations. This gate (frontend-a11y)
  #     now blocks on ANY axe AA violation; #1015 will additionally enforce
  #     non-regression at release boundaries.
  # Build-Once refactor 2026-05-25: consumes upstream build-frontend-a11y
  # artifact instead of running its own pnpm build with the visual-test
  # fixture flag (~100s saved).
  frontend-a11y:
    name: Frontend - A11y E2E
    runs-on: ${{ needs.changes.outputs.runner }}
    timeout-minutes: 15
    needs: [changes, build-frontend-a11y]
    # continue-on-error removed in Phase D gate flip (#1094 closure, 2026-05-18).
    # Any axe AA violation now fails CI. Pre-existing test-infrastructure flakes
    # (e.g. timing-sensitive focus assertions, fixture loading timeouts) tracked
    # separately — these are NOT axe violations; they need test-script fixes.
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: '20'
          pnpm-version: '10'
          working-directory: apps/web
          frozen-lockfile: 'true'

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          working-directory: apps/web

      - name: Download frontend (a11y) artifact
        uses: actions/download-artifact@v7
        with:
          name: frontend-build-a11y-${{ github.run_id }}
          path: /tmp/

      - name: Extract frontend (a11y) artifact
        shell: bash
        working-directory: apps/web
        run: |
          echo "📂 Extracting frontend (a11y) build artifact..."
          tar --use-compress-program='zstd -d' -xf /tmp/frontend-build-a11y.tar.zst
          echo "✅ Frontend (a11y) artifact extracted"

      - name: Setup Test Environment
        run: cp .env.test.example .env.test

      - name: Run A11y E2E Tests
        run: pnpm test:a11y:e2e
        env:
          CI: true

      - name: Upload Playwright Report (A11y)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-a11y-${{ github.run_number }}
          path: apps/web/playwright-report/
          retention-days: 7

  # Frontend bundle-size budget enforcement (Issue #629).
  # Verifies First Load JS for budgeted public routes against
  # `apps/web/.bundle-budgets.json`. Fails when any route exceeds
  # `budget × (1 + tolerance)` (default 5%). Documented in
  # `docs/frontend/bundle-size-budget.md`.
  #
  # Build-Once refactor 2026-05-25: consumes upstream build-frontend artifact
  # instead of running its own pnpm build (~100s saved). The default-config
  # build matches what bundle-size budgets target (no a11y fixture flag).
  frontend-bundle-size:
    name: Frontend - Bundle Size
    runs-on: ${{ needs.changes.outputs.runner }}
    timeout-minutes: 15
    needs: [changes, build-frontend]
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: '20'
          pnpm-version: '10'
          working-directory: apps/web
          frozen-lockfile: 'true'

      - name: Download frontend artifact
        uses: actions/download-artifact@v7
        with:
          name: frontend-build-${{ github.run_id }}
          path: /tmp/

      - name: Extract frontend artifact
        shell: bash
        working-directory: apps/web
        run: |
          echo "📂 Extracting frontend build artifact..."
          tar --use-compress-program='zstd -d' -xf /tmp/frontend-build.tar.zst
          echo "✅ Frontend artifact extracted"

      - name: Check Bundle Budgets
        run: pnpm bundle:check

      - name: Upload Bundle Budget Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-budget-report-${{ github.run_number }}
          path: apps/web/.next/diagnostics/bundle-budget-report.json
          retention-days: 30

  # Final status check
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-frontend-a11y, frontend, frontend-a11y, frontend-bundle-size, backend-unit, backend-integration, python-tests, e2e]
    if: always()
    steps:
      - name: Check Status
        run: |
          # Required upstream build jobs (Build-Once refactor 2026-05-25).
          # If a build fails, every downstream test job is skipped — the loop
          # below would then see only 'skipped' results and not flag the failure.
          # We catch build failures explicitly here.
          for build_job in build-backend build-frontend build-frontend-a11y; do
            case "$build_job" in
              build-backend) result="${{ needs.build-backend.result }}" ;;
              build-frontend) result="${{ needs.build-frontend.result }}" ;;
              build-frontend-a11y) result="${{ needs.build-frontend-a11y.result }}" ;;
            esac
            # 'skipped' is OK (paths filter excluded that area); 'failure' / 'cancelled' is not.
            if [ "$result" == "failure" ] || [ "$result" == "cancelled" ]; then
              echo "❌ CI Failed: upstream build $build_job=$result"
              exit 1
            fi
          done

          # Required jobs (block CI)
          # NOTE: frontend-a11y was non-blocking via job-level continue-on-error
          # until Phase D gate flip (#1094 closure, 2026-05-18). It is now in the
          # required-jobs list — any axe AA violation fails CI. #1015 (release-
          # level baseline-diff) is complementary, not a substitute.
          for job in frontend frontend-a11y frontend-bundle-size backend-unit python-tests e2e; do
            result="${{ needs.frontend.result }}"
            case "$job" in
              frontend-a11y) result="${{ needs.frontend-a11y.result }}" ;;
              frontend-bundle-size) result="${{ needs.frontend-bundle-size.result }}" ;;
              backend-unit) result="${{ needs.backend-unit.result }}" ;;
              python-tests) result="${{ needs.python-tests.result }}" ;;
              e2e) result="${{ needs.e2e.result }}" ;;
            esac
            if [ "$result" == "failure" ] || [ "$result" == "cancelled" ]; then
              echo "❌ CI Failed: $job=$result"
              exit 1
            fi
          done

          # Advisory jobs (warn but don't block — integration tests depend on CI
          # service containers). frontend-a11y was promoted to required (above) on
          # 2026-05-18 via #1094 Phase D closure.
          integration_result="${{ needs.backend-integration.result }}"
          if [ "$integration_result" == "failure" ]; then
            echo "⚠️ CI Warning: backend-integration=$integration_result (non-blocking, may be infrastructure)"
          fi

          echo "✅ CI Passed"

  # Deploy preview comment for PRs targeting staging
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [changes, ci-success]
    if: github.base_ref == 'main-staging' && needs.ci-success.result == 'success'
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Preview Comment
        uses: actions/github-script@v8
        env:
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend }}
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
          INFRA_CHANGED: ${{ needs.changes.outputs.infra }}
        with:
          script: |
            const frontendChanged = process.env.FRONTEND_CHANGED === 'true';
            const backendChanged = process.env.BACKEND_CHANGED === 'true';
            const infraChanged = process.env.INFRA_CHANGED === 'true';

            // Build services list
            const services = [];
            if (backendChanged) services.push('🔧 **API** — will be rebuilt and redeployed');
            if (frontendChanged) services.push('🎨 **Web** — will be rebuilt and redeployed');
            if (infraChanged) services.push('🏗️ **Infra** — configuration changes detected');
            if (services.length === 0) services.push('ℹ️ No service changes detected');

            const body = [
              '## 🚀 Deploy Preview — Staging',
              '',
              '> This PR targets `main-staging`. Merging will trigger an automatic deployment to [meepleai.app](https://meepleai.app).',
              '',
              '### Services Affected',
              services.join('\n'),
              '',
              '### CI Status',
              '✅ All checks passed — ready to deploy',
              '',
              '---',
              '*🤖 Generated by CI — Deploy Preview*'
            ].join('\n');

            // Find existing preview comment to update (avoid duplicates)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body && c.body.includes('Generated by CI — Deploy Preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
              console.log('Updated existing deploy preview comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
              console.log('Created new deploy preview comment');
            }

  notify-end:
    if: >-
      always()
      && github.event_name != 'workflow_call'
      && contains(join(needs.*.result, ','), 'failure')
      && (
        github.event_name == 'workflow_dispatch'
        || github.base_ref == 'main-staging'
        || github.base_ref == 'main'
      )
    needs: [changes, build-backend, build-frontend, build-frontend-a11y, frontend, frontend-a11y, frontend-bundle-size, backend-unit, backend-integration, python-tests, e2e, ci-success, deploy-preview]
    uses: ./.github/workflows/notify-slack.yml
    with:
      event: failed
      workflow_name: "CI"
      environment: ci
      is_critical: false
      branch: ${{ github.head_ref || github.ref_name }}
      actor: ${{ github.actor }}
      commit_sha: ${{ github.sha }}
      commit_message: ${{ github.event.head_commit.message || 'Manual trigger' }}
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets:
      SLACK_GITNOTIFY_WEBHOOK_URL: ${{ secrets.SLACK_GITNOTIFY_WEBHOOK_URL }}
      SLACK_CRITICAL_WEBHOOK_URL: ${{ secrets.SLACK_CRITICAL_WEBHOOK_URL }}