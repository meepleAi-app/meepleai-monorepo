name: Security Penetration Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
  # Run weekly on Sundays at 3 AM UTC
  schedule:
    - cron: '0 3 * * 0'

permissions:
  contents: read
  pull-requests: write
  checks: write

# Only run one instance per PR
concurrency:
  group: security-pen-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Check if we should run security tests
  check-trigger:
    name: Check Security Test Trigger
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check trigger conditions
        id: check
        run: |
          SHOULD_RUN="false"

          # Run on schedule (weekly)
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "::notice::Running security tests (weekly schedule)"
            SHOULD_RUN="true"
          fi

          # Run on manual trigger
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "::notice::Running security tests (manual trigger)"
            SHOULD_RUN="true"
          fi

          # Run if PR has 'security' label
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            LABELS="${{ toJson(github.event.pull_request.labels.*.name) }}"
            if echo "$LABELS" | grep -q "security"; then
              echo "::notice::Running security tests (PR labeled 'security')"
              SHOULD_RUN="true"
            fi
          fi

          # Check if authentication-related files changed
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "Checking for authentication-related changes..."
          fi

          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT
          echo "::notice::Security tests will run: $SHOULD_RUN"

  # Detect if authentication/security files changed
  changes:
    name: Detect Security Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      security: ${{ steps.filter.outputs.security }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Security Paths Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            security:
              - 'apps/api/src/Api/BoundedContexts/Authentication/**'
              - 'apps/api/src/Api/Services/TotpService.cs'
              - 'apps/api/src/Api/Services/PasswordHashingService.cs'
              - 'apps/api/src/Api/Services/EncryptionService.cs'
              - 'apps/api/tests/Api.Tests/Integration/Authentication/TwoFactorSecurityPenetrationTests.cs'
              - 'docs/06-security/**'

  security-penetration-tests:
    name: 2FA Security Penetration Tests (OWASP)
    needs: [check-trigger, changes]
    runs-on: ubuntu-latest
    # Run if: manual/schedule trigger OR (PR with 'security' label OR security files changed)
    if: |
      needs.check-trigger.outputs.should_run == 'true' ||
      (github.event_name == 'pull_request' && needs.changes.outputs.security == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        working-directory: apps/api
        run: dotnet restore

      - name: Build API (Release)
        working-directory: apps/api
        run: dotnet build -c Release --no-restore

      - name: Run Security Penetration Tests
        working-directory: apps/api
        timeout-minutes: 10
        run: |
          echo "::notice::Running OWASP-compliant 2FA security penetration tests"
          echo "::notice::Test Categories: Brute Force (6), Replay Attack (5), Timing Attack (4)"
          dotnet test \
            --filter "FullyQualifiedName~TwoFactorSecurityPenetrationTests" \
            --logger "console;verbosity=detailed" \
            --no-build \
            -c Release \
            --blame-hang-timeout 8m

      - name: Generate Security Report
        if: always()
        run: |
          cat << 'EOF' >> $GITHUB_STEP_SUMMARY
          ## 🔒 Security Penetration Test Results

          ### Test Suite: 2FA Authentication Security (Issue #576)

          **OWASP Coverage:**
          - ✅ A07:2021 – Identification and Authentication Failures
          - ✅ OWASP ASVS 2.0: Authentication Verification Requirements
          - ✅ OWASP Testing Guide: WSTG-ATHN-11 (Multi-Factor Authentication)

          **Test Categories:**
          1. **Brute Force Prevention (6 tests)** - Rate limiting, account lockout, attack detection
          2. **Replay Attack Prevention (5 tests)** - OTP reuse, nonce validation, temporal uniqueness
          3. **Timing Attack Resistance (4 tests)** - Constant-time comparison, side-channel protection

          **Performance:**
          - Total Tests: 15
          - Expected Duration: ~5-8 minutes
          - Execution Strategy: Sequential (security tests simulate real attacks)

          ---

          **Note:** These tests intentionally simulate real-world attack scenarios:
          - Brute force: 100-1000 authentication attempts
          - Timing attacks: 1000 statistical samples
          - Distributed attacks: Multi-session simulation

          For detailed security findings, review test output above.
          EOF

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const output = `## 🔒 Security Penetration Tests ${context.payload.workflow_run?.conclusion === 'success' ? '✅ PASSED' : '⚠️ COMPLETED'}

            **Test Suite:** 2FA Authentication Security (OWASP A07:2021)

            Security penetration tests have been executed for this PR.
            Review the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for detailed results.

            **Trigger:** ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'security') && 'Security label' || 'Security files changed' }}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
