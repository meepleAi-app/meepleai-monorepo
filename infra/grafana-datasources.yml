# OPS-02: Grafana Datasources Configuration
# Auto-provisions Prometheus and Loki data sources
# Jaeger datasource removed (Issue #1564) - using Prometheus for metrics only

apiVersion: 1

datasources:
  # Prometheus datasource for metrics
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: '15s'
      queryTimeout: '60s'
      httpMethod: 'POST'
    version: 1

  # Loki datasource for log aggregation (Issue #3367)
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      timeout: 60
      maxLines: 1000
    version: 1
