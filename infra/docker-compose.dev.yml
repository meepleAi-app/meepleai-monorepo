# MeepleAI Development Stack
# Complete docker-compose with app services + MCP servers
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down
#
# Note: This extends docker-compose.yml with MCP servers

services:
  # ============================================================================
  # Infrastructure Services (from docker-compose.yml)
  # ============================================================================
  meepleai-postgres:
    environment:
      POSTGRES_PASSWORD_FILE:  # Override to unset (dev uses direct password)
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meeplepass}
    volumes:
      - pgdata:/var/lib/postgresql/data

  meepleai-qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - meepleai

  meepleai-redis:
    image: redis:7.4.1-alpine3.20
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - meepleai

  meepleai-ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - meepleai

  meepleai-ollama-pull:
    image: curlimages/curl:latest
    container_name: meepleai-ollama-pull
    depends_on:
      meepleai-ollama:
        condition: service_healthy
    restart: "no"
    command: >
      sh -c '
        echo "Pulling nomic-embed-text model..." &&
        for attempt in 1 2 3 4 5; do
          if curl -sS -X POST http://meepleai-ollama:11434/api/pull -d "{\"name\":\"nomic-embed-text\"}"; then
            echo "Model pull initiated!" &&
            exit 0
          fi
          echo "Attempt $${attempt} failed, retrying in 10s..." &&
          sleep 10
        done &&
        echo "Failed to pull nomic-embed-text after 5 attempts" >&2 &&
        exit 1
      '
    networks:
      - meepleai

  meepleai-embedding:
    build:
      context: ../apps/embedding-service
      dockerfile: ./Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - meepleai

  # BGAI-001-v2: Unstructured PDF extraction service (Stage 1)
  meepleai-unstructured:
    build:
      context: ../apps/unstructured-service
      dockerfile: ./Dockerfile
    container_name: meepleai-unstructured
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - LOG_LEVEL=INFO
      - MAX_FILE_SIZE=52428800  # 50MB
      - TIMEOUT=30
      - UNSTRUCTURED_STRATEGY=fast
      - LANGUAGE=ita
      - CHUNK_MAX_CHARACTERS=2000
      - CHUNK_OVERLAP=200
      - QUALITY_THRESHOLD=0.80
      - MIN_CHARS_PER_PAGE=500
      - ENABLE_METRICS=true
      - ENABLE_STRUCTURED_LOGGING=true
    volumes:
      - unstructured-temp:/tmp/pdf-extraction
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - meepleai

  # BGAI-005: SmolDocling VLM service (Stage 2 - complex layouts fallback)
  meepleai-smoldocling:
    build:
      context: ../apps/smoldocling-service
      dockerfile: ./Dockerfile
    container_name: meepleai-smoldocling
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - LOG_LEVEL=INFO
      - MAX_FILE_SIZE=52428800  # 50MB
      - MAX_PAGES_PER_REQUEST=20
      - TIMEOUT=60
      - DEVICE=cpu
      - MODEL_NAME=docling-project/SmolDocling-256M-preview
      - MAX_NEW_TOKENS=2048
      - TORCH_DTYPE=bfloat16
      - IMAGE_DPI=300
      - IMAGE_FORMAT=PNG
      - QUALITY_THRESHOLD=0.70
      - MIN_CHARS_PER_PAGE=300
      - ENABLE_METRICS=true
      - ENABLE_STRUCTURED_LOGGING=true
      - ENABLE_MODEL_WARMUP=false
    volumes:
      - smoldocling-temp:/tmp/pdf-processing
      - smoldocling-models:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
    networks:
      - meepleai

  meepleai-seq:
    image: datalust/seq:2025.1
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seqdata:/data
    networks:
      - meepleai

  meepleai-jaeger:
    image: jaegertracing/all-in-one:1.74.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: "badger"
      BADGER_EPHEMERAL: "true"
    ports:
      - "16686:16686"
      - "4318:4318"
      - "4317:4317"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - meepleai

  meepleai-prometheus:
    image: prom/prometheus:v3.7.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheusdata:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meepleai

  meepleai-alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    env_file:
      - ./env/alertmanager.env
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanagerdata:/alertmanager
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meepleai

  meepleai-grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE:  # Override to unset (dev uses direct password)
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - meepleai-prometheus
      - meepleai-jaeger
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - meepleai

  meepleai-n8n:
    image: n8nio/n8n:1.114.4
    restart: unless-stopped
    env_file:
      - ./env/n8n.env.dev
    ports:
      - "5678:5678"
    depends_on:
      meepleai-postgres:
        condition: service_healthy
    networks:
      - meepleai

  # ============================================================================
  # Application Services
  # ============================================================================
  meepleai-api:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      POSTGRES_PASSWORD_FILE:  # Override to unset (dev uses connection string)
      OPENROUTER_API_KEY_FILE:  # Override to unset (dev uses env var from api.env.dev)
      INITIAL_ADMIN_PASSWORD_FILE:  # Override to unset (dev uses direct password)
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
    ports:
      - "8080:8080"
    depends_on:
      meepleai-postgres:
        condition: service_healthy
      meepleai-qdrant:
        condition: service_started
      meepleai-redis:
        condition: service_healthy
      meepleai-ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - meepleai

  meepleai-web:
    build:
      context: ../apps/web
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - ./env/web.env.dev
    ports:
      - "3000:3000"
    depends_on:
      meepleai-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - meepleai

  # ============================================================================
  # MCP Servers (Model Context Protocol)
  # ============================================================================

  # GitHub Project Manager MCP
  mcp-github:
    build:
      context: ..
      dockerfile: docker/mcp/Dockerfile.github
    container_name: mcp-github
    restart: unless-stopped
    environment:
      NODE_ENV: production
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER: ${GITHUB_OWNER:-}
      GITHUB_REPO: ${GITHUB_REPO:-meepleai-monorepo}
    stdin_open: true
    tty: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node.*index.js' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - meepleai

  # n8n Workflow Manager MCP
  mcp-n8n:
    build:
      context: ..
      dockerfile: docker/mcp/Dockerfile.n8n
    container_name: mcp-n8n
    restart: unless-stopped
    environment:
      NODE_ENV: production
      N8N_BASE_URL: ${N8N_BASE_URL:-http://meepleai-n8n:5678}
      N8N_API_KEY: ${N8N_API_KEY:-}
    stdin_open: true
    tty: true
    depends_on:
      - meepleai-n8n
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node.*index.js' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - meepleai

  # Memory Bank MCP
  mcp-memory:
    build:
      context: ..
      dockerfile: docker/mcp/Dockerfile.memory
    container_name: mcp-memory
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - mcp-memory-data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,size=64m
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*server.py' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - meepleai

  # Sequential Thinking MCP
  mcp-sequential:
    build:
      context: ..
      dockerfile: docker/mcp/Dockerfile.sequential
    container_name: mcp-sequential
    restart: unless-stopped
    stdin_open: true
    tty: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*server.py' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - meepleai

  # Playwright Browser Automation MCP
  mcp-playwright:
    build:
      context: ..
      dockerfile: docker/mcp/Dockerfile.playwright
    container_name: mcp-playwright
    restart: unless-stopped
    stdin_open: true
    tty: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,size=256m  # Playwright needs more tmp space for browser
    deploy:
      resources:
        limits:
          memory: 1g  # Playwright needs more memory
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*server.py' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - meepleai

  # Magic (21st.dev) UI Generator MCP
  mcp-magic:
    build:
      context: ..
      dockerfile: docker/mcp/Dockerfile.magic
    container_name: mcp-magic
    restart: unless-stopped
    environment:
      MAGIC_API_KEY: ${MAGIC_API_KEY:-}
      TWENTYFIRST_API_KEY: ${TWENTYFIRST_API_KEY:-}
    stdin_open: true
    tty: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*server.py' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - meepleai

  # Context7 (Upstash) Documentation MCP
  mcp-claude-context:
    build:
      context: ..
      dockerfile: docker/mcp/Dockerfile.claude-context
    container_name: mcp-claude-context
    restart: unless-stopped
    environment:
      CONTEXT7_API_KEY: ${CONTEXT7_API_KEY:-}
    stdin_open: true
    tty: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*server.py' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - meepleai

  # Knowledge Graph MCP
  mcp-knowledge-graph:
    build:
      context: ..
      dockerfile: docker/mcp/Dockerfile.knowledge-graph
    container_name: mcp-knowledge-graph
    restart: unless-stopped
    environment:
      KG_QDRANT_URL: http://meepleai-qdrant:6333
      KG_COLLECTION: knowledge_graph
    stdin_open: true
    tty: true
    depends_on:
      - meepleai-qdrant
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*server.py' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - meepleai

# ============================================================================
# Volumes
# ============================================================================
volumes:
  pgdata:
  qdrantdata:
  seqdata:
  ollamadata:
  unstructured-temp:
  smoldocling-temp:
  smoldocling-models:
  prometheusdata:
  grafanadata:
  alertmanagerdata:
  # MCP-specific volumes
  mcp-memory-data:
  mcp-knowledge-data:

# ============================================================================
# Networks
# ============================================================================
networks:
  meepleai:
    driver: bridge







