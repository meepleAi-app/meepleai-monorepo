services:
  postgres:
    image: postgres:16.4-alpine3.20
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meeple}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
      POSTGRES_DB: ${POSTGRES_DB:-meepleai}
      # Performance tuning aligned with resource limits
      POSTGRES_SHARED_BUFFERS: 512MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1536MB
      POSTGRES_WORK_MEM: 16MB
      POSTGRES_MAINTENANCE_WORK_MEM: 256MB
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    secrets:
      - postgres-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - meepleai
    shm_size: 1g
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"  # HTTP REST API
      - "127.0.0.1:6334:6334"  # gRPC API
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  redis:
    image: redis:7.4.1-alpine3.20
    restart: unless-stopped
    command: ["sh","-c","redis-server --appendonly yes --requirepass $(cat /run/secrets/redis-password) --maxmemory 768mb --maxmemory-policy allkeys-lru"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $(cat /run/secrets/redis-password) ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - meepleai
    secrets:
      - redis-password
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  ollama:
    image: ollama/ollama:0.3.14
    restart: unless-stopped
    environment:
      # Memory management for CPU-only mode
      OLLAMA_MAX_LOADED_MODELS: 3
      OLLAMA_KEEP_ALIVE: 5m
      # Uncomment if using GPU
      # OLLAMA_GPU_MEMORY_FRACTION: 0.80
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    # Uncomment if you have NVIDIA GPU support
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  ollama-pull:
    image: curlimages/curl:8.12.1
    container_name: ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    command: >
      sh -c '
        echo "Pulling nomic-embed-text model..." &&
        curl -X POST http://ollama:11434/api/pull -d "{\"name\":\"nomic-embed-text\"}" &&
        echo "Model pull initiated!"
      '
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # AI-09: Local multilingual embedding service
  embedding-service:
    build:
      context: ../apps/embedding-service
      dockerfile: ./Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    # Uncomment if you have NVIDIA GPU support for faster embeddings
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # BGAI-001-v2: Unstructured PDF extraction service (Stage 1)
  unstructured-service:
    build:
      context: ../apps/unstructured-service
      dockerfile: ./Dockerfile
    container_name: meepleai-unstructured
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - LOG_LEVEL=INFO
      - MAX_FILE_SIZE=52428800  # 50MB
      - TIMEOUT=30
      - UNSTRUCTURED_STRATEGY=fast
      - LANGUAGE=ita
      - CHUNK_MAX_CHARACTERS=2000
      - CHUNK_OVERLAP=200
      - QUALITY_THRESHOLD=0.80
      - MIN_CHARS_PER_PAGE=500
      - ENABLE_METRICS=true
      - ENABLE_STRUCTURED_LOGGING=true
    volumes:
      - unstructured-temp:/tmp/pdf-extraction
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  # BGAI-005: SmolDocling VLM service (Stage 2 - complex layouts fallback)
  smoldocling-service:
    build:
      context: ../apps/smoldocling-service
      dockerfile: ./Dockerfile
    container_name: meepleai-smoldocling
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - LOG_LEVEL=INFO
      - MAX_FILE_SIZE=52428800  # 50MB
      - MAX_PAGES_PER_REQUEST=20
      - TIMEOUT=60
      - DEVICE=cpu  # Use cpu for development (set to cuda in production with GPU)
      - MODEL_NAME=docling-project/SmolDocling-256M-preview
      - MAX_NEW_TOKENS=2048
      - TORCH_DTYPE=bfloat16
      - IMAGE_DPI=300
      - IMAGE_FORMAT=PNG
      - QUALITY_THRESHOLD=0.70
      - MIN_CHARS_PER_PAGE=300
      - ENABLE_METRICS=true
      - ENABLE_STRUCTURED_LOGGING=true
      - ENABLE_MODEL_WARMUP=true  # Enable warmup so health checks pass
    volumes:
      - smoldocling-temp:/tmp/pdf-processing
      - smoldocling-models:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s  # Long startup for model download
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    # Uncomment for GPU support (requires NVIDIA Docker runtime)
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ADR-016 Phase 4: Cross-encoder reranking service for RAG pipeline
  reranker-service:
    build:
      context: ../apps/reranker-service
      dockerfile: ./Dockerfile
    container_name: meepleai-reranker
    restart: unless-stopped
    ports:
      - "127.0.0.1:8003:8003"  # Bind to localhost only for security
    environment:
      - MODEL_NAME=BAAI/bge-reranker-v2-m3
      - BATCH_SIZE=32
      - LOG_LEVEL=INFO
      - ENABLE_MODEL_WARMUP=true
    volumes:
      - reranker-models:/home/reranker/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s  # Long startup for model download
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    # Uncomment for GPU support (requires NVIDIA Docker runtime)
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # OPS-02: OpenTelemetry Observability Stack
  # Seq and Jaeger removed - replaced by HyperDX unified observability (see docker-compose.hyperdx.yml)
  # Migration: Issue #1564 - HyperDX provides logs, traces, and session replay in one platform
  # HyperDX UI: http://localhost:8180
  # OTLP endpoints: gRPC :14317, HTTP :14318

  prometheus:
    image: prom/prometheus:v3.7.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=5GB'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # OPS-05: Error Monitoring & Alerting
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    env_file:
      - ./env/alertmanager.env
    secrets:
      - gmail-app-password
    volumes:
      - ./scripts/load-secrets-env.sh:/scripts/load-secrets-env.sh:ro
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanagerdata:/alertmanager
    entrypoint: ["/scripts/load-secrets-env.sh"]
    command:
      - '/bin/alertmanager'
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    ports:
      - "127.0.0.1:9093:9093"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # NOTE: Grafana OnCall is commented out for now as it requires manual setup
  # To add on-call management, follow the setup guide at:
  # https://grafana.com/docs/oncall/latest/set-up/open-source/
  # You can use Alertmanager directly with Slack/Email notifications in the meantime
  #
  # grafana-oncall:
  #   image: grafana/oncall:latest
  #   restart: unless-stopped
  #   environment:
  #     BASE_URL: http://localhost:8082
  #     SECRET_KEY: ${ONCALL_SECRET_KEY:-changeme-generate-secure-secret}
  #     DATABASE_TYPE: sqlite3
  #   volumes:
  #     - oncalldata:/var/lib/oncall
  #   ports:
  #     - "8082:8080"
  #   depends_on:
  #     - redis
  #     - alertmanager
  #   networks:
  #     - meepleai

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana-admin-password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3001"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    secrets:
      - grafana-admin-password
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
      # jaeger dependency removed - replaced by HyperDX (Issue #1564)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  n8n:
    image: n8nio/n8n:1.114.4
    restart: unless-stopped
    environment:
      # Node.js heap size tuning (75% of container limit minus overhead)
      NODE_OPTIONS: "--max-old-space-size=512"
    env_file:
      - ./env/n8n.env.dev
    secrets:
      - postgres-password
      - n8n-encryption-key
      - n8n-basic-auth-password
    volumes:
      - ./scripts/load-secrets-env.sh:/scripts/load-secrets-env.sh:ro
    entrypoint: ["/scripts/load-secrets-env.sh"]
    command: ["n8n"]
    ports:
      - "127.0.0.1:5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  api:
    build:
      context: ../apps/api
      dockerfile: ./src/Api/Dockerfile
    restart: unless-stopped
    env_file:
      - ./env/api.env.dev
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      # SEC-708: Connection string will be built from secret file
      # Password read from /run/secrets/postgres-password
      POSTGRES_USER: ${POSTGRES_USER:-meeple}
      POSTGRES_DB: ${POSTGRES_DB:-meepleai}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: "redis:6379,password=changeme-redis-dev-please-set,abortConnect=false"
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: mxbai-embed-large
      EMBEDDING_DIMENSIONS: 1024
      # Override nested config from appsettings.json (ASP.NET Core uses __ for nesting)
      Embedding__Dimensions: 1024
      # AI-09: Local embedding service configuration
      LOCAL_EMBEDDING_URL: http://embedding-service:8000
      EMBEDDING_FALLBACK_ENABLED: "false"
      # ADR-016 Phase 4: Reranker service configuration
      RERANKER_SERVICE_URL: http://reranker-service:8003
      # SEC-708: OpenRouter API key from secret file
      OPENROUTER_API_KEY_FILE: /run/secrets/openrouter-api-key
      # Bootstrap: Initial admin user configuration (password from secret)
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PASSWORD_FILE: /run/secrets/initial-admin-password
      INITIAL_ADMIN_DISPLAY_NAME: ${INITIAL_ADMIN_DISPLAY_NAME:-System Admin}
    secrets:
      - postgres-password
      - openrouter-api-key
      - initial-admin-password
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  web:
    build:
      context: ../apps/web
      dockerfile: ./Dockerfile
    restart: unless-stopped
    env_file:
      - ./env/web.env.dev
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  pgdata:
  qdrantdata:
  # seqdata removed - replaced by HyperDX (Issue #1564)
  ollamadata:
  # OPS-02: OpenTelemetry volumes
  # jaegerdata removed - using ephemeral storage for development
  # Seq and Jaeger replaced by HyperDX unified observability
  prometheusdata:
  grafanadata:
  # OPS-05: Error Monitoring & Alerting volumes
  alertmanagerdata:
  # BGAI-001-v2: Unstructured PDF extraction temporary storage
  unstructured-temp:
  # BGAI-005: SmolDocling VLM service storage
  smoldocling-temp:
  smoldocling-models:  # Hugging Face model cache
  # ADR-016 Phase 4: Reranker service model cache
  reranker-models:

networks:
  meepleai:
    driver: bridge

# SEC-708: Docker Secrets for sensitive credentials
# Secret files are stored in ./secrets/ directory (gitignored)
# Initialize secrets with: tools/secrets/init-secrets.sh
secrets:
  postgres-password:
    file: ./secrets/postgres-password.txt
  redis-password:
    file: ./secrets/redis-password.txt
  openrouter-api-key:
    file: ./secrets/openrouter-api-key.txt
  n8n-encryption-key:
    file: ./secrets/n8n-encryption-key.txt
  n8n-basic-auth-password:
    file: ./secrets/n8n-basic-auth-password.txt
  gmail-app-password:
    file: ./secrets/gmail-app-password.txt
  grafana-admin-password:
    file: ./secrets/grafana-admin-password.txt
  initial-admin-password:
    file: ./secrets/initial-admin-password.txt