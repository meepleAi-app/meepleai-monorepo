name: Fix DB Password Mismatch

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm fix'
        required: true
        type: string

jobs:
  fix-db-password:
    name: Sync DB Password on Staging
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    if: vars.DEPLOY_METHOD == 'ssh'
    steps:
      - name: Validate confirmation
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          if [ "$CONFIRM" != "yes" ]; then
            echo "Confirmation required: type 'yes' to proceed"
            exit 1
          fi
          echo "Confirmed"

      - name: Fix PostgreSQL password and restart API
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
            set -e

            DB_SECRET="/opt/meepleai/repo/infra/secrets/database.secret"
            if [ ! -f "$DB_SECRET" ]; then
              echo "ERROR: $DB_SECRET not found"
              exit 1
            fi
            set -a; source "$DB_SECRET"; set +a

            PG_USER="${POSTGRES_USER:-meepleai}"
            PG_DB="${POSTGRES_DB:-meepleai_db}"
            PG_PASS="${POSTGRES_PASSWORD}"

            if [ -z "$PG_PASS" ]; then
              echo "ERROR: POSTGRES_PASSWORD not found in database.secret"
              exit 1
            fi

            echo "Updating PostgreSQL password for user: $PG_USER"
            docker exec meepleai-postgres psql -U "$PG_USER" -c \
              "ALTER USER \"${PG_USER}\" WITH PASSWORD '${PG_PASS}';" \
              && echo "PostgreSQL password updated" || { echo "Failed to update password"; exit 1; }

            echo "Force-recreating API container..."
            cd /opt/meepleai/repo/infra
            set -a
            for f in secrets/*.secret; do source "$f" 2>/dev/null || true; done
            set +a
            docker compose -f docker-compose.yml -f compose.staging.yml -f compose.traefik.yml \
              --profile minimal up -d --no-deps --force-recreate api

            echo "Waiting for API to be healthy..."
            for attempt in $(seq 1 20); do
              if curl -sf https://meepleai.app/health > /dev/null 2>&1; then
                echo "API healthy after ~$((attempt*5))s"
                break
              fi
              sleep 5
            done

            sleep 3
            echo "Testing login with admin credentials..."
            ADMIN_EMAIL=$(grep "^ADMIN_EMAIL=" /opt/meepleai/repo/infra/secrets/admin.secret | cut -d= -f2)
            ADMIN_PASS=$(grep "^ADMIN_PASSWORD=" /opt/meepleai/repo/infra/secrets/admin.secret | cut -d= -f2)

            RESULT=$(curl -sf -X POST https://meepleai.app/api/v1/auth/login \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"${ADMIN_EMAIL}\",\"password\":\"${ADMIN_PASS}\"}" 2>/dev/null || echo "CURL_FAILED")

            if echo "$RESULT" | grep -q '"sessionToken"'; then
              echo "Admin login verified successfully!"
            elif echo "$RESULT" | grep -q '"requiresTwoFactor"'; then
              echo "Admin login successful (2FA required)"
            else
              echo "Login result: $RESULT"
              echo "INFO: Admin may need to be seeded - check API logs"
            fi
