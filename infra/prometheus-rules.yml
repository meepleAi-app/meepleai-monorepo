# OPS-05: Prometheus Recording and Alert Rules
# Error monitoring and alerting for MeepleAI

groups:
  # ========================================
  # Recording Rules
  # Pre-computed metrics for fast querying
  # ========================================

  - name: meepleai_error_recording_rules
    interval: 15s
    rules:
      # Error rate by endpoint (errors per second)
      - record: meepleai:api:error_rate:5m
        expr: |
          rate(
            http_server_request_duration_count{
              http_response_status_code=~"5.."
            }[5m]
          )
        labels:
          service: meepleai-api

      # Total request rate (all status codes)
      - record: meepleai:api:request_rate:5m
        expr: |
          rate(http_server_request_duration_count[5m])
        labels:
          service: meepleai-api

      # Error ratio (percentage of requests that fail)
      - record: meepleai:api:error_ratio:5m
        expr: |
          (
            rate(
              http_server_request_duration_count{
                http_response_status_code=~"5.."
              }[5m]
            )
            /
            rate(http_server_request_duration_count[5m])
          ) OR on() vector(0)
        labels:
          service: meepleai-api

      # RAG error rate (from custom metrics)
      - record: meepleai:rag:error_rate:5m
        expr: |
          rate(meepleai_rag_errors_total[5m]) OR on() vector(0)
        labels:
          service: meepleai-api
          category: rag

      # Critical error spike detection (current rate vs 1-hour historical average)
      - record: meepleai:api:error_spike_ratio
        expr: |
          (
            rate(
              http_server_request_duration_count{
                http_response_status_code="500"
              }[5m]
            )
            /
            (
              avg_over_time(
                rate(
                  http_server_request_duration_count{
                    http_response_status_code="500"
                  }[5m]
                )[1h:5m]
              ) > 0
            )
          ) OR on() vector(0)
        labels:
          service: meepleai-api

      # API response time p95 by endpoint
      - record: meepleai:api:response_time_p95:5m
        expr: |
          histogram_quantile(
            0.95,
            rate(http_server_request_duration_bucket[5m])
          )
        labels:
          service: meepleai-api

  # ========================================
  # Alert Rules
  # Conditions that trigger notifications
  # ========================================

  - name: meepleai_critical_alerts
    interval: 30s
    rules:
      # CRITICAL: High error rate (> 1 error/sec for 2 minutes)
      - alert: HighErrorRate
        expr: |
          meepleai:api:error_rate:5m > 1
        for: 2m
        labels:
          severity: critical
          service: meepleai-api
          category: errors
        annotations:
          summary: "API error rate is critically high"
          description: |
            Error rate is {{ $value | humanize }} errors/sec (threshold: 1/sec).
            This indicates a significant issue affecting multiple requests.
            Check logs at http://localhost:8081 with CorrelationId filter.
          runbook_url: "https://docs.meepleai.dev/runbooks/high-error-rate"
          dashboard_url: "http://localhost:3001/d/error-monitoring"

      # CRITICAL: Error spike (3x historical average)
      - alert: ErrorSpike
        expr: |
          meepleai:api:error_spike_ratio > 3
        for: 2m
        labels:
          severity: critical
          service: meepleai-api
          category: errors
        annotations:
          summary: "Sudden spike in error rate detected"
          description: |
            Current error rate is {{ $value | humanize }}x higher than 1-hour average.
            This may indicate a recent deployment issue or external dependency failure.
            Check recent changes and dependency health.
          runbook_url: "https://docs.meepleai.dev/runbooks/error-spike"
          dashboard_url: "http://localhost:3001/d/error-monitoring"

      # CRITICAL: All database connections are down
      - alert: DatabaseDown
        expr: |
          up{job="meepleai-api"} == 0
          OR
          (pg_up{} == 0)
        for: 1m
        labels:
          severity: critical
          service: meepleai-api
          category: dependency
        annotations:
          summary: "PostgreSQL database is unreachable"
          description: |
            The API cannot connect to PostgreSQL database.
            All API operations are likely failing.
            Check database health and network connectivity.
          runbook_url: "https://docs.meepleai.dev/runbooks/dependency-down"

      # CRITICAL: Redis cache is down
      - alert: RedisDown
        expr: |
          redis_up{} == 0
        for: 2m
        labels:
          severity: critical
          service: meepleai-api
          category: dependency
        annotations:
          summary: "Redis cache is unreachable"
          description: |
            The API cannot connect to Redis.
            Caching, session management, and rate limiting are affected.
            Check Redis container health.
          runbook_url: "https://docs.meepleai.dev/runbooks/dependency-down"

      # CRITICAL: Qdrant vector DB is down
      - alert: QdrantDown
        expr: |
          up{job="qdrant"} == 0
        for: 2m
        labels:
          severity: critical
          service: meepleai-api
          category: dependency
        annotations:
          summary: "Qdrant vector database is unreachable"
          description: |
            The API cannot connect to Qdrant.
            RAG operations and semantic search are failing.
            Check Qdrant container health at http://localhost:6333/healthz
          runbook_url: "https://docs.meepleai.dev/runbooks/dependency-down"

  - name: meepleai_warning_alerts
    interval: 1m
    rules:
      # WARNING: Elevated error ratio (> 5% for 5 minutes)
      - alert: HighErrorRatio
        expr: |
          meepleai:api:error_ratio:5m > 0.05
        for: 5m
        labels:
          severity: warning
          service: meepleai-api
          category: errors
        annotations:
          summary: "Error ratio exceeds 5%"
          description: |
            {{ $value | humanizePercentage }} of requests are failing.
            While not critical yet, this indicates degraded service quality.
            Monitor closely and investigate root cause.
          runbook_url: "https://docs.meepleai.dev/runbooks/high-error-rate"
          dashboard_url: "http://localhost:3001/d/error-monitoring"

      # WARNING: RAG errors occurring
      - alert: RagErrorsDetected
        expr: |
          meepleai:rag:error_rate:5m > 0.5
        for: 3m
        labels:
          severity: warning
          service: meepleai-api
          category: rag
        annotations:
          summary: "RAG operations are experiencing errors"
          description: |
            RAG error rate: {{ $value | humanize }} errors/sec.
            This may affect Q&A accuracy and semantic search.
            Check Qdrant connection and embedding service health.
          runbook_url: "https://docs.meepleai.dev/runbooks/rag-errors"
          dashboard_url: "http://localhost:3001/d/ai-rag-operations"

      # WARNING: Slow API response times
      - alert: SlowResponseTime
        expr: |
          meepleai:api:response_time_p95:5m > 5
        for: 5m
        labels:
          severity: warning
          service: meepleai-api
          category: performance
        annotations:
          summary: "API response time is degraded"
          description: |
            P95 response time: {{ $value | humanize }}s (threshold: 5s).
            Users are experiencing slow responses.
            Check database query performance and external API latency.
          runbook_url: "https://docs.meepleai.dev/runbooks/slow-performance"
          dashboard_url: "http://localhost:3001/d/api-performance"

      # WARNING: High memory usage
      - alert: HighMemoryUsage
        expr: |
          process_working_set_bytes / process_memory_limit_bytes > 0.8
        for: 5m
        labels:
          severity: warning
          service: meepleai-api
          category: resources
        annotations:
          summary: "API memory usage is high"
          description: |
            Memory usage: {{ $value | humanizePercentage }}.
            The API may be approaching memory limits.
            Check for memory leaks or increase container resources.
          dashboard_url: "http://localhost:3001/d/infrastructure"

  - name: meepleai_info_alerts
    interval: 5m
    rules:
      # INFO: New error type detected (for tracking)
      - alert: NewErrorTypeDetected
        expr: |
          changes(
            meepleai:api:error_rate:5m[10m]
          ) > 0
          and
          meepleai:api:error_rate:5m > 0.1
        for: 5m
        labels:
          severity: info
          service: meepleai-api
          category: errors
        annotations:
          summary: "New error pattern detected"
          description: |
            A new type of error has appeared in the system.
            Error rate: {{ $value | humanize }} errors/sec.
            Review logs to identify the new error type.
          dashboard_url: "http://localhost:3001/d/error-monitoring"

  # ========================================
  # AI Quality Alert Rules
  # AI-11.2: Quality monitoring and alerting
  # ========================================

  - name: meepleai_quality_recording_rules
    interval: 15s
    rules:
      # Average overall confidence score (5-minute window)
      - record: meepleai:quality:overall_confidence:5m
        expr: |
          avg(meepleai_quality_score{dimension="overall_confidence"}) OR on() vector(0)
        labels:
          service: meepleai-api
          category: quality

      # Low-quality response rate (percentage)
      - record: meepleai:quality:low_quality_rate:5m
        expr: |
          (
            rate(meepleai_quality_low_quality_responses_total[5m])
            /
            rate(meepleai_quality_score_count{dimension="overall_confidence"}[5m])
          ) * 100 OR on() vector(0)
        labels:
          service: meepleai-api
          category: quality

      # RAG confidence average
      - record: meepleai:quality:rag_confidence:5m
        expr: |
          avg(meepleai_quality_score{dimension="rag_confidence"}) OR on() vector(0)
        labels:
          service: meepleai-api
          category: quality

      # LLM confidence average
      - record: meepleai:quality:llm_confidence:5m
        expr: |
          avg(meepleai_quality_score{dimension="llm_confidence"}) OR on() vector(0)
        labels:
          service: meepleai-api
          category: quality

  - name: meepleai_quality_critical_alerts
    interval: 30s
    rules:
      # CRITICAL: Average overall confidence < 0.60 for 1 hour
      - alert: LowOverallConfidence
        expr: |
          meepleai:quality:overall_confidence:5m < 0.60
        for: 1h
        labels:
          severity: critical
          service: meepleai-api
          category: quality
        annotations:
          summary: "AI response quality is critically low"
          description: |
            Average overall confidence is {{ $value | humanizePercentage }} (threshold: 60%).
            AI responses have been consistently low quality for 1 hour.
            This indicates systematic issues with RAG, LLM, or citation quality.
            Check Qdrant connection, embedding service, and LLM API health.
          runbook_url: "https://docs.meepleai.dev/runbooks/ai-quality-low"
          dashboard_url: "http://localhost:3001/d/quality-metrics"

  # ========================================
  # 2FA Security Alert Rules (SEC-08)
  # Issue #1788: Enhanced Security Monitoring
  # ========================================

  - name: meepleai_2fa_security_recording_rules
    interval: 15s
    rules:
      # 2FA failure rate (failures per second)
      - record: meepleai:2fa:failure_rate:5m
        expr: |
          rate(meepleai_2fa_failed_totp_attempts_total[5m]) +
          rate(meepleai_2fa_failed_backup_attempts_total[5m])
        labels:
          service: meepleai-api
          category: security

      # 2FA success rate percentage
      - record: meepleai:2fa:success_rate:5m
        expr: |
          100 * (
            sum(rate(meepleai_2fa_successful_totp_total[5m]) + rate(meepleai_2fa_successful_backup_total[5m]))
            /
            sum(
              rate(meepleai_2fa_successful_totp_total[5m]) +
              rate(meepleai_2fa_successful_backup_total[5m]) +
              rate(meepleai_2fa_failed_totp_attempts_total[5m]) +
              rate(meepleai_2fa_failed_backup_attempts_total[5m])
            )
          ) OR on() vector(0)
        labels:
          service: meepleai-api
          category: security

      # Replay attack rate
      - record: meepleai:2fa:replay_attacks:5m
        expr: |
          rate(meepleai_2fa_replay_attacks_blocked_total[5m])
        labels:
          service: meepleai-api
          category: security

  - name: meepleai_2fa_security_critical_alerts
    interval: 30s
    rules:
      # CRITICAL: High rate of failed 2FA attempts (> 10/min sustained)
      - alert: High2FAFailureRate
        expr: |
          meepleai:2fa:failure_rate:5m > 0.167
        for: 2m
        labels:
          severity: critical
          service: meepleai-api
          category: security
          attack_type: brute_force
        annotations:
          summary: "High rate of failed 2FA attempts detected"
          description: |
            2FA failure rate is {{ $value | humanize }} failures/sec (threshold: 0.167/sec = 10/min).
            This indicates a potential brute force attack on user accounts.
            Verify account lockout mechanisms and consider IP blocking.
          runbook_url: "https://docs.meepleai.dev/runbooks/2fa-brute-force"
          dashboard_url: "http://localhost:3001/d/2fa-security-monitoring"

      # CRITICAL: Replay attack detected
      - alert: TotpReplayAttackDetected
        expr: |
          increase(meepleai_2fa_replay_attacks_blocked_total[1m]) > 0
        labels:
          severity: critical
          service: meepleai-api
          category: security
          attack_type: replay
        annotations:
          summary: "TOTP replay attack blocked"
          description: |
            {{ $value }} replay attack(s) blocked in the last minute.
            Attacker attempted to reuse a valid TOTP code within the 60-second window.
            This is a sophisticated attack indicating compromised credentials or session hijacking.
            Review audit logs and consider forcing password reset for affected users.
          runbook_url: "https://docs.meepleai.dev/runbooks/2fa-replay-attack"
          dashboard_url: "http://localhost:3001/d/2fa-security-monitoring"

      # CRITICAL: Distributed brute force attack (multiple users targeted)
      - alert: Distributed2FABruteForce
        expr: |
          count(
            sum by (user_id) (
              increase(meepleai_2fa_failed_totp_attempts_total[5m]) > 5
            )
          ) > 3
        for: 2m
        labels:
          severity: critical
          service: meepleai-api
          category: security
          attack_type: distributed_brute_force
        annotations:
          summary: "Distributed brute force attack on 2FA detected"
          description: |
            {{ $value }} user accounts experiencing simultaneous failed 2FA attempts.
            This indicates a coordinated attack, possibly from a botnet or distributed attacker.
            Consider implementing IP rate limiting or temporary 2FA endpoint restrictions.
          runbook_url: "https://docs.meepleai.dev/runbooks/2fa-distributed-attack"
          dashboard_url: "http://localhost:3001/d/2fa-security-monitoring"

      # CRITICAL: 2FA success rate critically low
      - alert: Low2FASuccessRate
        expr: |
          meepleai:2fa:success_rate:5m < 50
        for: 5m
        labels:
          severity: critical
          service: meepleai-api
          category: security
        annotations:
          summary: "2FA success rate is critically low"
          description: |
            2FA success rate is {{ $value | humanizePercentage }} (threshold: 50%).
            More than half of 2FA attempts are failing.
            Check for attacks, TOTP time sync issues, or UX problems.
          runbook_url: "https://docs.meepleai.dev/runbooks/2fa-low-success"
          dashboard_url: "http://localhost:3001/d/2fa-security-monitoring"

  - name: meepleai_2fa_security_warning_alerts
    interval: 1m
    rules:
      # WARNING: Elevated failed attempts for single user
      - alert: ElevatedUserFailedAttempts
        expr: |
          sum by (user_id) (
            increase(
              meepleai_2fa_failed_totp_attempts_total[10m] +
              meepleai_2fa_failed_backup_attempts_total[10m]
            )
          ) > 5
        for: 2m
        labels:
          severity: warning
          service: meepleai-api
          category: security
          attack_type: targeted
        annotations:
          summary: "User experiencing multiple failed 2FA attempts"
          description: |
            User {{ $labels.user_id }} has {{ $value }} failed attempts in 10 minutes.
            May indicate targeted attack or user lost TOTP device.
            Monitor for escalation and consider user notification.
          runbook_url: "https://docs.meepleai.dev/runbooks/2fa-user-lockout"
          dashboard_url: "http://localhost:3001/d/2fa-security-monitoring"

      # WARNING: Multiple replay attacks in short period
      - alert: MultipleReplayAttacks
        expr: |
          increase(meepleai_2fa_replay_attacks_blocked_total[5m]) > 2
        labels:
          severity: warning
          service: meepleai-api
          category: security
          attack_type: replay
        annotations:
          summary: "Multiple TOTP replay attacks detected"
          description: |
            {{ $value }} replay attacks blocked in 5 minutes.
            Indicates possible man-in-the-middle attack or session compromise.
            Review session security and TLS configuration.
          runbook_url: "https://docs.meepleai.dev/runbooks/2fa-replay-attack"
          dashboard_url: "http://localhost:3001/d/2fa-security-monitoring"

      # WARNING: High backup code usage
      - alert: HighBackupCodeConsumption
        expr: |
          rate(meepleai_2fa_successful_backup_total[1h]) > 0.01
        for: 10m
        labels:
          severity: warning
          service: meepleai-api
          category: security
        annotations:
          summary: "Elevated backup code usage detected"
          description: |
            Backup code usage: {{ $value | humanize }} uses/sec.
            Users may be losing access to TOTP apps or experiencing device issues.
            Monitor for users running out of backup codes.
          runbook_url: "https://docs.meepleai.dev/runbooks/2fa-backup-codes"
          dashboard_url: "http://localhost:3001/d/2fa-security-monitoring"

  - name: meepleai_2fa_security_info_alerts
    interval: 5m
    rules:
      # INFO: 2FA adoption declining
      - alert: Declining2FAAdoption
        expr: |
          increase(meepleai_2fa_disable_total[1h]) > increase(meepleai_2fa_enable_total[1h])
        for: 6h
        labels:
          severity: info
          service: meepleai-api
          category: security
        annotations:
          summary: "2FA adoption is declining"
          description: |
            More users disabling 2FA than enabling over 6 hours.
            Investigate user friction points and UX issues.
          runbook_url: "https://docs.meepleai.dev/runbooks/2fa-adoption"
          dashboard_url: "http://localhost:3001/d/2fa-security-monitoring"

      # CRITICAL: Low-quality response rate > 30% for 1 hour
      - alert: HighLowQualityRate
        expr: |
          meepleai:quality:low_quality_rate:5m > 30
        for: 1h
        labels:
          severity: critical
          service: meepleai-api
          category: quality
        annotations:
          summary: "High rate of low-quality responses"
          description: |
            {{ $value | humanize }}% of responses are low quality (threshold: 30%).
            More than 1 in 3 AI responses are failing quality standards.
            Investigate RAG retrieval, LLM performance, and citation extraction.
          runbook_url: "https://docs.meepleai.dev/runbooks/ai-quality-low"
          dashboard_url: "http://localhost:3001/d/quality-metrics"

