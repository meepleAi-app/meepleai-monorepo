name: Slack Notifications

on:
  workflow_run:
    workflows:
      - "Deploy to Production"
      - "Deploy to Staging"
      - "Self-Hosted Runner Health Check"
      - "Self-Hosted Runner Maintenance"
    types: [completed]

jobs:
  notify:
    name: Send Slack Notification
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    if: >-
      vars.SLACK_WEBHOOK_URL != '' && (
        github.event.workflow_run.conclusion == 'failure' ||
        github.event.workflow_run.name == 'Deploy to Production' ||
        github.event.workflow_run.name == 'Deploy to Staging'
      )
    steps:
      - name: Set notification context
        id: context
        run: |
          WORKFLOW="${{ github.event.workflow_run.name }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          ACTOR="${{ github.event.workflow_run.actor.login }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          COMMIT_MSG=$(echo '${{ github.event.workflow_run.head_commit.message }}' | head -1)

          # Determine emoji and color
          if [ "$CONCLUSION" = "success" ]; then
            EMOJI="✅"
            COLOR="good"
            STATUS="Success"
          elif [ "$CONCLUSION" = "failure" ]; then
            EMOJI="❌"
            COLOR="danger"
            STATUS="Failed"
          elif [ "$CONCLUSION" = "cancelled" ]; then
            EMOJI="⚠️"
            COLOR="warning"
            STATUS="Cancelled"
          else
            EMOJI="ℹ️"
            COLOR="#439FE0"
            STATUS="$CONCLUSION"
          fi

          # Determine environment context
          case "$WORKFLOW" in
            "Deploy to Production")
              ENV_LABEL="🚀 PRODUCTION"
              ;;
            "Deploy to Staging")
              ENV_LABEL="🧪 STAGING"
              ;;
            "Self-Hosted Runner Health Check")
              ENV_LABEL="🏥 RUNNER HEALTH"
              ;;
            "Self-Hosted Runner Maintenance")
              ENV_LABEL="🔧 RUNNER MAINTENANCE"
              ;;
            *)
              ENV_LABEL="🔄 CI/CD"
              ;;
          esac

          # Write outputs
          {
            echo "emoji=$EMOJI"
            echo "color=$COLOR"
            echo "status=$STATUS"
            echo "env_label=$ENV_LABEL"
            echo "workflow=$WORKFLOW"
            echo "branch=$BRANCH"
            echo "sha_short=${SHA::7}"
            echo "actor=$ACTOR"
            echo "run_url=$RUN_URL"
            echo "commit_msg=$COMMIT_MSG"
          } >> "$GITHUB_OUTPUT"

      - name: Send Slack notification
        run: |
          curl -sf -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d @- <<'PAYLOAD'
          {
            "attachments": [
              {
                "color": "${{ steps.context.outputs.color }}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "${{ steps.context.outputs.emoji }} ${{ steps.context.outputs.env_label }} — ${{ steps.context.outputs.status }}"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      { "type": "mrkdwn", "text": "*Workflow:*\n${{ steps.context.outputs.workflow }}" },
                      { "type": "mrkdwn", "text": "*Branch:*\n`${{ steps.context.outputs.branch }}`" },
                      { "type": "mrkdwn", "text": "*Commit:*\n`${{ steps.context.outputs.sha_short }}`" },
                      { "type": "mrkdwn", "text": "*Actor:*\n${{ steps.context.outputs.actor }}" }
                    ]
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Commit:* ${{ steps.context.outputs.commit_msg }}"
                    }
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": { "type": "plain_text", "text": "View Run" },
                        "url": "${{ steps.context.outputs.run_url }}"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          PAYLOAD
