name: Branch Policy

on:
  pull_request:
    branches:
      - main
      - main-staging
      - main-dev


# Q2 2026 Security Review (#186) P1.2 AC5: default least-privilege.
# Job-level permissions blocks (where present) override this default.
permissions:
  contents: read

jobs:
  validate-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR source branch
        env:
          BASE_BRANCH: ${{ github.base_ref }}
          SOURCE_BRANCH: ${{ github.head_ref }}
        run: |
          echo "PR: $SOURCE_BRANCH -> $BASE_BRANCH"

          # ============================================
          # MAIN branch policy
          # ============================================
          # main can only be updated from main-staging
          if [[ "$BASE_BRANCH" == "main" ]]; then
            if [[ "$SOURCE_BRANCH" != "main-staging" ]]; then
              echo "::error::Branch 'main' can only be updated from 'main-staging'"
              echo "::error::Attempted merge from: $SOURCE_BRANCH"
              echo ""
              echo "Workflow: feature -> main-dev -> main-staging -> main"
              exit 1
            fi
            echo "✅ Valid: main-staging -> main"
          fi

          # ============================================
          # MAIN-STAGING branch policy
          # ============================================
          # main-staging can only be updated from main-dev
          if [[ "$BASE_BRANCH" == "main-staging" ]]; then
            if [[ "$SOURCE_BRANCH" != "main-dev" ]]; then
              echo "::error::Branch 'main-staging' can only be updated from 'main-dev'"
              echo "::error::Attempted merge from: $SOURCE_BRANCH"
              echo ""
              echo "Workflow: feature -> main-dev -> main-staging -> main"
              exit 1
            fi
            echo "✅ Valid: main-dev -> main-staging"
          fi

          # ============================================
          # MAIN-DEV branch policy
          # ============================================
          # main-dev can be updated from:
          # - feature/* branches (issue-driven feature work)
          # - hotfix/* branches (urgent security/bug fixes; still flow
          #   through main-dev → main-staging → main, no direct-to-main)
          # - fix/*, docs/*, refactor/*, chore/* branches
          # - dependabot/* branches (automated dependency updates)
          if [[ "$BASE_BRANCH" == "main-dev" ]]; then
            ALLOWED_PATTERNS="^(feature/|fix/|hotfix/|docs/|test/|refactor/|chore/|release/|merge/|dependabot/)"

            if ! echo "$SOURCE_BRANCH" | grep -qE "$ALLOWED_PATTERNS"; then
              echo "::error::Branch 'main-dev' can only be updated from allowed branches"
              echo "::error::Attempted merge from: $SOURCE_BRANCH"
              echo ""
              echo "Allowed patterns:"
              echo "  - feature/*"
              echo "  - hotfix/*"
              echo "  - fix/*"
              echo "  - docs/*"
              echo "  - test/*"
              echo "  - refactor/*"
              echo "  - chore/*"
              echo "  - release/*"
              echo "  - merge/*"
              echo "  - dependabot/*"
              exit 1
            fi
            echo "✅ Valid: $SOURCE_BRANCH -> main-dev"
          fi

          echo ""
          echo "Branch policy validated successfully"
