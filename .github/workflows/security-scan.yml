name: Security Scanning

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'infra/**'
      - 'schemas/**'
      - 'tools/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'global.json'
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'infra/**'
      - 'schemas/**'
      - 'tools/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'global.json'
  schedule:
    # Run weekly security scans on Mondays at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

# Cancel previous runs on same PR/branch
concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # CodeQL SAST for both .NET and TypeScript
  codeql-analysis:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['csharp', 'javascript']
        include:
          - language: csharp
            build-mode: manual
          - language: javascript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      # Build .NET projects for CodeQL analysis
      - name: Setup .NET (C# only)
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Install PDF dependencies (C# only)
        if: matrix.language == 'csharp'
        run: sudo apt-get update && sudo apt-get install -y libgdiplus

      - name: Build .NET (C# only)
        if: matrix.language == 'csharp'
        run: |
          cd apps/api
          dotnet restore
          dotnet build --no-restore --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

  # Dependency vulnerability scanning
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # .NET dependency scanning
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Install PDF dependencies
        run: sudo apt-get update && sudo apt-get install -y libgdiplus

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('apps/api/**/*.csproj', 'apps/api/**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore .NET dependencies
        working-directory: apps/api
        run: dotnet restore

      - name: Scan .NET Dependencies
        id: dotnet-scan
        working-directory: apps/api
        run: |
          echo "## .NET Dependency Vulnerabilities" >> $GITHUB_STEP_SUMMARY

          # Check for vulnerable packages
          dotnet list package --vulnerable --include-transitive > vulnerability-report.txt 2>&1 || true

          # Display results
          cat vulnerability-report.txt
          cat vulnerability-report.txt >> $GITHUB_STEP_SUMMARY

          # Check if there are HIGH or CRITICAL vulnerabilities
          # Use grep with proper exit code handling
          set +e  # Don't exit on error
          grep -iE "(High|Critical)" vulnerability-report.txt > /dev/null 2>&1
          GREP_EXIT_CODE=$?
          set -e  # Re-enable exit on error

          if [ $GREP_EXIT_CODE -eq 0 ]; then
            echo "HIGH_SEVERITY_FOUND=true" >> $GITHUB_OUTPUT
            echo "❌ **HIGH/CRITICAL vulnerabilities found in .NET dependencies!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### High/Critical Severity Issues:" >> $GITHUB_STEP_SUMMARY
            grep -iE "(High|Critical)" vulnerability-report.txt >> $GITHUB_STEP_SUMMARY || true
          else
            echo "HIGH_SEVERITY_FOUND=false" >> $GITHUB_OUTPUT
            echo "✅ No HIGH/CRITICAL vulnerabilities in .NET dependencies" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload .NET Vulnerability Report
        uses: actions/upload-artifact@v5
        with:
          name: dotnet-vulnerability-report
          path: apps/api/vulnerability-report.txt
          retention-days: 7

      # Frontend dependency scanning
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Scan Frontend Dependencies
        id: pnpm-scan
        working-directory: apps/web
        run: |
          echo "## Frontend Dependency Vulnerabilities" >> $GITHUB_STEP_SUMMARY

          # Run pnpm audit and capture output (allow non-zero exit for vulnerabilities)
          pnpm audit --audit-level=moderate --json > audit-report.json 2>/dev/null || true

          # Generate human-readable report
          pnpm audit --audit-level=moderate > audit-report.txt 2>&1 || true
          cat audit-report.txt
          cat audit-report.txt >> $GITHUB_STEP_SUMMARY

          # Check for HIGH or CRITICAL vulnerabilities
          # pnpm audit returns exit code 0 if no vulnerabilities, non-zero if found
          set +e  # Don't exit on error
          pnpm audit --audit-level=high > /dev/null 2>&1
          AUDIT_EXIT_CODE=$?
          set -e  # Re-enable exit on error

          if [ $AUDIT_EXIT_CODE -eq 0 ]; then
            echo "HIGH_SEVERITY_FOUND=false" >> $GITHUB_OUTPUT
            echo "✅ No HIGH/CRITICAL vulnerabilities in frontend dependencies" >> $GITHUB_STEP_SUMMARY
          else
            echo "HIGH_SEVERITY_FOUND=true" >> $GITHUB_OUTPUT
            echo "❌ **HIGH/CRITICAL vulnerabilities found in frontend dependencies!**" >> $GITHUB_STEP_SUMMARY
            # Show the high severity vulnerabilities
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### High/Critical Severity Issues:" >> $GITHUB_STEP_SUMMARY
            pnpm audit --audit-level=high >> $GITHUB_STEP_SUMMARY 2>&1 || true
          fi

      - name: Upload Frontend Vulnerability Report
        uses: actions/upload-artifact@v5
        with:
          name: frontend-vulnerability-report
          path: |
            apps/web/audit-report.txt
            apps/web/audit-report.json
          retention-days: 7

      # Fail the pipeline if HIGH severity vulnerabilities found
      - name: Check Severity Threshold
        if: steps.dotnet-scan.outputs.HIGH_SEVERITY_FOUND == 'true' || steps.pnpm-scan.outputs.HIGH_SEVERITY_FOUND == 'true'
        run: |
          echo "::error::Pipeline failed due to HIGH or CRITICAL severity vulnerabilities"
          echo "Please review the vulnerability reports and fix the issues before merging"
          exit 1

  # .NET Security Code Scan
  dotnet-security-scan:
    name: .NET Security Code Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-security-${{ hashFiles('apps/api/**/*.csproj', 'apps/api/**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Issue #1455: SecurityCodeScan.VS2019 removed (deprecated, last update 2021)
      # Modern analyzers now in Api.csproj: NetAnalyzers, SonarAnalyzer, Meziantou.Analyzer

      - name: Build with Security Analysis
        id: security_build
        run: |
          # Build with security analysis, capture output
          dotnet build --configuration Release /p:TreatWarningsAsErrors=false > security-scan.log 2>&1 || true

          # Check for HIGH severity security warnings (SCS prefix)
          set +e  # Don't exit on grep failure
          HIGH_SEVERITY=$(grep -E "warning (SCS0[0-9]{3}|CA[0-9]{4}):" security-scan.log || true)
          set -e

          # Display full log
          cat security-scan.log

          # Check for security warnings and categorize
          if grep -qi "warning.*security" security-scan.log || grep -qi "warning SCS" security-scan.log; then
            echo "## ⚠️ .NET Security Warnings Found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Count warnings
            SECURITY_WARNINGS=$(grep -ic "warning.*security\|warning SCS" security-scan.log || echo "0")
            echo "**Total Security Warnings:** $SECURITY_WARNINGS" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Show warnings in summary
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Security Warning Details</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -i "warning.*security\|warning SCS" security-scan.log >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY

            # Set output for later check
            echo "has_warnings=true" >> $GITHUB_OUTPUT
            echo "warning_count=$SECURITY_WARNINGS" >> $GITHUB_OUTPUT

            # Check for HIGH severity issues
            if [ -n "$HIGH_SEVERITY" ]; then
              echo "has_high_severity=true" >> $GITHUB_OUTPUT
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### 🚨 HIGH Severity Issues Detected" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$HIGH_SEVERITY" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            else
              echo "has_high_severity=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "✅ No security warnings found in .NET code" >> $GITHUB_STEP_SUMMARY
            echo "has_warnings=false" >> $GITHUB_OUTPUT
            echo "has_high_severity=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail on High Severity Security Issues
        if: steps.security_build.outputs.has_high_severity == 'true'
        run: |
          echo "::error::Build contains HIGH severity security warnings that must be fixed before merging"
          echo ""
          echo "Security warnings found:"
          grep -E "warning (SCS0[0-9]{3}|CA[0-9]{4}):" security-scan.log || true
          echo ""
          echo "Please review and fix these security issues before merging."
          echo "See https://security-code-scan.github.io/ for remediation guidance."
          exit 1

      - name: Upload Security Scan Report
        uses: actions/upload-artifact@v5
        with:
          name: dotnet-security-scan-report
          path: apps/api/security-scan.log
          retention-days: 7

  # Semgrep SAST & Secrets Scanning
  semgrep-scan:
    name: Semgrep SAST & Secrets Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Semgrep Security Analysis
        run: |
          semgrep scan \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/owasp-top-10 \
            --config=p/csharp \
            --config=p/typescript \
            --sarif \
            --output=semgrep-results.sarif \
            --verbose || true

      - name: Generate Human-Readable Report
        run: |
          echo "## Semgrep Security Findings" >> $GITHUB_STEP_SUMMARY

          # Run Semgrep again for human-readable output
          semgrep scan \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/owasp-top-10 \
            --config=p/csharp \
            --config=p/typescript \
            --quiet > semgrep-report.txt 2>&1 || true

          if [ -s semgrep-report.txt ]; then
            cat semgrep-report.txt >> $GITHUB_STEP_SUMMARY
            cat semgrep-report.txt
          else
            echo "✅ No security issues found by Semgrep" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
        if: always()

      - name: Upload Semgrep Reports
        uses: actions/upload-artifact@v5
        with:
          name: semgrep-security-reports
          path: |
            semgrep-results.sarif
            semgrep-report.txt
          retention-days: 30
        if: always()

  # Security scan summary
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [codeql-analysis, dependency-scan, dotnet-security-scan, semgrep-scan]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "# 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All security scans completed. Check individual job results for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- CodeQL Analysis: ${{ needs.codeql-analysis.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Scan: ${{ needs.dependency-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- .NET Security Scan: ${{ needs.dotnet-security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Semgrep SAST & Secrets: ${{ needs.semgrep-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Security reports are available as workflow artifacts (retained for 30 days)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Security Coverage (SEC-04)" >> $GITHUB_STEP_SUMMARY
          echo "✅ SAST: CodeQL + Semgrep" >> $GITHUB_STEP_SUMMARY
          echo "✅ Secrets Detection: Semgrep" >> $GITHUB_STEP_SUMMARY
          echo "✅ Dependency Scanning: .NET + npm" >> $GITHUB_STEP_SUMMARY
          echo "✅ Code Analysis: NetAnalyzers + SonarAnalyzer + Meziantou.Analyzer" >> $GITHUB_STEP_SUMMARY
