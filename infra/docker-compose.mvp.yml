# Docker Compose MVP - MeepleAI Production (6 services)
# Target: Hetzner CAX31 (8 ARM cores, 16 GB RAM, EUR 9.30/month)
# Total RAM budget: ~6.6 GB (headroom: ~9.4 GB)
#
# Services: postgres, redis, ollama, api, web, caddy
# Eliminated: qdrant, embedding-service, reranker-service, unstructured-service,
#             smoldocling-service, orchestration-service, prometheus, grafana,
#             alertmanager, cadvisor, node-exporter, n8n, minio, mailpit, traefik
#
# Usage:
#   docker compose -f docker-compose.mvp.yml up -d
#   docker compose -f docker-compose.mvp.yml logs -f
#
# Post-deploy: run scripts/ollama-init.sh to pull required models

name: meepleai

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: meepleai-postgres
    restart: unless-stopped
    env_file:
      - ./secrets/database.secret
    environment:
      # Tuned for 1.5 GB RAM limit
      POSTGRES_SHARED_BUFFERS: 384MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1024MB
      POSTGRES_WORK_MEM: 8MB
      POSTGRES_MAINTENANCE_WORK_MEM: 128MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - meepleai
    shm_size: 256m
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M
        reservations:
          cpus: '0.5'
          memory: 768M

  redis:
    image: redis:7.4.1-alpine3.20
    container_name: meepleai-redis
    restart: unless-stopped
    env_file:
      - ./secrets/redis.secret
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass $$REDIS_PASSWORD --maxmemory 512mb --maxmemory-policy allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  ollama:
    image: ollama/ollama:0.3.14
    container_name: meepleai-ollama
    restart: unless-stopped
    environment:
      # Keep models loaded in RAM to avoid swap latency
      OLLAMA_KEEP_ALIVE: 24h
      # CPU-only: limit concurrent models to 2 (qwen2.5 + mxbai-embed-large)
      OLLAMA_MAX_LOADED_MODELS: 2
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2560M
        reservations:
          cpus: '1.0'
          memory: 1536M

  api:
    build:
      context: ../apps/api
      dockerfile: ./src/Api/Dockerfile
    container_name: meepleai-api
    restart: unless-stopped
    env_file:
      - ./secrets/database.secret
      - ./secrets/redis.secret
      - ./secrets/jwt.secret
      - ./secrets/openrouter.secret
      - ./secrets/admin.secret
      - ./secrets/oauth.secret
      - ./secrets/bgg.secret
      - ./secrets/email.secret
      - ./secrets/storage.secret
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # Embedding: Ollama mxbai-embed-large (replaces Python embedding-service)
      Embedding__Provider: OllamaMxbai
      Embedding__OllamaUrl: http://ollama:11434
      Embedding__Model: mxbai-embed-large
      Embedding__Dimensions: "1024"
      # Reranker: disabled, graceful degradation to RRF scores
      ResilientRetrieval__EnableReranking: "false"
      # LLM: Ollama for local, OpenRouter for cloud (unchanged)
      OLLAMA_URL: http://ollama:11434
    volumes:
      - ./scripts/load-secrets-env.sh:/scripts/load-secrets-env.sh:ro
      - pdf_uploads:/app/pdf_uploads
      - ./secrets:/app/infra/secrets:ro
    entrypoint: ["/scripts/load-secrets-env.sh"]
    command: ["dotnet", "Api.dll"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1536M
        reservations:
          cpus: '1.0'
          memory: 768M

  web:
    build:
      context: ../apps/web
      dockerfile: ./Dockerfile
    container_name: meepleai-web
    restart: unless-stopped
    environment:
      # API URL for server-side rendering (internal Docker network)
      NEXT_PUBLIC_API_BASE: http://api:8080
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  caddy:
    image: caddy:2-alpine
    container_name: meepleai-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  pdf_uploads:
  caddy_data:

networks:
  meepleai:
    driver: bridge
