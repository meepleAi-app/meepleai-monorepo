version: 2

# Ignore test files with hardcoded mock credentials (not real secrets)
# and example/template files with placeholder values
ignore-paths:
  - apps/api/tests/
  - apps/web/src/components/auth/__tests__/
  - apps/web/src/components/ui/v2/strength-meter/
  - apps/web/src/**/__tests__/
  - apps/web/src/**/*.test.tsx
  - apps/web/src/**/*.test.ts
  - infra/secrets/*.secret.example
  # I7 (auth security fixes): blocklist of common passwords used to REJECT
  # weak choices at registration. The literals are the very strings users
  # are forbidden from using — by definition not real credentials.
  - apps/api/src/Api/BoundedContexts/Authentication/Domain/Resources/CommonPasswords.txt
