name: Test Admin Login

on:
  workflow_dispatch:

jobs:
  test-login:
    name: Test Login and Show API Logs
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    if: vars.DEPLOY_METHOD == 'ssh'
    steps:
      - name: Test login and show logs
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"

            echo "=== API CONTAINER STATUS ==="
            docker ps --filter name=meepleai-api --format "{{.Status}}"

            echo "=== API LAST 60 LOG LINES ==="
            docker logs meepleai-api --tail=60 2>&1

            echo ""
            echo "=== LOGIN TEST full response ==="
            ADMIN_EMAIL=$(grep "^ADMIN_EMAIL=" /opt/meepleai/repo/infra/secrets/admin.secret | cut -d= -f2)
            ADMIN_PASS=$(grep "^ADMIN_PASSWORD=" /opt/meepleai/repo/infra/secrets/admin.secret | cut -d= -f2)

            curl -s -X POST https://meepleai.app/api/v1/auth/login \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"${ADMIN_EMAIL}\",\"password\":\"${ADMIN_PASS}\"}" \
              -w "\nHTTP_STATUS: %{http_code}" 2>&1

            echo ""
            echo "=== ADMIN IN DB ==="
            DB_SECRET="/opt/meepleai/repo/infra/secrets/database.secret"
            set -a; source "$DB_SECRET"; set +a
            PG_USER="${POSTGRES_USER:-meepleai}"
            PG_DB="${POSTGRES_DB:-meepleai_staging}"
            docker exec meepleai-postgres psql -U "$PG_USER" -d "$PG_DB" -c \
              "SELECT count(*) as admin_count FROM users WHERE \"Role\" = 'SuperAdmin';" 2>&1
