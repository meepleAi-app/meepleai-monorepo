# OPS-05: Prometheus Recording and Alert Rules
# Error monitoring and alerting for MeepleAI

groups:
  # ========================================
  # Recording Rules
  # Pre-computed metrics for fast querying
  # ========================================

  - name: meepleai_error_recording_rules
    interval: 15s
    rules:
      # Error rate by endpoint (errors per second)
      - record: meepleai:api:error_rate:5m
        expr: |
          rate(
            http_server_request_duration_count{
              http_response_status_code=~"5.."
            }[5m]
          )
        labels:
          service: meepleai-api

      # Total request rate (all status codes)
      - record: meepleai:api:request_rate:5m
        expr: |
          rate(http_server_request_duration_count[5m])
        labels:
          service: meepleai-api

      # Error ratio (percentage of requests that fail)
      - record: meepleai:api:error_ratio:5m
        expr: |
          (
            rate(
              http_server_request_duration_count{
                http_response_status_code=~"5.."
              }[5m]
            )
            /
            rate(http_server_request_duration_count[5m])
          ) OR on() vector(0)
        labels:
          service: meepleai-api

      # RAG error rate (from custom metrics)
      - record: meepleai:rag:error_rate:5m
        expr: |
          rate(meepleai_rag_errors_total[5m]) OR on() vector(0)
        labels:
          service: meepleai-api
          category: rag

      # Critical error spike detection (current rate vs 1-hour historical average)
      - record: meepleai:api:error_spike_ratio
        expr: |
          (
            rate(
              http_server_request_duration_count{
                http_response_status_code="500"
              }[5m]
            )
            /
            (
              avg_over_time(
                rate(
                  http_server_request_duration_count{
                    http_response_status_code="500"
                  }[5m]
                )[1h:5m]
              ) > 0
            )
          ) OR on() vector(0)
        labels:
          service: meepleai-api

      # API response time p95 by endpoint
      - record: meepleai:api:response_time_p95:5m
        expr: |
          histogram_quantile(
            0.95,
            rate(http_server_request_duration_bucket[5m])
          )
        labels:
          service: meepleai-api

  # ========================================
  # Alert Rules
  # Conditions that trigger notifications
  # ========================================

  - name: meepleai_critical_alerts
    interval: 30s
    rules:
      # CRITICAL: High error rate (> 1 error/sec for 2 minutes)
      - alert: HighErrorRate
        expr: |
          meepleai:api:error_rate:5m > 1
        for: 2m
        labels:
          severity: critical
          service: meepleai-api
          category: errors
        annotations:
          summary: "API error rate is critically high"
          description: |
            Error rate is {{ $value | humanize }} errors/sec (threshold: 1/sec).
            This indicates a significant issue affecting multiple requests.
            Check logs at http://localhost:8081 with CorrelationId filter.
          runbook_url: "https://docs.meepleai.dev/runbooks/high-error-rate"
          dashboard_url: "http://localhost:3001/d/error-monitoring"

      # CRITICAL: Error spike (3x historical average)
      - alert: ErrorSpike
        expr: |
          meepleai:api:error_spike_ratio > 3
        for: 2m
        labels:
          severity: critical
          service: meepleai-api
          category: errors
        annotations:
          summary: "Sudden spike in error rate detected"
          description: |
            Current error rate is {{ $value | humanize }}x higher than 1-hour average.
            This may indicate a recent deployment issue or external dependency failure.
            Check recent changes and dependency health.
          runbook_url: "https://docs.meepleai.dev/runbooks/error-spike"
          dashboard_url: "http://localhost:3001/d/error-monitoring"

      # CRITICAL: All database connections are down
      - alert: DatabaseDown
        expr: |
          up{job="meepleai-api"} == 0
          OR
          (pg_up{} == 0)
        for: 1m
        labels:
          severity: critical
          service: meepleai-api
          category: dependency
        annotations:
          summary: "PostgreSQL database is unreachable"
          description: |
            The API cannot connect to PostgreSQL database.
            All API operations are likely failing.
            Check database health and network connectivity.
          runbook_url: "https://docs.meepleai.dev/runbooks/dependency-down"

      # CRITICAL: Redis cache is down
      - alert: RedisDown
        expr: |
          redis_up{} == 0
        for: 2m
        labels:
          severity: critical
          service: meepleai-api
          category: dependency
        annotations:
          summary: "Redis cache is unreachable"
          description: |
            The API cannot connect to Redis.
            Caching, session management, and rate limiting are affected.
            Check Redis container health.
          runbook_url: "https://docs.meepleai.dev/runbooks/dependency-down"

      # CRITICAL: Qdrant vector DB is down
      - alert: QdrantDown
        expr: |
          up{job="qdrant"} == 0
        for: 2m
        labels:
          severity: critical
          service: meepleai-api
          category: dependency
        annotations:
          summary: "Qdrant vector database is unreachable"
          description: |
            The API cannot connect to Qdrant.
            RAG operations and semantic search are failing.
            Check Qdrant container health at http://localhost:6333/healthz
          runbook_url: "https://docs.meepleai.dev/runbooks/dependency-down"

  - name: meepleai_warning_alerts
    interval: 1m
    rules:
      # WARNING: Elevated error ratio (> 5% for 5 minutes)
      - alert: HighErrorRatio
        expr: |
          meepleai:api:error_ratio:5m > 0.05
        for: 5m
        labels:
          severity: warning
          service: meepleai-api
          category: errors
        annotations:
          summary: "Error ratio exceeds 5%"
          description: |
            {{ $value | humanizePercentage }} of requests are failing.
            While not critical yet, this indicates degraded service quality.
            Monitor closely and investigate root cause.
          runbook_url: "https://docs.meepleai.dev/runbooks/high-error-rate"
          dashboard_url: "http://localhost:3001/d/error-monitoring"

      # WARNING: RAG errors occurring
      - alert: RagErrorsDetected
        expr: |
          meepleai:rag:error_rate:5m > 0.5
        for: 3m
        labels:
          severity: warning
          service: meepleai-api
          category: rag
        annotations:
          summary: "RAG operations are experiencing errors"
          description: |
            RAG error rate: {{ $value | humanize }} errors/sec.
            This may affect Q&A accuracy and semantic search.
            Check Qdrant connection and embedding service health.
          runbook_url: "https://docs.meepleai.dev/runbooks/rag-errors"
          dashboard_url: "http://localhost:3001/d/ai-rag-operations"

      # WARNING: Slow API response times
      - alert: SlowResponseTime
        expr: |
          meepleai:api:response_time_p95:5m > 5
        for: 5m
        labels:
          severity: warning
          service: meepleai-api
          category: performance
        annotations:
          summary: "API response time is degraded"
          description: |
            P95 response time: {{ $value | humanize }}s (threshold: 5s).
            Users are experiencing slow responses.
            Check database query performance and external API latency.
          runbook_url: "https://docs.meepleai.dev/runbooks/slow-performance"
          dashboard_url: "http://localhost:3001/d/api-performance"

      # WARNING: High memory usage
      - alert: HighMemoryUsage
        expr: |
          process_working_set_bytes / process_memory_limit_bytes > 0.8
        for: 5m
        labels:
          severity: warning
          service: meepleai-api
          category: resources
        annotations:
          summary: "API memory usage is high"
          description: |
            Memory usage: {{ $value | humanizePercentage }}.
            The API may be approaching memory limits.
            Check for memory leaks or increase container resources.
          dashboard_url: "http://localhost:3001/d/infrastructure"

  - name: meepleai_info_alerts
    interval: 5m
    rules:
      # INFO: New error type detected (for tracking)
      - alert: NewErrorTypeDetected
        expr: |
          changes(
            meepleai:api:error_rate:5m[10m]
          ) > 0
          and
          meepleai:api:error_rate:5m > 0.1
        for: 5m
        labels:
          severity: info
          service: meepleai-api
          category: errors
        annotations:
          summary: "New error pattern detected"
          description: |
            A new type of error has appeared in the system.
            Error rate: {{ $value | humanize }} errors/sec.
            Review logs to identify the new error type.
          dashboard_url: "http://localhost:3001/d/error-monitoring"

  # ========================================
  # AI Quality Alert Rules
  # AI-11.2: Quality monitoring and alerting
  # ========================================

  - name: meepleai_quality_recording_rules
    interval: 15s
    rules:
      # Average overall confidence score (5-minute window)
      - record: meepleai:quality:overall_confidence:5m
        expr: |
          avg(meepleai_quality_score{dimension="overall_confidence"}) OR on() vector(0)
        labels:
          service: meepleai-api
          category: quality

      # Low-quality response rate (percentage)
      - record: meepleai:quality:low_quality_rate:5m
        expr: |
          (
            rate(meepleai_quality_low_quality_responses_total[5m])
            /
            rate(meepleai_quality_score_count{dimension="overall_confidence"}[5m])
          ) * 100 OR on() vector(0)
        labels:
          service: meepleai-api
          category: quality

      # RAG confidence average
      - record: meepleai:quality:rag_confidence:5m
        expr: |
          avg(meepleai_quality_score{dimension="rag_confidence"}) OR on() vector(0)
        labels:
          service: meepleai-api
          category: quality

      # LLM confidence average
      - record: meepleai:quality:llm_confidence:5m
        expr: |
          avg(meepleai_quality_score{dimension="llm_confidence"}) OR on() vector(0)
        labels:
          service: meepleai-api
          category: quality

  - name: meepleai_quality_critical_alerts
    interval: 30s
    rules:
      # CRITICAL: Average overall confidence < 0.60 for 1 hour
      - alert: LowOverallConfidence
        expr: |
          meepleai:quality:overall_confidence:5m < 0.60
        for: 1h
        labels:
          severity: critical
          service: meepleai-api
          category: quality
        annotations:
          summary: "AI response quality is critically low"
          description: |
            Average overall confidence is {{ $value | humanizePercentage }} (threshold: 60%).
            AI responses have been consistently low quality for 1 hour.
            This indicates systematic issues with RAG, LLM, or citation quality.
            Check Qdrant connection, embedding service, and LLM API health.
          runbook_url: "https://docs.meepleai.dev/runbooks/ai-quality-low"
          dashboard_url: "http://localhost:3001/d/quality-metrics"

      # CRITICAL: Low-quality response rate > 30% for 1 hour
      - alert: HighLowQualityRate
        expr: |
          meepleai:quality:low_quality_rate:5m > 30
        for: 1h
        labels:
          severity: critical
          service: meepleai-api
          category: quality
        annotations:
          summary: "High rate of low-quality responses"
          description: |
            {{ $value | humanize }}% of responses are low quality (threshold: 30%).
            More than 1 in 3 AI responses are failing quality standards.
            Investigate RAG retrieval, LLM performance, and citation extraction.
          runbook_url: "https://docs.meepleai.dev/runbooks/ai-quality-low"
          dashboard_url: "http://localhost:3001/d/quality-metrics"

      # CRITICAL: RAG confidence < 0.50 for 30 minutes
      - alert: LowRagConfidence
        expr: |
          meepleai:quality:rag_confidence:5m < 0.50
        for: 30m
        labels:
          severity: critical
          service: meepleai-api
          category: quality
        annotations:
          summary: "RAG retrieval quality is critically low"
          description: |
            RAG confidence is {{ $value | humanizePercentage }} (threshold: 50%).
            Semantic search is not finding relevant context consistently.
            Check Qdrant vector DB health, embedding service, and index quality.
          runbook_url: "https://docs.meepleai.dev/runbooks/ai-quality-low"
          dashboard_url: "http://localhost:3001/d/quality-metrics"

      # CRITICAL: LLM confidence < 0.50 for 30 minutes
      - alert: LowLlmConfidence
        expr: |
          meepleai:quality:llm_confidence:5m < 0.50
        for: 30m
        labels:
          severity: critical
          service: meepleai-api
          category: quality
        annotations:
          summary: "LLM response quality is critically low"
          description: |
            LLM confidence is {{ $value | humanizePercentage }} (threshold: 50%).
            Language model is producing low-quality responses consistently.
            Check OpenRouter API health, prompt quality, and model selection.
          runbook_url: "https://docs.meepleai.dev/runbooks/ai-quality-low"
          dashboard_url: "http://localhost:3001/d/quality-metrics"

      # CRITICAL: Zero quality metrics for 15 minutes (service health check)
      - alert: QualityMetricsUnavailable
        expr: |
          absent(meepleai_quality_score{dimension="overall_confidence"})
          or
          (
            rate(meepleai_quality_score_count{dimension="overall_confidence"}[5m]) == 0
            and
            rate(http_server_request_duration_count[5m]) > 0
          )
        for: 15m
        labels:
          severity: critical
          service: meepleai-api
          category: quality
        annotations:
          summary: "Quality metrics are not being recorded"
          description: |
            No quality metrics have been recorded for 15 minutes.
            This indicates either:
            1. No AI requests are being processed
            2. Quality scoring service is failing
            3. Metrics collection is broken
            Check AI service health and quality scoring pipeline.
          runbook_url: "https://docs.meepleai.dev/runbooks/ai-quality-low"
          dashboard_url: "http://localhost:3001/d/quality-metrics"

  - name: meepleai_quality_warning_alerts
    interval: 1m
    rules:
      # WARNING: Overall confidence dropping (< 0.70 for 30 minutes)
      - alert: DegradedOverallConfidence
        expr: |
          meepleai:quality:overall_confidence:5m < 0.70
        for: 30m
        labels:
          severity: warning
          service: meepleai-api
          category: quality
        annotations:
          summary: "AI response quality is degraded"
          description: |
            Average overall confidence is {{ $value | humanizePercentage }} (threshold: 70%).
            Response quality is below normal levels but not critical yet.
            Monitor closely and investigate if trend continues.
          runbook_url: "https://docs.meepleai.dev/runbooks/ai-quality-low"
          dashboard_url: "http://localhost:3001/d/quality-metrics"

      # WARNING: Low-quality rate elevated (> 15% for 30 minutes)
      - alert: ElevatedLowQualityRate
        expr: |
          meepleai:quality:low_quality_rate:5m > 15
        for: 30m
        labels:
          severity: warning
          service: meepleai-api
          category: quality
        annotations:
          summary: "Elevated rate of low-quality responses"
          description: |
            {{ $value | humanize }}% of responses are low quality (threshold: 15%).
            More responses than usual are failing quality standards.
            Review recent changes and monitor for escalation.
          runbook_url: "https://docs.meepleai.dev/runbooks/ai-quality-low"
          dashboard_url: "http://localhost:3001/d/quality-metrics"

  # ========================================
  # BGAI-043: PDF Processing Metrics Rules
  # PDF pipeline monitoring and alerting
  # ========================================

  - name: meepleai_pdf_recording_rules
    interval: 15s
    rules:
      # PDF extraction stage success rate (by stage)
      - record: meepleai:pdf:stage_success_rate:5m
        expr: |
          (
            rate(meepleai_pdf_extraction_stage_success[5m])
            /
            rate(meepleai_pdf_extraction_stage_attempts[5m])
          ) OR on() vector(0)
        labels:
          service: meepleai-api
          category: pdf

      # PDF quality score average
      - record: meepleai:pdf:quality_score_avg:5m
        expr: |
          avg(meepleai_pdf_quality_score) OR on() vector(0)
        labels:
          service: meepleai-api
          category: pdf

      # PDF processing duration p95
      - record: meepleai:pdf:processing_duration_p95:5m
        expr: |
          histogram_quantile(
            0.95,
            rate(meepleai_pdf_processing_duration_bucket[5m])
          ) OR on() vector(0)
        labels:
          service: meepleai-api
          category: pdf

      # PDF upload success rate
      - record: meepleai:pdf:upload_success_rate:5m
        expr: |
          (
            rate(meepleai_pdf_upload_attempts{status="success"}[5m])
            /
            rate(meepleai_pdf_upload_attempts[5m])
          ) OR on() vector(0)
        labels:
          service: meepleai-api
          category: pdf

      # Average chunks per document
      - record: meepleai:pdf:chunks_per_doc_avg:5m
        expr: |
          avg(meepleai_pdf_chunks_count) OR on() vector(0)
        labels:
          service: meepleai-api
          category: pdf

  - name: meepleai_pdf_critical_alerts
    interval: 30s
    rules:
      # CRITICAL: High PDF extraction failure rate (>40% for 10 minutes)
      - alert: HighPdfExtractionFailureRate
        expr: |
          (1 - meepleai:pdf:stage_success_rate:5m) > 0.40
        for: 10m
        labels:
          severity: critical
          service: meepleai-api
          category: pdf
        annotations:
          summary: "PDF extraction failure rate is critically high"
          description: |
            {{ $value | humanizePercentage }} of PDF extractions are failing (threshold: 40%).
            This affects all 3 stages (Unstructured, SmolDocling, Docnet).
            Check extraction service health (ports 8001, 8002) and logs.
          runbook_url: "https://docs.meepleai.dev/runbooks/pdf-extraction-failures"
          dashboard_url: "http://localhost:3001/d/pdf-processing"

      # CRITICAL: PDF quality score critically low (<0.60 for 1 hour)
      - alert: LowPdfQualityScore
        expr: |
          meepleai:pdf:quality_score_avg:5m < 0.60
        for: 1h
        labels:
          severity: critical
          service: meepleai-api
          category: pdf
        annotations:
          summary: "PDF extraction quality is critically low"
          description: |
            Average PDF quality score is {{ $value | humanizePercentage }} (threshold: 60%).
            Extracted text quality is below acceptable standards.
            Check extraction services, OCR configuration, and input PDF quality.
          runbook_url: "https://docs.meepleai.dev/runbooks/pdf-quality-low"
          dashboard_url: "http://localhost:3001/d/pdf-processing"

      # CRITICAL: PDF processing stalled (no uploads in 30 minutes during business hours)
      - alert: PdfProcessingStalled
        expr: |
          (
            rate(meepleai_pdf_upload_attempts[30m]) == 0
            and
            rate(http_server_request_duration_count[5m]) > 0
          )
        for: 30m
        labels:
          severity: critical
          service: meepleai-api
          category: pdf
        annotations:
          summary: "PDF processing pipeline is stalled"
          description: |
            No PDF uploads detected for 30 minutes despite active API traffic.
            This may indicate upload endpoint issues or storage failures.
            Check /api/v1/pdf/upload endpoint health and blob storage service.
          runbook_url: "https://docs.meepleai.dev/runbooks/pdf-stalled"
          dashboard_url: "http://localhost:3001/d/pdf-processing"

      # CRITICAL: Stage 1 (Unstructured) failing consistently
      - alert: UnstructuredStageFailure
        expr: |
          meepleai:pdf:stage_success_rate:5m{stage="unstructured"} < 0.50
        for: 15m
        labels:
          severity: critical
          service: meepleai-api
          category: pdf
        annotations:
          summary: "Unstructured PDF extraction (Stage 1) is failing"
          description: |
            Stage 1 success rate: {{ $value | humanizePercentage }} (threshold: 50%).
            Primary extraction method is degraded, forcing fallback to slower stages.
            Check Unstructured service at http://unstructured:8001/health
          runbook_url: "https://docs.meepleai.dev/runbooks/pdf-stage-failure"
          dashboard_url: "http://localhost:3001/d/pdf-processing"

  - name: meepleai_pdf_warning_alerts
    interval: 1m
    rules:
      # WARNING: Elevated PDF processing time (p95 >20s for 10 minutes)
      - alert: SlowPdfProcessing
        expr: |
          meepleai:pdf:processing_duration_p95:5m > 20000
        for: 10m
        labels:
          severity: warning
          service: meepleai-api
          category: pdf
        annotations:
          summary: "PDF processing is slower than normal"
          description: |
            P95 processing duration: {{ $value | humanizeDuration }} (threshold: 20s).
            PDFs are taking longer to process than expected.
            Check extraction service latency and queue backlog.
          runbook_url: "https://docs.meepleai.dev/runbooks/pdf-slow"
          dashboard_url: "http://localhost:3001/d/pdf-processing"

      # WARNING: PDF quality degraded (<0.75 for 30 minutes)
      - alert: DegradedPdfQuality
        expr: |
          meepleai:pdf:quality_score_avg:5m < 0.75
        for: 30m
        labels:
          severity: warning
          service: meepleai-api
          category: pdf
        annotations:
          summary: "PDF extraction quality is degraded"
          description: |
            Average quality score: {{ $value | humanizePercentage }} (threshold: 75%).
            Extraction quality is below optimal levels.
            Monitor input PDF quality and extraction stage performance.
          runbook_url: "https://docs.meepleai.dev/runbooks/pdf-quality-low"
          dashboard_url: "http://localhost:3001/d/pdf-processing"

      # WARNING: Low PDF upload success rate (<90% for 15 minutes)
      - alert: LowPdfUploadSuccessRate
        expr: |
          meepleai:pdf:upload_success_rate:5m < 0.90
        for: 15m
        labels:
          severity: warning
          service: meepleai-api
          category: pdf
        annotations:
          summary: "PDF upload success rate is below normal"
          description: |
            Upload success rate: {{ $value | humanizePercentage }} (threshold: 90%).
            More uploads are failing validation or storage than normal.
            Check validation rules, blob storage health, and disk space.
          runbook_url: "https://docs.meepleai.dev/runbooks/pdf-upload-failures"
          dashboard_url: "http://localhost:3001/d/pdf-processing"

      # WARNING: Excessive chunking (avg >150 chunks per document)
      - alert: ExcessivePdfChunking
        expr: |
          meepleai:pdf:chunks_per_doc_avg:5m > 150
        for: 15m
        labels:
          severity: warning
          service: meepleai-api
          category: pdf
        annotations:
          summary: "PDFs are generating excessive chunks"
          description: |
            Average chunks per document: {{ $value | humanize }} (threshold: 150).
            Large PDFs or improper chunking may impact RAG performance.
            Review chunk size configuration and input PDF sizes.
          runbook_url: "https://docs.meepleai.dev/runbooks/pdf-chunking"
          dashboard_url: "http://localhost:3001/d/pdf-processing"
