name: E2E Tests

on:
  pull_request:
    branches: [main, main-staging]
    paths:
      - 'apps/web/**'
      - 'apps/api/**'
  workflow_dispatch:
    inputs:
      project:
        description: 'Browser project to test'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - desktop-chrome
          - desktop-firefox
          - desktop-safari
          - mobile-chrome
          - mobile-safari
          - tablet-chrome

# Cancel in-progress runs for same PR/branch
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Minimal required permissions
permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    outputs:
      e2e-needed: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            e2e:
              - 'apps/web/**'
              - 'apps/api/**'
              - '.github/workflows/test-e2e.yml'

  # E2E Tests with Sharding (6 shards) - Backend runs in same job
  # Issue #3082: Optimized from 4 to 6 shards for 30% faster execution
  e2e-tests:
    name: E2E Tests (Shard ${{ matrix.shard }})
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    needs: changes
    if: needs.changes.outputs.e2e-needed == 'true' || github.event_name == 'workflow_dispatch'

    # Service containers for backend
    services:
      postgres:
        image: pgvector/pgvector:pg16  # Issue #3547: Use pgvector image for Vector column support
        env:
          POSTGRES_DB: meepleai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_test_password
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      qdrant:
        image: qdrant/qdrant:v1.12.4
        options: >-
          --health-cmd "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /readyz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n\" >&3 && grep -q \"HTTP/1.1 200\" <&3'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
        ports:
          - 6333:6333
          - 6334:6334  # gRPC port for Qdrant client

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]

    env:
      CI: true
      SHARD_INDEX: ${{ matrix.shard }}
      TOTAL_SHARDS: 6

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ===== Backend Setup =====
      - name: Wait for Services
        timeout-minutes: 2
        run: |
          echo "⏳ Waiting for PostgreSQL..."
          until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done
          echo "✅ PostgreSQL ready"

          echo "⏳ Waiting for Qdrant..."
          for i in {1..30}; do
            if curl -sf http://localhost:6333/healthz > /dev/null 2>&1; then
              echo "✅ Qdrant ready"
              break
            fi
            sleep 2
          done

          echo "⏳ Waiting for Redis..."
          for i in {1..30}; do
            if nc -z localhost 6379 2>/dev/null; then
              echo "✅ Redis ready"
              break
            fi
            sleep 1
          done

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore Backend Dependencies
        working-directory: apps/api/src/Api
        run: dotnet restore

      - name: Build Backend
        working-directory: apps/api/src/Api
        run: dotnet build --no-restore --configuration Release

      - name: Install EF Core Tools
        run: dotnet tool install --global dotnet-ef

      - name: Run Database Migrations
        working-directory: apps/api/src/Api
        run: dotnet ef database update --no-build --configuration Release
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: meepleai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_test_password

      - name: Start Backend API
        working-directory: apps/api/src/Api
        run: |
          dotnet run --no-build --configuration Release --no-launch-profile &
          echo $! > api.pid
          sleep 15  # Wait for startup (migrations already done)
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          ASPNETCORE_URLS: "http://localhost:8080"
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: meepleai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_test_password
          REDIS_URL: "localhost:6379"
          QDRANT_URL: "http://localhost:6333"
          OPENROUTER_API_KEY: "test-key-for-ci-placeholder"

      - name: Backend Health Check
        run: curl --retry 10 --retry-delay 3 --retry-max-time 60 http://localhost:8080/health

      # ===== Frontend Setup =====
      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: '20'
          pnpm-version: '10'
          working-directory: apps/web

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ hashFiles('apps/web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-playwright-

      - name: Install Playwright Browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Build Frontend (Production Mode for Stability)
        working-directory: apps/web
        run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8080

      # ===== Run E2E Tests =====
      - name: Run E2E Tests (Shard ${{ matrix.shard }}/${{ env.TOTAL_SHARDS }})
        working-directory: apps/web
        run: pnpm test:e2e:shard${{ matrix.shard }}
        env:
          # Let Playwright manage the Next.js server (uses next start in CI)
          FORCE_PRODUCTION_SERVER: 'true'

      # ===== Cleanup =====
      - name: Stop Backend
        if: always()
        run: |
          if [ -f apps/api/src/Api/api.pid ]; then
            kill $(cat apps/api/src/Api/api.pid) 2>/dev/null || true
          fi

      # ===== Upload Artifacts =====
      - name: Upload Test Report (Shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload Test Results (Shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: apps/web/test-results/
          retention-days: 7

      - name: Upload E2E Coverage (Shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-coverage-shard-${{ matrix.shard }}
          path: apps/web/coverage-e2e/
          retention-days: 7

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-shard-${{ matrix.shard }}
          path: apps/web/test-results/**/*.png
          retention-days: 7

      - name: Upload Traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: traces-shard-${{ matrix.shard }}
          path: apps/web/test-results/**/*.zip
          retention-days: 7

  # Aggregate results and enforce quality gates
  e2e-quality-gate:
    name: E2E Quality Gate
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    needs: e2e-tests
    if: always()
    steps:
      - name: Download All Shard Reports
        uses: actions/download-artifact@v8
        with:
          pattern: playwright-report-shard-*
          path: reports/
          merge-multiple: true

      - name: Merge Coverage Reports
        uses: actions/download-artifact@v8
        with:
          pattern: e2e-coverage-shard-*
          path: coverage-merged/
          merge-multiple: true

      - name: Calculate Pass Rate
        id: metrics
        run: |
          TOTAL=0
          PASSED=0
          FAILED=0

          # Parse Playwright JSON reports from all shards
          for result_file in reports/results*.json reports/**/results*.json; do
            if [ -f "$result_file" ]; then
              FILE_TOTAL=$(jq '[.. | .status? // empty] | length' "$result_file" 2>/dev/null || echo 0)
              FILE_PASSED=$(jq '[.. | select(.status? == "passed")] | length' "$result_file" 2>/dev/null || echo 0)
              TOTAL=$((TOTAL + FILE_TOTAL))
              PASSED=$((PASSED + FILE_PASSED))
            fi
          done

          # Fallback: derive from job results if no JSON reports found
          if [ "$TOTAL" -eq 0 ]; then
            echo "::warning::No Playwright JSON reports found, deriving pass rate from job results"
            if [ "${{ needs.e2e-tests.result }}" == "success" ]; then
              PASS_RATE=100
            else
              PASS_RATE=0
            fi
            echo "pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT
            echo "total_tests=0" >> $GITHUB_OUTPUT
            echo "passed_tests=0" >> $GITHUB_OUTPUT
            echo "failed_tests=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          FAILED=$((TOTAL - PASSED))
          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$((PASSED * 100 / TOTAL))
          else
            PASS_RATE=0
          fi
          echo "pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT
          echo "total_tests=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed_tests=$PASSED" >> $GITHUB_OUTPUT
          echo "failed_tests=$FAILED" >> $GITHUB_OUTPUT

      - name: Enforce Quality Gate (≥90% Pass Rate)
        run: |
          PASS_RATE=${{ steps.metrics.outputs.pass_rate }}
          TOTAL=${{ steps.metrics.outputs.total_tests }}

          # If no test metrics, fall back to job result
          if [ "$TOTAL" -eq 0 ]; then
            echo "::warning::No test metrics available, quality gate based on job result"
            if [ "${{ needs.e2e-tests.result }}" != "success" ]; then
              echo "❌ E2E test shards failed"
              exit 1
            fi
            echo "✅ All E2E test shards passed"
            exit 0
          fi

          if [ "$PASS_RATE" -lt 90 ]; then
            echo "❌ Quality gate failed: $PASS_RATE% < 90% threshold"
            exit 1
          else
            echo "✅ Quality gate passed: $PASS_RATE% ≥ 90% threshold"
          fi

      - name: Upload Merged Coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage-merged/lcov.info
          flags: e2e
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const passRate = ${{ steps.metrics.outputs.pass_rate }};
            const total = ${{ steps.metrics.outputs.total_tests }};
            const passed = ${{ steps.metrics.outputs.passed_tests }};
            const failed = ${{ steps.metrics.outputs.failed_tests }};

            const emoji = passRate >= 90 ? '✅' : '❌';
            const status = passRate >= 90 ? 'PASSED' : 'FAILED';

            const body = `## ${emoji} E2E Test Results: ${status}

            **Pass Rate**: ${passRate}% (${passed}/${total} tests)
            **Quality Gate**: ${passRate >= 90 ? '✅ PASSED' : '❌ FAILED'} (≥90% required)

            **Details**:
            - Passed: ${passed}
            - Failed: ${failed}
            - Total: ${total}

            **Artifacts**:
            - Test reports available in workflow artifacts
            - Screenshots/traces uploaded for failures
            - E2E coverage report uploaded to Codecov

            Issue #2542: E2E Test Suite with Robust Selectors`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # Manual trigger for full suite (all browsers)
  e2e-full-suite:
    name: E2E Full Suite (All Browsers)
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    if: github.event_name == 'workflow_dispatch'
    needs: changes

    # Service containers for backend
    services:
      postgres:
        image: pgvector/pgvector:pg16  # Issue #3547: Use pgvector image for Vector column support
        env:
          POSTGRES_DB: meepleai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_test_password
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      qdrant:
        image: qdrant/qdrant:v1.12.4
        options: >-
          --health-cmd "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /readyz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n\" >&3 && grep -q \"HTTP/1.1 200\" <&3'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
        ports:
          - 6333:6333
          - 6334:6334

    strategy:
      fail-fast: false
      matrix:
        project: [desktop-chrome, desktop-firefox, desktop-safari, mobile-chrome, mobile-safari, tablet-chrome]

    steps:
      - uses: actions/checkout@v6

      # ===== Backend Setup =====
      - name: Wait for Services
        timeout-minutes: 2
        run: |
          echo "⏳ Waiting for PostgreSQL..."
          until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done
          echo "✅ PostgreSQL ready"

          echo "⏳ Waiting for Qdrant..."
          for i in {1..30}; do
            if curl -sf http://localhost:6333/healthz > /dev/null 2>&1; then
              echo "✅ Qdrant ready"
              break
            fi
            sleep 2
          done

          echo "⏳ Waiting for Redis..."
          for i in {1..30}; do
            if nc -z localhost 6379 2>/dev/null; then
              echo "✅ Redis ready"
              break
            fi
            sleep 1
          done

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore Backend Dependencies
        working-directory: apps/api/src/Api
        run: dotnet restore

      - name: Build Backend
        working-directory: apps/api/src/Api
        run: dotnet build --no-restore --configuration Release

      - name: Install EF Core Tools
        run: dotnet tool install --global dotnet-ef

      - name: Run Database Migrations
        working-directory: apps/api/src/Api
        run: dotnet ef database update --no-build --configuration Release
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: meepleai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_test_password

      - name: Start Backend API
        working-directory: apps/api/src/Api
        run: |
          dotnet run --no-build --configuration Release --no-launch-profile &
          echo $! > api.pid
          sleep 15  # Wait for startup (migrations already done)
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          ASPNETCORE_URLS: "http://localhost:8080"
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: meepleai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_test_password
          REDIS_URL: "localhost:6379"
          QDRANT_URL: "http://localhost:6333"
          OPENROUTER_API_KEY: "test-key-for-ci-placeholder"

      - name: Backend Health Check
        run: curl --retry 10 --retry-delay 3 --retry-max-time 60 http://localhost:8080/health

      # ===== Frontend Setup =====
      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: '20'
          pnpm-version: '10'
          working-directory: apps/web

      - name: Install Playwright Browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps ${{ matrix.project == 'desktop-safari' && 'webkit' || matrix.project == 'desktop-firefox' && 'firefox' || 'chromium' }}

      - name: Build Frontend
        working-directory: apps/web
        run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8080

      # ===== Run E2E Tests =====
      - name: Run E2E Tests (${{ matrix.project }})
        working-directory: apps/web
        run: pnpm test:e2e --project=${{ matrix.project }}
        env:
          # Let Playwright manage the Next.js server (uses next start in CI)
          FORCE_PRODUCTION_SERVER: 'true'

      # ===== Cleanup =====
      - name: Stop Backend
        if: always()
        run: |
          if [ -f apps/api/src/Api/api.pid ]; then
            kill $(cat apps/api/src/Api/api.pid) 2>/dev/null || true
          fi

      - name: Upload Results (${{ matrix.project }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results-${{ matrix.project }}
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
            apps/web/coverage-e2e/
          retention-days: 7
