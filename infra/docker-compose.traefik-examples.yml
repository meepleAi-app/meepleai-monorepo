# Traefik Service Exposure Examples
# This file shows how to expose existing services through Traefik
# Usage: docker compose -f docker-compose.yml -f docker-compose.traefik.yml -f docker-compose.traefik-examples.yml up -d
#
# IMPORTANT: This is an EXAMPLE file. To expose services:
# 1. Copy labels to your service in docker-compose.yml OR
# 2. Create docker-compose.override.yml with service labels
#
# For production: Update domains from *.localhost to *.yourdomain.com

services:
  # Example 1: API Service - Full configuration
  api:
    labels:
      # Enable Traefik for this service
      - "traefik.enable=true"

      # HTTP Router (Development)
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.routers.api.entrypoints=web"

      # Service definition (port where container listens)
      - "traefik.http.services.api.loadbalancer.server.port=8080"

      # Apply middlewares (from dynamic/middlewares.yml)
      - "traefik.http.routers.api.middlewares=rate-limit-api@file,cors-api@file,compress@file"

      # PRODUCTION: HTTPS Router (uncomment when Let's Encrypt is configured)
      # - "traefik.http.routers.api-secure.rule=Host(`api.yourdomain.com`)"
      # - "traefik.http.routers.api-secure.entrypoints=websecure"
      # - "traefik.http.routers.api-secure.tls.certresolver=letsencrypt"
      # - "traefik.http.routers.api-secure.service=api"
      # - "traefik.http.routers.api-secure.middlewares=rate-limit-api@file,security-headers@file,compress@file"

  # Example 2: Web Frontend - Simple configuration
  web:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`app.localhost`) || Host(`localhost`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
      - "traefik.http.routers.web.middlewares=rate-limit-standard@file,compress@file"

      # PRODUCTION: HTTPS
      # - "traefik.http.routers.web-secure.rule=Host(`yourdomain.com`) || Host(`www.yourdomain.com`)"
      # - "traefik.http.routers.web-secure.entrypoints=websecure"
      # - "traefik.http.routers.web-secure.tls.certresolver=letsencrypt"
      # - "traefik.http.routers.web-secure.service=web"
      # - "traefik.http.routers.web-secure.middlewares=rate-limit-standard@file,security-headers@file,compress@file"

  # Example 3: Grafana - With IP whitelist and authentication
  grafana:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.localhost`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

      # Apply security middlewares
      # Note: Grafana has its own auth, but adding rate limiting for extra protection
      - "traefik.http.routers.grafana.middlewares=rate-limit-strict@file"

      # PRODUCTION: Add IP whitelist for admin access
      # - "traefik.http.routers.grafana-secure.middlewares=ip-whitelist-admin@file,rate-limit-strict@file,security-headers@file"

  # Example 4: Prometheus - Admin only, IP restricted
  prometheus:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.localhost`)"
      - "traefik.http.routers.prometheus.entrypoints=web"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "traefik.http.routers.prometheus.middlewares=rate-limit-strict@file"

      # PRODUCTION: Restrict access
      # - "traefik.http.routers.prometheus-secure.middlewares=ip-whitelist-admin@file,auth-basic@file"

  # Example 5: n8n - Workflow automation
  n8n:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.localhost`)"
      - "traefik.http.routers.n8n.entrypoints=web"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

      # n8n needs websockets for editor
      - "traefik.http.routers.n8n.middlewares=rate-limit-standard@file"

  # Example 6: Ollama - AI Model Service (internal only)
  # Note: Typically you don't expose this publicly, but might want subdomain for internal access
  ollama:
    labels:
      - "traefik.enable=false"  # Disabled by default for security

      # Uncomment if you need web access (e.g., for Ollama Web UI)
      # - "traefik.enable=true"
      # - "traefik.http.routers.ollama.rule=Host(`ollama.localhost`)"
      # - "traefik.http.routers.ollama.entrypoints=web"
      # - "traefik.http.services.ollama.loadbalancer.server.port=11434"
      # - "traefik.http.routers.ollama.middlewares=ip-whitelist-admin@file,rate-limit-strict@file"

