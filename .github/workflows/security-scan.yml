name: Security Scan

on:
  pull_request:
    branches: [main, main-staging]
  schedule:
    - cron: '0 2 * * 1' # Weekly on Mondays
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # CodeQL SAST
  codeql:
    name: CodeQL Analysis
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    strategy:
      matrix:
        language: ['csharp', 'javascript']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      # Build C# for analysis
      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Build .NET
        if: matrix.language == 'csharp'
        working-directory: apps/api
        run: |
          sudo apt-get update && sudo apt-get install -y libgdiplus || true
          dotnet restore
          dotnet build --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
        continue-on-error: true  # Code scanning might not be enabled in repo settings

  # Dependency scanning
  dependencies:
    name: Dependency Vulnerabilities
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # .NET dependencies
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Scan .NET Dependencies
        working-directory: apps/api
        run: |
          dotnet restore
          dotnet list package --vulnerable --include-transitive > vuln-report.txt || true
          cat vuln-report.txt

          # Fail on HIGH/CRITICAL
          if grep -iE "(High|Critical)" vuln-report.txt; then
            echo "❌ HIGH/CRITICAL vulnerabilities found"
            exit 1
          fi

      # Frontend dependencies
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Scan Frontend Dependencies
        working-directory: apps/web
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --audit-level=high > audit-report.txt 2>&1 || true
          cat audit-report.txt

          # Check for HIGH/CRITICAL in production dependencies only
          # Dev dependencies (like @chromatic-com/playwright) with transitive vulnerabilities are acceptable
          #
          # TEMPORARY EXCLUSION (TODO: Issue #4242 - Migrate to react-pdf):
          # - pdfjs-dist GHSA-wgrm-67xf-hhpq: Requires v4.2.67+ but @react-pdf-viewer only supports v3
          # - Context: PDF.js vulnerability for malicious PDFs, mitigated by server-side validation
          # - Solution: Migrate from @react-pdf-viewer to react-pdf to use pdfjs-dist v4+
          if pnpm audit --audit-level=high --prod 2>&1 | grep -v "GHSA-wgrm-67xf-hhpq" | grep -i "high\|critical"; then
            echo "❌ HIGH/CRITICAL vulnerabilities found in production dependencies"
            exit 1
          fi
          echo "✅ No HIGH/CRITICAL vulnerabilities in production dependencies (pdfjs-dist excluded - see TODO)"

  # Secrets scanning with Semgrep
  secrets:
    name: Secrets Detection
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: |
          python3 -m pip install --user semgrep
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=p/secrets \
            --config=p/security-audit \
            --sarif \
            --output=semgrep.sarif \
            --verbose || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        if: always()
        continue-on-error: true  # Code scanning might not be enabled in repo settings
