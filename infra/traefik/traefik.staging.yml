# Traefik v3.6 Staging Configuration for meepleai.app
#
# Uses docker-socket-proxy v0.6 for secure Docker API access

# API & Dashboard
api:
  dashboard: true

# Health check endpoint
ping: {}

# Entry Points
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
        domains:
          - main: "meepleai.app"
            sans:
              - "*.meepleai.app"

# Logging
log:
  level: INFO
  filePath: "/var/log/traefik/traefik.log"
  format: json
  maxSize: 100
  maxBackups: 5
  maxAge: 30
  compress: true

accessLog:
  filePath: "/var/log/traefik/access.log"
  format: json
  bufferingSize: 100
  fields:
    headers:
      defaultMode: keep
      names:
        Authorization: drop
        Cookie: drop
        Set-Cookie: drop

# Providers
providers:
  # Docker Provider via socket-proxy (v0.6)
  docker:
    endpoint: "tcp://docker-socket-proxy:2375"
    exposedByDefault: false
    network: "meepleai"
    watch: true

  file:
    directory: "/etc/traefik/dynamic"
    watch: true

# Let's Encrypt
certificatesResolvers:
  letsencrypt:
    acme:
      email: "admin@meepleai.io"
      storage: "/letsencrypt/acme.json"
      httpChallenge:
        entryPoint: web

# Metrics
metrics:
  prometheus:
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0

global:
  checkNewVersion: false
  sendAnonymousUsage: false
