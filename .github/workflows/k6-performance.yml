name: K6 Performance Tests

on:
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'

  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type (smoke, load, stress, spike)'
        required: false
        default: 'load'
        type: choice
        options:
          - smoke
          - load
          - stress
          - spike

  pull_request:
    paths:
      - 'apps/api/**'
      - 'tests/k6/**'
      - '.github/workflows/k6-performance.yml'

# Explicit permissions (Least Privilege Principle - Issue #1455)
# https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
permissions:
  contents: read        # Required: Checkout code
  pull-requests: write  # Required: Comment on PRs with performance test results
  actions: write        # Required: Upload/download artifacts (actions/upload-artifact@v6)
  checks: write         # Required: Report k6 test results

env:
  API_BASE_URL: http://localhost:5080
  TEST_GAME_ID: '00000000-0000-0000-0000-000000000001'
  # Database credentials - use secrets in CI, fallback to defaults for local runs
  TEST_POSTGRES_USER: ${{ secrets.TEST_POSTGRES_USER || 'postgres' }}
  TEST_POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD || 'postgres' }}
  TEST_DB_NAME: meepleai_test

jobs:
  k6-performance-tests:
    name: K6 Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ secrets.TEST_POSTGRES_USER || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD || 'postgres' }}
          POSTGRES_DB: meepleai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      qdrant:
        image: qdrant/qdrant:v1.12.5
        ports:
          - 6333:6333

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup backend environment
        uses: ./.github/actions/setup-backend
        with:
          dotnet-version: '9.0.x'
          working-directory: apps/api

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Build API
        working-directory: apps/api/src/Api
        run: dotnet build --configuration Release --no-restore

      - name: Create test database
        run: |
          PGPASSWORD="${{ secrets.TEST_POSTGRES_PASSWORD || 'postgres' }}" psql -h localhost -U "${{ secrets.TEST_POSTGRES_USER || 'postgres' }}" -c "CREATE DATABASE meepleai_test;" || true

      - name: Apply migrations
        working-directory: apps/api/src/Api
        run: |
          dotnet ef database update --configuration Release
        env:
          ConnectionStrings__Postgres: ${{ secrets.TEST_DB_CONNECTION_STRING || 'Host=localhost;Port=5432;Database=meepleai_test;Username=postgres;Password=postgres' }}

      - name: Seed test data
        working-directory: apps/api/src/Api
        run: |
          # Run integration tests that seed the database with test data
          dotnet test --filter "FullyQualifiedName~SeedTestData" --no-build --configuration Release || echo "Test seed not found, database will be seeded on first request"
        env:
          ConnectionStrings__Postgres: ${{ secrets.TEST_DB_CONNECTION_STRING || 'Host=localhost;Port=5432;Database=meepleai_test;Username=postgres;Password=postgres' }}

      - name: Start API server
        working-directory: apps/api/src/Api
        run: |
          nohup dotnet run --configuration Release > ../../api.log 2>&1 &
          echo $! > ../../api.pid
        env:
          ConnectionStrings__Postgres: ${{ secrets.TEST_DB_CONNECTION_STRING || 'Host=localhost;Port=5432;Database=meepleai_test;Username=postgres;Password=postgres' }}
          ConnectionStrings__Redis: 'localhost:6379'
          ConnectionStrings__Qdrant: 'http://localhost:6333'
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: 'http://0.0.0.0:5080'

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:5080/health; then
              echo "✅ API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "❌ API failed to start"
          cat api.log
          exit 1

      - name: Run k6 performance tests
        working-directory: tests/k6
        run: |
          TEST_TYPE="${{ github.event.inputs.test_type || 'load' }}"

          # Create reports directory
          mkdir -p reports

          # Run tests based on trigger
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # Quick smoke test for PRs
            k6 run --env TEST_TYPE=smoke scenarios/all.js
          else
            # Full load test for scheduled runs
            k6 run --env TEST_TYPE=${TEST_TYPE} scenarios/all.js
          fi
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
          TEST_USER_EMAIL: 'test@meepleai.dev'
          TEST_USER_PASSWORD: 'Test123!'
          TEST_GAME_ID: ${{ env.TEST_GAME_ID }}
          WEBSOCKET_URL: 'ws://localhost:5080/ws'

      - name: Generate HTML report
        if: always()
        working-directory: tests/k6
        run: |
          node utils/generate-report.js reports/summary.json

      - name: Upload performance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-reports-${{ github.run_number }}
          path: tests/k6/reports/
          retention-days: 30

      - name: Get latest main workflow run
        if: github.event_name == 'pull_request'
        id: get-baseline-run
        uses: actions/github-script@v8
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'k6-performance.yml',
              branch: 'main',
              status: 'success',
              per_page: 1
            });
            if (runs.data.workflow_runs.length > 0) {
              core.setOutput('run-id', runs.data.workflow_runs[0].id);
              core.setOutput('found', 'true');
            } else {
              core.setOutput('found', 'false');
            }

      - name: Download baseline report
        if: github.event_name == 'pull_request' && steps.get-baseline-run.outputs.found == 'true'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: k6-performance-reports-latest
          path: tests/k6/baseline/
          run-id: ${{ steps.get-baseline-run.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for performance regressions
        if: github.event_name == 'pull_request'
        working-directory: tests/k6
        continue-on-error: true
        run: |
          if [ -f baseline/summary.json ]; then
            echo "Comparing against baseline..."
            node utils/detect-regression.js baseline/summary.json reports/summary.json 10
          else
            echo "⚠️ No baseline found, skipping regression detection"
            echo "This will be the new baseline once merged to main"
          fi

      - name: Post results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('tests/k6/reports/summary.json', 'utf8'));
            const metrics = summary.metrics;

            const comment = `
            ## 🚀 K6 Performance Test Results

            | Metric | Value |
            |--------|-------|
            | Total Requests | ${metrics.http_reqs?.values.count || 0} |
            | Error Rate | ${((metrics.http_req_failed?.values.rate || 0) * 100).toFixed(2)}% |
            | Avg Response Time | ${(metrics.http_req_duration?.values.avg || 0).toFixed(2)}ms |
            | P95 Response Time | ${(metrics.http_req_duration?.values['p(95)'] || 0).toFixed(2)}ms |
            | Throughput | ${(metrics.http_reqs?.values.rate || 0).toFixed(2)} req/s |

            ### Endpoint Performance

            | Endpoint | P95 Latency | Threshold | Status |
            |----------|-------------|-----------|--------|
            | RAG Search | ${(metrics['http_req_duration{endpoint:rag-search}']?.values['p(95)'] || 0).toFixed(2)}ms | 2000ms | ${(metrics['http_req_duration{endpoint:rag-search}']?.values['p(95)'] || 0) < 2000 ? '✅' : '❌'} |
            | Chat | ${(metrics['http_req_duration{endpoint:chat}']?.values['p(95)'] || 0).toFixed(2)}ms | 1000ms | ${(metrics['http_req_duration{endpoint:chat}']?.values['p(95)'] || 0) < 1000 ? '✅' : '❌'} |
            | Games | ${(metrics['http_req_duration{endpoint:games}']?.values['p(95)'] || 0).toFixed(2)}ms | 500ms | ${(metrics['http_req_duration{endpoint:games}']?.values['p(95)'] || 0) < 500 ? '✅' : '❌'} |
            | Sessions | ${(metrics['http_req_duration{endpoint:sessions}']?.values['p(95)'] || 0).toFixed(2)}ms | 100ms | ${(metrics['http_req_duration{endpoint:sessions}']?.values['p(95)'] || 0) < 100 ? '✅' : '❌'} |

            [View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

      - name: Save baseline report
        if: github.ref == 'refs/heads/main' && github.event_name == 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-reports-latest
          path: tests/k6/reports/summary.json
          retention-days: 90

      - name: Archive API logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-logs-${{ github.run_number }}
          path: api.log
          retention-days: 7

      - name: Cleanup resources
        if: always()
        run: |
          # Stop API server
          if [ -f api.pid ]; then
            kill $(cat api.pid) 2>/dev/null || true
            rm api.pid
          fi

          # Cleanup any remaining dotnet processes
          pkill -f "dotnet.*Api" 2>/dev/null || true

          # Clean database
          PGPASSWORD="${{ secrets.TEST_POSTGRES_PASSWORD || 'postgres' }}" psql -h localhost -U "${{ secrets.TEST_POSTGRES_USER || 'postgres' }}" -c "DROP DATABASE IF EXISTS meepleai_test;" 2>/dev/null || true

          # Flush Redis
          redis-cli FLUSHALL 2>/dev/null || true

          echo "✅ Cleanup complete"

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: k6-performance-tests
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write  # Required: Create GitHub issues
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: actions/github-script@v8
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const webhook = process.env.SLACK_WEBHOOK_URL;
            if (!webhook) {
              console.log('⚠️ SLACK_WEBHOOK_URL not configured, skipping Slack notification');
              return;
            }

            const payload = {
              text: '🚨 K6 Performance Tests Failed',
              blocks: [
                {
                  type: 'header',
                  text: {
                    type: 'plain_text',
                    text: '🚨 K6 Performance Tests Failed',
                    emoji: true
                  }
                },
                {
                  type: 'section',
                  fields: [
                    {
                      type: 'mrkdwn',
                      text: `*Repository:*\n${context.repo.owner}/${context.repo.repo}`
                    },
                    {
                      type: 'mrkdwn',
                      text: `*Branch:*\n${context.ref.replace('refs/heads/', '')}`
                    },
                    {
                      type: 'mrkdwn',
                      text: `*Trigger:*\nScheduled (nightly)`
                    },
                    {
                      type: 'mrkdwn',
                      text: `*Run ID:*\n${context.runId}`
                    }
                  ]
                },
                {
                  type: 'actions',
                  elements: [
                    {
                      type: 'button',
                      text: {
                        type: 'plain_text',
                        text: 'View Workflow Run',
                        emoji: true
                      },
                      url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
                    }
                  ]
                }
              ]
            };

            const response = await fetch(webhook, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify(payload)
            });

            if (!response.ok) {
              console.error(`❌ Failed to send Slack notification: ${response.statusText}`);
            } else {
              console.log('✅ Slack notification sent successfully');
            }

      - name: Check for existing performance issue
        id: check-issue
        uses: actions/github-script@v8
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'performance,automated',
              per_page: 100
            });

            const performanceIssue = issues.data.find(issue =>
              issue.title.includes('K6 Performance Tests Failed')
            );

            if (performanceIssue) {
              core.setOutput('issue-exists', 'true');
              core.setOutput('issue-number', performanceIssue.number);
              console.log(`Found existing issue: #${performanceIssue.number}`);
            } else {
              core.setOutput('issue-exists', 'false');
              console.log('No existing performance issue found');
            }

      - name: Create or update GitHub issue
        uses: actions/github-script@v8
        with:
          script: |
            const issueExists = '${{ steps.check-issue.outputs.issue-exists }}' === 'true';
            const issueNumber = '${{ steps.check-issue.outputs.issue-number }}';

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const timestamp = new Date().toISOString();

            const comment = `## 🔴 Performance Test Failure - ${timestamp}

**Run:** [#${context.runId}](${runUrl})
**Branch:** ${context.ref.replace('refs/heads/', '')}
**Trigger:** Scheduled (nightly)

### Action Required
The nightly K6 performance tests have failed. Please investigate the workflow run for details.

### Common Issues to Check
- [ ] API response times exceeding thresholds
- [ ] Increased error rates
- [ ] Database connection issues
- [ ] Memory or resource constraints
- [ ] Breaking changes in recent commits

### Next Steps
1. Review the [workflow run](${runUrl}) logs
2. Check the performance reports artifact
3. Investigate and fix the root cause
4. Re-run the workflow to verify the fix
5. Close this issue once resolved`;

            if (issueExists) {
              // Add comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(issueNumber),
                body: comment
              });
              console.log(`✅ Added comment to existing issue #${issueNumber}`);
            } else {
              // Create new issue
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 K6 Performance Tests Failed - Investigation Required',
                body: comment,
                labels: ['performance', 'automated', 'bug', 'priority: high']
              });
              console.log(`✅ Created new issue #${issue.data.number}`);
            }
