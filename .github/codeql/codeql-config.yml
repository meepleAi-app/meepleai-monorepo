name: "MeepleAI CodeQL Configuration"
description: "Custom CodeQL configuration with false positive filters for MeepleAI"

# Disable specific queries that produce false positives
disable-default-queries: false

# Custom Models-as-Data extensions: registers MeepleAI canonical sanitizers
# (DataMasking.Mask*, LogSanitizer.*) so taint-tracking queries (cs/log-forging,
# cs/exposure-of-sensitive-information, cs/cleartext-storage-of-sensitive-information)
# stop flagging call sites where these sanitizers are already applied.
# See ADR-058 §1.4 and .github/codeql/extensions/meepleai-sanitizers/qlpack.yml
packs:
  - .github/codeql/extensions/meepleai-sanitizers

# Query filters to reduce false positives
query-filters:
  # Exclude generic exception handling warnings where properly justified with #pragma
  # CA1031: All 220 instances are properly documented with architectural patterns
  - exclude:
      id: cs/catch-of-all-exceptions
  # NOTE 2026-05-16: blanket exclude for cs/log-forging removed — Phase 1.4 (above)
  # registers LogSanitizer.* as a sanitizerModel, so the rule can again surface true
  # positives where input flows directly to ILogger without sanitization.

# Path filters to exclude test files and generated code
paths-ignore:
  - "**/Tests/**"
  - "**/test/**"
  - "**/obj/**"
  - "**/bin/**"
  - "**/*.Designer.cs"
  - "**/Migrations/**"
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/.next/**"

# Paths to include in analysis
paths:
  - apps/api/src
  - apps/web/src
  # Include top-level Next.js runtime files for security scanning
  - apps/web/proxy.ts
  - apps/web/instrumentation.ts  # For observability/telemetry (if added)

# Additional queries to run (optional)
queries:
  - uses: security-extended
  - uses: security-and-quality

# Suppress specific warnings with justification
# Note: Individual suppressions should use #pragma in code where possible
suppressions:
  # Path injection warnings already mitigated by PathSecurity utilities
  # Keep enabled but document that defense-in-depth is in place

  # IDisposable warnings - keep enabled to catch new issues
  # Already fixed 12 real leaks, remaining 589 are false positives from IHttpClientFactory usage

  # Null reference warnings - keep enabled
  # Already fixed 6 real issues, remaining are false positives from nullable context

# Custom query packs (if needed in future)
# packs:
#   - codeql/csharp-queries
#   - codeql/javascript-queries
