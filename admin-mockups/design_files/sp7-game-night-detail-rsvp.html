<!doctype html>
<html lang="it" data-theme="light">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1440"/>
  <title>SP7-B · Game Night · Detail + RSVP — MeepleAI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700;800&family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700;800&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="tokens.css"/>
  <link rel="stylesheet" href="components.css"/>

  <style>
    body { background: var(--bg); }

    @keyframes sp7Pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .55; transform: scale(.85); }
    }
    @keyframes sp7Celebrate {
      0%   { transform: scale(.92); opacity: 0; }
      60%  { transform: scale(1.02); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes sp7Sparkle {
      0%, 100% { opacity: 0; transform: scale(.5) rotate(0deg); }
      40%      { opacity: 1; transform: scale(1.1) rotate(180deg); }
      80%      { opacity: 0; transform: scale(.7) rotate(360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      [style*="animation"] { animation: none !important; }
    }

    .section-header {
      display: flex; align-items: center; gap: 10px;
      padding: 0 4px 16px;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 24px;
    }
    .section-marker { width: 4px; height: 22px; border-radius: 2px; }
    .section-title {
      flex: 1; margin: 0;
      font-family: var(--f-display);
      font-size: 18px; font-weight: 800; color: var(--text);
      letter-spacing: -.01em;
    }
    .section-meta {
      font-family: var(--f-mono); font-size: 11px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .06em;
    }

    .mobile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(412px, 1fr));
      gap: 36px 28px;
    }

    .phone-shell {
      display: flex; flex-direction: column; gap: 12px;
      align-items: center;
    }
    .phone {
      width: 412px; height: 820px;
      border-radius: 38px;
      background: var(--bg-card);
      border: 1px solid var(--border-strong);
      box-shadow: var(--shadow-lg), inset 0 0 0 8px var(--bg-sunken);
      overflow: hidden;
      display: flex; flex-direction: column;
      position: relative;
    }
    .phone::before {
      content: ''; position: absolute;
      top: 12px; left: 50%; transform: translateX(-50%);
      width: 110px; height: 28px;
      background: #000; border-radius: 999px; z-index: 99;
    }
    .phone-sbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 24px 6px;
      font-family: var(--f-mono); font-size: 12px; font-weight: 800;
      color: var(--text);
      flex-shrink: 0;
    }
    .phone-sbar .ind {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; letter-spacing: .04em;
    }

    .state-caption {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap;
      padding: 6px 10px;
      max-width: 412px;
    }
    .state-id {
      font-family: var(--f-mono); font-size: 10px; font-weight: 800;
      color: hsl(var(--c-event));
      background: hsl(var(--c-event) / 0.12);
      border: 1px solid hsl(var(--c-event) / 0.22);
      padding: 2px 7px; border-radius: var(--r-sm);
      letter-spacing: .04em;
    }
    .state-label {
      font-family: var(--f-display); font-size: 12px; font-weight: 800;
      color: var(--text); flex: 1; min-width: 0;
    }
    .gherkin {
      font-family: var(--f-mono); font-size: 9px; font-weight: 700;
      color: var(--text-muted);
      background: var(--bg-muted);
      padding: 2px 6px; border-radius: var(--r-xs);
      text-transform: uppercase; letter-spacing: .06em;
    }

    .desktop-shell {
      display: flex; flex-direction: column; gap: 12px;
    }
    .desktop-shell .state-caption { max-width: none; }
    .desktop-frame {
      border-radius: 14px;
      background: var(--bg-card);
      border: 1px solid var(--border-strong);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }
    .desktop-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      background: var(--bg-muted);
      border-bottom: 1px solid var(--border);
    }
    .traffic { width: 12px; height: 12px; border-radius: 50%; background: var(--border-strong); }
    .traffic:nth-child(1) { background: hsl(var(--c-danger) / .7); }
    .traffic:nth-child(2) { background: hsl(var(--c-warning) / .7); }
    .traffic:nth-child(3) { background: hsl(var(--c-toolkit) / .7); }
    .desktop-bar .url {
      flex: 1; text-align: center;
      font-family: var(--f-mono); font-size: 11px; font-weight: 700;
      color: var(--text-sec);
      background: var(--bg-card);
      padding: 4px 12px; border-radius: var(--r-sm);
      max-width: 380px; margin: 0 auto;
      border: 1px solid var(--border-light);
    }

    input, button { font-family: inherit; }
    button:focus-visible {
      outline: 2px solid hsl(var(--c-event));
      outline-offset: 2px;
    }
    code {
      font-family: var(--f-mono); font-size: .9em;
      background: var(--bg-muted);
      padding: 1px 5px; border-radius: var(--r-xs);
      color: var(--text-sec);
    }
    :root[data-theme="dark"] .phone {
      box-shadow: 0 12px 36px rgba(0,0,0,.6), inset 0 0 0 8px #000;
    }
  </style>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="hsl(350 89% 60%)"/>
      <g transform="translate(28 28)" fill="white">
        <rect x="0" y="0" width="44" height="38" rx="5" fill="white" opacity=".95"/>
        <circle cx="9" cy="10" r="3" fill="hsl(142 70% 45%)"/>
        <circle cx="22" cy="10" r="3" fill="hsl(142 70% 45%)"/>
        <circle cx="35" cy="10" r="3" fill="hsl(38 92% 50%)"/>
        <rect x="4" y="18" width="36" height="2.5" rx="1" fill="hsl(350 89% 60%)" opacity=".4"/>
        <rect x="4" y="24" width="26" height="2.5" rx="1" fill="hsl(350 89% 60%)" opacity=".4"/>
        <rect x="4" y="30" width="32" height="2.5" rx="1" fill="hsl(350 89% 60%)" opacity=".4"/>
      </g>
    </svg>
  </template>
</head>
<body>
  <div id="root"></div>

  <script src="data.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="sp7-game-night-detail-rsvp.jsx"></script>
</body>
</html>
