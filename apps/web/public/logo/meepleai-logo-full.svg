      A 12 12 0 1 1 50 39
      A 12 12 0 1 1 50 15
      M 50 39
      L 50 42
      L 15 42
      L 12 45
      L 12 52
      L 15 55
      L 28 55
      L 32 60
      L 35 70
      L 30 88
      L 28 95
      L 45 95
      L 50 75
      L 55 95
      L 72 95
      L 70 88
      L 65 70
      L 68 60
      L 72 55
      L 85 55
      L 88 52
      L 88 45
      L 85 42
      L 50 42
      Z
    " fill="url(#meeple-gradient-full)"/>

    <!-- AI Circuit Pattern -->
    <g opacity="0.3">
      <circle cx="50" cy="27" r="6" fill="none" stroke="url(#circuit-gradient-full)" stroke-width="1.5"/>
      <line x1="50" y1="45" x2="50" y2="55" stroke="url(#circuit-gradient-full)" stroke-width="2"/>
      <circle cx="50" cy="55" r="3" fill="url(#circuit-gradient-full)"/>
      <line x1="47" y1="55" x2="35" y2="55" stroke="url(#circuit-gradient-full)" stroke-width="1.5"/>
      <line x1="53" y1="55" x2="65" y2="55" stroke="url(#circuit-gradient-full)" stroke-width="1.5"/>
      <circle cx="35" cy="55" r="2" fill="url(#circuit-gradient-full)"/>
      <circle cx="65" cy="55" r="2" fill="url(#circuit-gradient-full)"/>
    </g>

    <!-- AI Core -->
