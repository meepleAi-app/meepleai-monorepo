name: Docs Link Check

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'CLAUDE.md'
      - '.github/workflows/docs-linkcheck.yml'
      - '.lycheeignore'
  workflow_dispatch:
    inputs:
      full_scan:
        description: 'Scan entire docs/ tree (vs PR-changed files only)'
        required: false
        default: 'false'

# Avoid duplicate runs
concurrency:
  group: docs-linkcheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    name: Lychee link check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history to diff against base

      - name: Determine files to check
        id: files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          FULL_SCAN: ${{ github.event.inputs.full_scan || 'false' }}
        run: |
          set -euo pipefail
          if [[ "$FULL_SCAN" == "true" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Mode: full scan"
            git ls-files 'docs/**/*.md' 'CLAUDE.md' > .lychee-targets.txt
          else
            echo "Mode: PR-diff scan (base=$BASE_SHA head=$HEAD_SHA)"
            git diff --name-only --diff-filter=AMR "$BASE_SHA" "$HEAD_SHA" -- 'docs/**/*.md' 'CLAUDE.md' > .lychee-targets.txt || true
          fi
          count=$(wc -l < .lychee-targets.txt)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Will check $count file(s):"
          cat .lychee-targets.txt || true

      - name: Skip if no doc changes
        if: steps.files.outputs.count == '0'
        run: echo "No docs/CLAUDE.md changes in this PR — skipping link check."

      - name: Restore lychee cache
        if: steps.files.outputs.count != '0'
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        id: lychee
        if: steps.files.outputs.count != '0'
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2
        with:
          # Read targets from file (one path per line). --offline avoids
          # external HTTP and makes the check deterministic + fast.
          args: >-
            --no-progress
            --cache
            --max-cache-age 1d
            --offline
            --include-fragments
            --root-dir ${{ github.workspace }}
            --
            $(cat .lychee-targets.txt | tr '\n' ' ')
          fail: true
          format: markdown
          output: ./lychee-report.md

      - name: Upload report
        if: always() && steps.files.outputs.count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: ./lychee-report.md
          retention-days: 14

      - name: Comment on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '_(report unavailable)_';
            try { body = fs.readFileSync('./lychee-report.md', 'utf8'); } catch {}
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Docs link check failed\n\n${body}\n\n_The check scans only files changed in this PR. Pre-existing broken links elsewhere in \`docs/\` are tracked separately. To scan everything: trigger this workflow manually with \`full_scan=true\`._`
            });
