# E2E Coverage Workflow
# Uses @bgotink/playwright-coverage integrated in playwright.config.ts
# Coverage reports: LCOV, HTML, JSON, text-summary
name: e2e-coverage

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
  pull_request: {}

jobs:
  e2e-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies (apps/web)
        run: |
          cd apps/web
          pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: |
          cd apps/web
          npx playwright install chromium --with-deps

      - name: Build Next.js application
        run: |
          cd apps/web
          pnpm build

      # Barrier 1: Validate critical test infrastructure exists
      - name: Validate E2E test infrastructure
        run: |
          cd apps/web
          # Check playwright.config.ts exists and has coverage config
          if ! grep -q "@bgotink/playwright-coverage" playwright.config.ts; then
            echo "ERROR: playwright-coverage not configured in playwright.config.ts"
            exit 1
          fi
          # Check e2e directory exists with tests
          if [ ! -d "e2e" ] || [ -z "$(ls -A e2e/*.spec.ts 2>/dev/null)" ]; then
            echo "ERROR: No E2E tests found in e2e/ directory"
            exit 1
          fi
          echo "✅ E2E infrastructure validated"

      # Run Playwright tests with coverage (uses playwright.config.ts settings)
      # @bgotink/playwright-coverage automatically collects V8 coverage and converts to LCOV/HTML
      - name: Run E2E tests with coverage
        run: |
          cd apps/web
          # Use Chrome projects only for consistent coverage (Firefox/Safari don't support V8 coverage)
          pnpm test:e2e --project=desktop-chrome --project=mobile-chrome --project=tablet-chrome
        env:
          CI: 'true'

      # Barrier 2: Validate coverage was actually generated
      - name: Validate coverage output
        run: |
          cd apps/web
          if [ ! -d "coverage-e2e" ]; then
            echo "ERROR: coverage-e2e directory not created"
            exit 1
          fi
          if [ ! -f "coverage-e2e/lcov.info" ]; then
            echo "ERROR: lcov.info not generated"
            exit 1
          fi
          echo "✅ Coverage files generated successfully"
          echo "Coverage summary:"
          head -20 coverage-e2e/lcov.info || true

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage-html
          path: apps/web/coverage-e2e
          if-no-files-found: error

      - name: Upload LCOV file
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage-lcov
          path: apps/web/coverage-e2e/lcov.info
          if-no-files-found: error