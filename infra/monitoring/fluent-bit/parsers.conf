# Fluent Bit Parsers for MeepleAI
# Issue #3367: Log format parsers for .NET and Python services

[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ

# .NET Serilog structured logs (JSON format)
[PARSER]
    Name        dotnet-json
    Format      json
    Time_Key    @t
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

# Python structured logs (JSON format)
[PARSER]
    Name        python-json
    Format      json
    Time_Key    timestamp
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep   On

# Fallback: generic JSON parser
[PARSER]
    Name        json
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
