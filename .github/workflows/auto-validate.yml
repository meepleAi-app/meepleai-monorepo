name: Validate Workflows

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'scripts/validate-workflows.js'
  push:
    branches:
      - main
      - main-dev
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'scripts/validate-workflows.js'


# Q2 2026 Security Review (#186) P1.2 AC5: default least-privilege.
# Job-level permissions blocks (where present) override this default.

# Concurrency: prevent duplicate runs. See issue #850.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-workflow-patterns:
    name: Validate pnpm Cache Patterns
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Validate workflow files
        run: node scripts/validate-workflows.js
