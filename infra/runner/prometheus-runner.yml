# Prometheus config for Runner VM monitoring
# Epic #2967 / #2974

global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'oracle-arm-runner'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
