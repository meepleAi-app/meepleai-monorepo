<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- MeepleAI Logo - Authentic Meeple with AI Elements -->
  <defs>
    <linearGradient id="meeple-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6" />
      <stop offset="50%" style="stop-color:#6366F1" />
      <stop offset="100%" style="stop-color:#8B5CF6" />
    </linearGradient>
    <linearGradient id="circuit-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981" />
      <stop offset="100%" style="stop-color:#06B6D4" />
    </linearGradient>
  </defs>

  <!-- Authentic Meeple Shape -->
  <path d="
    M 50 15
    A 12 12 0 1 1 50 39
    A 12 12 0 1 1 50 15
    M 50 39
    L 50 42
    L 15 42
    L 12 45
    L 12 52
    L 15 55
    L 28 55
    L 32 60
    L 35 70
    L 30 88
    L 28 95
    L 45 95
    L 50 75
    L 55 95
    L 72 95
    L 70 88
    L 65 70
    L 68 60
    L 72 55
    L 85 55
    L 88 52
    L 88 45
    L 85 42
    L 50 42
    Z
  " fill="url(#meeple-gradient)" stroke="none"/>

  <!-- AI Circuit Pattern Overlay -->
  <g opacity="0.3">
    <circle cx="50" cy="27" r="6" fill="none" stroke="url(#circuit-gradient)" stroke-width="1.5"/>
    <line x1="50" y1="45" x2="50" y2="55" stroke="url(#circuit-gradient)" stroke-width="2"/>
    <circle cx="50" cy="55" r="3" fill="url(#circuit-gradient)"/>
    <line x1="47" y1="55" x2="35" y2="55" stroke="url(#circuit-gradient)" stroke-width="1.5"/>
    <line x1="53" y1="55" x2="65" y2="55" stroke="url(#circuit-gradient)" stroke-width="1.5"/>
    <circle cx="35" cy="55" r="2" fill="url(#circuit-gradient)"/>
    <circle cx="65" cy="55" r="2" fill="url(#circuit-gradient)"/>
  </g>

  <!-- Bright AI Core -->
  <circle cx="50" cy="55" r="4" fill="#10B981" opacity="0.8">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="55" r="2" fill="white"/>
</svg>