name: Deploy to Staging

on:
  push:
    branches: [main-staging]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency deploy only)'
        required: false
        default: 'false'
        type: boolean

# Only one staging deployment at a time
concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write  # For OIDC auth to cloud providers
  checks: write     # Required by ci.yml reusable workflow
  pull-requests: write  # Required by ci.yml reusable workflow

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web
  ENVIRONMENT: staging

jobs:
  # Run tests before deploy (unless skipped for emergency)
  test:
    name: Pre-deploy Tests
    if: github.event_name == 'push' || inputs.skip_tests != 'true'
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # Build and push Docker images
  build:
    name: Build Images
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: [test]
    if: always() && (needs.test.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.skip_tests == 'true'))
    outputs:
      api_image: ${{ steps.meta-api.outputs.tags }}
      web_image: ${{ steps.meta-web.outputs.tags }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Verify ARM64 runner
        if: vars.RUNNER != ''
        run: |
          ARCH=$(uname -m)
          echo "Runner architecture: $ARCH"
          if [ "$ARCH" != "aarch64" ]; then
            echo "::error::Expected aarch64 but got $ARCH — runner may have silently fallen back"
            exit 1
          fi

      - name: Pre-build disk check (self-hosted)
        if: vars.RUNNER != ''
        run: |
          # Requires GNU df (--output flag)
          USAGE=$(df / --output=pcent | tail -1 | tr -d ' %')
          echo "Disk usage: ${USAGE}%"
          if [ "$USAGE" -gt 90 ]; then
            echo "::error::Disk usage critical (${USAGE}%) — triggering emergency cleanup"
            docker system prune -af --filter "until=24h" 2>/dev/null || true
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Version
        id: version
        run: |
          VERSION="staging-$(date +'%Y%m%d')-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract API Metadata
        id: meta-api
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=staging-latest

      - name: Extract Web Metadata
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=staging-latest

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ASPNETCORE_ENVIRONMENT=Staging
            VERSION=${{ steps.version.outputs.version }}

      - name: Build and Push Web Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            NEXT_PUBLIC_ENV=staging
            VERSION=${{ steps.version.outputs.version }}

      - name: Post-build cleanup (self-hosted)
        if: always() && !contains(runner.name, 'GitHub Actions')
        run: |
          echo "🧹 Cleaning up Docker build artifacts on self-hosted runner..."
          docker container prune -f 2>/dev/null || true
          docker image prune -f 2>/dev/null || true
          echo "✅ Cleanup complete"
          df -h / | tail -1

  # Deploy to staging server
  deploy:
    name: Deploy to Staging
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: [build]
    environment:
      name: staging
      url: https://staging.meepleai.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Option 1: SSH Deploy (VPS/Dedicated Server)
      - name: Deploy via SSH
        if: vars.DEPLOY_METHOD == 'ssh'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/meepleai

            # Pull new images
            docker pull ${{ needs.build.outputs.api_image }}
            docker pull ${{ needs.build.outputs.web_image }}

            # Update docker-compose with new image tags
            export API_IMAGE="${{ needs.build.outputs.api_image }}"
            export WEB_IMAGE="${{ needs.build.outputs.web_image }}"

            # Deploy with zero-downtime
            docker compose -f compose.staging.yml pull
            docker compose -f compose.staging.yml up -d --no-deps api web

            # Run database migrations
            docker compose -f compose.staging.yml exec -T api \
              dotnet ef database update --no-build

            # Health check
            sleep 10
            curl -sf https://staging.meepleai.com/health || exit 1

            # Cleanup old images
            docker image prune -f

      # Option 2: Kubernetes Deploy (AKS/EKS/GKE)
      - name: Deploy to Kubernetes
        if: vars.DEPLOY_METHOD == 'kubernetes'
        run: |
          echo "🚀 Deploying to Kubernetes cluster..."
          # kubectl set image deployment/api api=${{ needs.build.outputs.api_image }}
          # kubectl set image deployment/web web=${{ needs.build.outputs.web_image }}
          # kubectl rollout status deployment/api
          # kubectl rollout status deployment/web
          echo "⚠️ Kubernetes deployment not yet configured"

      # Option 3: Cloud Run / App Service
      - name: Deploy to Cloud Run
        if: vars.DEPLOY_METHOD == 'cloudrun'
        run: |
          echo "🚀 Deploying to Cloud Run..."
          # gcloud run deploy api --image=${{ needs.build.outputs.api_image }}
          # gcloud run deploy web --image=${{ needs.build.outputs.web_image }}
          echo "⚠️ Cloud Run deployment not yet configured"

  # Post-deploy validation
  validate:
    name: Post-deploy Validation
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: [deploy]
    steps:
      - name: Health Check
        run: |
          echo "🔍 Running health checks..."

          # API Health
          for i in {1..30}; do
            if curl -sf https://staging.meepleai.com/health; then
              echo "✅ API healthy"
              break
            fi
            echo "⏳ Waiting for API... ($i/30)"
            sleep 10
          done

          # Web Health
          curl -sf https://staging.meepleai.com || exit 1
          echo "✅ Web healthy"

      - name: Smoke Tests
        run: |
          echo "🧪 Running smoke tests..."
          # Add critical path smoke tests here
          # curl -sf https://staging.meepleai.com/api/v1/health
          # curl -sf https://staging.meepleai.com/api/v1/games?limit=1
          echo "✅ Smoke tests passed"

  # Notify on completion
  notify:
    name: Notify
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: [build, deploy, validate]
    if: always()
    steps:
      - name: Slack Notification
        if: vars.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,workflow
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ needs.build.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API Image | \`${{ needs.build.outputs.api_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Web Image | \`${{ needs.build.outputs.web_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | staging |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://staging.meepleai.com |" >> $GITHUB_STEP_SUMMARY
