name: Mockup Ownership — Weekly Status Dashboard

# WS-F.3 (issue #1072, umbrella #1066) — AC-F.5 dashboard.
#
# Regenerates docs/for-developers/audits/mockup-ownership-status.md weekly,
# opens an auto-PR with the refreshed dashboard if there are any changes.
#
# The dashboard is the "at-a-glance" view of mockup coverage:
#   - Status counts (canonical / verified / drifted / pending / archived / unmapped)
#   - Stale-canonical flag (canonical entries with @last-verified >30d ago)
#   - Per-mockup table with route, status, verified-by, age
#
# Source of truth remains the @route/@status/@last-verified headers in each
# mockup HTML; this workflow just renders them deterministically.

on:
  schedule:
    # Mondays 07:00 UTC — early enough for European working hours.
    - cron: '0 7 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: mockup-ownership-summary
  cancel-in-progress: false

jobs:
  generate:
    name: Generate ownership status
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-frontend
        with:
          node-version: '20'
          pnpm-version: '10'
          working-directory: apps/web
          frozen-lockfile: 'true'

      - name: Generate dashboard
        run: pnpm tsx scripts/generate-ownership-status.ts

      - name: Open auto-PR if dashboard changed
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/mockup-ownership-status-${{ github.run_number }}
          base: main-dev
          commit-message: |
            docs(audit): refresh mockup ownership status (WS-F.3, #1072)

            Auto-generated by mockup-ownership-summary.yml run ${{ github.run_number }}.
          title: 'docs(audit): refresh mockup ownership status (#1072)'
          body: |
            ## Weekly mockup ownership refresh

            Trigger: **${{ github.event_name }}** ([run ${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}))

            The dashboard at `docs/for-developers/audits/mockup-ownership-status.md` has changed since the previous run. Review for:

            - Newly stale-canonical mockups (verified more than 30 days ago)
            - Status transitions (canonical → drifted, pending → verified, etc.)
            - New mockups added to the design files directory (will appear as `unmapped` until headers are added)

            ### Refs

            - Spec: §3 WS-F, AC-F.5 dashboard
            - Umbrella: #1066
            - WS-F issue: #1072
          labels: |
            conformity
            automation
            documentation
          add-paths: |
            docs/for-developers/audits/mockup-ownership-status.md
