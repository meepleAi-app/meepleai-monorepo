version: '3.8'

services:
  # GitHub Actions Runner Simulator
  act-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: github-actions-simulator
    hostname: act-runner
    volumes:
      # Mount the MeepleAI repository (read-only)
      - ../:/workspace/meepleai:ro
      # Persistent volumes for logs, artifacts, and cache
      - ./logs:/logs
      - ./artifacts:/artifacts
      - ./cache:/cache
      - ./.act:/workspace/.act
      # Docker socket for Docker-in-Docker (required for act)
      - /var/run/docker.sock:/var/run/docker.sock
      # Configuration files
      - ./config/.actrc:/workspace/.actrc:ro
      - ./config/.secrets:/workspace/.secrets:ro
    environment:
      # CI Environment
      - CI=true
      - DOTNET_CLI_TELEMETRY_OPTOUT=1
      - DOTNET_VERSION=9.0.x
      - NODE_VERSION=20
      # Database configuration (matches MeepleAI)
      - POSTGRES_USER=meeple
      - POSTGRES_PASSWORD=meeplepass
      - POSTGRES_DB=meepleai
      # Service URLs (will connect to services below)
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      # Paths
      - ACT_LOG_DIR=/logs
      - ACT_ARTIFACT_DIR=/artifacts
      - ACT_CACHE_DIR=/cache
    networks:
      - act-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    stdin_open: true
    tty: true
    command: /bin/bash

  # PostgreSQL Database (for integration tests)
  postgres:
    image: postgres:16.4-alpine3.20
    container_name: act-postgres
    environment:
      POSTGRES_USER: meeple
      POSTGRES_PASSWORD: meeplepass
      POSTGRES_DB: meepleai
    ports:
      - "5433:5432"  # Different port to avoid conflict with main MeepleAI
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - act-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meeple"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7.4.1-alpine3.20
    container_name: act-redis
    ports:
      - "6380:6379"  # Different port
    volumes:
      - redis-data:/data
    networks:
      - act-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: act-qdrant
    ports:
      - "6335:6333"  # Different ports
      - "6336:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - act-network

  # Log Viewer (optional - lightweight web UI for logs)
  dozzle:
    image: amir20/dozzle:latest
    container_name: act-log-viewer
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs:/logs:ro
    networks:
      - act-network
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300

networks:
  act-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
