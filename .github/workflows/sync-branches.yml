name: Sync Branches After Production Release

on:
  push:
    branches: [main]

# Only allow one sync operation at a time
concurrency:
  group: sync-branches
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync-cascade:
    name: Auto-Sync main → main-staging → main-dev
    runs-on: ubuntu-latest
    # Only run on main branch (prevents execution from main-dev)
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync main → main-staging (Step 1/2)
        run: |
          echo "🔄 Step 1/2: Syncing main → main-staging..."

          # Fetch latest changes
          git fetch origin main-staging

          # Checkout main-staging
          git checkout main-staging

          # Merge main into main-staging
          git merge origin/main --no-ff -m "chore: auto-sync main-staging with production release

Co-Authored-By: GitHub Actions <github-actions[bot]@users.noreply.github.com>"

          # Push changes
          git push origin main-staging

          echo "✅ Step 1/2 complete: main → main-staging synced"

      - name: Sync main-staging → main-dev (Step 2/2)
        run: |
          echo "🔄 Step 2/2: Syncing main-staging → main-dev..."

          # Fetch latest changes
          git fetch origin main-dev

          # Checkout main-dev
          git checkout main-dev

          # Merge main-staging into main-dev
          git merge origin/main-staging --no-ff -m "chore: auto-sync main-dev with staging release

Co-Authored-By: GitHub Actions <github-actions[bot]@users.noreply.github.com>"

          # Push changes
          git push origin main-dev

          echo "✅ Step 2/2 complete: main-staging → main-dev synced"

      - name: Create Sync Summary
        if: success()
        run: |
          echo "## ✅ 3-Tier Branch Sync Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Cascade**: main → main-staging → main-dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Step 1**: main → main-staging ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Step 2**: main-staging → main-dev ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY

      - name: Notify on Failure
        if: failure()
        run: |
          echo "## ❌ Branch Sync Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Manual intervention required to sync branches" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run manually:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Step 1: main → main-staging" >> $GITHUB_STEP_SUMMARY
          echo "git checkout main-staging" >> $GITHUB_STEP_SUMMARY
          echo "git merge main --no-ff" >> $GITHUB_STEP_SUMMARY
          echo "git push origin main-staging" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Step 2: main-staging → main-dev" >> $GITHUB_STEP_SUMMARY
          echo "git checkout main-dev" >> $GITHUB_STEP_SUMMARY
          echo "git merge main-staging --no-ff" >> $GITHUB_STEP_SUMMARY
          echo "git push origin main-dev" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

