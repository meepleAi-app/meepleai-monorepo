name: Reset Admin Password

on:
  workflow_dispatch:
    inputs:
      new_password:
        description: 'New admin password (min 8 chars, uppercase + digit required)'
        required: true
        type: string
      admin_email:
        description: 'Admin email'
        required: false
        default: 'admin@meepleai.app'
        type: string
      confirm:
        description: 'Type "yes" to confirm password reset'
        required: true
        type: string

jobs:
  reset-admin:
    name: Reset Admin Password on Staging
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    if: vars.DEPLOY_METHOD == 'ssh'
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "yes" ]; then
            echo "❌ Confirmation required: type 'yes' to proceed"
            exit 1
          fi
          echo "✅ Confirmed"

      - name: Update secret and reset admin via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: NEW_PASSWORD,ADMIN_EMAIL
          script: |
            export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
            set -e

            echo "🔑 Updating admin.secret on server..."
            SECRET_FILE="/opt/meepleai/repo/infra/secrets/admin.secret"
            if [ -f "$SECRET_FILE" ]; then
              sed -i "s|^ADMIN_PASSWORD=.*|ADMIN_PASSWORD=${NEW_PASSWORD}|" "$SECRET_FILE"
              echo "✅ admin.secret updated"
            else
              echo "❌ $SECRET_FILE not found"
              exit 1
            fi

            # Load DB credentials
            DB_SECRET="/opt/meepleai/repo/infra/secrets/database.secret"
            if [ -f "$DB_SECRET" ]; then
              set -a; source "$DB_SECRET"; set +a
            fi
            PG_USER="${POSTGRES_USER:-meepleai}"
            PG_DB="${POSTGRES_DB:-meepleai_db}"
            echo "📦 Using DB: $PG_DB as user: $PG_USER"

            echo "🗑️ Deleting admin user from DB so seeder recreates with new password..."

            # Step 1: Get admin user ID
            ADMIN_ID=$(docker exec meepleai-postgres psql -U "$PG_USER" "$PG_DB" -t -A -c \
              "SELECT \"Id\" FROM users WHERE \"Email\" = '${ADMIN_EMAIL}' AND lower(\"Role\") IN ('admin','superadmin') LIMIT 1;")

            echo "Admin ID: ${ADMIN_ID:-not found}"

            if [ -n "$ADMIN_ID" ]; then
              # Step 2: Find a substitute user for NOT NULL FK references
              # CreatedByUserId is NOT NULL in system_configurations, so we can't null it.
              # Replace the admin FK reference with another existing user.
              SUBSTITUTE_ID=$(docker exec meepleai-postgres psql -U "$PG_USER" "$PG_DB" -t -A -c \
                "SELECT \"Id\" FROM users WHERE \"Id\" != '${ADMIN_ID}'::uuid LIMIT 1;")

              echo "Substitute user ID: ${SUBSTITUTE_ID:-none}"

              if [ -n "$SUBSTITUTE_ID" ]; then
                docker exec meepleai-postgres psql -U "$PG_USER" "$PG_DB" -c \
                  "UPDATE system_configurations SET \"CreatedByUserId\" = '${SUBSTITUTE_ID}'::uuid WHERE \"CreatedByUserId\" = '${ADMIN_ID}'::uuid;" \
                  && echo "✅ Reassigned CreatedByUserId FK" || echo "⚠️ CreatedByUserId reassign skipped"
              else
                echo "⚠️ No substitute user found — attempting delete anyway"
              fi

              # Step 3: Null UpdatedByUserId (nullable column)
              docker exec meepleai-postgres psql -U "$PG_USER" "$PG_DB" -c \
                "UPDATE system_configurations SET \"UpdatedByUserId\" = NULL WHERE \"UpdatedByUserId\" = '${ADMIN_ID}'::uuid;" \
                && echo "✅ Nulled UpdatedByUserId FK" || echo "⚠️ UpdatedByUserId null skipped"

              # Step 4: Delete admin user
              docker exec meepleai-postgres psql -U "$PG_USER" "$PG_DB" -c \
                "DELETE FROM users WHERE \"Id\" = '${ADMIN_ID}'::uuid;" \
                && echo "✅ Admin user deleted" || { echo "❌ Delete failed — check remaining FK constraints"; exit 1; }
            else
              echo "⚠️ Admin user not found in DB — skipping delete"
            fi

            # Show result
            docker exec meepleai-postgres psql -U "$PG_USER" "$PG_DB" -c \
              "SELECT count(*) as admin_count FROM users WHERE lower(\"Role\") IN ('admin','superadmin');" \
              || echo "⚠️ Could not query admin count"

            echo "🔄 Recreating API container to pick up new secrets and re-seed..."
            cd /opt/meepleai/repo/infra
            set -a
            for f in secrets/*.secret; do source "$f" 2>/dev/null || true; done
            set +a
            docker compose -f docker-compose.yml -f compose.staging.yml -f compose.traefik.yml \
              --profile minimal up -d --no-deps --force-recreate api

            echo "⏳ Waiting for API to be healthy (checking https://meepleai.app/health)..."
            for attempt in $(seq 1 20); do
              if curl -sf https://meepleai.app/health > /dev/null 2>&1; then
                echo "✅ API healthy after ~$((attempt*5))s"
                break
              fi
              sleep 5
            done

            echo "🧪 Verifying login works (up to 90s for seeder to run)..."
            LOGIN_OK=false
            for attempt in $(seq 1 18); do
              sleep 5
              RESULT=$(curl -s -X POST https://meepleai.app/api/v1/auth/login \
                -H "Content-Type: application/json" \
                -d "{\"email\":\"${ADMIN_EMAIL}\",\"password\":\"${NEW_PASSWORD}\"}" 2>/dev/null || echo "CURL_FAILED")

              if echo "$RESULT" | grep -q '"sessionToken"'; then
                echo "✅ Admin login verified successfully! (attempt $attempt)"
                LOGIN_OK=true
                break
              elif echo "$RESULT" | grep -q '"requiresTwoFactor"'; then
                echo "✅ Admin login successful (2FA required, attempt $attempt)"
                LOGIN_OK=true
                break
              else
                echo "⏳ Attempt $attempt/18: $RESULT"
              fi
            done

            if [ "$LOGIN_OK" != "true" ]; then
              echo "❌ Login verification failed after 90s"
              exit 1
            fi
        env:
          NEW_PASSWORD: ${{ inputs.new_password }}
          ADMIN_EMAIL: ${{ inputs.admin_email }}
