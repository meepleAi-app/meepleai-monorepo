name: Integration Tests

on:
  # Run nightly at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'
  # Allow manual trigger
  workflow_dispatch:
  # Optionally run on push to main (can be removed if too expensive)
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/integration-tests.yml'

# Cancel previous runs on same branch
concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      # Ollama service for LLM client streaming tests
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        options: >-
          --health-cmd "curl -f http://localhost:11434/api/version || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        working-directory: apps/api
        run: dotnet restore

      - name: Build
        working-directory: apps/api
        run: dotnet build --no-restore --configuration Release

      - name: Wait for Ollama to be ready
        run: |
          echo "Waiting for Ollama service to be healthy..."
          timeout 60 bash -c 'until curl -f http://localhost:11434/api/version; do sleep 2; done'
          echo "Ollama is ready!"

      - name: Pull Ollama model for tests
        run: |
          echo "Pulling llama2 model for integration tests..."
          docker exec ${{ job.services.ollama.id }} ollama pull llama2:latest || true
          echo "Model pulled successfully!"

      - name: Run Integration Tests
        working-directory: apps/api
        env:
          # Point tests to local Ollama service
          OLLAMA_BASE_URL: http://localhost:11434
        run: |
          dotnet test \
            --no-build \
            --configuration Release \
            --filter "Category=Integration" \
            --logger "trx;LogFileName=integration-test-results.trx" \
            --logger "console;verbosity=detailed" \
            --settings tests/Api.Tests/integration.runsettings \
            -- RunConfiguration.TestSessionTimeout=1800000

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: apps/api/TestResults/**/*.trx
          retention-days: 30

      - name: Report Test Summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Integration Test Results
          path: apps/api/TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

  notify-on-failure:
    name: Notify on Failure
    needs: integration-tests
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'schedule'
    steps:
      - name: Send notification
        run: |
          echo "Integration tests failed on scheduled run!"
          echo "Check the workflow run for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Add Slack/email notification here if desired
