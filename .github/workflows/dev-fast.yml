# Dev Fast Path — blocking CI on PR to main-dev
#
# Per ADR-054 (DevOps Multi-Branch Strategy) and epic #842 / issue #846:
# Keep the hot path narrow. Lint + typecheck + unit only. Target SLO < 3 min.
# Heavier checks run async on push to main-dev via dev-async.yml.
#
# Path filters skip the workflow when irrelevant files (e.g. docs-only PRs)
# change so we don't burn minutes on a docs PR.
name: Dev Fast

on:
  pull_request:
    branches: [main-dev]
    paths:
      - 'apps/web/**'
      - 'apps/api/**'
      - 'apps/orchestration-service/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'global.json'
      - '.github/workflows/dev-fast.yml'
      - '.github/actions/**'
      - 'infra/scripts/check-migration-safety.py'
  workflow_dispatch:

concurrency:
  group: dev-fast-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      orchestration: ${{ steps.filter.outputs.orchestration }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Issue #850: filter patterns must cover ALL paths that trigger
          # this workflow, otherwise a workflow/action/orchestration change
          # spawns a run where every job skips ("changes" runs alone, both
          # downstream jobs skip → wasted minutes). The `workflow-meta`
          # pseudo-pattern bundles all the cross-cutting paths.
          filters: |
            frontend:
              - 'apps/web/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/dev-fast.yml'
              - '.github/actions/setup-frontend/**'
              - '.github/actions/setup-playwright/**'
            backend:
              - 'apps/api/**'
              - 'global.json'
              - '.github/workflows/dev-fast.yml'
              - '.github/actions/setup-backend/**'
            orchestration:
              - 'apps/orchestration-service/**'
            migrations:
              # Issue #1087: trigger the migration safety gate on any change to
              # EF Core migration .cs files OR to the gate parser/workflow itself.
              # Designer.cs is autogenerated alongside each migration and is fine
              # to include — it adds no new SQL patterns vs the .cs sibling.
              - 'apps/api/src/Api/Infrastructure/Migrations/**/*.cs'
              - 'infra/scripts/check-migration-safety.py'
              - 'infra/scripts/test_check_migration_safety.py'
              - '.github/workflows/dev-fast.yml'

  # Sharding strategy (incident #1115): the apps/web Vitest suite runs >15min
  # in CI as a single job. Splitting into 3 parallel matrix shards drops
  # wall-clock to ~5min per shard while preserving full coverage. Lint and
  # typecheck stay in a separate fast job (no benefit from parallelism).
  # The frontend-fast aggregator job below preserves the branch-protection
  # required check name "Frontend Fast (lint + typecheck + unit)".

  frontend-static:
    name: Frontend Static (lint + typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-frontend
        with:
          node-version: '20'
          pnpm-version: '10'
          working-directory: apps/web
          frozen-lockfile: 'true'
          cache-version: ${{ vars.CACHE_VERSION || 'v1' }}

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  frontend-tests:
    name: Frontend Tests (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-frontend
        with:
          node-version: '20'
          pnpm-version: '10'
          working-directory: apps/web
          frozen-lockfile: 'true'
          cache-version: ${{ vars.CACHE_VERSION || 'v1' }}

      - name: Unit tests (Vitest shard ${{ matrix.shard }}/3)
        # Bypass the "test" pnpm script to forward the --shard flag cleanly.
        # Vitest 3.x supports deterministic file-level sharding via --shard.
        run: pnpm exec vitest run --shard ${{ matrix.shard }}/3

  frontend-fast:
    # Aggregator job — preserves the branch-protection required check name
    # "Frontend Fast (lint + typecheck + unit)" introduced by #846 / #1086.
    # Succeeds iff both upstream jobs succeeded, or both were legitimately
    # skipped because the PR did not touch frontend paths.
    name: Frontend Fast (lint + typecheck + unit)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [changes, frontend-static, frontend-tests]
    if: ${{ always() }}
    steps:
      - name: Verify upstream results
        run: |
          STATIC="${{ needs.frontend-static.result }}"
          TESTS="${{ needs.frontend-tests.result }}"
          FRONTEND_CHANGED="${{ needs.changes.outputs.frontend }}"
          EVENT="${{ github.event_name }}"
          echo "event=$EVENT frontend-static=$STATIC frontend-tests=$TESTS frontend-changed=$FRONTEND_CHANGED"
          # Skip early only for PRs that don't touch frontend (upstream jobs
          # legitimately skipped). workflow_dispatch always runs upstream
          # regardless of frontend-changed, so we must verify their results.
          if [[ "$FRONTEND_CHANGED" != "true" ]] && [[ "$EVENT" != "workflow_dispatch" ]]; then
            echo "No frontend changes on PR — aggregator passes (upstream legitimately skipped)."
            exit 0
          fi
          if [[ "$STATIC" != "success" ]]; then
            echo "frontend-static did not succeed (result=$STATIC)"
            exit 1
          fi
          if [[ "$TESTS" != "success" ]]; then
            echo "frontend-tests did not succeed across all shards (result=$TESTS)"
            exit 1
          fi
          echo "All frontend checks passed."

  backend-fast:
    name: Backend Fast (build + unit)
    runs-on: ubuntu-latest
    # Issue #1161: raised from 5 → 8 minutes. The Release `dotnet build` step
    # alone takes ~4min on ubuntu-latest runners (confirmed on PR #1156 cancels);
    # combined with setup (~30s) and the test step (~30s) the 5-min budget
    # leaves no headroom and the job is cancelled mid-test.
    # Issue #833 (PR #1271): raised 8 → 12 minutes after sustained wall-clock
    # of ~8m20s on consecutive runs (cache-miss-warm-runner), exceeding the
    # 8min cap. The 12-min budget gives ~3min headroom. Per issue #1161 note,
    # this trigger justifies splitting build + test into separate jobs (option b);
    # tracked as follow-up.
    # Issue #1630: raised 12 → 18 minutes. The 12-min cap covers setup + Release
    # build (~4min) + the full unit suite (~4-8min, 17k+ tests) in ONE job, and
    # on a cache-miss / noisy-runner combo the three phases stacked past 12min
    # (PR #1627 hit the cap on 2/3 attempts on a 3-line change). This is runner
    # variance on a monolithic job, not a slow test — 18min right-sizes the
    # budget. Splitting build+test (artifact hand-off, à la ci.yml) and xUnit
    # parallelization remain the structural follow-ups.
    timeout-minutes: 18
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-backend
        with:
          dotnet-version: '9.0.x'
          working-directory: apps/api
          cache-version: ${{ vars.CACHE_VERSION || 'v1' }}

      - name: Build
        working-directory: apps/api
        run: dotnet build --no-restore --configuration Release

      - name: Unit tests
        working-directory: apps/api/tests/Api.Tests
        run: dotnet test --no-build --configuration Release --filter "Category=Unit" --verbosity quiet

  migration-safety:
    # Issue #1087: block PRs that introduce forbidden migration patterns per
    # rollback-runbook section 8.2 (DROP COLUMN, DROP TABLE, ALTER COLUMN TYPE,
    # RENAME, ADD COLUMN NOT NULL without DEFAULT) unless an explicit
    # `-- safe: <rationale>` directive is present.
    name: Migration Safety Gate
    runs-on: ubuntu-latest
    # Budget: ~5 min for setup-dotnet + tool install + restore + build + script
    # generation + parser. The parser itself is < 1s on a typical SQL output.
    timeout-minutes: 8
    needs: changes
    if: needs.changes.outputs.migrations == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      pull-requests: write  # for audit comment on directive use
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install dotnet-ef tool
        run: |
          # Idempotent install — mirror deploy-staging.yml pattern (#1087).
          if dotnet tool list --global | awk '{print $1}' | grep -qx 'dotnet-ef'; then
            echo "dotnet-ef already installed -- using existing version:"
            dotnet tool list --global | grep '^dotnet-ef'
          else
            dotnet tool install --global dotnet-ef --version 9.*
          fi
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Setup Python
        # v5 to match the rest of the repo (ci.yml). Dependabot PR #1240 will
        # bump all setup-python pinned versions in a single PR.
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run parser self-tests
        # Self-test the parser before applying it to real migrations.
        # Cheap (~50ms) and catches regressions in the gate itself.
        working-directory: infra/scripts
        run: python -m unittest test_check_migration_safety -v

      - name: Restore and build API project
        working-directory: apps/api/src/Api
        run: |
          dotnet restore
          dotnet build --no-restore -c Release

      - name: Generate idempotent migration SQL
        working-directory: apps/api/src/Api
        run: |
          # No --no-build: dotnet-ef defaults to Debug and triggers its own
          # build to avoid Release/Debug path mismatches (same pattern as
          # deploy-staging.yml lines 467-474).
          dotnet ef migrations script --idempotent -o "$RUNNER_TEMP/migrations.sql"
          lines=$(wc -l < "$RUNNER_TEMP/migrations.sql")
          echo "Generated ${lines} lines of SQL at $RUNNER_TEMP/migrations.sql"

      - name: Check migration safety
        # Exits 0 (clean), 1 (unsafe pattern without directive), 2 (invocation error).
        # gate-ship-date 20260518 = the date this gate ships; older migrations
        # are grandfathered (we don't retroactively gate the existing 25 migrations).
        run: |
          python infra/scripts/check-migration-safety.py \
            --sql "$RUNNER_TEMP/migrations.sql" \
            --gate-ship-date 20260518 \
            --report "$RUNNER_TEMP/migration-safety-report.json"

      - name: Upload audit report
        if: always()
        # v7 matches the predominant pin in this repo (bootstrap-mockup-baselines.yml,
        # backend-e2e-tests.yml). Older workflows on v4 will be bumped separately.
        uses: actions/upload-artifact@v7
        with:
          name: migration-safety-report
          path: ${{ runner.temp }}/migration-safety-report.json
          retention-days: 90  # Aligned with audit/compliance retention window.
