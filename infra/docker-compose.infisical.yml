# ==============================================================================
#
# Check service status:
#   docker compose -f infra/docker-compose.infisical.yml ps
#
# Check Infisical health:
#   curl http://localhost:5080/api/status
#
# Check logs:
#   docker compose -f infra/docker-compose.infisical.yml logs -f infisical
