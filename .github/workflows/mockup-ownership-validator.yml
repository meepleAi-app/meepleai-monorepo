name: Mockup Ownership Header Validator

# WS-F.1 (issue #1072, umbrella #1066) — AC-F.2 enforcement.
#
# Validates that every mockup in `admin-mockups/design_files/*.html` listed in
# the AC-F.1b allowlist (`apps/web/scripts/mockup-ownership-check.ts`) carries
# a valid `@route` / `@last-verified` / `@verified-by` / `@status` header
# block per AC-F.5 enum.
#
# Non-allowlisted mockups produce warnings only (progressive enforcement).
# The allowlist grows by explicit edit to the script.

on:
  pull_request:
    branches:
      - main-dev
      - main-staging
      - main
    paths:
      - 'admin-mockups/design_files/**'
      - 'apps/web/scripts/mockup-ownership-check.ts'
      - 'apps/web/scripts/parse-mockup-header.ts'
      - '.github/workflows/mockup-ownership-validator.yml'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: mockup-ownership-validator-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Mockup Ownership Header
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-frontend
        with:
          node-version: '20'
          pnpm-version: '10'
          working-directory: apps/web
          frozen-lockfile: 'true'

      - name: Run mockup ownership check (AC-F.2)
        run: pnpm verify:mockup-ownership
