# Docker Compose project name - ensures consistent volume naming
# Volumes will be named: meepleai_pgdata, meepleai_qdrantdata, etc.
# Instead of: infra_pgdata (directory-dependent)
name: meepleai

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: meepleai-postgres
    restart: unless-stopped
    profiles: [minimal, dev, observability, ai, automation, full]
    env_file:
      - ./secrets/database.secret
    environment:
      # Performance tuning aligned with resource limits
      POSTGRES_SHARED_BUFFERS: 512MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1536MB
      POSTGRES_WORK_MEM: 16MB
      POSTGRES_MAINTENANCE_WORK_MEM: 256MB
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - meepleai
    shm_size: 1g
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: meepleai-qdrant
    restart: unless-stopped
    profiles: [minimal, dev, observability, ai, automation, full]
    ports:
      - "127.0.0.1:6333:6333"  # HTTP REST API
      - "127.0.0.1:6334:6334"  # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # Note: wget/curl not available in Qdrant image, use bash TCP health check
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"HTTP/1.1 200\" <&3'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  redis:
    image: redis:7.4.1-alpine3.20
    container_name: meepleai-redis
    restart: unless-stopped
    profiles: [minimal, dev, observability, ai, automation, full]
    env_file:
      - ./secrets/redis.secret
    command: ["sh","-c","redis-server --appendonly yes --requirepass $$REDIS_PASSWORD --maxmemory 768mb --maxmemory-policy allkeys-lru"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ISSUE-922: Email testing service for development (Mailpit - modern Mailhog alternative)
  mailpit:
    image: axllent/mailpit:v1.22
    container_name: mailpit
    restart: unless-stopped
    profiles: [dev, observability, full]
    ports:
      - "127.0.0.1:1025:1025"  # SMTP server
      - "127.0.0.1:8025:8025"  # Web UI + REST API
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
      MP_DATABASE: /data/mailpit.db
      MP_DATA_DIR: /data
    volumes:
      - mailpit_data:/data
    healthcheck:
      # Comprehensive health check: HTTP API + SMTP port
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8025/api/v1/messages && nc -z localhost 1025"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M

  ollama:
    image: ollama/ollama:0.3.14
    container_name: meepleai-ollama
    restart: unless-stopped
    profiles: [ai, full]
    environment:
      # Memory management for CPU-only mode
      OLLAMA_MAX_LOADED_MODELS: 3
      OLLAMA_KEEP_ALIVE: 5m
      # Uncomment if using GPU
      # OLLAMA_GPU_MEMORY_FRACTION: 0.80
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    # Uncomment if you have NVIDIA GPU support
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  ollama-pull:
    image: curlimages/curl:8.12.1
    container_name: ollama-pull
    profiles: [ai, full]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    command: >
      sh -c '
        echo "Pulling nomic-embed-text model..." &&
        curl -X POST http://ollama:11434/api/pull -d "{\"name\":\"nomic-embed-text\"}" &&
        echo "Model pull initiated!"
      '
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # AI-09: Local multilingual embedding service
  embedding-service:
    build:
      context: ../apps/embedding-service
      dockerfile: ./Dockerfile
    container_name: meepleai-embedding
    restart: unless-stopped
    profiles: [ai, full]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    # Uncomment if you have NVIDIA GPU support for faster embeddings
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # BGAI-001-v2: Unstructured PDF extraction service (Stage 1)
  unstructured-service:
    build:
      context: ../apps/unstructured-service
      dockerfile: ./Dockerfile
    container_name: meepleai-unstructured
    restart: unless-stopped
    profiles: [ai, full]
    ports:
      - "8001:8001"
    environment:
      - LOG_LEVEL=INFO
      - MAX_FILE_SIZE=52428800  # 50MB
      - TIMEOUT=30
      - UNSTRUCTURED_STRATEGY=fast
      - LANGUAGE=ita
      - CHUNK_MAX_CHARACTERS=2000
      - CHUNK_OVERLAP=200
      - QUALITY_THRESHOLD=0.80
      - MIN_CHARS_PER_PAGE=500
      - ENABLE_METRICS=true
      - ENABLE_STRUCTURED_LOGGING=true
    volumes:
      - unstructured_temp:/tmp/pdf-extraction
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  # BGAI-005: SmolDocling VLM service (Stage 2 - complex layouts fallback)
  smoldocling-service:
    build:
      context: ../apps/smoldocling-service
      dockerfile: ./Dockerfile
    container_name: meepleai-smoldocling
    restart: unless-stopped
    profiles: [ai, full]
    ports:
      - "8002:8002"
    environment:
      - LOG_LEVEL=INFO
      - MAX_FILE_SIZE=52428800  # 50MB
      - MAX_PAGES_PER_REQUEST=20
      - TIMEOUT=60
      - DEVICE=cpu  # Use cpu for development (set to cuda in production with GPU)
      - MODEL_NAME=docling-project/SmolDocling-256M-preview
      - MAX_NEW_TOKENS=2048
      - TORCH_DTYPE=bfloat16
      - IMAGE_DPI=300
      - IMAGE_FORMAT=PNG
      - QUALITY_THRESHOLD=0.70
      - MIN_CHARS_PER_PAGE=300
      - ENABLE_METRICS=true
      - ENABLE_STRUCTURED_LOGGING=true
      - ENABLE_MODEL_WARMUP=true  # Enable warmup so health checks pass
    volumes:
      - smoldocling_temp:/tmp/pdf-processing
      - smoldocling_models:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s  # Long startup for model download
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    # Uncomment for GPU support (requires NVIDIA Docker runtime)
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ADR-016 Phase 4: Cross-encoder reranking service for RAG pipeline
  reranker-service:
    build:
      context: ../apps/reranker-service
      dockerfile: ./Dockerfile
    container_name: meepleai-reranker
    restart: unless-stopped
    profiles: [ai, full]
    ports:
      - "127.0.0.1:8003:8003"  # Bind to localhost only for security
    environment:
      - MODEL_NAME=BAAI/bge-reranker-v2-m3
      - BATCH_SIZE=32
      - LOG_LEVEL=INFO
      - ENABLE_MODEL_WARMUP=true
    volumes:
      - reranker_models:/home/reranker/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s  # Long startup for model download
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    # Uncomment for GPU support (requires NVIDIA Docker runtime)
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ISSUE-3495: LangGraph Orchestration Service for Multi-Agent Coordination
  orchestration-service:
    build:
      context: ../apps/orchestration-service
      dockerfile: ./Dockerfile
    container_name: meepleai-orchestrator
    restart: unless-stopped
    profiles: [ai, full]
    ports:
      - "127.0.0.1:8004:8004"
    environment:
      - LOG_LEVEL=INFO
      - PORT=8004
      - EMBEDDING_SERVICE_URL=http://embedding-service:8000
      - RERANKER_SERVICE_URL=http://reranker-service:8003
      - UNSTRUCTURED_SERVICE_URL=http://unstructured-service:8001
      - SMOLDOCLING_SERVICE_URL=http://smoldocling-service:8002
      - DATABASE_URL=${DATABASE_URL:-postgresql://meepleai:meepleai@postgres:5432/meepleai}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - QDRANT_URL=http://qdrant:6333
      - LANGGRAPH_TIMEOUT=30
      - MAX_WORKFLOW_DEPTH=10
      - METRICS_ENABLED=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - meepleai
    depends_on:
      embedding-service:
        condition: service_healthy
      reranker-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # OPS-02: OpenTelemetry Observability Stack
  # Seq and Jaeger removed - replaced by HyperDX unified observability (see docker-compose.hyperdx.yml)
  # Migration: Issue #1564 - HyperDX provides logs, traces, and session replay in one platform
  # HyperDX UI: http://localhost:8180
  # OTLP endpoints: gRPC :14317, HTTP :14318

  prometheus:
    image: prom/prometheus:v3.7.0
    container_name: meepleai-prometheus
    restart: unless-stopped
    profiles: [dev, observability, full]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=5GB'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # OPS-05: Error Monitoring & Alerting
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: meepleai-alertmanager
    restart: unless-stopped
    profiles: [observability, full]
    env_file:
      - ./secrets/email.secret
      - ./secrets/monitoring.secret
      - ./env/alertmanager.env
    volumes:
      - ./scripts/load-secrets-env.sh:/scripts/load-secrets-env.sh:ro
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    entrypoint: ["/scripts/load-secrets-env.sh"]
    command:
      - '/bin/alertmanager'
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    ports:
      - "127.0.0.1:9093:9093"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # NOTE: Grafana OnCall is commented out for now as it requires manual setup
  # To add on-call management, follow the setup guide at:
  # https://grafana.com/docs/oncall/latest/set-up/open-source/
  # You can use Alertmanager directly with Slack/Email notifications in the meantime
  #
  # grafana-oncall:
  #   image: grafana/oncall:latest
  #   restart: unless-stopped
  #   environment:
  #     BASE_URL: http://localhost:8082
  #     SECRET_KEY: ${ONCALL_SECRET_KEY:-changeme-generate-secure-secret}
  #     DATABASE_TYPE: sqlite3
  #   volumes:
  #     - oncalldata:/var/lib/oncall
  #   ports:
  #     - "8082:8080"
  #   depends_on:
  #     - redis
  #     - alertmanager
  #   networks:
  #     - meepleai

  # P3-705: cAdvisor for container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: meepleai-cadvisor
    restart: unless-stopped
    profiles: [observability, full]
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Required for Docker API access
    ports:
      - "127.0.0.1:8082:8080"
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # P3-705: node-exporter for host metrics
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: meepleai-node-exporter
    restart: unless-stopped
    profiles: [observability, full]
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  grafana:
    image: grafana/grafana:11.4.0
    container_name: meepleai-grafana
    restart: unless-stopped
    profiles: [dev, observability, full]
    env_file:
      - ./secrets/monitoring.secret
    entrypoint: ["/scripts/load-secrets-env.sh"]
    command: ["/run.sh"]
    environment:
      # Issue #2570: GRAFANA_ADMIN_PASSWORD from monitoring.secret, mapped by load-secrets-env.sh
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3001"
      # Issue #901: Enable iframe embedding for Infrastructure page
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./scripts/load-secrets-env.sh:/scripts/load-secrets-env.sh:ro
      - grafana_data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
      # jaeger dependency removed - replaced by HyperDX (Issue #1564)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  n8n:
    image: n8nio/n8n:1.114.4
    container_name: meepleai-n8n
    restart: unless-stopped
    profiles: [automation, full]
    environment:
      # Node.js heap size tuning (75% of container limit minus overhead)
      NODE_OPTIONS: "--max-old-space-size=512"
    env_file:
      - ./secrets/database.secret
      - ./secrets/n8n.secret
      - ./env/n8n.env.dev
    volumes:
      - ./scripts/load-secrets-env.sh:/scripts/load-secrets-env.sh:ro
    entrypoint: ["/scripts/load-secrets-env.sh"]
    command: ["n8n"]
    ports:
      - "127.0.0.1:5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  api:
    build:
      context: ../apps/api
      dockerfile: ./src/Api/Dockerfile
    container_name: meepleai-api
    restart: unless-stopped
    profiles: [minimal, dev, observability, ai, automation, full]
    env_file:
      - ./secrets/database.secret
      - ./secrets/redis.secret
      - ./secrets/qdrant.secret
      - ./secrets/jwt.secret
      - ./secrets/openrouter.secret
      - ./secrets/admin.secret
      - ./secrets/oauth.secret
      - ./secrets/bgg.secret
      - ./secrets/email.secret
      - ./secrets/embedding-service.secret
      - ./env/api.env.dev
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      # Postgres/Redis connection details come from api.env.dev and secrets
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
      # AI-09: Use external embedding service to avoid OOM in API container
      EMBEDDING_PROVIDER: external
      Embedding__Provider: External
      EMBEDDING_MODEL: intfloat/multilingual-e5-large
      EMBEDDING_DIMENSIONS: 1024
      # Override nested config from appsettings.json (ASP.NET Core uses __ for nesting)
      Embedding__Dimensions: 1024
      # AI-09: External embedding service configuration (Python service)
      LOCAL_EMBEDDING_URL: http://embedding-service:8000
      Embedding__LocalServiceUrl: http://embedding-service:8000
      EMBEDDING_FALLBACK_ENABLED: "false"
      Embedding__FallbackEnabled: "false"
      # ADR-016 Phase 4: Reranker service configuration
      RERANKER_URL: http://reranker-service:8003
      # Issue #2570: Secrets now loaded from .secret files via env_file
      # All variables (POSTGRES_*, REDIS_*, JWT_*, OPENROUTER_*, ADMIN_*, OAuth) come from env_file
      # No need for *_FILE environment variables or Docker secrets section
    volumes:
      - ./scripts/load-secrets-env.sh:/scripts/load-secrets-env.sh:ro
      - pdf_uploads:/app/pdf_uploads  # Persistent PDF storage
      # ISSUE-2510: Secret management system - mount secrets directory
      - ./secrets:/app/infra/secrets:ro  # Read-only mount for .secret files
    entrypoint: ["/scripts/load-secrets-env.sh"]
    command: ["dotnet", "Api.dll"]
    # Direct port binding for development (Next.js proxy handles routing)
    ports:
      - "127.0.0.1:8080:8080"
    # Traefik labels (ready for production Linux deployment)
    # Commented out for Windows development - use Next.js proxy instead
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.meepleai-api.rule=Host(`localhost`) && PathPrefix(`/api`)"
    #   - "traefik.http.routers.meepleai-api.entrypoints=web"
    #   - "traefik.http.routers.meepleai-api.priority=10"
    #   - "traefik.http.services.meepleai-api.loadbalancer.server.port=8080"
    #   - "traefik.http.routers.meepleai-api.middlewares=rate-limit-api@file,security-headers@file"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      # ollama dependency removed - optional service for local embeddings
      # API works without it (uses OpenRouter for LLM, embedding-service for embeddings)
    healthcheck:
      # Issue #3797: Test critical auth endpoint used by web middleware
      test: ["CMD-SHELL", "curl --fail --max-time 3 http://localhost:8080/api/v1/auth/me || curl --fail http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G  # Sufficient with batch processing (20 chunks/batch = ~500MB peak)
        reservations:
          cpus: '1.0'
          memory: 2G

  web:
    build:
      context: ../apps/web
      dockerfile: ./Dockerfile
    container_name: meepleai-web
    restart: unless-stopped
    profiles: [minimal, dev, observability, ai, automation, full]
    env_file:
      - ./env/web.env.dev
    # Direct port binding for development (Next.js proxy handles routing)
    ports:
      - "127.0.0.1:3000:3000"
    # Traefik labels (ready for production Linux deployment)
    # Commented out for Windows development - use Next.js proxy instead
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.meepleai-web.rule=Host(`localhost`)"
    #   - "traefik.http.routers.meepleai-web.entrypoints=web"
    #   - "traefik.http.routers.meepleai-web.priority=1"
    #   - "traefik.http.services.meepleai-web.loadbalancer.server.port=3000"
    #   - "traefik.http.routers.meepleai-web.middlewares=security-headers@file"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  # Database & Cache - Core data persistence
  postgres_data:
  qdrant_data:

  # ML Service Model Caches
  ollama_data:
  smoldocling_models:  # Hugging Face model cache
  reranker_models:     # Reranker model cache

  # Temporary Processing Directories
  unstructured_temp:   # PDF extraction temporary storage
  smoldocling_temp:    # PDF processing temporary storage

  # Application Data
  pdf_uploads:         # Persistent storage for uploaded PDFs

  # Observability & Monitoring
  prometheus_data:
  grafana_data:
  alertmanager_data:
  mailpit_data:        # Email testing storage

networks:
  meepleai:
    driver: bridge

