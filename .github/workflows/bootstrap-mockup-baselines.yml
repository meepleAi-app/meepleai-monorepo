name: Conformity — Bootstrap Mockup Baselines

# WS-C Phase 3 (issue #1069, umbrella #1066) — AC-C.6 baseline generation.
#
# Two ways this workflow runs:
#
#   (a) workflow_dispatch — manually triggered. Regenerates ALL baselines for
#       every route in mockup-ownership.bootstrap.json, opens an auto-PR with
#       the resulting __mockup__/*.png files for human review.
#
#   (b) push on `admin-mockups/design_files/**` (main-dev only) — when a mockup
#       file changes, regenerate baselines so the conformity gate doesn't
#       silently drift. Auto-PR is opened against main-dev.
#
# This workflow is the ONLY way to (re)generate conformity baselines.
# `visual-regression-conformity.yml` (the PR gate) must never call
# --update-snapshots — that's an AC-C.6 invariant.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are we regenerating baselines? (recorded in auto-PR body)'
        required: true
        type: string
  push:
    branches:
      - main-dev
    paths:
      - 'admin-mockups/design_files/**'
      - 'apps/web/e2e/visual-conformity/mockup-ownership.bootstrap.json'
      - 'apps/web/scripts/conformity-ownership.ts'
      - 'apps/web/scripts/serve-mockups.cjs'
      - 'apps/web/e2e/visual-conformity/bootstrap.spec.ts'
      - 'apps/web/playwright.config.ts'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: conformity-bootstrap-${{ github.ref }}
  cancel-in-progress: false # Don't cancel in-progress bootstrap; baselines are expensive.

jobs:
  bootstrap:
    name: Bootstrap Baselines (Desktop + Mobile)
    runs-on: ubuntu-22.04 # AC-C.8 — pinned, no matrix.
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: '20'
          pnpm-version: '10'
          working-directory: apps/web
          frozen-lockfile: 'true'

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          working-directory: apps/web

      - name: Setup Test Environment
        run: cp .env.test.example .env.test

      - name: Verify mockup pin policy (AC-C.8)
        run: pnpm verify:mockup-pins

      - name: Regenerate Mockup Baselines
        run: pnpm test:visual:conformity:bootstrap:update
        env:
          CI: true
          # The bootstrap project only hits :5174; skip Next.js webServer for speed.
          MOCKUP_ONLY_WEBSERVER: '1'

      - name: Show regenerated PNGs
        run: |
          echo "Baselines under apps/web/e2e/visual-conformity/__mockup__/:"
          ls -la e2e/visual-conformity/__mockup__/ || echo "(empty)"

      - name: Upload Bootstrapped Baselines artifact
        uses: actions/upload-artifact@v7
        with:
          name: conformity-baselines-${{ github.run_number }}
          path: apps/web/e2e/visual-conformity/__mockup__/
          retention-days: 14
          if-no-files-found: error

      - name: Upload Playwright Report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: conformity-bootstrap-report-${{ github.run_number }}
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Create auto-PR with regenerated baselines
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/conformity-baselines-${{ github.run_number }}
          base: main-dev
          commit-message: |
            chore(conformity): regenerate __mockup__ baselines (#1069)

            Auto-generated by bootstrap-mockup-baselines.yml run ${{ github.run_number }}.
            Trigger: ${{ github.event_name }}${{ github.event_name == 'workflow_dispatch' && format(' — {0}', github.event.inputs.reason) || '' }}.
          title: 'chore(conformity): regenerate mockup baselines (#1069)'
          body: |
            ## Auto-generated baselines refresh

            Trigger: **${{ github.event_name }}**
            ${{ github.event_name == 'workflow_dispatch' && format('Reason: {0}', github.event.inputs.reason) || 'Auto-triggered by mockup change on main-dev.' }}

            ### Review checklist

            - [ ] Inspect each regenerated `__mockup__/*.png` — does it match the intended visual?
            - [ ] Confirm no spurious diff (font flake, animation timing, viewport drift)
            - [ ] If a baseline looks wrong: close this PR and investigate the underlying mockup HTML.

            ### Refs

            - Issue: #1069 (WS-C)
            - Umbrella: #1066
            - Workflow run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          labels: |
            conformity
            automation
          add-paths: |
            apps/web/e2e/visual-conformity/__mockup__/
