name: Visual Regression — Mockup Conformity

# WS-C Phase 3 (issue #1069, umbrella #1066) — AC-C.1..C.9 gate.
#
# Compares LIVE ROUTE screenshots (on :3000) against committed MOCKUP baselines
# at apps/web/e2e/visual-conformity/__mockup__/{id}.{viewport}.png.
#
# Triggered on PRs that touch routes mapped in mockup-ownership.bootstrap.json
# OR shared design tokens / Tailwind config / canonical mockup HTML.
#
# Baselines are NEVER regenerated by this gate (AC-C.6 invariant). They are
# produced exclusively by `bootstrap-mockup-baselines.yml`.
#
# Phase 3 caveat: per-route page.route() data stubs are not yet wired into
# conformity.spec.ts (test.fixme()'d in scaffold). Phase 3b will land mocks
# and remove the fixme guards. Until then, this workflow runs but every spec
# is skipped — providing the wiring + an opt-in CI gate for future PRs.

on:
  pull_request:
    branches:
      - main-dev
      - main-staging
      - main
    paths:
      # Routes (mockup-ownership.bootstrap.json triggerPaths, AC-C.1)
      - 'apps/web/src/app/(authenticated)/library/**'
      - 'apps/web/src/app/(authenticated)/library/[gameId]/**'
      - 'apps/web/src/components/v2/library/**'
      - 'apps/web/src/components/features/library/**'
      # Shared design surface (AC-C.1)
      - 'apps/web/src/styles/design-tokens-canonical.css'
      - 'apps/web/tailwind.config.*'
      - 'admin-mockups/design_files/**'
      # The gate's own config
      - 'apps/web/e2e/visual-conformity/**'
      - 'apps/web/scripts/conformity-ownership.ts'
      - 'apps/web/scripts/verify-mockup-pins.ts'
      - 'apps/web/scripts/mockup-pin-policy.json'
      - 'apps/web/playwright.config.ts'
      - '.github/workflows/visual-regression-conformity.yml'

permissions:
  contents: read
  pull-requests: write
  checks: write

# AC-C.9 — cancel stale runs on push, but only within the same PR.
concurrency:
  group: conformity-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  conformity:
    name: Conformity Gate (Desktop + Mobile)
    runs-on: ubuntu-22.04 # AC-C.8 — pinned, no matrix.
    # AC-C.5 — waiver short-circuit. Required label + rationale comment are
    # enforced procedurally; this gate just gets out of the way.
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'conformity-waiver') }}
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: '20'
          pnpm-version: '10'
          working-directory: apps/web
          frozen-lockfile: 'true'

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          working-directory: apps/web

      - name: Setup Test Environment
        run: cp .env.test.example .env.test

      - name: Verify mockup pin policy (AC-C.8)
        run: pnpm verify:mockup-pins

      - name: Build Next.js (required for :3000 route renders)
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          # Phase 3b: enables IS_VISUAL_TEST_BUILD constant so /library
          # short-circuits to the curated fixture (Wave B.3 pattern).
          # /library/{gameId} uses ?state= URL override which is also gated
          # behind this flag in production builds.
          NEXT_PUBLIC_VISUAL_TEST_FIXTURE_ENABLED: '1'

      - name: Run Conformity Gate
        run: pnpm test:visual:conformity
        env:
          CI: true

      - name: Upload Playwright Report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: conformity-report-${{ github.run_number }}
          path: apps/web/playwright-report/
          # AC-C.3 — 14 days for PR runs.
          retention-days: 14

      - name: Upload Diff Triplets on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: conformity-diffs-${{ github.run_number }}
          path: apps/web/test-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Post or update sticky PR comment (failure)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const STICKY_MARKER = '<!-- conformity-gate-sticky -->';
            const body = `${STICKY_MARKER}
            ## ❌ Mockup Conformity Gate — diff exceeds budget

            One or more live routes diverge from their canonical mockup beyond
            the configured \`maxDiffPixelRatio\` (AC-C.2).

            **What to do**:

            1. Download the [\`conformity-diffs-${{ github.run_number }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) artifact — it contains \`mockup.png\` / \`route.png\` / \`diff.png\` triplets per failed route.
            2. Inspect the diff. Two outcomes:
               - **Implementation drift** — the route changed but the mockup is still canonical. Adjust the implementation.
               - **Mockup drift** — the mockup intentionally changed but the baseline wasn't regenerated. Dispatch the [\`Conformity — Bootstrap Mockup Baselines\`](${{ github.server_url }}/${{ github.repository }}/actions/workflows/bootstrap-mockup-baselines.yml) workflow, merge its auto-PR, then re-run this gate.
            3. If neither applies (e.g. font flake), comment on the PR and tag a reviewer to consider applying the \`conformity-waiver\` label (AC-C.5) with a written rationale.

            See \`docs/for-developers/testing/frontend/mockup-conformity.md\` for the full runbook.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(STICKY_MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Resolve sticky comment on success
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const STICKY_MARKER = '<!-- conformity-gate-sticky -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(STICKY_MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: `${STICKY_MARKER}\n## ✅ Mockup Conformity Gate — all routes within budget`,
              });
            }
