# OPS-02: Prometheus Configuration for MeepleAI
# Scrapes metrics from the API service for observability

global:
  scrape_interval: 15s       # Default scrape interval
  evaluation_interval: 15s   # How often to evaluate rules
  scrape_timeout: 10s        # Timeout for each scrape

  external_labels:
    cluster: 'meepleai-dev'
    environment: 'development'

# OPS-05: Alertmanager configuration for error monitoring
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s
      api_version: v2

# OPS-05: Rule files for recording and alerting rules
rule_files:
  - '/etc/prometheus/prometheus-rules.yml'

# Scrape configurations
scrape_configs:
  # Scrape Prometheus itself for monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Scrape MeepleAI API metrics (OpenTelemetry Prometheus exporter)
  - job_name: 'meepleai-api'
    scrape_interval: 10s  # More frequent scraping for API metrics
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8080']
        labels:
          service: 'meepleai-api'
          component: 'backend'

  # Issue #3797: Scrape Next.js middleware session cache metrics
  - job_name: 'meepleai-web'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['web:3000']
        labels:
          service: 'meepleai-web'
          component: 'frontend'

  # Jaeger scrape removed - replaced by HyperDX unified observability (Issue #1564)
  # HyperDX exposes its own metrics if needed at hyperdx:8180/metrics

  # Scrape Grafana metrics (optional)
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: 'grafana'
          component: 'visualization'

  # Embedding service (local multilingual embeddings)
  - job_name: 'embedding-service'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['embedding-service:8000']
        labels:
          service: 'embedding-service'
          component: 'ml'

  # Unstructured PDF extraction service (stage 1)
  - job_name: 'unstructured-service'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['unstructured-service:8001']
        labels:
          service: 'unstructured-service'
          component: 'ingestion'

  # SmolDocling VLM extraction service (stage 2)
  - job_name: 'smoldocling-service'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['smoldocling-service:8002']
        labels:
          service: 'smoldocling-service'
          component: 'ingestion'

  # OPS-05: Scrape Alertmanager metrics
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          service: 'alertmanager'
          component: 'alerting'

  # P3-705: cAdvisor - Container metrics
  - job_name: 'cadvisor'
    scrape_interval: 30s
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
          component: 'container-metrics'

  # P3-705: node-exporter - Host metrics
  - job_name: 'node-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          component: 'host-metrics'
