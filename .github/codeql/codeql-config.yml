name: "MeepleAI CodeQL Configuration"
description: "Custom CodeQL configuration with false positive filters for MeepleAI"

# Disable specific queries that produce false positives
disable-default-queries: false

# Custom Models-as-Data sanitizer pack (ADR-058 §1.4).
# Pack metadata is NOT declared here. The right mechanism is injecting both
# `--additional-packs=<workspace>/.github/codeql` (search path) and
# `--extension-packs=meepleai/sanitizers-extensions` (activation) into
# `database run-queries` via CODEQL_ACTION_EXTRA_OPTIONS on the analyze step.
# Pack files live at:
#   .github/codeql/meepleai/sanitizers-extensions/
# Directory layout must match the pack name for --extension-packs to resolve.
# Pattern mirrors homelabforge/mygarage (working reference).
# See .github/workflows/security-scan.yml.

# Query filters to reduce false positives
query-filters:
  # Exclude generic exception handling warnings where properly justified with #pragma
  # CA1031: All 220 instances are properly documented with architectural patterns
  - exclude:
      id: cs/catch-of-all-exceptions
  # NOTE 2026-05-16: blanket exclude for cs/log-forging removed (PR #1192 closing #1181).
  # The MaD sanitizer pack at .github/codeql/meepleai/sanitizers-extensions registers
  # LogSanitizer.Sanitize + LogSanitizer.SanitizePath + DataMasking.MaskCreditCard
  # as `log-injection` barriers. Pack loads via CODEQL_ACTION_EXTRA_OPTIONS env var
  # on the analyze step (see security-scan.yml). With those barriers active, the
  # cs/log-forging rule surfaces only true positives where input flows directly to
  # ILogger without sanitization — the original purpose of the rule.
  #
  # History:
  #   - Pre-2025-11: exclude introduced (PR #1710) without empirical validation
  #   - 2026-05-15 PR #1183: exclude removed in optimistic Phase 1.4 (MaD pack
  #     didn't actually load — see #1188); 84 alerts surfaced as false positives
  #   - 2026-05-16 PR #1187: exclude restored as safety net during #1188 resolution
  #   - 2026-05-16 PR #1189: empirical pack-load mechanism delivered, 107 → 22 reduction
  #   - 2026-05-16 PR #1191: file-content-store barriers extended, 22 → 7 reduction
  #   - 2026-05-16 this PR: exclude removed for the second time, now empirically safe

# Path filters to exclude test files and generated code
paths-ignore:
  - "**/Tests/**"
  - "**/test/**"
  - "**/obj/**"
  - "**/bin/**"
  - "**/*.Designer.cs"
  - "**/Migrations/**"
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/.next/**"

# Paths to include in analysis
paths:
  - apps/api/src
  - apps/web/src
  # Include top-level Next.js runtime files for security scanning
  - apps/web/proxy.ts
  - apps/web/instrumentation.ts  # For observability/telemetry (if added)

# Additional queries to run (optional)
queries:
  - uses: security-extended
  - uses: security-and-quality

# Suppress specific warnings with justification
# Note: Individual suppressions should use #pragma in code where possible
suppressions:
  # Path injection warnings already mitigated by PathSecurity utilities
  # Keep enabled but document that defense-in-depth is in place

  # IDisposable warnings - keep enabled to catch new issues
  # Already fixed 12 real leaks, remaining 589 are false positives from IHttpClientFactory usage

  # Null reference warnings - keep enabled
  # Already fixed 6 real issues, remaining are false positives from nullable context

# Custom query packs (if needed in future)
# packs:
#   - codeql/csharp-queries
#   - codeql/javascript-queries
