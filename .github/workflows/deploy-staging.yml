name: Deploy to Staging

on:
  push:
    branches: [main-staging]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency deploy only)'
        required: false
        default: 'false'
        type: boolean
      force_full_deploy:
        description: 'Force rebuild and deploy of both API and Web'
        required: false
        default: 'false'
        type: boolean

# Only one staging deployment at a time
concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write  # For OIDC auth to cloud providers
  checks: write     # Required by ci.yml reusable workflow
  pull-requests: write  # Required by ci.yml reusable workflow

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web
  ENVIRONMENT: staging

jobs:
  # Detect which components changed
  detect-changes:
    name: Detect Changes
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    outputs:
      api: ${{ steps.changes.outputs.api }}
      web: ${{ steps.changes.outputs.web }}
      infra: ${{ steps.changes.outputs.infra }}
      deploy_api: ${{ steps.decision.outputs.deploy_api }}
      deploy_web: ${{ steps.decision.outputs.deploy_web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            api:
              - 'apps/api/**'
            web:
              - 'apps/web/**'
            infra:
              - 'infra/**'
              - '.github/workflows/deploy-staging.yml'

      - name: Determine what to deploy
        id: decision
        run: |
          FORCE="${{ inputs.force_full_deploy }}"
          API="${{ steps.changes.outputs.api }}"
          WEB="${{ steps.changes.outputs.web }}"
          INFRA="${{ steps.changes.outputs.infra }}"

          # Force full deploy on: manual force, infra changes, or workflow_dispatch without force (deploy all by default)
          if [ "$FORCE" = "true" ] || [ "$INFRA" = "true" ]; then
            echo "deploy_api=true" >> $GITHUB_OUTPUT
            echo "deploy_web=true" >> $GITHUB_OUTPUT
            echo "📦 Full deploy: force=$FORCE, infra=$INFRA"
          else
            echo "deploy_api=$API" >> $GITHUB_OUTPUT
            echo "deploy_web=$WEB" >> $GITHUB_OUTPUT
            echo "📦 Selective deploy: api=$API, web=$WEB"
          fi

  # Run tests before deploy (unless skipped for emergency)
  test:
    name: Pre-deploy Tests
    if: github.event_name == 'push' || inputs.skip_tests != true
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # Build and push Docker images (only changed components)
  build:
    name: Build Images
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 45
    needs: [test, detect-changes]
    if: always() && (needs.test.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.skip_tests == true)) && (needs.detect-changes.outputs.deploy_api == 'true' || needs.detect-changes.outputs.deploy_web == 'true')
    outputs:
      api_image: ${{ steps.meta-api.outputs.tags }}
      web_image: ${{ steps.meta-web.outputs.tags }}
      version: ${{ steps.version.outputs.version }}
      api_built: ${{ needs.detect-changes.outputs.deploy_api }}
      web_built: ${{ needs.detect-changes.outputs.deploy_web }}
    steps:
      - name: Check Runner Fallback
        if: vars.RUNNER != '' && !contains(runner.name, vars.RUNNER)
        run: |
          echo "::warning::Self-hosted runner '${{ vars.RUNNER }}' unavailable — fell back to GitHub-hosted runner"
          echo "⚠️ This may produce x86 images incompatible with ARM64 staging server"

      - name: Verify ARM64 runner
        if: vars.RUNNER != ''
        run: |
          ARCH=$(uname -m)
          echo "Runner architecture: $ARCH"
          if [ "$ARCH" != "aarch64" ]; then
            echo "::error::Expected aarch64 but got $ARCH — runner may have silently fallen back"
            exit 1
          fi

      - name: Pre-build disk check (self-hosted)
        if: vars.RUNNER != ''
        run: |
          # Requires GNU df (--output flag)
          USAGE=$(df / --output=pcent | tail -1 | tr -d ' %')
          echo "Disk usage: ${USAGE}%"
          if [ "$USAGE" -gt 90 ]; then
            echo "::error::Disk usage critical (${USAGE}%) — triggering emergency cleanup"
            docker system prune -af --filter "until=24h" 2>/dev/null || true
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Version
        id: version
        run: |
          VERSION="staging-$(date +'%Y%m%d')-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract API Metadata
        if: needs.detect-changes.outputs.deploy_api == 'true'
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=staging-latest

      - name: Extract Web Metadata
        if: needs.detect-changes.outputs.deploy_web == 'true'
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=staging-latest

      - name: Build and Push API Image
        if: needs.detect-changes.outputs.deploy_api == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          file: ./apps/api/src/Api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ASPNETCORE_ENVIRONMENT=Staging
            VERSION=${{ steps.version.outputs.version }}

      - name: Build and Push Web Image
        if: needs.detect-changes.outputs.deploy_web == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            NEXT_PUBLIC_ENV=staging
            VERSION=${{ steps.version.outputs.version }}

      - name: Build Summary
        run: |
          echo "📦 Build summary:"
          echo "  API built: ${{ needs.detect-changes.outputs.deploy_api }}"
          echo "  Web built: ${{ needs.detect-changes.outputs.deploy_web }}"

      - name: Post-build cleanup (self-hosted)
        if: always() && !contains(runner.name, 'GitHub Actions')
        run: |
          echo "🧹 Cleaning up Docker build artifacts on self-hosted runner..."
          docker container prune -f 2>/dev/null || true
          docker image prune -f 2>/dev/null || true
          echo "✅ Cleanup complete"
          df -h / | tail -1

  # Run database migrations BEFORE deploying new code
  migrate-db:
    name: Database Migration
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: [build]
    if: vars.DEPLOY_METHOD == 'ssh'
    steps:
      - name: Run Migrations via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/meepleai/repo/infra

            set -a
            for f in secrets/*.secret; do source "$f" 2>/dev/null; done
            set +a

            docker pull ${{ needs.build.outputs.api_image }}
            export API_IMAGE="${{ needs.build.outputs.api_image }}"

            mkdir -p /backups
            BACKUP_FILE="/backups/pre-migration-staging-$(date +%Y%m%d%H%M%S).sql"
            echo "💾 Creating backup: $BACKUP_FILE"
            docker compose -f docker-compose.yml -f compose.staging.yml exec -T postgres \
              pg_dump -U ${POSTGRES_USER:-meeple} ${POSTGRES_DB:-meepleai_staging} > "$BACKUP_FILE" 2>/dev/null || {
              echo "⚠️ Backup failed (postgres may not be running) — continuing"
            }

            echo "🔍 Checking EF CLI availability..."
            HAS_EF=$(docker run --rm "$API_IMAGE" dotnet ef --version 2>/dev/null && echo "yes" || echo "no")

            if [ "$HAS_EF" = "yes" ]; then
              CONN_STRING=$(docker compose -f docker-compose.yml -f compose.staging.yml exec -T api \
                printenv ConnectionStrings__DefaultConnection 2>/dev/null || echo "")
              if [ -n "$CONN_STRING" ]; then
                echo "🔄 Applying migrations..."
                docker run --rm --network meepleai \
                  -e "ConnectionStrings__DefaultConnection=$CONN_STRING" \
                  "$API_IMAGE" dotnet ef database update --no-build 2>&1 || {
                  echo "❌ Migration failed — restoring backup"
                  docker compose -f docker-compose.yml -f compose.staging.yml exec -T postgres \
                    psql -U ${POSTGRES_USER:-meeple} ${POSTGRES_DB:-meepleai_staging} < "$BACKUP_FILE"
                  exit 1
                }
                echo "✅ Migrations applied"
              else
                echo "ℹ️ No connection string — migrations will apply on API startup"
              fi
            else
              echo "ℹ️ EF CLI not in image — migrations will apply on API startup"
            fi

  # Deploy to staging server (only changed services)
  deploy:
    name: Deploy to Staging
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 15
    needs: [build, migrate-db]
    if: always() && needs.build.result == 'success' && (needs.migrate-db.result == 'success' || needs.migrate-db.result == 'skipped')
    environment:
      name: staging
      url: https://meepleai.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Option 1: SSH Deploy (VPS/Dedicated Server)
      - name: Deploy via SSH
        if: vars.DEPLOY_METHOD == 'ssh'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/meepleai/repo/infra

            # Load secrets for docker compose
            set -a
            for f in secrets/*.secret; do source "$f" 2>/dev/null; done
            set +a

            SERVICES=""

            # Pull and tag only changed images
            if [ "${{ needs.build.outputs.api_built }}" = "true" ]; then
              docker pull ${{ needs.build.outputs.api_image }}
              export API_IMAGE="${{ needs.build.outputs.api_image }}"
              SERVICES="$SERVICES api"
              echo "📦 API image updated"
            fi

            if [ "${{ needs.build.outputs.web_built }}" = "true" ]; then
              docker pull ${{ needs.build.outputs.web_image }}
              export WEB_IMAGE="${{ needs.build.outputs.web_image }}"
              SERVICES="$SERVICES web"
              echo "📦 Web image updated"
            fi

            if [ -z "$SERVICES" ]; then
              echo "⏭️ No services to deploy"
              exit 0
            fi

            echo "🚀 Deploying services:$SERVICES"

            # Deploy only changed services
            docker compose -f docker-compose.yml -f compose.staging.yml -f compose.staging-traefik.yml \
              --profile minimal up -d --no-deps $SERVICES

            # Health check (internal - avoids SSL issues)
            sleep 15
            curl -sf http://localhost:8080/health | python3 -c "
            import sys,json
            d=json.load(sys.stdin)
            healthy = [c['name'] for c in d['checks'] if c['status']=='Healthy']
            print(f'Healthy services: {len(healthy)}')
            assert any(c['name']=='postgres' and c['status']=='Healthy' for c in d['checks']), 'postgres unhealthy'
            assert any(c['name']=='redis' and c['status']=='Healthy' for c in d['checks']), 'redis unhealthy'
            " || exit 1

            # Record deployment version
            cat > /opt/meepleai/repo/infra/DEPLOYMENT.json << VEREOF
            {
              "version": "${{ needs.build.outputs.version }}",
              "api_image": "${{ needs.build.outputs.api_image }}",
              "web_image": "${{ needs.build.outputs.web_image }}",
              "environment": "staging",
              "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "deployed_by": "${{ github.actor }}",
              "commit": "${{ github.sha }}",
              "workflow_run": "${{ github.run_id }}"
            }
            VEREOF
            echo "📋 Version recorded: ${{ needs.build.outputs.version }}"

            # Cleanup old images
            docker image prune -f

  # Post-deploy validation
  validate:
    name: Post-deploy Validation
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: [deploy]
    steps:
      - name: Deep Health Check
        run: |
          echo "🔍 Running deep health checks..."

          # Wait for API with structured health response
          HEALTH=""
          for i in {1..30}; do
            HEALTH=$(curl -sf https://api.meepleai.app/health 2>/dev/null || true)
            if [ -n "$HEALTH" ]; then
              echo "📋 Health response received"
              break
            fi
            echo "⏳ Waiting for API... ($i/30)"
            sleep 10
          done

          if [ -z "$HEALTH" ]; then
            echo "❌ API did not respond within 5 minutes"
            exit 1
          fi

          echo "$HEALTH" | jq . 2>/dev/null || echo "$HEALTH"

          # Verify critical services from health response
          for SERVICE in postgres redis; do
            STATUS=$(echo "$HEALTH" | jq -r ".checks[] | select(.name==\"$SERVICE\") | .status" 2>/dev/null || true)
            if [ "$STATUS" != "Healthy" ]; then
              echo "❌ $SERVICE is $STATUS (expected Healthy)"
              exit 1
            fi
            echo "✅ $SERVICE: Healthy"
          done

          echo "✅ All critical services healthy"

      - name: Web Health Check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://meepleai.app)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Web returned status $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Web healthy (HTTP $HTTP_STATUS)"

      - name: Smoke Tests
        run: |
          echo "🧪 Running staging smoke tests..."
          FAIL=0
          RESULTS=""

          smoke_test() {
            local name="$1" url="$2" expect="$3"
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null || echo "000")
            if echo "$expect" | grep -q "$status"; then
              echo "  ✅ $name: HTTP $status"
              RESULTS="${RESULTS}| $name | $status | ✅ |\n"
            else
              echo "  ❌ $name: HTTP $status (expected $expect)"
              RESULTS="${RESULTS}| $name | $status | ❌ |\n"
              FAIL=1
            fi
          }

          # Critical smoke tests (failure = deployment issue)
          smoke_test "API Health" "https://meepleai.app/health" "200"
          smoke_test "Web Root" "https://meepleai.app" "200"
          smoke_test "API Game Catalog" "https://meepleai.app/api/v1/shared-game-catalog/games?limit=1" "200 401"
          smoke_test "Swagger Docs" "https://meepleai.app/swagger/index.html" "200"

          # Health endpoint JSON validation
          echo "  Validating health response structure..."
          HEALTH_JSON=$(curl -sf --max-time 10 https://meepleai.app/health 2>/dev/null || true)
          if [ -n "$HEALTH_JSON" ] && echo "$HEALTH_JSON" | jq -e '.status' > /dev/null 2>&1; then
            echo "  ✅ Health JSON: valid structure"
          else
            echo "  ⚠️ Health JSON: unexpected format (non-blocking)"
          fi

          # Response time check
          RT=$(curl -sf -o /dev/null -w "%{time_total}" --max-time 10 https://meepleai.app 2>/dev/null || echo "9.999")
          echo "  📊 Response time: ${RT}s"

          # Write summary to job output
          {
            echo "## 🧪 Staging Smoke Test Results"
            echo ""
            echo "| Test | Status | Result |"
            echo "|------|--------|--------|"
            echo -e "$RESULTS"
            echo ""
            echo "**Response Time**: ${RT}s"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAIL" -ne 0 ]; then
            echo ""
            echo "❌ Smoke tests FAILED"
            exit 1
          fi
          echo ""
          echo "✅ All smoke tests passed"

      - name: Performance Baseline
        run: |
          echo "⚡ Running performance baseline..."
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚡ Performance Baseline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Avg (s) | P95 (s) | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|---------|--------|" >> $GITHUB_STEP_SUMMARY

          THRESHOLD=3.0

          for ENDPOINT in "/health" "/"; do
            TIMES=""
            for i in {1..5}; do
              T=$(curl -sf -o /dev/null -w "%{time_total}" "https://meepleai.app$ENDPOINT" 2>/dev/null || echo "9.999")
              TIMES="$TIMES $T"
            done

            AVG=$(echo $TIMES | tr ' ' '\n' | awk '{sum+=$1} END {printf "%.3f", sum/NR}')
            P95=$(echo $TIMES | tr ' ' '\n' | sort -n | tail -1)

            if (( $(echo "$P95 > $THRESHOLD" | bc -l 2>/dev/null || echo 0) )); then
              STATUS="⚠️ Slow"
            else
              STATUS="✅ OK"
            fi

            echo "$ENDPOINT: avg=${AVG}s p95=${P95}s $STATUS"
            echo "| \`$ENDPOINT\` | $AVG | $P95 | $STATUS |" >> $GITHUB_STEP_SUMMARY
          done

  # Post-deploy E2E smoke tests against live staging
  e2e-staging:
    name: Staging E2E Smoke Tests
    runs-on: ubuntu-latest  # Needs browser support (not self-hosted ARM64)
    needs: [validate]
    if: needs.validate.result == 'success'
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Run Smoke Tests against Staging
        working-directory: apps/web
        env:
          STAGING_URL: https://meepleai.app
          CI: 'true'
        run: |
          echo "🧪 Running E2E smoke tests against staging..."
          pnpm exec playwright test e2e/smoke.spec.ts \
            --config=playwright.staging.config.ts \
            --reporter=list

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-e2e-report
          path: apps/web/playwright-report/
          retention-days: 7

  # Notify on completion
  notify:
    name: Notify
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: [build, deploy, validate, e2e-staging]
    if: always()
    steps:
      - name: Slack Notification
        if: vars.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,workflow
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ needs.build.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API Built | ${{ needs.build.outputs.api_built }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web Built | ${{ needs.build.outputs.web_built }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | staging |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://meepleai.app |" >> $GITHUB_STEP_SUMMARY
