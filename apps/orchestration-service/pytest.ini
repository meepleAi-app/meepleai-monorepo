[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --strict-markers
    # Coverage options removed - specified in CI workflow as needed
    # This allows local test runs without coverage requirements
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
