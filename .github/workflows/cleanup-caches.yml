name: Cache Cleanup

on:
  schedule:
    # Run on the first day of every month at 00:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read

jobs:
  cleanup:
    name: Clean Cache Directories
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Calculate sizes before cleanup
        id: before
        run: |
          echo "Calculating disk usage before cleanup..."
          BEFORE_SIZE=$(du -sb . 2>/dev/null | cut -f1 || echo "0")
          echo "size=$BEFORE_SIZE" >> $GITHUB_OUTPUT
          echo "Before size: $(du -sh . 2>/dev/null | cut -f1)"

      - name: Run cleanup script
        id: cleanup
        run: |
          echo "Running cache cleanup..."
          bash tools/cleanup-caches.sh --yes --verbose 2>&1 | tee cleanup-output.log

      - name: Calculate sizes after cleanup
        id: after
        run: |
          echo "Calculating disk usage after cleanup..."
          AFTER_SIZE=$(du -sb . 2>/dev/null | cut -f1 || echo "0")
          echo "size=$AFTER_SIZE" >> $GITHUB_OUTPUT
          echo "After size: $(du -sh . 2>/dev/null | cut -f1)"

      - name: Calculate space freed
        id: summary
        run: |
          BEFORE_SIZE=${{ steps.before.outputs.size }}
          AFTER_SIZE=${{ steps.after.outputs.size }}
          FREED_BYTES=$((BEFORE_SIZE - AFTER_SIZE))
          FREED_MB=$((FREED_BYTES / 1024 / 1024))
          echo "freed_mb=$FREED_MB" >> $GITHUB_OUTPUT
          echo "Space freed: ${FREED_MB} MB"

      - name: Create cleanup report
        run: |
          cat > cleanup-report.md << 'EOF'
          # Cache Cleanup Report

          **Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Workflow**: ${{ github.workflow }}
          **Run ID**: ${{ github.run_id }}

          ## Summary

          - **Space freed**: ${{ steps.summary.outputs.freed_mb }} MB
          - **Before cleanup**: $(du -sh . 2>/dev/null | cut -f1)
          - **After cleanup**: $(du -sh . 2>/dev/null | cut -f1)

          ## Directories Cleaned

          - `.serena/` - Serena MCP cache
          - `codeql-db/` - CodeQL database cache
          - `.playwright-mcp/` - Playwright MCP cache
          - `apps/api/obj`, `apps/api/bin` - .NET build artifacts
          - `apps/web/.next` - Next.js build cache

          ## Detailed Log

          ```
          $(cat cleanup-output.log)
          ```

          ## Next Scheduled Run

          The next automatic cleanup will run on the 1st of next month at 00:00 UTC.

          ---
          🤖 Generated by [Cache Cleanup Workflow](https://github.com/${{ github.repository }}/actions/workflows/cleanup-caches.yml)
          EOF

          # Save report artifact
          mkdir -p cleanup-reports
          cp cleanup-report.md "cleanup-reports/cleanup-$(date +%Y-%m-%d).md"

      - name: Upload cleanup report
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-report-${{ github.run_id }}
          path: cleanup-report.md
          retention-days: 90

      - name: Cleanup artifacts
        if: always()
        run: |
          rm -f cleanup-output.log cleanup-report.md

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: cleanup
    if: failure()

    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Cache Cleanup Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Automated Cache Cleanup Failed

            The scheduled cache cleanup workflow failed to complete.

            **Workflow Run**: ${{ github.run_id }}
            **Workflow URL**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ### Recommended Actions

            1. Check the workflow logs for errors
            2. Verify disk space on CI runners
            3. Ensure cleanup scripts are executable and functional
            4. Run cleanup manually if needed: \`bash tools/cleanup-caches.sh\`

            ---
            🤖 Auto-generated issue by Cache Cleanup Workflow`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'maintenance', 'automated']
            });
