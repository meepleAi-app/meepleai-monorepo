      # WARNING: Low-quality rate elevated (> 15% for 30 minutes)
      - alert: ElevatedLowQualityRate
        expr: |
          meepleai:quality:low_quality_rate:5m > 15
        for: 30m
        labels:
          severity: warning
          service: meepleai-api
          category: quality
        annotations:
          summary: "Elevated rate of low-quality responses"
          description: |
            {{ $value | humanize }}% of responses are low quality (threshold: 15%).
            More responses than usual are failing quality standards.
            Review recent changes and monitor for escalation.
          runbook_url: "https://docs.meepleai.dev/runbooks/ai-quality-low"
          dashboard_url: "http://localhost:3001/d/quality-metrics"

