name: Validate Workflows

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'scripts/validate-workflows.js'
  push:
    branches:
      - main
      - main-dev
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'scripts/validate-workflows.js'

jobs:
  notify-start:
    uses: ./.github/workflows/notify-slack.yml
    with:
      event: started
      workflow_name: "Validate Workflows"
      environment: automation
      branch: ${{ github.head_ref || github.ref_name }}
      actor: ${{ github.actor }}
      commit_sha: ${{ github.sha }}
      commit_message: ${{ github.event.head_commit.message || 'Manual trigger' }}
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      job_list: '["validate-workflow-patterns"]'
      caller_workflow_id: ${{ github.workflow_id }}
    secrets:
      SLACK_GITNOTIFY_WEBHOOK_URL: ${{ secrets.SLACK_GITNOTIFY_WEBHOOK_URL }}

  validate-workflow-patterns:
    name: Validate pnpm Cache Patterns
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Validate workflow files
        run: node scripts/validate-workflows.js

  notify-end:
    if: always()
    needs: [validate-workflow-patterns]
    uses: ./.github/workflows/notify-slack.yml
    with:
      event: ${{ contains(toJSON(needs), '"result":"failure"') && 'failed' || contains(toJSON(needs), '"result":"cancelled"') && 'cancelled' || 'completed' }}
      workflow_name: "Validate Workflows"
      environment: automation
      branch: ${{ github.head_ref || github.ref_name }}
      actor: ${{ github.actor }}
      commit_sha: ${{ github.sha }}
      commit_message: ${{ github.event.head_commit.message || 'Manual trigger' }}
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets:
      SLACK_GITNOTIFY_WEBHOOK_URL: ${{ secrets.SLACK_GITNOTIFY_WEBHOOK_URL }}
