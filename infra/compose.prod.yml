# Docker Compose - Production Environment
# Extends docker-compose.yml with production-specific configurations
# Production configuration with security hardening and high availability
#
# Usage:
#   docker compose -f docker-compose.yml -f compose.prod.yml up -d
#   docker compose -f docker-compose.yml -f compose.prod.yml down
#
# Secrets: Uses env_file (.secret files) — same pattern as docker-compose.yml.
# All secrets are loaded via ./secrets/*.secret and ./secrets/prod/*.secret files.
# See infra/secrets/setup-secrets.ps1 for initial setup.

services:
  # ============================================================================
  # Core Infrastructure - Production Configuration
  # ============================================================================

  postgres:
    restart: always
    env_file:
      - ./secrets/database.secret
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meepleai_prod}
      POSTGRES_USER: ${POSTGRES_USER:-meeple}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
      - ./init/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  redis:
    restart: always
    env_file:
      - ./secrets/redis.secret
    command: ["sh", "-c", "redis-server /etc/redis/redis.conf --requirepass $REDIS_PASSWORD"]
    volumes:
      - redisdata-prod:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  qdrant:
    restart: always
    env_file:
      - ./secrets/qdrant.secret
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY is required - see secrets/qdrant.secret.example}
    volumes:
      - qdrantdata-prod:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 4G

  # ============================================================================
  # Application Services - Production Configuration
  # ============================================================================

  api:
    restart: always
    env_file:
      - ./secrets/database.secret
      - ./secrets/jwt.secret
      - ./secrets/admin.secret
      - ./secrets/openrouter.secret
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: https://+:8080;http://+:8081
      # TLS cert — mount via volume, not Docker secrets
      ASPNETCORE_Kestrel__Certificates__Default__Path: /app/certs/api-cert.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${API_CERT_PASSWORD:-}
      # Issue #2460: Database connection configuration (two options)
      # Option 1 (Default): POSTGRES_* vars - SecretsHelper builds connection string automatically
      POSTGRES_USER: ${POSTGRES_USER:-meeple}
      POSTGRES_DB: ${POSTGRES_DB:-meepleai_prod}
      # Option 2 (Advanced): Full connection string with SSL/TLS and optimized pooling
      # Uncomment below and comment Option 1 if using managed PostgreSQL (RDS, Azure, GCP)
      # See infra/secrets/postgres-connection-string-production.example.txt for template
      # ConnectionStrings__Postgres: "Host=HOST;Database=DB;Username=USER;Password=PASS;Pooling=true;Minimum Pool Size=5;Maximum Pool Size=50;SSL Mode=Require;Trust Server Certificate=false;Command Timeout=30;Timeout=15"
    volumes:
      - ./secrets/prod/api-cert.pfx:/app/certs/api-cert.pfx:ro
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  web:
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE: ${PRODUCTION_API_URL:?PRODUCTION_API_URL is required}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # ============================================================================
  # AI/ML Services - Production Configuration
  # ============================================================================

  ollama:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  embedding-service:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  unstructured-service:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  smoldocling-service:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # ============================================================================
  # Observability Stack - Production Settings
  # ============================================================================

  grafana:
    restart: always
    env_file:
      - ./secrets/monitoring.secret
    environment:
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:?GRAFANA_ROOT_URL is required}
    volumes:
      - grafana-prod:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro

  prometheus:
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'  # 90 days retention for production
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.size=50GB'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheus-prod:/prometheus
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  alertmanager:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  n8n:
    restart: always

# ============================================================================
# Production-specific Volumes
# ============================================================================
volumes:
  pgdata-prod:
    name: meepleai-pgdata-prod
  qdrantdata-prod:
    name: meepleai-qdrantdata-prod
  redisdata-prod:
    name: meepleai-redisdata-prod
  prometheus-prod:
    name: meepleai-prometheus-prod
  grafana-prod:
    name: meepleai-grafana-prod
