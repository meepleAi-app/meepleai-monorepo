# MeepleAI Development Stack
# Extends docker-compose.yml with development-specific overrides
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml down
#
# For MCP servers, use:
#   docker compose -f ../docker/mcp/docker-compose.yml up -d
#
# Note: This file uses plain environment variables instead of secrets for easier local development

services:
  # ============================================================================
  # Development Overrides (simpler auth, no secrets)
  # ============================================================================

  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meeple}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meeplepass}  # Plain password for dev
      POSTGRES_DB: ${POSTGRES_DB:-meepleai}
    secrets: []  # Disable secrets in dev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      # Use plain connection string for dev (no secrets)
      ConnectionStrings__Postgres: "Host=postgres;Database=${POSTGRES_DB:-meepleai};Username=${POSTGRES_USER:-meeple};Password=${POSTGRES_PASSWORD:-meeplepass}"
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis:6379
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: nomic-embed-text
      LOCAL_EMBEDDING_URL: http://embedding-service:8000
      EMBEDDING_FALLBACK_ENABLED: "true"
      # OpenRouter key from env (not secret file)
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Bootstrap admin (plain password for dev)
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@meepleai.dev}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-Demo123!}
      INITIAL_ADMIN_DISPLAY_NAME: ${INITIAL_ADMIN_DISPLAY_NAME:-Dev Admin}
    env_file:
      - ./env/api.env.dev
    secrets: []  # Disable secrets in dev

  n8n:
    environment:
      # Override to use plain env vars instead of secrets
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-meeplepass}
    env_file:
      - ./env/n8n.env.dev
    secrets: []  # Disable secrets in dev
    entrypoint: []  # Use default n8n entrypoint
    command: ["n8n"]

  alertmanager:
    environment:
      # Override for dev - use plain env vars
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
    env_file:
      - ./env/alertmanager.env
    secrets: []  # Disable secrets in dev
    entrypoint: []  # Use default entrypoint
    command:
      - '/bin/alertmanager'
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanagerdata:/alertmanager

  grafana:
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}  # Plain password for dev
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3001"
    secrets: []  # Disable secrets in dev
