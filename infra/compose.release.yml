# Docker Compose Release Override
# Usage: docker compose -f docker-compose.yml -f compose.release.yml --profile full [command]
#
# Switches API from Development to Production environment.
# All other services remain unchanged.

services:
  api:
    env_file:
      - ./secrets/database.secret
      - ./secrets/redis.secret
      - ./secrets/qdrant.secret
      - ./secrets/jwt.secret
      - ./secrets/openrouter.secret
      - ./secrets/admin.secret
      - ./secrets/oauth.secret
      - ./secrets/bgg.secret
      - ./secrets/email.secret
      - ./secrets/embedding-service.secret
      - ./secrets/storage.secret
      - ./env/api.env.release
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Docker networking: service names as hostnames
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      # appsettings.Production.json uses ${OAUTH_CALLBACK_BASE_URL} placeholder (not auto-resolved by ASP.NET Core)
      # Override directly via ASP.NET Core nested env var convention (__ = config section separator)
      Authentication__OAuth__CallbackBaseUrl: "http://localhost:8080"
      # appsettings.Production.json sets Secure=true which breaks cookies over HTTP in local Docker
      # SameSite=None requires Secure=true per browser policy, revert to Lax for HTTP
      Authentication__SessionCookie__Secure: "false"
      Authentication__SessionCookie__SameSite: "Lax"
