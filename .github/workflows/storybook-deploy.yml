name: Deploy Storybook

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/src/components/**'
      - 'apps/web/.storybook/**'
      - 'apps/web/package.json'
  pull_request:
    paths:
      - 'apps/web/src/components/**'
      - 'apps/web/.storybook/**'
      - 'apps/web/package.json'

# Explicit permissions (Least Privilege Principle - Issue #1455)
# https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
permissions:
  contents: read        # Required: Checkout code
  pull-requests: write  # Required: Comment on PRs with Chromatic preview links
  actions: read         # Required: Access Chromatic action status

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build Storybook
        run: pnpm build-storybook --quiet

      - name: Publish to Chromatic
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: chromaui/action@v13
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/web
          buildScriptName: build-storybook
          onlyChanged: true
          exitZeroOnChanges: true
          exitOnceUploaded: true

      - name: Comment PR with Storybook links
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const comment = `## 📚 Storybook Preview Ready!

            **Chromatic**: Visual testing complete

            Check the Chromatic deployment status above for the Storybook preview link.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
