# Traefik v3.2 Staging Configuration for meepleai.app
#
# Based on traefik.prod.yml but uses direct Docker socket
# instead of socket-proxy (v0.3.0 incompatible with Docker API 1.40+)

# API & Dashboard
api:
  dashboard: true

# Health check endpoint
ping: {}

# Entry Points
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
        domains:
          - main: "meepleai.app"
            sans:
              - "*.meepleai.app"
      middlewares:
        - security-headers@file

# Logging
log:
  level: INFO
  filePath: "/var/log/traefik/traefik.log"
  format: json
  maxSize: 100
  maxBackups: 5
  maxAge: 30
  compress: true

accessLog:
  filePath: "/var/log/traefik/access.log"
  format: json
  bufferingSize: 100
  fields:
    headers:
      defaultMode: keep
      names:
        Authorization: drop
        Cookie: drop
        Set-Cookie: drop

# Providers
providers:
  # Docker Provider - direct socket (TODO: upgrade socket-proxy to v0.6+)
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: "meepleai"
    watch: true

  file:
    directory: "/etc/traefik/dynamic"
    watch: true

# Let's Encrypt
certificatesResolvers:
  letsencrypt:
    acme:
      email: "admin@meepleai.io"
      storage: "/letsencrypt/acme.json"
      httpChallenge:
        entryPoint: web

# Metrics
metrics:
  prometheus:
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0

global:
  checkNewVersion: false
  sendAnonymousUsage: false
