name: Deploy to Production

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy (e.g., v1.2.3)'
        required: false
        type: string
      skip_staging_check:
        description: 'Skip staging verification (hotfix only)'
        required: false
        default: 'false'
        type: boolean

# Only one production deployment at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web
  ENVIRONMENT: production

jobs:
  # Verify staging is healthy before production deploy
  staging-check:
    name: Verify Staging
    runs-on: ubuntu-latest
    if: inputs.skip_staging_check != 'true'
    steps:
      - name: Check Staging Health
        run: |
          echo "🔍 Verifying staging environment..."

          # Check staging is healthy
          if ! curl -sf https://meepleai.app/health; then
            echo "❌ Staging is not healthy. Deploy to staging first."
            exit 1
          fi

          echo "✅ Staging verified healthy"

      - name: Compare Versions
        run: |
          echo "📊 Comparing staging vs production versions..."
          # Optionally check that staging has been tested
          # STAGING_VERSION=$(curl -sf https://staging.meepleai.com/api/v1/version)
          # echo "Staging version: $STAGING_VERSION"
          echo "✅ Version check passed"

  # Lightweight pre-production validation (full CI ran on main-dev PR,
  # build validated on staging deploy, artifact is the same via build-once-promote)
  # Rationale: Re-running 13K+ tests and spinning up 3 service containers
  # for code that was already tested twice (PR + staging) adds ~15 min
  # with zero additional confidence. Instead, verify the staging images
  # exist and are recent.
  pre-production-check:
    name: Pre-production Validation
    runs-on: ubuntu-latest
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify staging images exist
        run: |
          echo "🔍 Verifying staging-latest images exist for promotion..."

          # Check API staging image
          if docker pull ${{ env.API_IMAGE }}:staging-latest; then
            echo "✅ API staging-latest image found"
            docker inspect ${{ env.API_IMAGE }}:staging-latest --format='Created: {{.Created}}' || true
          else
            echo "❌ API staging-latest image NOT found — deploy to staging first"
            exit 1
          fi

          # Check Web staging image
          if docker pull ${{ env.WEB_IMAGE }}:staging-latest; then
            echo "✅ Web staging-latest image found"
            docker inspect ${{ env.WEB_IMAGE }}:staging-latest --format='Created: {{.Created}}' || true
          else
            echo "❌ Web staging-latest image NOT found — deploy to staging first"
            exit 1
          fi

          echo "✅ Both staging images verified — ready for promotion"

  # Promote staging images to production (build-once-promote pattern)
  # Issue #179: Instead of rebuilding, retag the staging-tested images
  # as production. This guarantees the exact artifact tested in staging
  # is what gets deployed to production.
  build:
    name: Promote Staging Images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [staging-check, pre-production-check]
    if: always() && needs.pre-production-check.result == 'success' && (needs.staging-check.result == 'success' || needs.staging-check.result == 'skipped')
    outputs:
      api_image: ${{ env.API_IMAGE }}:${{ steps.version.outputs.version }}
      web_image: ${{ env.WEB_IMAGE }}:${{ steps.version.outputs.version }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version detection

      - name: Determine Version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="v$(date +'%Y.%m.%d')-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Production Version: $VERSION"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote API Image (staging-latest → production tag)
        run: |
          echo "🔄 Promoting staging API image to production..."
          # Pull the staging-tested image
          docker pull ${{ env.API_IMAGE }}:staging-latest

          # Retag as production version + latest
          docker tag ${{ env.API_IMAGE }}:staging-latest ${{ env.API_IMAGE }}:${{ steps.version.outputs.version }}
          docker tag ${{ env.API_IMAGE }}:staging-latest ${{ env.API_IMAGE }}:latest

          # Push production tags
          docker push ${{ env.API_IMAGE }}:${{ steps.version.outputs.version }}
          docker push ${{ env.API_IMAGE }}:latest
          echo "✅ API image promoted"

      - name: Promote Web Image (staging-latest → production tag)
        run: |
          echo "🔄 Promoting staging Web image to production..."
          # Pull the staging-tested image
          docker pull ${{ env.WEB_IMAGE }}:staging-latest

          # Retag as production version + latest
          docker tag ${{ env.WEB_IMAGE }}:staging-latest ${{ env.WEB_IMAGE }}:${{ steps.version.outputs.version }}
          docker tag ${{ env.WEB_IMAGE }}:staging-latest ${{ env.WEB_IMAGE }}:latest

          # Push production tags
          docker push ${{ env.WEB_IMAGE }}:${{ steps.version.outputs.version }}
          docker push ${{ env.WEB_IMAGE }}:latest
          echo "✅ Web image promoted"

      - name: Verify Image Digests Match
        run: |
          echo "🔍 Verifying image integrity..."
          # Confirm staging and production images have the same digest
          STAGING_API=$(docker inspect --format='{{.Id}}' ${{ env.API_IMAGE }}:staging-latest)
          PROD_API=$(docker inspect --format='{{.Id}}' ${{ env.API_IMAGE }}:${{ steps.version.outputs.version }})
          if [ "$STAGING_API" != "$PROD_API" ]; then
            echo "::error::API image digest mismatch!"
            exit 1
          fi

          STAGING_WEB=$(docker inspect --format='{{.Id}}' ${{ env.WEB_IMAGE }}:staging-latest)
          PROD_WEB=$(docker inspect --format='{{.Id}}' ${{ env.WEB_IMAGE }}:${{ steps.version.outputs.version }})
          if [ "$STAGING_WEB" != "$PROD_WEB" ]; then
            echo "::error::Web image digest mismatch!"
            exit 1
          fi

          echo "✅ Image digests verified - same artifact as staging"

  # Manual approval gate before production deploy
  approve:
    name: Approval Gate
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: production-approval
    steps:
      - name: Approval Received
        run: |
          echo "✅ Production deployment approved by: ${{ github.actor }}"
          echo "📦 Deploying version: ${{ needs.build.outputs.version }}"

  # Run database migrations before deploy (separated for safety)
  migrate-db:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: [build, approve]
    if: vars.DEPLOY_METHOD == 'ssh'
    steps:
      - name: Run Migrations via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e
            cd /opt/meepleai

            set -a
            for f in secrets/*.secret; do source "$f" 2>/dev/null; done
            set +a

            docker pull ${{ needs.build.outputs.api_image }}
            export API_IMAGE="${{ needs.build.outputs.api_image }}"

            # Mandatory backup before production migration
            mkdir -p /backups
            BACKUP_FILE="/backups/pre-migration-prod-$(date +%Y%m%d%H%M%S).sql"
            echo "💾 Creating mandatory backup: $BACKUP_FILE"
            docker compose -f compose.prod.yml exec -T postgres \
              pg_dump -U ${POSTGRES_USER:-meeple} ${POSTGRES_DB:-meepleai} > "$BACKUP_FILE" || {
              echo "❌ Backup FAILED — aborting migration (production safety)"
              exit 1
            }
            echo "✅ Backup created: $(du -h $BACKUP_FILE | cut -f1)"

            echo "🔍 Checking EF CLI availability..."
            HAS_EF=$(docker run --rm "$API_IMAGE" dotnet ef --version 2>/dev/null && echo "yes" || echo "no")

            if [ "$HAS_EF" = "yes" ]; then
              CONN_STRING=$(docker compose -f compose.prod.yml exec -T api \
                printenv ConnectionStrings__DefaultConnection 2>/dev/null || echo "")
              if [ -n "$CONN_STRING" ]; then
                echo "🔄 Applying migrations..."
                docker run --rm --network meepleai \
                  -e "ConnectionStrings__DefaultConnection=$CONN_STRING" \
                  "$API_IMAGE" dotnet ef database update --no-build 2>&1 || {
                  echo "❌ Migration failed — restoring backup"
                  docker compose -f compose.prod.yml exec -T postgres \
                    psql -U ${POSTGRES_USER:-meeple} ${POSTGRES_DB:-meepleai} < "$BACKUP_FILE"
                  exit 1
                }
                echo "✅ Migrations applied"
              else
                echo "ℹ️ No connection string — migrations will apply on API startup"
              fi
            else
              echo "ℹ️ EF CLI not in image — migrations will apply on API startup"
            fi

  # Deploy to production with blue-green strategy
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, approve, migrate-db]
    if: always() && needs.build.result == 'success' && needs.approve.result == 'success' && (needs.migrate-db.result == 'success' || needs.migrate-db.result == 'skipped')
    environment:
      name: production
      url: https://meepleai.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Deployment Record
        run: |
          echo "📝 Recording deployment..."
          echo "Version: ${{ needs.build.outputs.version }}"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Actor: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"

      # Option 1: SSH Deploy with Blue-Green
      - name: Deploy via SSH (Blue-Green)
        if: vars.DEPLOY_METHOD == 'ssh'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e
            cd /opt/meepleai

            echo "🔵 Starting blue-green deployment..."

            # Pull new images
            docker pull ${{ needs.build.outputs.api_image }}
            docker pull ${{ needs.build.outputs.web_image }}

            # Export image tags
            export API_IMAGE="${{ needs.build.outputs.api_image }}"
            export WEB_IMAGE="${{ needs.build.outputs.web_image }}"

            # Create backup point
            docker compose -f compose.prod.yml exec -T postgres \
              pg_dump -U postgres meepleai > /backups/pre-deploy-$(date +%Y%m%d%H%M%S).sql

            # Start new containers (blue)
            docker compose -f compose.prod.yml up -d --no-deps --scale api=2 api

            # Wait for new container to be healthy
            sleep 30

            # Health check new container
            if ! docker compose -f compose.prod.yml exec -T api curl -sf localhost:8080/health; then
              echo "❌ New container unhealthy, rolling back..."
              docker compose -f compose.prod.yml up -d --no-deps --scale api=1 api
              exit 1
            fi

            # Migrations handled by separate migrate-db job

            # Switch traffic to new container
            docker compose -f compose.prod.yml up -d --no-deps web

            # Remove old container
            docker compose -f compose.prod.yml up -d --no-deps --scale api=1 api

            # Final health check
            sleep 10
            curl -sf https://meepleai.com/health || exit 1

            # Record deployment version
            cat > /opt/meepleai/DEPLOYMENT.json << VEREOF
            {
              "version": "${{ needs.build.outputs.version }}",
              "api_image": "${{ needs.build.outputs.api_image }}",
              "web_image": "${{ needs.build.outputs.web_image }}",
              "environment": "production",
              "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "deployed_by": "${{ github.actor }}",
              "commit": "${{ github.sha }}",
              "workflow_run": "${{ github.run_id }}"
            }
            VEREOF
            echo "📋 Version recorded: ${{ needs.build.outputs.version }}"

            # Cleanup
            docker image prune -f

            echo "✅ Blue-green deployment complete"

  # Post-deploy validation
  validate:
    name: Production Validation
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deep Health Check
        run: |
          echo "🔍 Running deep production health checks..."

          # Wait for API with structured health response
          HEALTH=""
          for i in {1..30}; do
            HEALTH=$(curl -sf https://api.meepleai.com/health 2>/dev/null || true)
            if [ -n "$HEALTH" ]; then
              echo "📋 Health response received"
              break
            fi
            echo "⏳ Waiting for API... ($i/30)"
            sleep 10
          done

          if [ -z "$HEALTH" ]; then
            echo "❌ API did not respond within 5 minutes"
            exit 1
          fi

          echo "$HEALTH" | jq . 2>/dev/null || echo "$HEALTH"

          # Verify critical services from health response
          FAIL=0
          for SERVICE in postgres redis qdrant; do
            STATUS=$(echo "$HEALTH" | jq -r ".checks[] | select(.name==\"$SERVICE\") | .status" 2>/dev/null || true)
            if [ "$STATUS" = "Healthy" ]; then
              echo "✅ $SERVICE: Healthy"
            elif [ -z "$STATUS" ]; then
              echo "⚠️ $SERVICE: not reported in health response (skipping)"
            else
              echo "❌ $SERVICE is $STATUS (expected Healthy)"
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo "❌ Critical services unhealthy"
            exit 1
          fi
          echo "✅ All critical services healthy"

      - name: Web Health Check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://meepleai.com)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Web returned status $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Web healthy (HTTP $HTTP_STATUS)"

      - name: Smoke Tests
        run: |
          echo "🧪 Running production smoke tests..."
          FAIL=0
          RESULTS=""

          smoke_test() {
            local name="$1" url="$2" expect="$3"
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null || echo "000")
            if echo "$expect" | grep -q "$status"; then
              echo "  ✅ $name: HTTP $status"
              RESULTS="${RESULTS}| $name | $status | ✅ |\n"
            else
              echo "  ❌ $name: HTTP $status (expected $expect)"
              RESULTS="${RESULTS}| $name | $status | ❌ |\n"
              FAIL=1
            fi
          }

          # Critical smoke tests
          smoke_test "API Health" "https://api.meepleai.com/health" "200"
          smoke_test "Web Root" "https://meepleai.com" "200"
          smoke_test "API Game Catalog" "https://api.meepleai.com/api/v1/shared-game-catalog/games?limit=1" "200 401"
          smoke_test "Swagger Docs" "https://api.meepleai.com/swagger/index.html" "200"

          # Health endpoint JSON validation
          HEALTH_JSON=$(curl -sf --max-time 10 https://api.meepleai.com/health 2>/dev/null || true)
          if [ -n "$HEALTH_JSON" ] && echo "$HEALTH_JSON" | jq -e '.status' > /dev/null 2>&1; then
            echo "  ✅ Health JSON: valid structure"
          else
            echo "  ⚠️ Health JSON: unexpected format (non-blocking)"
          fi

          # Write summary
          {
            echo "## 🧪 Production Smoke Test Results"
            echo ""
            echo "| Test | Status | Result |"
            echo "|------|--------|--------|"
            echo -e "$RESULTS"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAIL" -ne 0 ]; then
            echo "❌ Production smoke tests FAILED"
            exit 1
          fi
          echo "✅ All production smoke tests passed"

      - name: Performance Baseline
        run: |
          echo "⚡ Running performance baseline check..."
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚡ Performance Baseline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Avg (s) | P95 (s) | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|---------|--------|" >> $GITHUB_STEP_SUMMARY

          THRESHOLD=2.0
          FAIL=0

          for ENDPOINT in "/health" "/" "/api/v1/shared-game-catalog/games?limit=1"; do
            TIMES=""
            for i in {1..5}; do
              T=$(curl -sf -o /dev/null -w "%{time_total}" "https://meepleai.com$ENDPOINT" 2>/dev/null || echo "9.999")
              TIMES="$TIMES $T"
            done

            AVG=$(echo $TIMES | tr ' ' '\n' | awk '{sum+=$1} END {printf "%.3f", sum/NR}')
            P95=$(echo $TIMES | tr ' ' '\n' | sort -n | tail -1)

            if (( $(echo "$P95 > $THRESHOLD" | bc -l 2>/dev/null || echo 0) )); then
              STATUS="⚠️ Slow"
              FAIL=1
            else
              STATUS="✅ OK"
            fi

            echo "$ENDPOINT: avg=${AVG}s p95=${P95}s $STATUS"
            echo "| \`$ENDPOINT\` | $AVG | $P95 | $STATUS |" >> $GITHUB_STEP_SUMMARY
          done

          if [ "$FAIL" = "1" ]; then
            echo "::warning::Some endpoints exceeded the ${THRESHOLD}s P95 threshold"
          else
            echo "✅ All endpoints within threshold"
          fi

  # Auto-rollback on deploy or validation failure
  rollback:
    name: Auto-Rollback
    runs-on: ubuntu-latest
    needs: [build, deploy, validate]
    if: failure() && vars.DEPLOY_METHOD == 'ssh'
    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e
            cd /opt/meepleai

            echo "🔄 Auto-rollback triggered — finding previous working version..."

            PREV_API=""
            PREV_WEB=""

            # Strategy 1: Read from DEPLOYMENT.json (written by successful deploys)
            if [ -f /opt/meepleai/DEPLOYMENT.json ]; then
              PREV_API=$(jq -r '.api_image // empty' /opt/meepleai/DEPLOYMENT.json 2>/dev/null || true)
              PREV_WEB=$(jq -r '.web_image // empty' /opt/meepleai/DEPLOYMENT.json 2>/dev/null || true)
              if [ -n "$PREV_API" ] && [ -n "$PREV_WEB" ]; then
                echo "📋 Found previous version from DEPLOYMENT.json"
              fi
            fi

            # Strategy 2: Fallback to GHCR image history
            if [ -z "$PREV_API" ] || [ -z "$PREV_WEB" ]; then
              echo "⚠️ DEPLOYMENT.json not available, searching local images..."
              PREV_API=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E 'api:(v|prod)' | head -2 | tail -1)
              PREV_WEB=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E 'web:(v|prod)' | head -2 | tail -1)
            fi

            # Strategy 3: Last resort — use the *-latest tags
            if [ -z "$PREV_API" ] || [ -z "$PREV_WEB" ]; then
              echo "⚠️ No versioned images found, trying latest tags..."
              PREV_API=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep 'api:' | grep -v 'staging' | head -1)
              PREV_WEB=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep 'web:' | grep -v 'staging' | head -1)
            fi

            if [ -z "$PREV_API" ] || [ -z "$PREV_WEB" ]; then
              echo "❌ CRITICAL: Cannot find ANY previous images for rollback!"
              echo "Manual intervention required."
              exit 1
            fi

            echo "Rolling back to: API=$PREV_API, WEB=$PREV_WEB"

            export API_IMAGE="$PREV_API"
            export WEB_IMAGE="$PREV_WEB"

            # Rollback containers
            docker compose -f compose.prod.yml up -d --no-deps api web

            # Verify rollback
            for i in {1..12}; do
              if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "✅ Rollback successful — services healthy"
                exit 0
              fi
              echo "⏳ Waiting for rollback health... ($i/12)"
              sleep 5
            done

            echo "❌ CRITICAL: Rollback health check failed!"
            exit 1

      - name: Rollback Summary
        if: always()
        run: |
          echo "## 🔄 Auto-Rollback Executed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy or validation failed — previous version restored." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Failed version:** \`${{ needs.build.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** Deploy/validation failure" >> $GITHUB_STEP_SUMMARY

  # Notifications
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build, deploy, validate]
    if: always()
    steps:
      - name: Slack Notification
        if: vars.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.validate.result }}
          fields: repo,message,commit,author,workflow
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && needs.validate.result == 'success'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: Release ${{ needs.build.outputs.version }}
          generate_release_notes: true
          body: |
            ## 🚀 Production Release

            **Version:** ${{ needs.build.outputs.version }}
            **Deployed at:** ${{ github.event.head_commit.timestamp }}

            ### Docker Images
            - API: `${{ needs.build.outputs.api_image }}`
            - Web: `${{ needs.build.outputs.web_image }}`
          draft: false
          prerelease: false

      - name: Summary
        run: |
          echo "## 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ needs.build.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API Image | \`${{ needs.build.outputs.api_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Web Image | \`${{ needs.build.outputs.web_image }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | production |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://meepleai.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
