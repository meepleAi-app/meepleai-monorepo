# Environment-neutral base compose file
# Ports, env_file, environment, and labels come from per-environment overrides
# (e.g. compose.dev.yml, compose.staging.yml, compose.prod.yml)
name: meepleai

services:
  # ---------------------------------------------------------------------------
  # Core services (no profile — always started)
  # ---------------------------------------------------------------------------

  postgres:
    image: pgvector/pgvector:pg16
    container_name: meepleai-postgres
    restart: unless-stopped
    env_file: [./secrets/database.secret]  # fallback; overrides replace this
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - meepleai
    shm_size: 1g
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7.4.1-alpine3.20
    container_name: meepleai-redis
    restart: unless-stopped
    env_file: [./secrets/redis.secret]  # fallback; overrides replace this
    command: ["sh", "-c", "redis-server /etc/redis/redis.conf --requirepass $$REDIS_PASSWORD"]
    volumes:
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  api:
    build:
      context: ../apps/api
      dockerfile: ./src/Api/Dockerfile
    container_name: meepleai-api
    restart: unless-stopped
    volumes:
      - ./scripts/load-secrets-env.sh:/scripts/load-secrets-env.sh:ro
      - pdf_uploads:/app/pdf_uploads
      - ./secrets:/app/infra/secrets:ro
    entrypoint: ["/scripts/load-secrets-env.sh"]
    command: ["dotnet", "Api.dll"]
    environment:
      SEQ_URL: "http://seq:5341"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  web:
    build:
      context: ../apps/web
      dockerfile: ./Dockerfile
    container_name: meepleai-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ---------------------------------------------------------------------------
  # AI services (profile: ai)
  # ---------------------------------------------------------------------------

  ollama:
    image: ollama/ollama:0.5.4
    container_name: meepleai-ollama
    restart: unless-stopped
    profiles: [ai]
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

  ollama-pull:
    image: curlimages/curl:8.12.1
    container_name: ollama-pull
    profiles: [ai]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    command: >
      sh -c '
        echo "Pulling nomic-embed-text model..." &&
        curl -X POST http://ollama:11434/api/pull -d "{\"name\":\"nomic-embed-text\"}" &&
        echo "Model pull initiated!"
      '
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  embedding-service:
    build:
      context: ../apps/embedding-service
      dockerfile: ./Dockerfile
    container_name: meepleai-embedding
    restart: unless-stopped
    profiles: [ai]
    environment:
      # Model selection: e5-large (quality), e5-base (2x faster), e5-small (4x faster)
      # Model: e5-base (768d, 3.7x faster than e5-large on ARM64)
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-intfloat/multilingual-e5-base}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  unstructured-service:
    build:
      context: ../apps/unstructured-service
      dockerfile: ./Dockerfile
    container_name: meepleai-unstructured
    restart: unless-stopped
    profiles: [ai]
    volumes:
      - unstructured_temp:/tmp/pdf-extraction
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  smoldocling-service:
    build:
      context: ../apps/smoldocling-service
      dockerfile: ./Dockerfile
    container_name: meepleai-smoldocling
    restart: unless-stopped
    profiles: [ai]
    volumes:
      - smoldocling_temp:/tmp/pdf-processing
      - smoldocling_models:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  reranker-service:
    build:
      context: ../apps/reranker-service
      dockerfile: ./Dockerfile
    container_name: meepleai-reranker
    restart: unless-stopped
    profiles: [ai]
    volumes:
      - reranker_models:/home/reranker/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  orchestration-service:
    build:
      context: ../apps/orchestration-service
      dockerfile: ./Dockerfile
    container_name: meepleai-orchestrator
    restart: unless-stopped
    profiles: [ai]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - meepleai
    depends_on:
      embedding-service:
        condition: service_started
      reranker-service:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # ---------------------------------------------------------------------------
  # Monitoring services (profile: monitoring)
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v3.7.0
    container_name: meepleai-prometheus
    restart: unless-stopped
    profiles: [monitoring]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=5GB'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  grafana:
    image: grafana/grafana:11.4.0
    container_name: meepleai-grafana
    restart: unless-stopped
    profiles: [monitoring]
    entrypoint: ["/scripts/load-secrets-env.sh"]
    command: ["/run.sh"]
    volumes:
      - ./scripts/load-secrets-env.sh:/scripts/load-secrets-env.sh:ro
      - grafana_data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: meepleai-alertmanager
    restart: unless-stopped
    profiles: [monitoring]
    volumes:
      - ./scripts/load-secrets-env.sh:/scripts/load-secrets-env.sh:ro
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    entrypoint: ["/scripts/load-secrets-env.sh"]
    command:
      - '/bin/alertmanager'
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  seq:
    image: datalust/seq:2024.3
    container_name: meepleai-seq
    restart: unless-stopped
    profiles: [monitoring]
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - seq_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/api"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: meepleai-node-exporter
    restart: unless-stopped
    profiles: [monitoring]
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: meepleai-cadvisor
    restart: unless-stopped
    profiles: [monitoring]
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    security_opt:
      - no-new-privileges=true
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # docker-socket-proxy is defined in compose.traefik.yml (Linux-only, staging/prod)

  # ---------------------------------------------------------------------------
  # Automation services (profile: automation)
  # ---------------------------------------------------------------------------

  n8n:
    image: n8nio/n8n:1.114.4
    container_name: meepleai-n8n
    restart: unless-stopped
    profiles: [automation]
    volumes:
      - ./scripts/load-secrets-env.sh:/scripts/load-secrets-env.sh:ro
    entrypoint: ["/scripts/load-secrets-env.sh"]
    command: ["n8n"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  mailpit:
    image: axllent/mailpit:v1.22
    container_name: mailpit
    restart: unless-stopped
    profiles: [automation]
    volumes:
      - mailpit_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8025/api/v1/messages && nc -z localhost 1025"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M

  # ---------------------------------------------------------------------------
  # Storage services (profile: storage)
  # ---------------------------------------------------------------------------

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: meepleai-minio
    restart: unless-stopped
    profiles: [storage]
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    container_name: meepleai-minio-init
    profiles: [storage]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb myminio/meepleai-uploads --ignore-existing;
      echo 'Bucket meepleai-uploads ready';
      "
    networks:
      - meepleai

# =============================================================================
# Volumes
# =============================================================================
volumes:
  # Database & Cache
  postgres_data:

  # ML Service Model Caches
  ollama_data:
  smoldocling_models:
  reranker_models:

  # Temporary Processing Directories
  unstructured_temp:
  smoldocling_temp:

  # Application Data
  pdf_uploads:
  minio_data:

  # Observability & Monitoring
  prometheus_data:
  grafana_data:
  alertmanager_data:
  seq_data:
  mailpit_data:

# =============================================================================
# Networks
# =============================================================================
networks:
  meepleai:
    driver: bridge
    name: meepleai
