# Log Aggregation Stack - Loki + Fluent Bit
# Issue #3367: Centralized log aggregation for all services

services:
  loki:
    image: grafana/loki:3.0.0
    container_name: meepleai-loki
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - meepleai
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  fluent-bit:
    image: fluent/fluent-bit:3.0
    container_name: meepleai-fluent-bit
    volumes:
      - ./monitoring/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./monitoring/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - meepleai
    restart: unless-stopped

volumes:
  loki-data:
    driver: local

networks:
  meepleai:
    external: true
    name: meepleai
