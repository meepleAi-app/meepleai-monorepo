# Docker Compose - Staging Environment
# Extends docker-compose.yml with staging-specific configurations
# Production-like environment for pre-release testing
#
# Usage:
#   docker compose -f docker-compose.yml -f compose.staging.yml up -d
#   docker compose -f docker-compose.yml -f compose.staging.yml down
#
# Secrets: Uses env_file (.secret files) — same pattern as docker-compose.yml.

services:
  # ============================================================================
  # Core Infrastructure - Staging Configuration
  # ============================================================================

  postgres:
    restart: unless-stopped
    env_file:
      - ./secrets/database.secret
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meepleai_staging}
      POSTGRES_USER: ${POSTGRES_USER:-meepleai}
    volumes:
      - pgdata-staging:/var/lib/postgresql/data
      - ./init/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    restart: unless-stopped
    env_file:
      - ./secrets/redis.secret
    command: ["sh", "-c", "redis-server /etc/redis/redis.conf --requirepass $$REDIS_PASSWORD"]
    volumes:
      - redisdata-staging:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro

  qdrant:
    restart: unless-stopped
    env_file:
      - ./secrets/qdrant.secret
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY is required - see secrets/qdrant.secret.example}
    volumes:
      - qdrantdata-staging:/qdrant/storage

  # ============================================================================
  # Application Services - Staging Configuration
  # ============================================================================

  api:
    restart: unless-stopped
    env_file:
      - ./secrets/database.secret
      - ./secrets/jwt.secret
      - ./secrets/admin.secret
      - ./secrets/openrouter.secret
      - ./secrets/oauth.secret
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      POSTGRES_USER: ${POSTGRES_USER:-meepleai}
      POSTGRES_DB: ${POSTGRES_DB:-meepleai_staging}
      # OAuth: callback URL must match the public domain (not localhost)
      Authentication__OAuth__CallbackBaseUrl: "https://meepleai.app"
      # Frontend URL for post-OAuth redirect (not localhost)
      FrontendUrl: "https://meepleai.app"
      # HTTPS cookies for staging (Traefik terminates TLS)
      Authentication__SessionCookie__Secure: "true"
      Authentication__SessionCookie__SameSite: "Lax"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    restart: unless-stopped
    build:
      args:
        NEXT_PUBLIC_API_BASE: "https://meepleai.app"
        NEXT_PUBLIC_APP_URL: "https://meepleai.app"
        NEXT_PUBLIC_SITE_URL: "https://meepleai.app"
    environment:
      NODE_ENV: staging
      NEXT_PUBLIC_API_BASE: "https://meepleai.app"
      NEXT_PUBLIC_APP_URL: "https://meepleai.app"
      NEXT_PUBLIC_SITE_URL: "https://meepleai.app"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Observability Stack - Full Enabled for Staging
  # ============================================================================

  grafana:
    restart: unless-stopped
    env_file:
      - ./secrets/monitoring.secret
    volumes:
      - grafana-staging:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro

  prometheus:
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=60d'  # Longer retention for staging
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheus-staging:/prometheus

  alertmanager:
    restart: unless-stopped

  n8n:
    restart: unless-stopped

# ============================================================================
# Staging-specific Volumes
# ============================================================================
volumes:
  pgdata-staging:
    name: meepleai-pgdata-staging
  qdrantdata-staging:
    name: meepleai-qdrantdata-staging
  redisdata-staging:
    name: meepleai-redisdata-staging
  prometheus-staging:
    name: meepleai-prometheus-staging
  grafana-staging:
    name: meepleai-grafana-staging
