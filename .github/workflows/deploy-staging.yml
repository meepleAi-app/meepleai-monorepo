name: Deploy to Staging

# Spec R2 — Deploy quality gate (Sprint 2b, 2026-04-09):
# This workflow no longer fires on direct push to main-staging. It is now
# gated on a successful CI run on main-staging via workflow_run, which
# closes the feedback loop "main-staging green CI → deploy" as a structural
# invariant rather than a developer responsibility.
#
# Triggers:
#   1. workflow_run: fires after CI completes on main-staging IF AND ONLY
#      IF conclusion == 'success' (enforced at job level via `gate` job)
#   2. workflow_dispatch: manual escape hatch (emergency deploy, retry, etc.)
#
# IMPORTANT: under workflow_run, GitHub executes this workflow in the
# DEFAULT BRANCH context. `github.sha`, `github.ref`, and `github.head_ref`
# all point to the default branch, NOT the commit that triggered CI. To
# get the actual deploy SHA we use `github.event.workflow_run.head_sha`
# (with fallback to github.sha for workflow_dispatch). This is exposed as
# the env vars DEPLOY_SHA and DEPLOY_BRANCH below — every checkout and
# every reference to "the commit being deployed" must route through them.
#
# Migration note: the previous `on: push: branches: [main-staging]` trigger
# was removed in favor of workflow_run. To rollback, restore the push block
# and revert the env-var routing.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main-staging]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency deploy only)'
        required: false
        default: 'false'
        type: boolean
      force_full_deploy:
        description: 'Force rebuild and deploy of both API and Web'
        required: false
        default: 'false'
        type: boolean
      perf_regression_mode:
        description: 'Performance regression behavior (warn|fail)'
        required: false
        default: 'warn'
        type: choice
        options:
          - warn
          - fail

# Only one staging deployment at a time
concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write  # For OIDC auth to cloud providers

  actions: read
env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web
  ENVIRONMENT: staging
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Spec R2 — Deploy SHA/branch routing
  # Under workflow_run trigger, github.sha and github.ref point to the
  # default branch, NOT the commit that triggered CI. Use the workflow_run
  # context to recover the actual deploy SHA, with a fallback to github.sha
  # for workflow_dispatch and any future trigger that doesn't expose
  # workflow_run context. Every checkout `ref:` and every shell reference
  # to the deploy SHA must use these env vars instead of github.sha.
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
  DEPLOY_BRANCH: ${{ github.event.workflow_run.head_branch || github.head_ref || github.ref_name }}

jobs:
  # Spec R2 — Deploy quality gate
  # All deployment jobs depend on this gate. The gate passes only if:
  #   - The workflow was triggered manually (workflow_dispatch escape hatch), OR
  #   - The workflow was triggered by a successful CI run on main-staging
  #
  # When ci.yml on main-staging fails, this gate stays in `skipped` state
  # and no downstream jobs run. The result: zero deploy attempts on red CI.
  gate:
    name: CI Quality Gate
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch'
      || (
        github.event_name == 'workflow_run'
        && github.event.workflow_run.conclusion == 'success'
        && github.event.workflow_run.head_branch == 'main-staging'
      )
    steps:
      - name: Confirm gate inputs
        run: |
          echo "Trigger:           ${{ github.event_name }}"
          echo "Source CI status:  ${{ github.event.workflow_run.conclusion || 'n/a (manual)' }}"
          echo "Source CI branch:  ${{ github.event.workflow_run.head_branch || 'n/a (manual)' }}"
          echo "Source CI run id:  ${{ github.event.workflow_run.id || 'n/a (manual)' }}"
          echo "Deploy SHA:        ${{ env.DEPLOY_SHA }}"
          echo "Deploy branch:     ${{ env.DEPLOY_BRANCH }}"
          echo "Gate passed - proceeding with deployment pipeline"
  notify-start:
    needs: gate
    uses: ./.github/workflows/notify-slack.yml
    with:
      event: started
      workflow_name: "Deploy to Staging"
      environment: staging
      branch: ${{ github.event.workflow_run.head_branch || github.head_ref || github.ref_name }}
      actor: ${{ github.actor }}
      commit_sha: ${{ github.event.workflow_run.head_sha || github.sha }}
      commit_message: ${{ github.event.workflow_run.head_commit.message || github.event.head_commit.message || 'Manual trigger' }}
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      job_list: '["detect-changes", "pre-deploy-check", "build", "migrate-db", "snapshot-baseline", "deploy", "validate", "e2e-staging"]'
      caller_workflow_id: ${{ github.workflow_id }}
    secrets:
      SLACK_GITNOTIFY_WEBHOOK_URL: ${{ secrets.SLACK_GITNOTIFY_WEBHOOK_URL }}

  # Detect which components changed
  detect-changes:
    name: Detect Changes
    needs: gate
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    outputs:
      api: ${{ steps.changes.outputs.api }}
      web: ${{ steps.changes.outputs.web }}
      infra: ${{ steps.changes.outputs.infra }}
      deploy_api: ${{ steps.decision.outputs.deploy_api }}
      deploy_web: ${{ steps.decision.outputs.deploy_web }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.DEPLOY_SHA }}  # Spec R2: pin to actual deploy SHA, not default branch
          fetch-depth: 0  # Full history needed to compare against github.event.before on merge commits
          # sparse-checkout excludes data/ (1.3GB PDFs) — runner disk is limited
          # PDFs are managed via S3 blob storage, not git
          sparse-checkout: |
            apps/
            infra/
            .github/
            tests/
            scripts/
            packages/
          sparse-checkout-cone-mode: true

      # IMPORTANT: explicitly set `base` to github.event.before for push events.
      # Without this, paths-filter falls back to comparing the current branch
      # against the repository's default branch (main-dev), which on a
      # main-dev → main-staging release shows only the files that diverged
      # between branches — NOT the files brought in by the merge. This caused
      # release PR #308 to build a web-only image and silently miss API manifest
      # changes (apps/api/**/*.yml → SeedManifestGame entries for 159 games).
      # See paths-filter README "push events" section.
      #
      # Only runs on push events. For workflow_dispatch the decision step
      # below forces a full deploy regardless, so this step would be a no-op.
      - uses: dorny/paths-filter@v4
        id: changes
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        with:
          base: ${{ github.event.before }}
          filters: |
            api:
              - 'apps/api/**'
            web:
              - 'apps/web/**'
            infra:
              - 'infra/**'
              - '.github/workflows/deploy-staging.yml'

      - name: Determine what to deploy
        id: decision
        run: |
          FORCE="${{ inputs.force_full_deploy }}"
          EVENT="${{ github.event_name }}"
          BEFORE="${{ github.event.before }}"
          API="${{ steps.changes.outputs.api }}"
          WEB="${{ steps.changes.outputs.web }}"
          INFRA="${{ steps.changes.outputs.infra }}"

          # Force full deploy on:
          # - Manual workflow_dispatch (operator intent is always "deploy now")
          # - Explicit force_full_deploy=true input
          # - Infra config changes
          # - Initial push to branch (before=zeros, paths-filter can't diff)
          ZEROS="0000000000000000000000000000000000000000"
          if [ "$EVENT" = "workflow_dispatch" ] \
            || [ "$FORCE" = "true" ] \
            || [ "$INFRA" = "true" ] \
            || [ "$BEFORE" = "$ZEROS" ] \
            || [ -z "$BEFORE" ]; then
            echo "deploy_api=true" >> $GITHUB_OUTPUT
            echo "deploy_web=true" >> $GITHUB_OUTPUT
            echo "📦 Full deploy: event=$EVENT force=$FORCE infra=$INFRA before=$BEFORE"
          else
            echo "deploy_api=$API" >> $GITHUB_OUTPUT
            echo "deploy_web=$WEB" >> $GITHUB_OUTPUT
            echo "📦 Selective deploy: api=$API, web=$WEB"
          fi

  # Lightweight pre-deploy validation (full CI already ran on main-dev PR)
  # Rationale: Code reaching main-staging has already passed the full ci.yml
  # suite during the PR to main-dev. Re-running 13K+ tests wastes ~15 min
  # and 3 service containers. Instead, verify builds compile and the commit
  # was previously tested.
  pre-deploy-check:
    name: Pre-deploy Validation
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    # Spec R2: workflow_run trigger always runs pre-deploy-check (it can't
    # set skip_tests). workflow_dispatch respects the skip_tests input.
    # Legacy push branch retained for safety in case the trigger reverts.
    if: github.event_name == 'push' || github.event_name == 'workflow_run' || inputs.skip_tests != true
    needs: [detect-changes]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.DEPLOY_SHA }}  # Spec R2: pin to actual deploy SHA
          # sparse-checkout excludes data/ (1.3GB PDFs) — runner disk is limited
          sparse-checkout: |
            apps/
            .github/
          sparse-checkout-cone-mode: true

      - name: Verify CI passed on this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Checking if CI already passed for commit ${{ env.DEPLOY_SHA }}..."

          # Check for successful CI runs on this commit (from main-dev PR
          # or the gating workflow_run event that triggered this deploy).
          # Under workflow_run trigger, env.DEPLOY_SHA == workflow_run.head_sha,
          # so this query targets the actual commit being deployed (NOT the
          # default branch HEAD that github.sha would resolve to).
          CI_STATUS=$(gh api repos/${{ github.repository }}/commits/${{ env.DEPLOY_SHA }}/check-runs \
            --jq '[.check_runs[] | select(.name | test("CI Success|Backend|Frontend")) | select(.conclusion=="success")] | length' \
            2>/dev/null || echo "0")

          if [ "$CI_STATUS" -gt 0 ]; then
            echo "✅ Found $CI_STATUS successful CI checks on this commit"
          else
            echo "⚠️ No prior CI checks found — will run build validation"
          fi

      - name: Setup .NET
        if: needs.detect-changes.outputs.deploy_api == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Backend build check
        if: needs.detect-changes.outputs.deploy_api == 'true'
        run: |
          echo "🔨 Verifying backend compiles..."
          cd apps/api/src/Api
          dotnet restore --verbosity quiet
          dotnet build --no-restore --configuration Release --verbosity quiet
          echo "✅ Backend builds successfully"

      - name: Setup Frontend
        if: needs.detect-changes.outputs.deploy_web == 'true'
        uses: ./.github/actions/setup-frontend
        with:
          working-directory: apps/web
          frozen-lockfile: 'true'

      - name: Frontend build check
        if: needs.detect-changes.outputs.deploy_web == 'true'
        run: |
          echo "🔨 Verifying frontend compiles..."
          cd apps/web
          pnpm build
          echo "✅ Frontend builds successfully"
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8080
          NODE_OPTIONS: '--max-old-space-size=4096'

  # Build and push Docker images (only changed components)
  build:
    name: Build Images
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 90
    needs: [pre-deploy-check, detect-changes]
    if: always() && (needs.pre-deploy-check.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.skip_tests == true)) && (needs.detect-changes.outputs.deploy_api == 'true' || needs.detect-changes.outputs.deploy_web == 'true')
    outputs:
      api_image: ${{ steps.api-tag.outputs.tag }}
      web_image: ${{ steps.web-tag.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      api_built: ${{ needs.detect-changes.outputs.deploy_api }}
      web_built: ${{ needs.detect-changes.outputs.deploy_web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.DEPLOY_SHA }}  # Spec R2: pin to actual deploy SHA
          # sparse-checkout excludes data/ (1.3GB PDFs) — runner disk is limited
          sparse-checkout: |
            apps/
            .github/
          sparse-checkout-cone-mode: true

      - name: Generate Version
        id: version
        run: |
          VERSION="staging-$(date +'%Y%m%d')-${GITHUB_SHA::7}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Free disk space for build
        run: |
          echo "📊 Disk before cleanup: $(df -h / | tail -1 | awk '{print $4}') free"
          # Remove orphaned buildx builders (each can hold 5-7GB of state)
          for b in $(docker buildx ls --format '{{.Name}}' 2>/dev/null | grep -v default | grep -v '^$'); do
            docker buildx rm "$b" 2>/dev/null || true
          done
          docker builder prune -f 2>/dev/null || true
          docker image prune -a -f --filter 'until=24h' 2>/dev/null || true
          echo "📊 Disk after cleanup: $(df -h / | tail -1 | awk '{print $4}') free"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Setup QEMU for ARM64 cross-compilation
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract API Metadata
        if: needs.detect-changes.outputs.deploy_api == 'true'
        id: meta-api
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=staging-latest

      - name: Extract Web Metadata
        if: needs.detect-changes.outputs.deploy_web == 'true'
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=staging-latest

      - name: Extract single API tag
        if: needs.detect-changes.outputs.deploy_api == 'true'
        id: api-tag
        run: echo "tag=$(echo '${{ steps.meta-api.outputs.tags }}' | head -1)" >> $GITHUB_OUTPUT

      - name: Extract single Web tag
        if: needs.detect-changes.outputs.deploy_web == 'true'
        id: web-tag
        run: echo "tag=$(echo '${{ steps.meta-web.outputs.tags }}' | head -1)" >> $GITHUB_OUTPUT

      - name: Build and Push API Image
        if: needs.detect-changes.outputs.deploy_api == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/src/Api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Note: No environment build-args. ASPNETCORE_ENVIRONMENT is injected
          # at runtime via compose.staging.yml. Images are environment-agnostic
          # to support build-once-promote pattern (Issue #179).

      - name: Build and Push Web Image
        if: needs.detect-changes.outputs.deploy_web == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Note: No environment build-args. NODE_ENV is set in Dockerfile,
          # NEXT_PUBLIC_ENV has no ARG in Dockerfile (was silently ignored).
          # Environment config is injected at runtime via compose files.

      - name: Build Summary
        run: |
          echo "📦 Build summary:"
          echo "  API built: ${{ needs.detect-changes.outputs.deploy_api }}"
          echo "  Web built: ${{ needs.detect-changes.outputs.deploy_web }}"

  # Run database migrations BEFORE deploying new code
  #
  # Strategy (fix for historical bug where this job only did `docker pull`):
  #   1. Generate an idempotent SQL migration script via `dotnet ef migrations script --idempotent`
  #   2. SCP the SQL to the staging server
  #   3. Create a pre-migration DB backup (pg_dump | gzip) for rollback safety
  #   4. Apply the SQL via `docker exec postgres psql -v ON_ERROR_STOP=1 -f ...`
  #   5. Verify __EFMigrationsHistory reflects the latest migration
  #   6. Pull new API image (for the downstream deploy job)
  #
  # Idempotent SQL means every migration is wrapped in `IF NOT EXISTS` against
  # `__EFMigrationsHistory`, so re-running is a no-op if no new migrations.
  # If psql fails mid-stream, ON_ERROR_STOP=1 aborts the whole script and the
  # backup created in step 3 can be restored with `pg_restore`.
  migrate-db:
    name: Database Migration
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    needs: [build]
    if: vars.DEPLOY_METHOD == 'ssh'
    steps:
      - name: Checkout source at deploy SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install dotnet-ef tool
        # Idempotent: use pre-installed tool if present (self-hosted runner may
        # already have dotnet-ef from a newer SDK). `dotnet tool install` does
        # not support downgrades, so skipping install when a compatible version
        # exists avoids exit 1 on runners with ef 10.x already global.
        run: |
          if dotnet tool list --global | awk '{print $1}' | grep -qx 'dotnet-ef'; then
            echo "dotnet-ef already installed globally — using existing version:"
            dotnet tool list --global | grep '^dotnet-ef'
          else
            dotnet tool install --global dotnet-ef --version 9.*
          fi

      - name: Restore and build API project
        working-directory: apps/api/src/Api
        run: |
          dotnet restore
          dotnet build --no-restore -c Release

      - name: Generate idempotent migration SQL
        working-directory: apps/api/src/Api
        run: |
          # Note: no --no-build — dotnet-ef needs the project built. We built
          # it in the previous step but ef defaults to Debug configuration,
          # so we let it trigger its own build without the flag to avoid
          # Release/Debug path mismatches.
          dotnet ef migrations script --idempotent -o /tmp/migrations.sql
          lines=$(wc -l < /tmp/migrations.sql)
          echo "✅ Generated ${lines} lines of SQL at /tmp/migrations.sql"
          if [ "$lines" -lt 10 ]; then
            echo "❌ SQL output suspiciously small (< 10 lines). Aborting."
            exit 1
          fi

      - name: Apply migrations on staging
        env:
          SSH_HOST: ${{ secrets.STAGING_HOST }}
          SSH_USER: ${{ secrets.STAGING_USER }}
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          API_IMAGE: ${{ needs.build.outputs.api_image }}
        run: |
          set -euo pipefail

          # Setup SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH_CMD="ssh -i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST"
          SCP_CMD="scp -i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=no"

          # Step 1 — pre-migration backup with integrity check.
          # pipefail is active in the inner shell so a pg_dump failure stops
          # the chain; gzip -t then verifies the gz is a complete, valid
          # archive before we consider the backup usable. If any part fails
          # we delete the partial file so an operator can't accidentally
          # restore from a truncated dump later.
          BACKUP_NAME="pre-migration-$(date -u +%Y%m%dT%H%M%SZ).sql.gz"
          echo "📦 Creating pre-migration backup: ${BACKUP_NAME}"
          $SSH_CMD "set -o pipefail; docker exec meepleai-postgres pg_dump -U meepleai -d meepleai_staging --no-owner --no-acl | gzip > /tmp/${BACKUP_NAME} && gzip -t /tmp/${BACKUP_NAME} && ls -lh /tmp/${BACKUP_NAME} || { echo '❌ backup failed — removing partial file'; rm -f /tmp/${BACKUP_NAME}; exit 1; }"

          # Step 2 — upload idempotent SQL to server
          echo "📤 Uploading migrations.sql to server..."
          $SCP_CMD /tmp/migrations.sql "$SSH_USER@$SSH_HOST:/tmp/migrations.sql"

          # Step 3 — apply SQL inside postgres container with ON_ERROR_STOP=1.
          # Use a heredoc to ship a small remote script. psql's exit code is
          # captured directly into `rc` on the next line; the `tail` (log
          # output) and cleanup run unconditionally after, and their own
          # exit codes never mask psql's result. Final `exit $rc` propagates
          # the real psql outcome back through SSH to the runner.
          echo "🔧 Applying migrations via psql..."
          ssh -i "$HOME/.ssh/deploy_key" -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" bash <<'REMOTE_APPLY'
          set -u
          docker cp /tmp/migrations.sql meepleai-postgres:/tmp/migrations.sql
          docker exec meepleai-postgres psql -U meepleai -d meepleai_staging -v ON_ERROR_STOP=1 -f /tmp/migrations.sql > /tmp/migrations.log 2>&1
          rc=$?
          echo "--- psql log (tail -20) ---"
          tail -20 /tmp/migrations.log 2>/dev/null || true
          echo "--- end log ---"
          docker exec meepleai-postgres rm -f /tmp/migrations.sql /tmp/migrations.log 2>/dev/null || true
          rm -f /tmp/migrations.sql /tmp/migrations.log
          exit $rc
          REMOTE_APPLY

          # Step 4 — verify migration history
          echo "🔍 Verifying applied migrations..."
          $SSH_CMD "docker exec meepleai-postgres psql -U meepleai -d meepleai_staging -c 'SELECT \"MigrationId\" FROM \"__EFMigrationsHistory\" ORDER BY \"MigrationId\" DESC LIMIT 5;'"

          # Step 5 — pull new API image for downstream deploy job
          echo "📥 Pulling new API image..."
          $SSH_CMD "docker pull $API_IMAGE && echo '✅ API image pulled'"

          # Cleanup SSH key
          rm -f ~/.ssh/deploy_key

  # Snapshot previous performance baseline before deploy overwrites DEPLOYMENT.json
  snapshot-baseline:
    name: Snapshot Performance Baseline
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    needs: [build]
    outputs:
      previous_baseline: ${{ steps.read-baseline.outputs.baseline }}
    steps:
      - name: Read previous DEPLOYMENT.json performance metrics
        id: read-baseline
        env:
          SSH_HOST: ${{ secrets.STAGING_HOST }}
          SSH_USER: ${{ secrets.STAGING_USER }}
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          # Setup SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Read performance field from DEPLOYMENT.json on server
          BASELINE=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST" \
            'DEPLOY_FILE="/opt/meepleai/repo/infra/DEPLOYMENT.json";
             if [ -f "$DEPLOY_FILE" ]; then
               jq -c ".performance // empty" "$DEPLOY_FILE" 2>/dev/null || echo ""
             else
               echo ""
             fi') || true

          # Clean up SSH key
          rm -f ~/.ssh/deploy_key

          if [ -n "$BASELINE" ] && [ "$BASELINE" != "null" ] && [ "$BASELINE" != '""' ]; then
            echo "📊 Previous baseline found: $BASELINE"
            echo "baseline=$BASELINE" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ No previous performance baseline (first deploy or missing)"
            echo "baseline=" >> $GITHUB_OUTPUT
          fi

  # Deploy to staging server (only changed services)
  deploy:
    name: Deploy to Staging
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 15
    needs: [build, migrate-db, snapshot-baseline]
    if: always() && needs.build.result == 'success' && (needs.migrate-db.result == 'success' || needs.migrate-db.result == 'skipped') && (needs.snapshot-baseline.result == 'success' || needs.snapshot-baseline.result == 'skipped')
    environment:
      name: staging
      url: https://meepleai.app
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.DEPLOY_SHA }}  # Spec R2: pin to actual deploy SHA
          # sparse-checkout excludes data/ (1.3GB PDFs) — runner disk is limited
          sparse-checkout: |
            infra/
            .github/
          sparse-checkout-cone-mode: true

      # Option 1: SSH Deploy (VPS/Dedicated Server)
      - name: Deploy via SSH
        if: vars.DEPLOY_METHOD == 'ssh'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/meepleai/repo/infra

            # Load secrets for docker compose
            set -a
            for f in secrets/*.secret; do source "$f" 2>/dev/null; done
            set +a

            SERVICES=""

            # Pull and tag only changed images
            if [ "${{ needs.build.outputs.api_built }}" = "true" ]; then
              docker pull ${{ needs.build.outputs.api_image }}
              export API_IMAGE="${{ needs.build.outputs.api_image }}"
              SERVICES="$SERVICES api"
              echo "📦 API image updated"
            fi

            if [ "${{ needs.build.outputs.web_built }}" = "true" ]; then
              docker pull ${{ needs.build.outputs.web_image }}
              export WEB_IMAGE="${{ needs.build.outputs.web_image }}"
              SERVICES="$SERVICES web"
              echo "📦 Web image updated"
            fi

            if [ -z "$SERVICES" ]; then
              echo "⏭️ No services to deploy"
              exit 0
            fi

            echo "🚀 Deploying services:$SERVICES"

            # Force-remove orphaned containers by name before deploy.
            # 'docker compose rm' only removes containers it owns; containers from
            # interrupted/cancelled deploys may belong to a different compose invocation
            # and cause "name already in use" conflicts. 'docker rm -f' removes by name
            # regardless of project ownership.
            for svc in $SERVICES; do
              docker rm -f "meepleai-${svc}" 2>/dev/null && echo "🗑️ Removed orphaned meepleai-${svc}" || true
            done

            # Deploy only changed services (--force-recreate ensures container restarts even if image digest unchanged)
            docker compose -f docker-compose.yml -f compose.staging.yml -f compose.traefik.yml \
              --profile minimal up -d --no-deps --force-recreate $SERVICES

            # Health check via docker exec (port not exposed on host)
            echo "⏳ Waiting for API health..."
            for attempt in $(seq 1 20); do
              if docker exec meepleai-api curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "✅ API healthy after ~$((attempt*3))s"
                break
              fi
              sleep 3
            done
            docker exec meepleai-api curl -sf http://localhost:8080/health | python3 -c "
            import sys,json
            d=json.load(sys.stdin)
            healthy = [c['name'] for c in d['checks'] if c['status']=='Healthy']
            print(f'Healthy services: {len(healthy)}')
            assert any(c['name']=='postgres' and c['status']=='Healthy' for c in d['checks']), 'postgres unhealthy'
            assert any(c['name']=='redis' and c['status']=='Healthy' for c in d['checks']), 'redis unhealthy'
            " || exit 1

            # Record deployment version
            cat > /opt/meepleai/repo/infra/DEPLOYMENT.json << VEREOF
            {
              "version": "${{ needs.build.outputs.version }}",
              "api_image": "${{ needs.build.outputs.api_image }}",
              "web_image": "${{ needs.build.outputs.web_image }}",
              "environment": "staging",
              "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "deployed_by": "${{ github.actor }}",
              "commit": "${{ env.DEPLOY_SHA }}",
              "workflow_run": "${{ github.run_id }}"
            }
            VEREOF
            echo "📋 Version recorded: ${{ needs.build.outputs.version }}"

            # Cleanup old images
            docker image prune -f

  # Post-deploy validation
  validate:
    name: Post-deploy Validation
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    needs: [deploy, snapshot-baseline]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.DEPLOY_SHA }}  # Spec R2: pin to actual deploy SHA
          # sparse-checkout excludes data/ (1.3GB PDFs) — runner disk is limited
          sparse-checkout: |
            tests/
            apps/web/
            .github/
          sparse-checkout-cone-mode: true

      - name: Deep Health Check
        run: |
          echo "🔍 Running deep health checks..."

          # Wait for API with structured health response
          HEALTH=""
          for i in {1..30}; do
            HEALTH=$(curl -sf https://api.meepleai.app/health 2>/dev/null || true)
            if [ -n "$HEALTH" ]; then
              echo "📋 Health response received"
              break
            fi
            echo "⏳ Waiting for API... ($i/30)"
            sleep 10
          done

          if [ -z "$HEALTH" ]; then
            echo "❌ API did not respond within 5 minutes"
            exit 1
          fi

          echo "$HEALTH" | jq . 2>/dev/null || echo "$HEALTH"

          # Verify critical services from health response
          FAIL=0
          for SERVICE in postgres redis; do
            STATUS=$(echo "$HEALTH" | jq -r ".checks[] | select(.name==\"$SERVICE\") | .status" 2>/dev/null || true)
            if [ "$STATUS" = "Healthy" ]; then
              echo "✅ $SERVICE: Healthy"
            elif [ -z "$STATUS" ]; then
              echo "⚠️ $SERVICE: not reported in health response (skipping)"
            else
              echo "❌ $SERVICE is $STATUS (expected Healthy)"
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo "❌ Critical services unhealthy"
            exit 1
          fi
          echo "✅ All critical services healthy"

      - name: Web Health Check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://meepleai.app)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Web returned status $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Web healthy (HTTP $HTTP_STATUS)"

      - name: Smoke Tests
        run: |
          echo "🧪 Running staging smoke tests..."
          FAIL=0
          RESULTS=""

          smoke_test() {
            local name="$1" url="$2" expect="$3"
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null || echo "000")
            if echo "$expect" | grep -q "$status"; then
              echo "  ✅ $name: HTTP $status"
              RESULTS="${RESULTS}| $name | $status | ✅ |\n"
            else
              echo "  ❌ $name: HTTP $status (expected $expect)"
              RESULTS="${RESULTS}| $name | $status | ❌ |\n"
              FAIL=1
            fi
          }

          # Critical smoke tests (failure = deployment issue)
          smoke_test "API Health" "https://meepleai.app/health" "200"
          smoke_test "Web Root" "https://meepleai.app" "200"
          smoke_test "API Game Catalog" "https://meepleai.app/api/v1/shared-games?pageNumber=1&pageSize=1" "200"
          smoke_test "API Direct Health" "https://api.meepleai.app/health" "200"

          # Health endpoint JSON validation
          echo "  Validating health response structure..."
          HEALTH_JSON=$(curl -sf --max-time 10 https://meepleai.app/health 2>/dev/null || true)
          if [ -n "$HEALTH_JSON" ] && echo "$HEALTH_JSON" | jq -e '.status' > /dev/null 2>&1; then
            echo "  ✅ Health JSON: valid structure"
          else
            echo "  ⚠️ Health JSON: unexpected format (non-blocking)"
          fi

          # Response time check
          RT=$(curl -sf -o /dev/null -w "%{time_total}" --max-time 10 https://meepleai.app 2>/dev/null || echo "9.999")
          echo "  📊 Response time: ${RT}s"

          # Write summary to job output
          {
            echo "## 🧪 Staging Smoke Test Results"
            echo ""
            echo "| Test | Status | Result |"
            echo "|------|--------|--------|"
            echo -e "$RESULTS"
            echo ""
            echo "**Response Time**: ${RT}s"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAIL" -ne 0 ]; then
            echo ""
            echo "❌ Smoke tests FAILED"
            exit 1
          fi
          echo ""
          echo "✅ All smoke tests passed"

      - name: Install K6
        run: |
          # Install K6 (supports ARM64 and x86_64) — skip if already present (self-hosted runner)
          if command -v k6 &>/dev/null; then
            echo "K6 already installed: $(k6 version)"
          else
            ARCH=$(dpkg --print-architecture 2>/dev/null || echo "amd64")
            curl -fsSL "https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-${ARCH}.tar.gz" \
              | tar xzf - --strip-components=1 -C /usr/local/bin k6-v0.54.0-linux-${ARCH}/k6
            echo "K6 installed: $(k6 version)"
          fi

      - name: Run K6 Deploy Smoke
        run: |
          mkdir -p reports/deploy
          k6 run \
            --env BASE_URL=https://meepleai.app \
            --env SUMMARY_EXPORT_PATH=reports/deploy/deploy-smoke-summary.json \
            tests/k6/scenarios/deploy-smoke.js
        continue-on-error: true

      - name: Compare Performance Baseline
        env:
          PERF_REGRESSION_MODE: ${{ inputs.perf_regression_mode || 'warn' }}
          REGRESSION_THRESHOLD_PCT: '20'
        run: |
          # Ensure jq is available (required for JSON metric extraction)
          command -v jq &>/dev/null || sudo apt-get install -y jq

          # Write previous baseline to temp file if available
          PREV_BASELINE=""
          BASELINE_JSON='${{ needs.snapshot-baseline.outputs.previous_baseline }}'
          if [ -n "$BASELINE_JSON" ]; then
            echo "$BASELINE_JSON" > /tmp/previous-baseline.json
            PREV_BASELINE="/tmp/previous-baseline.json"
          fi

          chmod +x tests/k6/utils/deploy-baseline-compare.sh
          tests/k6/utils/deploy-baseline-compare.sh \
            reports/deploy/deploy-smoke-summary.json \
            "$PREV_BASELINE"

      - name: Read metrics for server update
        id: metrics
        if: always()
        run: |
          METRICS_FILE="reports/deploy/deploy-smoke-summary-metrics.json"
          if [ -f "$METRICS_FILE" ]; then
            # Compact JSON to single line for env var transport
            METRICS=$(jq -c '.' "$METRICS_FILE" 2>/dev/null || echo "")
            echo "json=$METRICS" >> $GITHUB_OUTPUT
            echo "📊 Metrics ready for server update"
          else
            echo "⚠️ No metrics file found, skipping server update"
            echo "json=" >> $GITHUB_OUTPUT
          fi

      - name: Update Server Baseline
        if: always() && steps.metrics.outputs.json != ''
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: PERF_METRICS
          script: |
            DEPLOY_FILE="/opt/meepleai/repo/infra/DEPLOYMENT.json"
            if [ ! -f "$DEPLOY_FILE" ]; then
              echo "⚠️ DEPLOYMENT.json not found, skipping baseline update"
              exit 0
            fi

            if command -v jq &> /dev/null; then
              jq --argjson perf "$PERF_METRICS" \
                '.performance = $perf' "$DEPLOY_FILE" > "${DEPLOY_FILE}.tmp" \
                && mv "${DEPLOY_FILE}.tmp" "$DEPLOY_FILE" \
                && echo "✅ Performance baseline updated in DEPLOYMENT.json" \
                || echo "⚠️ jq merge failed, skipping"
            else
              echo "⚠️ jq not available, skipping baseline update"
            fi
        env:
          PERF_METRICS: ${{ steps.metrics.outputs.json }}

  # Post-deploy E2E smoke tests against live staging
  e2e-staging:
    name: Staging E2E Smoke Tests
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}  # Needs browser support (not self-hosted ARM64)
    needs: [validate]
    if: needs.validate.result == 'success'
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.DEPLOY_SHA }}  # Spec R2: pin to actual deploy SHA
          # sparse-checkout excludes data/ (1.3GB PDFs) — runner disk is limited
          sparse-checkout: |
            apps/web/
            .github/
          sparse-checkout-cone-mode: true

      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Run Smoke Tests against Staging
        working-directory: apps/web
        env:
          STAGING_URL: https://meepleai.app
          CI: 'true'
        run: |
          echo "🧪 Running E2E smoke tests against staging..."
          pnpm exec playwright test e2e/smoke.spec.ts \
            --config=playwright.staging.config.ts \
            --reporter=list

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: staging-e2e-report
          path: apps/web/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  notify-end:
    if: always()
    needs: [detect-changes, pre-deploy-check, build, migrate-db, snapshot-baseline, deploy, validate, e2e-staging]
    uses: ./.github/workflows/notify-slack.yml
    with:
      event: ${{ contains(join(needs.*.result, ','), 'failure') && 'failed' || contains(join(needs.*.result, ','), 'cancelled') && 'cancelled' || 'completed' }}
      workflow_name: "Deploy to Staging"
      environment: staging
      is_critical: true
      branch: ${{ github.event.workflow_run.head_branch || github.head_ref || github.ref_name }}
      actor: ${{ github.actor }}
      commit_sha: ${{ github.event.workflow_run.head_sha || github.sha }}
      commit_message: ${{ github.event.workflow_run.head_commit.message || github.event.head_commit.message || 'Manual trigger' }}
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets:
      SLACK_GITNOTIFY_WEBHOOK_URL: ${{ secrets.SLACK_GITNOTIFY_WEBHOOK_URL }}
      SLACK_CRITICAL_WEBHOOK_URL: ${{ secrets.SLACK_CRITICAL_WEBHOOK_URL }}
