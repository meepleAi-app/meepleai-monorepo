<!doctype html>
<!--
  Schermata: SP6 Libro Game — Index (Lista manuali)
  Route: /gamebook
  Descrizione: Hero + grid manuali fotografati + quota mensile widget; punto di ingresso libro game per Sara casual GM.
  Persona: Sara, 32, casual italian gamer — apre app, vede i suoi gamebook e quota free.
-->
<html lang="it" data-theme="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MeepleAI — Libri game (SP6 · Index)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="components.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  body { background: var(--bg); }

  /* ─── Stage ─── */
  .lg-stage { padding: 56px 24px 80px; min-height: 100vh; }
  .lg-wrap { max-width: 1440px; margin: 0 auto; }

  .lg-section-label {
    font-family: var(--f-mono); font-size: var(--fs-xs);
    color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.08em; margin: var(--s-9) 0 var(--s-3);
    padding-bottom: var(--s-2); border-bottom: 1px solid var(--border);
  }
  .lg-section-label:first-of-type { margin-top: var(--s-4); }

  .lg-state-grid {
    display: grid; gap: 28px; align-items: flex-start;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
  }

  /* ─── Phone bezel ─── */
  .lg-phone {
    width: 380px; height: 780px;
    border-radius: 48px; border: 10px solid #1a1a1a;
    background: var(--bg);
    overflow: hidden; position: relative;
    box-shadow: 0 40px 80px rgba(90,60,20,.18), 0 0 0 2px #000;
    display: flex; flex-direction: column;
  }
  [data-theme="dark"] .lg-phone {
    border-color: #0a0a0a;
    box-shadow: 0 40px 80px rgba(0,0,0,.6), 0 0 0 2px #000;
  }
  .lg-phone-sbar {
    height: 32px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 22px 0; font-size: 12px; font-weight: var(--fw-bold);
    font-family: var(--f-display); color: var(--text-sec);
  }
  .lg-phone-sbar .ind { display: flex; gap: 4px; font-size: 11px; }
  .lg-phone-body {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    background: var(--bg);
  }
  .lg-phone-body::-webkit-scrollbar { display: none; }
  .lg-phone-body { scrollbar-width: none; }

  /* ─── Desktop frame ─── */
  .lg-desktop {
    width: 100%; max-width: 1280px;
    height: 820px;
    border-radius: 16px;
    border: 1px solid var(--border-strong);
    background: var(--bg);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    display: flex; flex-direction: column;
  }
  .lg-desktop-bar {
    height: 36px; flex-shrink: 0;
    background: var(--bg-muted);
    display: flex; align-items: center; gap: 8px;
    padding: 0 14px;
    border-bottom: 1px solid var(--border);
  }
  .lg-desktop-bar .traffic {
    width: 12px; height: 12px; border-radius: 50%;
  }
  .lg-desktop-bar .traffic:nth-child(1) { background: #ff5f57; }
  .lg-desktop-bar .traffic:nth-child(2) { background: #febc2e; }
  .lg-desktop-bar .traffic:nth-child(3) { background: #28c840; }
  .lg-desktop-bar .url {
    margin-left: 14px;
    font-family: var(--f-mono); font-size: 11px;
    color: var(--text-muted);
  }
  .lg-desktop-body {
    flex: 1; overflow-y: auto; overflow-x: hidden;
  }
  .lg-desktop-body::-webkit-scrollbar { width: 6px; }
  .lg-desktop-body::-webkit-scrollbar-thumb {
    background: var(--border); border-radius: 3px;
  }

  .lg-frame-caption {
    font-family: var(--f-mono); font-size: var(--fs-xs);
    color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 10px;
  }

  /* Single phone column on small screens */
  @media (max-width: 800px) {
    .lg-state-grid { grid-template-columns: 1fr; justify-items: center; }
  }

  /* ─── Tweaks panel ─── */
  #tweaks-panel {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    display: none;
    background: var(--glass-bg); backdrop-filter: blur(16px);
    border: 1px solid var(--border); border-radius: var(--r-xl);
    box-shadow: var(--shadow-lg); padding: 16px 18px; min-width: 220px;
    font-family: var(--f-display); font-size: 13px; color: var(--text);
  }
  #tweaks-panel h4 {
    font-size: 11px; font-weight: 700; margin: 0 0 12px;
    text-transform: uppercase; letter-spacing: .07em;
    color: var(--text-muted); font-family: var(--f-mono);
  }
  #tweaks-panel label {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; font-size: 12px; margin-bottom: 10px; color: var(--text-sec);
  }
  #tweaks-panel select, #tweaks-panel input[type="range"] {
    font-family: inherit; font-size: 12px; padding: 3px 6px;
    border-radius: var(--r-sm); border: 1px solid var(--border);
    background: var(--bg); color: var(--text); cursor: pointer;
  }
</style>
</head>
<body>

<nav class="hub-nav">
  <a href="00-hub.html" class="brand" style="color:inherit;text-decoration:none;">
    <span class="brand-mark">M</span><span>MeepleAI</span>
  </a>
  <span style="font-size:11px;padding:3px 8px;border-radius:6px;background:var(--bg-muted);font-family:var(--f-mono);color:var(--text-muted);">SP6 · A · Libro game index</span>
  <div class="spacer"></div>
  <a href="00-hub.html" /* DEMO-NAV */>← Hub</a>
</nav>

<button class="theme-toggle" id="themeToggle">🌗 <span id="themeLabel">Light</span></button>

<div class="lg-stage">
  <div class="lg-wrap">
    <h1 style="font-size:var(--fs-3xl);margin-bottom:var(--s-2);">SP6 · Libri game — Index</h1>
    <p style="color:var(--text-sec);font-size:var(--fs-md);max-width:760px;margin-bottom:var(--s-7);">
      Lista manuali fotografati di Sara con quota mensile. 6 stati richiesti dal brief,
      mobile 375 canonical + desktop 1440 adaptation.
    </p>

    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px;">
      <span class="e-game e-chip">📚 Index manuali</span>
      <span class="e-toolkit e-chip">📊 Quota widget</span>
      <span class="e-event e-chip">⚠️ Hard limit</span>
      <span class="e-kb e-chip">🔗 ConnectionPip</span>
    </div>

    <div id="root"></div>
  </div>
</div>

<div id="tweaks-panel">
  <h4>Tweaks</h4>
  <label>
    <span>Tema</span>
    <select id="tweak-theme">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
    </select>
  </label>
  <label>
    <span>Stato attivo</span>
    <select id="tweak-state">
      <option value="all">Tutti</option>
      <option value="default">Default</option>
      <option value="empty">Empty</option>
      <option value="loading">Loading</option>
      <option value="error">Error</option>
      <option value="quota-soft">Quota soft 47/50</option>
      <option value="quota-hard">Quota hard 50/50</option>
    </select>
  </label>
  <label>
    <span>Frame</span>
    <select id="tweak-frame">
      <option value="both">Mobile + Desktop</option>
      <option value="mobile">Solo mobile</option>
      <option value="desktop">Solo desktop</option>
    </select>
  </label>
</div>

<script>
  const root = document.documentElement;
  const saved = localStorage.getItem('mai-theme') || 'light';
  root.setAttribute('data-theme', saved);
  document.addEventListener('DOMContentLoaded', () => {
    const lbl = document.getElementById('themeLabel');
    if (lbl) lbl.textContent = saved === 'dark' ? 'Dark' : 'Light';
    document.getElementById('themeToggle').addEventListener('click', () => {
      const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      root.setAttribute('data-theme', next);
      localStorage.setItem('mai-theme', next);
      document.getElementById('themeLabel').textContent = next === 'dark' ? 'Dark' : 'Light';
      const ts = document.getElementById('tweak-theme'); if (ts) ts.value = next;
    });
  });

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "light",
    "state": "all",
    "frame": "both"
  }/*EDITMODE-END*/;

  window.addEventListener('message', e => {
    if (e.data?.type === '__activate_edit_mode')
      document.getElementById('tweaks-panel').style.display = 'block';
    if (e.data?.type === '__deactivate_edit_mode')
      document.getElementById('tweaks-panel').style.display = 'none';
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');

  document.addEventListener('DOMContentLoaded', () => {
    const tt = document.getElementById('tweak-theme');
    if (tt) {
      tt.value = saved;
      tt.addEventListener('change', e => {
        const next = e.target.value;
        root.setAttribute('data-theme', next);
        localStorage.setItem('mai-theme', next);
        document.getElementById('themeLabel').textContent = next === 'dark' ? 'Dark' : 'Light';
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme: next } }, '*');
      });
    }
    const ts = document.getElementById('tweak-state');
    if (ts) {
      ts.addEventListener('change', e => {
        document.dispatchEvent(new CustomEvent('lg-tweak-state', { detail: e.target.value }));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { state: e.target.value } }, '*');
      });
    }
    const tf = document.getElementById('tweak-frame');
    if (tf) {
      tf.addEventListener('change', e => {
        document.dispatchEvent(new CustomEvent('lg-tweak-frame', { detail: e.target.value }));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { frame: e.target.value } }, '*');
      });
    }
  });
</script>

<script type="text/babel" src="sp6-libro-game-index.jsx"></script>

</body>
</html>
