# docker-compose.test.yml - Test Environment Memory Overrides
#
# Inherits project name from docker-compose.yml (name: meepleai)
# Volumes will be named: meepleai_pgdata, meepleai_qdrantdata, etc.
#
# Purpose: Optimize memory allocation for test suite execution
# Issue: #2576 - Test crashes with exit -1073741819 (ACCESS_VIOLATION)
# Root Cause: PostgreSQL 2GB limit insufficient for concurrent test load (needs 3GB)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml --profile dev up -d
#   cd apps/api && dotnet test
#   docker compose down
#
# Total Memory Required: ~8.5GB (services) + OS overhead
# WSL2 Configuration: Set to 16GB in C:\Users\<username>\.wslconfig
#
# Last Updated: 2026-01-19

services:
  # PostgreSQL: Increased from 2GB to 4GB for concurrent test queries
  # Peak usage during tests: ~2.9GB (shared_buffers 512MB + work_mem 16MB × 150 concurrent operations)
  # 4GB provides comfortable headroom for test execution
  postgres:
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G  # +2GB from production config
        reservations:
          cpus: '1.0'
          memory: 2G  # +1GB from production
    environment:
      # Tuned for 4GB limit (25% rule for shared_buffers)
      POSTGRES_SHARED_BUFFERS: 1GB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 3GB  # 75% of 4GB
      POSTGRES_WORK_MEM: 16MB
      POSTGRES_MAINTENANCE_WORK_MEM: 512MB

  # Qdrant: Reduced for test environment (small dataset)
  # Test vectors: <50K typically, well under production scale
  qdrant:
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G  # Reduced from 4G (test dataset small)
        reservations:
          cpus: '1.0'
          memory: 512M

  # Redis: Reduced for test environment
  redis:
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M  # Reduced from 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    command: ["sh","-c","redis-server --appendonly yes --requirepass $${REDIS_PASSWORD} --maxmemory 400mb --maxmemory-policy allkeys-lru"]

  # Embedding Service: Reduced from 4G
  # all-MiniLM-L6-v2 model: 90MB + ~1GB batch processing
  embedding-service:
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G  # Reduced from 4G
        reservations:
          cpus: '1.0'
          memory: 1G

  # Reranker Service: Reduced from 2G
  reranker-service:
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G  # Reduced from 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Unstructured Service: Keep 4G for PDF processing during tests
  # Multiple PDFs may be processed concurrently
  unstructured-service:
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G  # Reduced from 4G
        reservations:
          cpus: '1.0'
          memory: 1G

  # SmolDocling Service: Keep for OCR tests
  smoldocling-service:
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G  # Reduced from 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # MinIO: S3-compatible object storage for local testing
  # Optional - only needed for testing S3 functionality without cloud provider
  # Access: http://localhost:9001 (console), http://localhost:9000 (API)
  minio:
    image: quay.io/minio/minio:latest
    container_name: meepleai-minio
    restart: unless-stopped
    profiles: [storage-test]  # Start with: docker compose --profile storage-test up -d minio
    ports:
      - "127.0.0.1:9000:9000"  # S3 API
      - "127.0.0.1:9001:9001"  # Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meepleai
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  minio_data:
    name: meepleai_miniodata

# Total Memory (limits): postgres 4G + qdrant 1G + redis 512M + embedding 2G + reranker 1G + unstructured 2G + smoldocling 1G
# = ~11.5GB (down from 17GB production config)
# + MinIO 512M (optional, only when --profile storage-test)
#
# Benefits:
# - Fixes test crash (PostgreSQL has sufficient memory)
# - Reduces total memory footprint for CI/CD
# - Optimized for test workload patterns
# - Maintains sufficient resources for all test scenarios
# - MinIO available for S3 integration testing
