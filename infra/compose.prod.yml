# Production environment
# Requires PROD_DOMAIN env var (e.g., PROD_DOMAIN=meepleai.com)
# Secrets from ./secrets/prod/, stricter resource limits
#
# Edge: Cloudflare Tunnel (cloudflared on VPS, post-PR #738 cutover, T18 Phase 6).
# Public routing handled by CF Tunnel ingress config — no service-level labels required.
#
# Usage: docker compose -f docker-compose.yml -f compose.prod.yml \
#          --profile ai --profile monitoring up -d

services:
  # ===========================================================================
  # Core Infrastructure
  # ===========================================================================

  postgres:
    restart: always
    env_file: [./secrets/prod/database.secret]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meepleai_prod}
      POSTGRES_USER: ${POSTGRES_USER:-meeple}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
      - ./init/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  redis:
    restart: always
    env_file: [./secrets/prod/redis.secret]
    command: ["sh", "-c", "redis-server /etc/redis/redis.conf --requirepass $$REDIS_PASSWORD"]
    volumes:
      - redisdata-prod:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ===========================================================================
  # Application Services
  # ===========================================================================

  api:
    restart: always
    env_file:
      - ./secrets/prod/database.secret
      - ./secrets/prod/jwt.secret
      - ./secrets/prod/admin.secret
      - ./secrets/prod/openrouter.secret
      - ./secrets/prod/deepseek.secret
      - ./secrets/prod/oauth.secret
      - ./secrets/prod/redis.secret
      - ./secrets/prod/embedding-service.secret
      - ./secrets/prod/email.secret
      - ./secrets/prod/storage.secret
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-meeple}
      POSTGRES_DB: ${POSTGRES_DB:-meepleai_prod}
      REDIS_HOST: redis
      EMBEDDING_PROVIDER: external
      Embedding__Provider: External
      LOCAL_EMBEDDING_URL: http://embedding-service:8000
      Embedding__LocalServiceUrl: http://embedding-service:8000
      RERANKER_URL: http://reranker-service:8003
      EMBEDDING_MODEL: intfloat/multilingual-e5-base
      Embedding__Model: intfloat/multilingual-e5-base
      Embedding__Dimensions: 768
      Authentication__OAuth__CallbackBaseUrl: "https://${PROD_DOMAIN}"
      Frontend__BaseUrl: "https://${PROD_DOMAIN}"
      Authentication__SessionCookie__Secure: "true"
      Authentication__SessionCookie__SameSite: "Lax"
    logging:
      driver: "json-file"
      options: { max-size: "50m", max-file: "10" }
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  web:
    restart: always
    build:
      args:
        NEXT_PUBLIC_API_BASE: "https://${PROD_DOMAIN}"
        NEXT_PUBLIC_APP_URL: "https://${PROD_DOMAIN}"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE: "https://${PROD_DOMAIN}"
      NEXT_PUBLIC_APP_URL: "https://${PROD_DOMAIN}"
      API_BASE_URL: http://api:8080
    logging:
      driver: "json-file"
      options: { max-size: "50m", max-file: "10" }
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # ===========================================================================
  # AI Services — internal-only (CF Tunnel does not expose these publicly)
  # ===========================================================================

  embedding-service:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  reranker-service:
    restart: always

  unstructured-service:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  smoldocling-service:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  ollama:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

  # ===========================================================================
  # Monitoring — exposed via CF Tunnel ingress (configured separately on VPS)
  # ===========================================================================

  grafana:
    restart: always
    env_file: [./secrets/prod/monitoring.secret]
    environment:
      GF_SERVER_ROOT_URL: "https://${PROD_DOMAIN}/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana-prod:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro

  prometheus:
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--storage.tsdb.retention.size=50GB'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro  # prod-specific labels
      - ./prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheus-prod:/prometheus
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  alertmanager:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  n8n:
    restart: always

# =============================================================================
# Production volumes
# =============================================================================
volumes:
  pgdata-prod:
    name: meepleai-pgdata-prod
  redisdata-prod:
    name: meepleai-redisdata-prod
  prometheus-prod:
    name: meepleai-prometheus-prod
  grafana-prod:
    name: meepleai-grafana-prod
