<!doctype html>
<html lang="it" data-theme="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MeepleAI — Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="components.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
/* ─── Layout ───────────────────────────────────────────────────────── */
body { background: var(--bg); min-height: 100vh; }

.ob-root { min-height: 100vh; display: flex; flex-direction: column; }

.ob-main {
  flex: 1; display: flex; align-items: flex-start; justify-content: center;
  padding: 40px 16px 80px;
}

/* ─── Frame (phone-style on desktop) ──────────────────────────────── */
.ob-frame {
  width: 100%; max-width: 420px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-2xl);
  box-shadow: var(--shadow-lg);
  display: flex; flex-direction: column;
  overflow: hidden;
  min-height: 700px;
  position: relative;
}

@media (min-width: 640px) {
  .ob-frame {
    width: 420px;
    border-radius: 40px;
    border: 8px solid var(--bg-sunken);
    box-shadow: 0 40px 80px rgba(90,60,20,.18), 0 0 0 1.5px var(--border-strong);
  }
  .ob-main { padding-top: 60px; }
}

/* ─── Status bar ───────────────────────────────────────────────────── */
.ob-sbar {
  height: 36px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 22px;
  font-size: 12px; font-weight: var(--fw-bold); font-family: var(--f-display);
  background: var(--bg-card); color: var(--text-sec);
  border-bottom: 1px solid var(--border-light);
}
.ob-sbar .ind { font-size: 10px; letter-spacing: 2px; }

/* ─── Top bar (progress + skip) ───────────────────────────────────── */
.ob-topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px 8px;
  background: var(--bg-card);
  position: sticky; top: 0; z-index: var(--z-sticky);
  border-bottom: 1px solid var(--border-light);
}

/* ─── Progress bar ─────────────────────────────────────────────────── */
.ob-progress {
  flex: 1; display: flex; align-items: flex-start; gap: 0;
}

.ob-pdot-col {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}

.ob-pdot {
  width: 14px; height: 14px; border-radius: 50%;
  transition: transform var(--dur-md) var(--ease-spring),
              background var(--dur-sm) var(--ease-out),
              box-shadow var(--dur-sm) var(--ease-out);
  flex-shrink: 0;
}
.ob-pdot.active {
  background: hsl(var(--e));
  transform: scale(1.25);
  box-shadow: 0 0 0 4px hsl(var(--e) / 0.22);
}
.ob-pdot.done {
  background: hsl(var(--e));
  opacity: 0.45;
}
.ob-pdot.pending {
  background: var(--bg-muted);
  border: 1.5px solid var(--border);
}

.ob-pline {
  flex: 1; height: 2px; border-radius: 1px;
  margin-top: 6px; /* align with dot center */
  transition: background var(--dur-md) var(--ease-out);
}

.ob-plabel {
  font-size: 10px; font-weight: var(--fw-semi);
  font-family: var(--f-display);
  color: var(--text-muted);
  white-space: nowrap;
  transition: color var(--dur-sm) var(--ease-out);
}

.ob-skip-btn {
  font-size: var(--fs-xs); font-weight: var(--fw-semi);
  font-family: var(--f-display); color: var(--text-muted);
  background: none; border: none; cursor: pointer; padding: 4px 0;
  flex-shrink: 0;
  transition: color var(--dur-sm);
}
.ob-skip-btn:hover { color: var(--text-sec); }

/* ─── Content area ─────────────────────────────────────────────────── */
.ob-content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  scrollbar-width: none;
}
.ob-content::-webkit-scrollbar { display: none; }

/* ─── Step transitions ─────────────────────────────────────────────── */
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(32px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-32px); }
  to   { opacity: 1; transform: translateX(0); }
}
.slide-in-right { animation: slideInRight var(--dur-lg) var(--ease-spring) both; }
.slide-in-left  { animation: slideInLeft  var(--dur-lg) var(--ease-spring) both; }

/* ─── Generic step shell ───────────────────────────────────────────── */
.ob-step { padding: 28px 22px 12px; display: flex; flex-direction: column; gap: 20px; }

.ob-step-head { display: flex; flex-direction: column; gap: 6px; }

.ob-step-title {
  font-family: var(--f-display); font-size: var(--fs-xl); font-weight: var(--fw-bold);
  line-height: var(--lh-snug); color: var(--text);
}
.ob-step-sub { font-size: var(--fs-sm); color: var(--text-sec); line-height: var(--lh-body); }

/* ─── Welcome step ─────────────────────────────────────────────────── */
.ob-welcome { padding: 36px 28px 28px; align-items: center; text-align: center; gap: 28px; }

.ob-welcome-hero {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
}

.ob-brand-mark-lg {
  width: 72px; height: 72px; border-radius: 20px;
  background: linear-gradient(135deg, hsl(var(--c-game)), hsl(var(--c-event)) 60%, hsl(var(--c-player)));
  color: #fff; font-family: var(--f-display); font-size: 36px; font-weight: var(--fw-ext);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-md);
  animation: hueRotate 8s linear infinite;
}
@keyframes hueRotate {
  0%   { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

.ob-welcome-emoji {
  display: flex; gap: 8px; font-size: 32px;
  animation: floatEmoji 3s var(--ease-in-out) infinite alternate;
}
.ob-welcome-emoji span:nth-child(2) { animation-delay: 0.3s; }
.ob-welcome-emoji span:nth-child(3) { animation-delay: 0.6s; }
@keyframes floatEmoji {
  from { transform: translateY(0); }
  to   { transform: translateY(-6px); }
}

.ob-welcome-body { display: flex; flex-direction: column; gap: 14px; align-items: center; }

.ob-welcome-title {
  font-family: var(--f-display); font-size: var(--fs-2xl); font-weight: var(--fw-ext);
  line-height: var(--lh-snug); color: var(--text);
}
.ob-welcome-sub {
  font-size: var(--fs-md); color: var(--text-sec); line-height: var(--lh-body);
}

.ob-gradient-text {
  background: linear-gradient(120deg, hsl(var(--c-game)), hsl(var(--c-event)) 60%, hsl(var(--c-player)));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}

.ob-welcome-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }

.ob-start-btn {
  width: 100%; justify-content: center; padding: 13px 20px;
  font-size: var(--fs-md); border-radius: var(--r-lg);
  box-shadow: 0 4px 16px hsl(var(--c-game) / 0.35);
}
.ob-start-btn:hover { box-shadow: 0 6px 20px hsl(var(--c-game) / 0.45); }

.ob-welcome-actions .btn.ghost {
  width: 100%; justify-content: center; font-size: var(--fs-sm);
}

/* ─── Game grid ────────────────────────────────────────────────────── */
.ob-games-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
}

.ob-game-card {
  display: flex; flex-direction: column; gap: 0;
  background: var(--bg-card); border: 1.5px solid var(--border);
  border-radius: var(--r-xl); overflow: hidden;
  cursor: pointer; transition: all var(--dur-sm) var(--ease-out);
  text-align: left; padding: 0;
}
.ob-game-card:hover { transform: scale(0.98); border-color: hsl(var(--e, var(--c-game)) / 0.4); }
.ob-game-card:active { transform: scale(0.96); }
.ob-game-card.selected {
  border-color: hsl(var(--e, var(--c-game)));
  border-width: 2px;
  box-shadow: 0 0 0 2px hsl(var(--e, var(--c-game)) / 0.18);
}

.ob-game-cover {
  aspect-ratio: 3/4; width: 100%;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.ob-game-em { font-size: 2.4rem; filter: drop-shadow(0 2px 8px rgba(0,0,0,.25)); }

.ob-game-check {
  position: absolute; top: 8px; right: 8px;
  width: 24px; height: 24px; border-radius: 50%;
  background: hsl(var(--e, var(--c-game)));
  color: #fff; font-size: 13px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
  animation: popIn var(--dur-sm) var(--ease-spring);
}
@keyframes popIn {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.ob-game-info {
  padding: 8px 10px 10px;
  display: flex; flex-direction: column; gap: 2px;
}
.ob-game-title {
  font-family: var(--f-display); font-size: var(--fs-sm); font-weight: var(--fw-semi);
  color: var(--text); line-height: 1.2;
}
.ob-game-meta { font-size: var(--fs-xs); color: var(--text-muted); font-family: var(--f-mono); }

.ob-counter {
  text-align: center; font-size: var(--fs-xs); font-weight: var(--fw-semi);
  font-family: var(--f-display); color: var(--text-muted);
  padding: 4px 0;
  transition: color var(--dur-sm);
}
.ob-counter.ob-counter-ready { color: hsl(var(--c-game)); }

/* ─── Agents list ──────────────────────────────────────────────────── */
.ob-agents-list {
  display: flex; flex-direction: column;
  border: 1px solid var(--border); border-radius: var(--r-xl); overflow: hidden;
}

.ob-agent-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border-light);
  transition: background var(--dur-xs);
}
.ob-agent-row:last-child { border-bottom: none; }
.ob-agent-row:hover { background: var(--bg-hover); }

.ob-agent-em { font-size: 22px; flex-shrink: 0; width: 32px; text-align: center; }

.ob-agent-text {
  flex: 1; display: flex; flex-direction: column; gap: 2px;
}
.ob-agent-name { font-size: var(--fs-sm); font-weight: var(--fw-semi); color: var(--text); }
.ob-agent-desc { font-size: var(--fs-xs); color: var(--text-muted); line-height: 1.4; }

/* Toggle switch */
.ob-toggle {
  width: 44px; height: 26px; border-radius: var(--r-pill);
  background: var(--bg-muted); border: 1.5px solid var(--border);
  position: relative; cursor: pointer; flex-shrink: 0;
  transition: background var(--dur-sm) var(--ease-out),
              border-color var(--dur-sm) var(--ease-out);
}
.ob-toggle.on {
  background: hsl(var(--e, var(--c-agent)));
  border-color: transparent;
}
.ob-toggle-thumb {
  position: absolute; top: 2px; left: 2px;
  width: 20px; height: 20px; border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
  transition: transform var(--dur-sm) var(--ease-spring);
}
.ob-toggle.on .ob-toggle-thumb { transform: translateX(18px); }

.ob-agent-hint {
  font-size: var(--fs-xs); color: var(--text-muted);
  font-family: var(--f-mono); text-align: center;
  padding: 2px 0; margin: 0;
}

/* ─── Action cards ─────────────────────────────────────────────────── */
.ob-actions-list { display: flex; flex-direction: column; gap: 10px; }

.ob-action-card {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 18px; border-radius: var(--r-2xl);
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  cursor: pointer; text-align: left; width: 100%;
  transition: transform var(--dur-sm) var(--ease-out),
              box-shadow var(--dur-sm) var(--ease-out),
              border-color var(--dur-sm) var(--ease-out);
}
.ob-action-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: hsl(var(--e) / 0.4);
}
.ob-action-card:active { transform: translateY(0); }

.ob-action-em {
  width: 46px; height: 46px; border-radius: var(--r-lg);
  font-size: 22px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.ob-action-text { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.ob-action-title {
  font-family: var(--f-display); font-size: var(--fs-md); font-weight: var(--fw-semi);
  color: var(--text);
}
.ob-action-desc { font-size: var(--fs-xs); color: var(--text-muted); }

.ob-action-arrow {
  font-size: 18px; color: hsl(var(--e) / 0.6);
  transition: transform var(--dur-sm); flex-shrink: 0;
}
.ob-action-card:hover .ob-action-arrow { transform: translateX(3px); color: hsl(var(--e)); }

/* ─── Bottom action bar ────────────────────────────────────────────── */
.ob-bottom-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-top: 1px solid var(--border-light);
  background: var(--bg-card);
  flex-shrink: 0;
}

.ob-next-btn {
  background: hsl(var(--e, var(--c-game))); color: #fff;
  padding: 10px 20px; border-radius: var(--r-lg);
  font-size: var(--fs-sm);
  box-shadow: 0 3px 12px hsl(var(--e, var(--c-game)) / 0.3);
}
.ob-next-btn:hover:not(:disabled) {
  box-shadow: 0 5px 16px hsl(var(--e, var(--c-game)) / 0.42);
}
.ob-next-btn:disabled {
  opacity: 0.45; pointer-events: none; box-shadow: none;
}

/* ─── Complete step ────────────────────────────────────────────────── */
.ob-complete-step {
  position: relative; overflow: hidden;
  min-height: 580px; align-items: center; justify-content: center;
  padding: 40px 28px;
}

.ob-complete-body {
  display: flex; flex-direction: column; align-items: center;
  gap: 16px; text-align: center; position: relative; z-index: 1;
}

.ob-brand-mark-xl { width: 96px; height: 96px; border-radius: 28px; font-size: 48px; }

.ob-complete-title {
  font-family: var(--f-display); font-size: var(--fs-4xl); font-weight: var(--fw-ext);
  line-height: var(--lh-tight);
}

.ob-complete-sub {
  font-size: var(--fs-lg); color: var(--text-sec); line-height: var(--lh-body);
}

.ob-home-btn {
  margin-top: 8px; padding: 14px 32px;
  font-size: var(--fs-md); border-radius: var(--r-xl);
  box-shadow: 0 4px 20px hsl(var(--c-game) / 0.35);
}
.ob-home-btn:hover { box-shadow: 0 6px 24px hsl(var(--c-game) / 0.45); }

/* ─── Confetti ─────────────────────────────────────────────────────── */
.ob-confetti {
  position: absolute; inset: 0; pointer-events: none; overflow: hidden;
  z-index: 0;
}
.ob-confetti-piece {
  position: absolute; top: -20px;
  border-radius: 2px;
  animation: confettiFall linear forwards;
  will-change: transform;
}
@keyframes confettiFall {
  0%   { top: -20px; opacity: 1; transform: rotate(0deg) translateX(0); }
  70%  { opacity: 1; }
  100% { top: 110%; opacity: 0; transform: rotate(720deg) translateX(40px); }
}

/* ─── Accessibility ────────────────────────────────────────────────── */
.ob-skip-link {
  position: absolute; top: -40px; left: 16px; z-index: 9999;
  background: var(--bg-card); color: var(--text);
  padding: 8px 16px; border-radius: var(--r-md);
  font-size: var(--fs-sm); font-weight: var(--fw-semi);
  border: 1px solid var(--border);
  transition: top var(--dur-sm);
}
.ob-skip-link:focus { top: 8px; }

button:focus-visible, .ob-game-card:focus-visible {
  outline: 2px solid hsl(var(--e, var(--c-game)));
  outline-offset: 2px;
}

/* ─── Tweaks panel ─────────────────────────────────────────────────── */
#tweaks-panel {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  display: none;
  background: var(--glass-bg); backdrop-filter: blur(16px);
  border: 1px solid var(--border); border-radius: var(--r-xl);
  box-shadow: var(--shadow-lg); padding: 16px 18px; min-width: 200px;
  font-family: var(--f-display); font-size: 13px; color: var(--text);
}
#tweaks-panel h4 {
  font-size: 11px; font-weight: 700; margin: 0 0 12px;
  text-transform: uppercase; letter-spacing: .07em;
  color: var(--text-muted); font-family: var(--f-mono);
}
#tweaks-panel label {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; font-size: 12px; margin-bottom: 10px; color: var(--text-sec);
}
#tweaks-panel select, #tweaks-panel input[type="range"] {
  font-family: inherit; font-size: 12px; padding: 3px 6px;
  border-radius: var(--r-sm); border: 1px solid var(--border);
  background: var(--bg); color: var(--text); cursor: pointer;
}
</style>
</head>
<body>

<div id="root"></div>

<script>
  // ─── Theme ───────────────────────────────────────────────────────────
  const root = document.documentElement;
  const saved = localStorage.getItem('mai-theme') || 'light';
  root.setAttribute('data-theme', saved);

  document.addEventListener('DOMContentLoaded', () => {
    const lbl = document.getElementById('themeLabel');
    if (lbl) lbl.textContent = saved === 'dark' ? 'Dark' : 'Light';
    const btn = document.getElementById('themeToggle');
    if (btn) btn.addEventListener('click', () => {
      const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      root.setAttribute('data-theme', next);
      localStorage.setItem('mai-theme', next);
      const l = document.getElementById('themeLabel');
      if (l) l.textContent = next === 'dark' ? 'Dark' : 'Light';
      const ts = document.getElementById('tweak-theme');
      if (ts) ts.value = next;
    });
  });

  // ─── Tweaks ──────────────────────────────────────────────────────────
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "light",
    "frame": "phone",
    "step": 0
  }/*EDITMODE-END*/;

  window.addEventListener('message', e => {
    if (e.data?.type === '__activate_edit_mode')
      document.getElementById('tweaks-panel').style.display = 'block';
    if (e.data?.type === '__deactivate_edit_mode')
      document.getElementById('tweaks-panel').style.display = 'none';
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');

  document.addEventListener('DOMContentLoaded', () => {
    const tTheme = document.getElementById('tweak-theme');
    if (tTheme) {
      tTheme.value = saved;
      tTheme.addEventListener('change', e => {
        const next = e.target.value;
        root.setAttribute('data-theme', next);
        localStorage.setItem('mai-theme', next);
        const l = document.getElementById('themeLabel');
        if (l) l.textContent = next === 'dark' ? 'Dark' : 'Light';
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme: next } }, '*');
      });
    }

    const tStep = document.getElementById('tweak-step');
    if (tStep) {
      tStep.addEventListener('input', e => {
        const s = parseInt(e.target.value, 10);
        localStorage.setItem('mai-onboarding-step', String(s));
        location.reload();
      });
    }
  });
</script>

<script type="text/babel" src="onboarding.jsx"></script>

</body>
