# Jekyll configuration for GitHub Pages
# Disable Liquid processing for files containing JSX/React code patterns

# Exclude files with JSX syntax that conflicts with Liquid
exclude:
  - "node_modules"
  - "vendor"

# Files to skip Liquid processing (contain style={{ }}, {{ $var }}, etc.)
# These files contain React/JSX or Prometheus query syntax
defaults:
  - scope:
      path: "04-frontend/improvements"
    values:
      render_with_liquid: false
  - scope:
      path: "04-frontend/design-system.md"
    values:
      render_with_liquid: false
