  - name: meepleai_2fa_security_info_alerts
    interval: 5m
    rules:
      # INFO: 2FA adoption declining
      - alert: Declining2FAAdoption
        expr: |
          increase(meepleai_2fa_disable_total[1h]) > increase(meepleai_2fa_enable_total[1h])
        for: 6h
        labels:
