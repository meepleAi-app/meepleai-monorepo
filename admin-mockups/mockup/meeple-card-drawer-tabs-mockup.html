var cur='game',tabIdx=0,view='page';
function setH(id,h){document.getElementById(id).innerHTML=h}

function renderAll(){tabIdx=0;renderSwitcher();renderPhones();renderSpec()}

function renderSwitcher(){
  var h='';Object.keys(E).forEach(function(k){var v=E[k],a=k===cur;
    h+='<button class="e-btn'+(a?' active':'')+'" onclick="sw(\''+k+'\')" style="'+(a?'background:hsl('+hsl(k)+');color:white;border-color:transparent;':'')+'"><span class="dot" style="background:'+(a?'white':'hsl('+hsl(k)+')')+';"></span>'+v.em+' '+v.lb+'</button>';
  });setH('e-switch',h);
}

function renderPhones(){
  var e=view==='session'?E.session:E[cur],ek=view==='session'?'session':cur,col='hsl('+hsl(ek)+')';
  var recents='';[{em:'\u{1F3B2}',et:'game'},{em:'\u{1F916}',et:'agent'},{em:'\u{1F4AC}',et:'chat'}].forEach(function(r){recents+='<div class="rec-pill" style="background:'+hsla(r.et,.1)+';color:hsl('+hsl(r.et)+');">'+r.em+'</div>';});
  var mnTabs='';e.tabs.forEach(function(t,i){mnTabs+='<span class="mn-tab'+(i===0?' active':'')+'" style="'+(i===0?'color:'+col+';':'')+'">'+t.lb+(t.bg?'<span class="cnt">'+t.bg+'</span>':'')+'</span>';});
  var connBar='';e.conn.forEach(function(p){var em=p.cnt===0;connBar+='<div class="conn-pip'+(em?' empty':'')+'" style="background:'+(em?'transparent':hsla(p.et,.1))+';color:hsl('+hsl(p.et)+');'+(em?'border-color:'+hsla(p.et,.3)+';':'')+'"><span>'+p.i+'</span>'+(em?'+':'<span class="cp-count">'+p.cnt+'</span>')+' '+p.lb+'</div>';});
  var metaHtml='';e.meta.forEach(function(m){metaHtml+='<span class="meta-chip"><span style="font-size:10px;">'+m.i+'</span>'+m.v+'</span>';});metaHtml+='<span class="meta-chip" style="background:'+hsla(ek,.1)+';color:'+col+';font-weight:700;">'+e.badge+'</span>';
  var actBtns='';e.actions.forEach(function(a,i){actBtns+='<button class="qa-btn'+(i===0?' primary':'')+'" style="'+(i===0?'background:'+col+';':'color:'+col+';')+'">'+a+'</button>';});
  var sBanner='';if(view==='session'){sBanner='<div class="session-banner" style="background:hsla(240,60%,55%,.06);border-bottom:1px solid hsla(240,60%,55%,.15);"><span class="sb-dot"></span><span class="sb-text">Sessione: Serata Azul \u00B7 T3/5</span><button class="sb-btn">\u{1F4CA}</button><button class="sb-btn">\u{1F9F0}</button><button class="sb-btn">\u{1F4AC}</button><button class="sb-close">\u2715</button></div>';}
  var showDrawer=view==='drawer'||view==='session';
  var drawerHTML='';if(showDrawer){var tabs='';e.tabs.forEach(function(t,i){var a=i===tabIdx;tabs+='<button class="dr-tab'+(a?' active':'')+'" style="'+(a?'color:'+col+';border-bottom-color:'+col+';':'')+'" onclick="stab('+i+')"><span>'+t.ic+'</span>'+t.lb+(t.bg?'<span class="tb" style="background:'+col+';">'+t.bg+'</span>':'')+'</button>';});var tabId=e.tabs[tabIdx].id;var content=e.tc[tabId]||'<p style="color:var(--text-muted);padding:16px;text-align:center;">Disponibile prossimamente</p>';var fBtns='';e.footer.forEach(function(f){fBtns+='<button class="af-btn '+(f.v==='primary'?'primary':'secondary')+'" style="'+(f.v==='primary'?'background:'+col+';':'')+'">'+f.lb+'</button>';});drawerHTML='<div class="dr-overlay open"><div class="dr-panel" onclick="event.stopPropagation()"'+(view==='session'?' style="border-top:2px solid hsl(240,60%,55%);"':'')+'><div class="dr-handle"></div><div class="dr-header"><div class="dh-icon" style="background:'+col+';">'+e.em+'</div><span class="dh-title">'+e.ti+'</span><button class="dh-close">\u2715</button></div><div class="dr-tabs">'+tabs+'</div><div class="dr-content">'+content+'</div><div class="dr-footer">'+fBtns+'</div></div></div>';}
  var bbar='';if(view==='session'){bbar='<div class="bbar session-mode"><div class="bb-item"><span>\u25C0</span><span class="bl">Back</span></div><div class="bb-item" style="color:hsl(240,60%,55%);"><span>\u{1F4CA}</span><span class="bl" style="color:hsl(240,60%,55%);">Classifica</span></div><div class="bb-item"><span>\u{1F9F0}</span><span class="bl">Toolkit</span></div><div class="bb-item"><span>\u{1F4AC}</span><span class="bl">AI</span></div><div class="bb-item"><span>\u22EF</span><span class="bl">Altro</span></div></div>';}else{bbar='<div class="bbar"><div class="bb-item active"><span>\u{1F3E0}</span><span class="bl">Home</span></div><div class="bb-item"><span>\u{1F50D}</span><span class="bl">Cerca</span></div><div class="bb-item"><span>\u{1F4DA}</span><span class="bl">Libreria</span></div><div class="bb-item"><span>\u{1F4AC}</span><span class="bl">Chat</span></div><div class="bb-item"><span>\u{1F464}</span><span class="bl">Profilo</span></div></div>';}
  var pgHtml='<div class="hero"><div class="hero-img" style="background:'+e.cov+';">'+e.ce+'</div><div class="hero-grad"></div><div class="hero-badge" style="background:'+hsla(ek,.85)+';">'+e.lb+'</div>'+(e.rt?'<div class="hero-rating">\u2B50 '+e.rt+'</div>':'')+'</div><div class="cinfo"><div class="ti">'+e.ti+'</div><div class="sub">'+e.sub+'</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;">'+metaHtml+'</div></div><div class="conn-bar">'+connBar+'</div><div class="qactions">'+actBtns+'</div>';
  var labels={page:'Entity Page',drawer:'Drawer aperto',session:'Session Mode'};
  setH('mockup-row','<div class="mockup-col"><span class="mockup-label">'+labels[view]+'</span><div class="phone"><div class="sbar"><span class="t">14:32</span><div class="i"><span>\u{1F4F6}</span><span>\u{1F50B}</span></div></div><div class="topbar"><div class="logo"><div class="dice">\u{1F3B2}</div>MeepleAI</div><div class="spacer"></div><div class="tb-btn">\u{1F50D}</div><div class="tb-btn">\u{1F514}</div><div class="avatar">MR</div></div><div class="mininav"><span class="breadcrumb">\u203A '+e.lb+' / '+e.ti+'</span>'+mnTabs+'<div class="mn-spacer"></div><div class="recents">'+recents+'</div></div>'+sBanner+'<div class="pgc" style="'+(showDrawer?'opacity:.3;filter:blur(1px);pointer-events:none;':'')+'">'+pgHtml+'</div>'+drawerHTML+bbar+'</div></div>');
}

function renderSpec(){
  var e=view==='session'?E.session:E[cur],ek=view==='session'?'session':cur,col='hsl('+hsl(ek)+')';
  document.getElementById('spec-thead').style.background=col;document.getElementById('footer-thead').style.background=col;
  document.getElementById('spec-sub').textContent=e.em+' '+e.lb+' \u2014 '+e.tabs.length+' tab';
  document.getElementById('footer-sub').textContent=e.em+' '+e.lb+' \u2014 '+e.footer.length+' azioni';
  var tb='';e.tabs.forEach(function(t,i){tb+='<tr style="'+(i%2?'background:rgba(180,130,80,.04);':'')+'"><td style="font-weight:700;color:'+col+';">'+(i+1)+'</td><td style="font-family:monospace;font-size:10px;color:'+col+';font-weight:600;">'+t.id+'</td><td style="font-weight:700;">'+t.ic+' '+t.lb+'</td><td style="font-family:monospace;font-size:10px;color:var(--text-sec);">'+t.sp+'</td><td style="color:var(--text-sec);">'+t.desc+'</td><td>'+(t.bg?'<span style="padding:2px 6px;border-radius:6px;background:'+hsla(ek,.15)+';color:'+col+';font-size:9px;font-weight:700;">'+(t.bgl||'')+'</span>':'\u2014')+'</td></tr>';});
  setH('spec-body',tb);
  var fb='';e.footer.forEach(function(f,i){fb+='<tr style="'+(i%2?'background:rgba(180,130,80,.04);':'')+'"><td style="font-weight:700;">'+f.lb+'</td><td><span style="padding:2px 6px;border-radius:6px;font-size:9px;font-weight:700;'+(f.v==='primary'?'background:'+col+';color:white;':'background:var(--bg-muted);color:var(--text-sec);')+'">'+f.v+'</span></td><td style="color:var(--text-sec);">'+f.cond+'</td></tr>';});
  setH('footer-body',fb);
}

function sw(k){cur=k;if(view==='session')cur='session';renderAll()}
function stab(i){tabIdx=i;renderPhones()}
function setView(v){view=v;if(v==='session')cur='session';renderAll();document.querySelectorAll('.vt-btn').forEach(function(b){b.classList.toggle('active',(v==='page'&&b.textContent==='Page')||(v==='drawer'&&b.textContent==='Drawer')||(v==='session'&&b.textContent==='Session Mode'));});}
renderAll();
</script>
