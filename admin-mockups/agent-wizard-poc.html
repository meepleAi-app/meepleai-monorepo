// ===== SAFE DOM HELPERS =====
function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) {
    Object.entries(attrs).forEach(([k, v]) => {
      if (k === 'className') e.className = v;
      else if (k === 'textContent') e.textContent = v;
      else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
      else if (k === 'disabled') { if (v) e.disabled = true; }
      else if (k === 'placeholder') e.placeholder = v;
      else if (k === 'type') e.type = v;
      else if (k === 'rows') e.rows = v;
      else if (k === 'value') e.value = v;
      else if (k === 'id') e.id = v;
      else if (k === 'title') e.title = v;
      else if (k === 'htmlFor') e.htmlFor = v;
      else e.setAttribute(k, v);
    });
  }
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(c => {
      if (typeof c === 'string') e.appendChild(document.createTextNode(c));
      else if (c) e.appendChild(c);
    });
  }
  return e;
}

function svgIcon(path, cls) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('class', cls || 'w-5 h-5');
  svg.setAttribute('fill', 'none');
  svg.setAttribute('stroke', 'currentColor');
  svg.setAttribute('viewBox', '0 0 24 24');
  const p = document.createElementNS(ns, 'path');
  p.setAttribute('stroke-linecap', 'round');
  p.setAttribute('stroke-linejoin', 'round');
  p.setAttribute('stroke-width', '2');
  p.setAttribute('d', path);
  svg.appendChild(p);
  return svg;
}

// Simple markdown-like rendering using DOM (safe)
function renderMarkdownSafe(text, container) {
  const lines = text.split('\n');
  lines.forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) { container.appendChild(el('br')); return; }

    const p = el('p', { className: 'text-sm text-gray-800 mb-1' });

    // Parse inline formatting
    let remaining = trimmed;
    // Handle list items
    if (remaining.startsWith('- ')) {
      remaining = remaining.slice(2);
      p.className = 'text-sm text-gray-800 mb-0.5 ml-4 before:content-["•"] before:mr-2 before:text-amber-500';
    } else if (/^\d+\.\s/.test(remaining)) {
      const num = remaining.match(/^(\d+)\.\s/)[1];
      remaining = remaining.replace(/^\d+\.\s/, '');
      p.className = 'text-sm text-gray-800 mb-0.5 ml-4';
      p.appendChild(el('span', { className: 'font-bold text-amber-600 mr-1.5', textContent: num + '.' }));
    }

    // Parse bold and normal text
    const parts = remaining.split(/(\*\*[^*]+\*\*)/g);
    parts.forEach(part => {
      if (part.startsWith('**') && part.endsWith('**')) {
        p.appendChild(el('strong', { textContent: part.slice(2, -2) }));
      } else {
        p.appendChild(document.createTextNode(part));
      }
    });

    container.appendChild(p);
  });
}

// ===== NAVIGATION =====
function showView(view) {
  ['games', 'agents', 'chat-list', 'chat'].forEach(v => {
    const viewEl = document.getElementById('view-' + v);
    if (viewEl) viewEl.classList.toggle('hidden', v !== view);
  });
  ['games', 'agents', 'chats'].forEach(n => {
    const navEl = document.getElementById('nav-' + n);
    if (navEl) { navEl.classList.remove('text-amber-600', 'font-semibold'); }
  });
  const navMap = { 'games': 'games', 'agents': 'agents', 'chat-list': 'chats', 'chat': 'chats' };
  const navBtn = document.getElementById('nav-' + navMap[view]);
  if (navBtn) navBtn.classList.add('text-amber-600', 'font-semibold');
  currentView = view;
}

// ===== TOAST =====
function showToast(title, desc) {
  const toast = document.getElementById('toast');
  toast.querySelector('.toast-title').textContent = title;
  toast.querySelector('.toast-desc').textContent = desc;
  toast.style.transform = 'translateX(0)';
  setTimeout(() => { toast.style.transform = 'translateX(120%)'; }, 3000);
}

// ===== WIZARD ACTIONS =====
function openWizard(gameKey) {
  currentGame = gameKey;
  const game = games[gameKey];
  document.getElementById('wizard-game-name').textContent = game.name;
  document.getElementById('wizard-game-icon').textContent = game.icon;
  document.getElementById('wizard-game-icon').className = 'w-14 h-14 rounded-xl bg-gradient-to-br ' + game.color + ' flex items-center justify-center text-3xl flex-shrink-0';
  document.getElementById('wizard-game-meta').textContent = game.players + ' giocatori \u2022 ' + game.time + ' \u2022 ' + game.category;
  document.getElementById('wizard-subtitle').textContent = 'Configura il tuo assistente per ' + game.name;
  document.getElementById('wizard-agent-name').value = 'Esperto di ' + game.name;

  const badge = document.getElementById('wizard-collection-badge');
  badge.textContent = '';
  if (game.inCollection) {
    badge.appendChild(el('span', { className: 'inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-green-100 text-green-700 text-xs font-medium', textContent: '\u2713 Nella tua collezione' }));
  } else {
    badge.appendChild(el('span', { className: 'inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 text-xs font-medium', textContent: '+ Verra aggiunto alla collezione' }));
  }

  uploadedFiles = [];
  document.getElementById('wizard-files').textContent = '';
  document.getElementById('wizard-kb-count').textContent = '0 documenti';
  document.getElementById('wizard-game-selector').classList.add('hidden');
  document.getElementById('wizard-overlay').classList.remove('hidden');
}

function closeWizard() {
  document.getElementById('wizard-overlay').classList.add('hidden');
}

function selectGame(gameKey) {
  currentGame = gameKey;
  const game = games[gameKey];
  document.getElementById('wizard-game-name').textContent = game.name;
  document.getElementById('wizard-game-icon').textContent = game.icon;
  document.getElementById('wizard-game-icon').className = 'w-14 h-14 rounded-xl bg-gradient-to-br ' + game.color + ' flex items-center justify-center text-3xl flex-shrink-0';
  document.getElementById('wizard-game-meta').textContent = game.players + ' giocatori \u2022 ' + game.time + ' \u2022 ' + game.category;
  document.getElementById('wizard-subtitle').textContent = 'Configura il tuo assistente per ' + game.name;
  document.getElementById('wizard-agent-name').value = 'Esperto di ' + game.name;

  const badge = document.getElementById('wizard-collection-badge');
  badge.textContent = '';
  if (game.inCollection) {
    badge.appendChild(el('span', { className: 'inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-green-100 text-green-700 text-xs font-medium', textContent: '\u2713 Nella tua collezione' }));
  } else {
    badge.appendChild(el('span', { className: 'inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 text-xs font-medium', textContent: '+ Verra aggiunto alla collezione' }));
  }
  document.getElementById('wizard-game-selector').classList.add('hidden');
}

  const game = games[currentGame];

  const progressBar = el('div', { className: 'h-full bg-amber-400 rounded-full progress-bar', style: { width: '0%' } });
  const progressText = el('span', { className: 'text-xs text-gray-400', textContent: '0%' });
  const removeBtn = el('button', { className: 'p-1 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors' }, [ svgIcon('M6 18L18 6M6 6l12 12', 'w-4 h-4') ]);

  const fileEl = el('div', { className: 'flex items-center gap-3 p-3 rounded-xl border border-gray-200 bg-white/50 animate-fade-in' }, [
    el('div', { className: 'w-9 h-9 rounded-lg bg-red-100 flex items-center justify-center flex-shrink-0', textContent: '\u{1F4C4}' }),
    el('div', { className: 'flex-1 min-w-0' }, [
      el('p', { className: 'text-sm font-medium text-gray-700 truncate', textContent: fileName }),
      el('div', { className: 'flex items-center gap-2 mt-1' }, [
        el('div', { className: 'flex-1 h-1.5 bg-gray-200 rounded-full overflow-hidden' }, [ progressBar ]),
        progressText
      ])
    ]),
    removeBtn
  ]);
  removeBtn.addEventListener('click', () => { fileEl.remove(); });

  document.getElementById('wizard-files').appendChild(fileEl);
  document.getElementById('wizard-kb-count').textContent = uploadedFiles.length + ' documento';

  let progress = 0;
  const interval = setInterval(() => {
    progress += Math.random() * 15 + 5;
    if (progress >= 100) {
      progress = 100;
      clearInterval(interval);
      progressBar.style.width = '100%';
      progressBar.className = 'h-full bg-green-400 rounded-full progress-bar';
      progressText.textContent = '\u2713 45 chunks';
      progressText.className = 'text-xs text-green-600';
    } else {
      progressBar.style.width = progress + '%';
      progressText.textContent = Math.round(progress) + '%';
    }
  }, 200);
}

function createAgent() {
  const btn = document.getElementById('wizard-create-btn');
  btn.disabled = true;
  btn.textContent = '';
  const spinner = el('span', { className: 'inline-flex items-center gap-2' }, [
    el('span', { className: 'w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin', style: { display: 'inline-block' } }),
    document.createTextNode(' Creazione in corso...')
  ]);
  btn.appendChild(spinner);

  const game = games[currentGame];
  setTimeout(() => {
    game.hasAgent = true;
    game.agentName = document.getElementById('wizard-agent-name').value || 'Esperto di ' + game.name;
    if (!game.inCollection) game.inCollection = true;

    closeWizard();
    showToast('Agente creato!', '"' + game.agentName + '" e\' pronto per chattare');

    // Rebuild game cards
    const grid = document.getElementById('game-cards-grid');
    grid.textContent = '';
    Object.entries(games).forEach(([k, g]) => grid.appendChild(buildGameCard(k, g)));

    setTimeout(() => {
      openChatForGame(currentGame);
      btn.disabled = false;
      btn.textContent = '';
      btn.appendChild(svgIcon('M13 10V3L4 14h7v7l9-11h-7z', 'w-4 h-4'));
      btn.appendChild(document.createTextNode(' Crea e Inizia Chat'));
    }, 1200);
  }, 2000);
}

// ===== CHAT ACTIONS =====
function openChatForGame(gameKey) {
  currentGame = gameKey;
  const game = games[gameKey];
  const chatData = chatResponses[gameKey] || chatResponses.catan;

  document.getElementById('chat-agent-name').textContent = game.agentName || 'Esperto di ' + game.name;
  document.getElementById('chat-game-badge').textContent = game.name;
  document.getElementById('chat-panel-game-name').textContent = game.name;
  document.getElementById('chat-panel-game-icon').textContent = game.icon;

  chatHistory = [];
  document.getElementById('chat-messages').textContent = '';
  document.getElementById('followup-section').classList.add('hidden');

  showView('chat');

  setTimeout(() => {
    addAgentMessage(chatData.welcome);
    setTimeout(() => {
      showFollowups(['Come funziona il commercio?', 'Spiega il setup iniziale', 'Cosa succede quando esce 7?']);
    }, 2500);
  }, 800);
}

function addUserMessage(text) {
  const container = document.getElementById('chat-messages');
  const msgEl = el('div', { className: 'flex justify-end animate-fade-in' }, [
    el('div', { className: 'chat-bubble-user bg-gradient-to-br from-amber-100 to-orange-100 border border-amber-200/50 px-4 py-2.5 max-w-[75%] shadow-sm' }, [
      el('p', { className: 'text-sm text-gray-800', textContent: text }),
      el('p', { className: 'text-[10px] text-amber-600/60 mt-1 text-right', textContent: 'Adesso' })
    ])
  ]);
  container.appendChild(msgEl);
  container.scrollTop = container.scrollHeight;
  chatHistory.push({ role: 'user', content: text });
}

function addAgentMessage(text) {
  const container = document.getElementById('chat-messages');

  // Typing indicator
  const typingEl = el('div', { className: 'flex justify-start animate-fade-in' }, [
    el('div', { className: 'chat-bubble-agent glass border border-gray-200/50 px-4 py-3 shadow-sm' }, [
      el('div', { className: 'flex items-center gap-1.5' }, [
        el('div', { className: 'w-2 h-2 rounded-full bg-amber-400 animate-typing-1' }),
        el('div', { className: 'w-2 h-2 rounded-full bg-amber-400 animate-typing-2' }),
        el('div', { className: 'w-2 h-2 rounded-full bg-amber-400 animate-typing-3' }),
      ])
    ])
  ]);
  container.appendChild(typingEl);
  container.scrollTop = container.scrollHeight;

  setTimeout(() => {
    typingEl.remove();
    const contentDiv = el('div', { className: 'text-sm text-gray-800' });
    renderMarkdownSafe(text, contentDiv);

    const msgEl = el('div', { className: 'flex justify-start animate-fade-in' }, [
      el('div', { className: 'chat-bubble-agent glass border border-gray-200/50 px-4 py-2.5 max-w-[75%] shadow-sm' }, [
        contentDiv,
        el('p', { className: 'text-[10px] text-gray-400 mt-1.5', textContent: 'Adesso' })
      ])
    ]);
    container.appendChild(msgEl);
    container.scrollTop = container.scrollHeight;
    chatHistory.push({ role: 'agent', content: text });
  }, 1200 + Math.random() * 800);
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  addUserMessage(text);
  document.getElementById('followup-section').classList.add('hidden');

  const chatData = chatResponses[currentGame] || chatResponses.catan;
  let response = chatData.fallback;
  for (const r of chatData.responses) {
    if (r.q.test(text)) { response = r.a; break; }
  }

  setTimeout(() => {
    addAgentMessage(response);
    setTimeout(() => {
      showFollowups(['Come funziona il cavaliere?', 'Quando posso costruire una citta?', 'Regole dei porti speciali']);
    }, 2500);
  }, 500);
}

function showFollowups(questions) {
  const section = document.getElementById('followup-section');
  const container = document.getElementById('followup-questions');
  container.textContent = '';
  questions.forEach(q => {
    const btn = el('button', { className: 'w-full text-left px-3 py-2 text-xs rounded-lg border border-gray-200 bg-white hover:border-amber-300 hover:bg-amber-50 transition-colors text-gray-600', textContent: q, onClick: () => {
      document.getElementById('chat-input').value = q;
      sendMessage();
    }});
    container.appendChild(btn);
  });
  section.classList.remove('hidden');
}

// ===== INIT =====
const app = document.getElementById('app');
app.appendChild(buildNavbar());
app.appendChild(buildToast());
app.appendChild(buildGamesView());
app.appendChild(buildAgentsView());
app.appendChild(buildChatListView());
app.appendChild(buildChatView());
app.appendChild(buildWizard());
showView('games');
</script>
</body>
