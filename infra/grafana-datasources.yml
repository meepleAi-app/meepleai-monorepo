# OPS-02: Grafana Datasources Configuration
# Auto-provisions Prometheus data source
# Jaeger datasource removed - replaced by HyperDX unified observability (Issue #1564)
# For traces, use HyperDX UI at http://localhost:8180

apiVersion: 1

datasources:
  # Prometheus datasource for metrics
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: '15s'
      queryTimeout: '60s'
      httpMethod: 'POST'
    version: 1

  # HyperDX provides traces, logs, and session replay at http://localhost:8180
  # Manual datasource configuration available in HyperDX documentation if needed
