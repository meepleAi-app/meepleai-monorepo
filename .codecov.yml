# Codecov Configuration for MeepleAI
# https://docs.codecov.com/docs/codecov-yaml

codecov:
  require_ci_to_pass: true
  notify:
    after_n_builds: 2  # Wait for backend + frontend
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    # Overall project coverage
    project:
      default:
        target: auto
        threshold: 0.5%  # Allow 0.5% drop max
        base: auto
        if_ci_failed: error

    # Coverage on new code in PR
    patch:
      default:
        target: 80%  # New code must have 80%+ coverage
        threshold: 0%
        if_ci_failed: error

  # Track coverage by bounded context
  flags:
    # Backend overall
    backend:
      paths:
        - apps/api/src/Api/BoundedContexts/**
      target: 90%
      threshold: 0.5%
      carryforward: true
      carryforward_mode: "all"

    # Backend domain layer (highest quality requirement)
    backend-domain:
      paths:
        - apps/api/src/Api/BoundedContexts/**/Domain/**
      target: 95%
      threshold: 0.5%
      carryforward: true

    # Backend application handlers
    backend-handlers:
      paths:
        - apps/api/src/Api/BoundedContexts/**/Application/Handlers/**
      target: 90%
      threshold: 0.5%
      carryforward: true

    # Frontend overall
    frontend:
      paths:
        - apps/web/src/**
      target: 85%
      threshold: 0.5%
      carryforward: true
      carryforward_mode: "all"

    # Frontend state management
    frontend-stores:
      paths:
        - apps/web/src/store/**
      target: 70%
      threshold: 0.5%
      carryforward: true

    # Frontend React hooks
    frontend-hooks:
      paths:
        - apps/web/src/hooks/**
      target: 65%
      threshold: 0.5%
      carryforward: true

# Files to ignore
ignore:
  - "**/*.g.cs"  # Generated files
  - "**/Migrations/**"
  - "apps/web/.next/**"
  - "apps/web/out/**"
  - "**/*.stories.tsx"
  - "**/*.d.ts"
  - "apps/api/src/Api/Program.cs"
  - "**/obj/**"
  - "**/bin/**"
  - "apps/web/coverage/**"

# PR comment configuration
comment:
  layout: "header, diff, flags, files, footer"
  behavior: default
  require_changes: false
  require_base: true
  require_head: true

github_checks:
  annotations: true  # Add inline annotations to PRs

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no
