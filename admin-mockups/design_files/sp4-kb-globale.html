<style>
  /* ── Stage / page chrome (riusa pattern sp4-kb-hub) ── */
  .stage {
    min-height: 100vh;
    background: var(--bg);
    padding: 56px 24px 96px;
  }
  .stage-wrap {
    max-width: 1320px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: var(--s-7);
  }
  .stage-wrap h1 {
    font-size: clamp(28px, 4vw, 40px);
    letter-spacing: -.02em;
    margin: 0;
    color: var(--text);
  }
  .stage-wrap .lead {
    font-size: 15px;
    color: var(--text-sec);
    line-height: 1.55;
    max-width: 780px;
    margin: 0;
  }
  .section-label {
    font-family: var(--f-mono);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-muted);
    padding: 24px 0 4px;
    border-top: 1px dashed var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::before {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 2px;
    background: hsl(var(--c-kb));
  }
  .section-label .meta {
    margin-left: auto;
    font-weight: 500;
    color: var(--text-muted);
    opacity: .8;
  }

  /* ── Theme toggle (fixed top-right) ── */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: var(--z-overlay);
    padding: 8px 14px;
    border-radius: var(--r-pill);
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow-md);
    font-family: var(--f-display);
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    transition: transform var(--dur-sm) var(--ease-out);
  }
  .theme-toggle:hover { transform: translateY(-1px); }

  /* ── Annotation pill (per spec notes accanto agli screen) ── */
  .annotation {
    display: flex;
    gap: 12px;
    padding: 14px 18px;
    border-radius: var(--r-md);
    background: hsla(174, 60%, 40%, .08);
    border: 1px solid hsla(174, 60%, 40%, .25);
    border-left: 3px solid hsl(var(--c-kb));
    font-size: 12px;
    color: var(--text-sec);
    line-height: 1.55;
    font-family: var(--f-body);
  }
  .annotation .label {
    flex-shrink: 0;
    font-family: var(--f-mono);
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: hsl(var(--c-kb));
    padding-top: 1px;
  }

  /* ── Scrollbar tweaks ── */
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb {
    background: var(--border-strong);
    border-radius: 4px;
  }
  *::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
