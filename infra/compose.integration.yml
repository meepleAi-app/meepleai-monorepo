# Integration: Local API + frontend → staging services (meepleai.app)
#
# Two modes:
#   A) SSH tunnel: Postgres/Redis via SSH tunnel to staging server
#      Prerequisites: ssh -L 15432:localhost:5432 -L 16379:localhost:6379 deploy@204.168.135.69
#
#   B) Full remote: ALL services via meepleai.app
#      No SSH tunnel needed — everything goes through HTTPS + basic auth
#
# Usage:
#   docker compose -f docker-compose.yml -f compose.integration.yml up api web -d
#
# Secrets: cp -r infra/secrets/integration.example/ infra/secrets/integration/
#   Required: database.secret, redis.secret, jwt.secret,
#             openrouter.secret, admin.secret, services-auth.secret

services:
  api:
    ports: ["127.0.0.1:8080:8080"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    env_file:
      - ./secrets/integration/database.secret
      - ./secrets/integration/redis.secret
      - ./secrets/integration/jwt.secret
      - ./secrets/integration/openrouter.secret
      - ./secrets/integration/admin.secret
      - ./secrets/integration/services-auth.secret
    environment:
      ASPNETCORE_ENVIRONMENT: Integration
      ASPNETCORE_URLS: http://+:8080
      # Mode A: SSH tunnel (default)
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: "15432"
      REDIS_HOST: host.docker.internal
      REDIS_PORT: "16379"
      # AI services via meepleai.app (both modes)
      EMBEDDING_PROVIDER: external
      Embedding__Provider: External
      EMBEDDING_MODEL: intfloat/multilingual-e5-base
      EMBEDDING_DIMENSIONS: 768
      Embedding__Dimensions: 768
      LOCAL_EMBEDDING_URL: https://meepleai.app/services/embedding
      Embedding__LocalServiceUrl: https://meepleai.app/services/embedding
      RERANKER_URL: https://meepleai.app/services/reranker
      EMBEDDING_FALLBACK_ENABLED: "false"
      Embedding__FallbackEnabled: "false"
      # Mode B overrides (uncomment to use full remote without SSH tunnel):
      # POSTGRES_HOST: meepleai.app  # Requires Traefik TCP route (not yet configured)
      # REDIS_HOST: meepleai.app     # Requires Traefik TCP route (not yet configured)
    volumes:
      - ./secrets/integration:/app/infra/secrets:ro

  web:
    ports: ["127.0.0.1:3000:3000"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE: http://localhost:8080
