name: 'Setup Frontend Environment'
description: 'Sets up pnpm, Node.js, and installs frontend dependencies with caching'
inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'
  pnpm-version:
    description: 'pnpm version to use'
    required: false
    default: '10'
  working-directory:
    description: 'Working directory for pnpm operations'
    required: false
    default: 'apps/web'
  frozen-lockfile:
    description: 'Use frozen lockfile for installations'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: ${{ inputs.pnpm-version }}
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        # Note: Built-in cache disabled because actions/setup-node doesn't include
        # runner.arch in cache key, causing x86/ARM64 cache collisions (GH issue #1008).
        # Custom cache step below uses runner.arch-aware keys instead.

    - name: Get pnpm store directory
      shell: bash
      run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Cache pnpm modules
      uses: actions/cache@v5
      with:
        path: ${{ env.STORE_PATH }}
        # Issue #850: cache fingerprint widened to include .npmrc (registry +
        # auth config affects resolution). vars.CACHE_VERSION is the
        # emergency invalidation knob — bump 'v1' → 'v2' to flush all pnpm
        # caches without code change.
        key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ vars.CACHE_VERSION || 'v1' }}-${{ hashFiles(format('{0}/pnpm-lock.yaml', inputs.working-directory), format('{0}/.npmrc', inputs.working-directory)) }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ vars.CACHE_VERSION || 'v1' }}-
          ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ "${{ inputs.frozen-lockfile }}" == "true" ]; then
          pnpm install --frozen-lockfile
        else
          pnpm install
        fi
