name: Backend E2E Tests

on:
  pull_request:
    branches: [main, main-staging]
    paths:
      - 'apps/api/**'
      - 'tests/Api.Tests/E2E/**'
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: backend-e2e-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Minimal required permissions
permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # Quick path filtering
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      e2e-needed: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            e2e:
              - 'apps/api/**'
              - 'tests/Api.Tests/E2E/**'
              - '.github/workflows/backend-e2e-tests.yml'

  # Backend E2E Tests with Testcontainers
  backend-e2e-tests:
    name: Backend E2E Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.e2e-needed == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Dependencies
        working-directory: apps/api
        run: dotnet restore

      - name: Build Solution
        working-directory: apps/api
        run: dotnet build --no-restore --configuration Release

      - name: Run E2E Tests
        working-directory: apps/api
        run: |
          dotnet test tests/Api.Tests/Api.Tests.csproj \
            --no-build \
            --configuration Release \
            --filter "Category=E2E" \
            --logger "trx;LogFileName=e2e-test-results.trx" \
            --logger "console;verbosity=detailed" \
            --results-directory ./TestResults \
            -- RunConfiguration.TestSessionTimeout=600000
        env:
          CI: true
          DOTNET_ENVIRONMENT: Testing

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-e2e-test-results
          path: apps/api/TestResults/
          retention-days: 7

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: apps/api/TestResults/**/*.trx
          check_name: Backend E2E Test Results
          comment_mode: off

  # Quality Gate
  backend-e2e-quality-gate:
    name: Backend E2E Quality Gate
    runs-on: ubuntu-latest
    needs: backend-e2e-tests
    if: always()
    steps:
      - name: Check Test Results
        run: |
          if [ "${{ needs.backend-e2e-tests.result }}" == "success" ]; then
            echo "✅ Backend E2E tests passed"
          else
            echo "❌ Backend E2E tests failed"
            exit 1
          fi

      - name: Comment PR with Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          script: |
            const status = '${{ needs.backend-e2e-tests.result }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const statusText = status === 'success' ? 'PASSED' : 'FAILED';

            const body = `## ${emoji} Backend E2E Test Results: ${statusText}

            **Status**: ${statusText}

            **Test Categories**:
            - Authentication Flow
            - Game Management
            - Share Request Workflow
            - User Library Management
            - Notification Management
            - Document Processing
            - Chat/AI Flows

            **Artifacts**:
            - Test results (.trx) available in workflow artifacts

            Issue #3012: Backend E2E Test Suite`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
