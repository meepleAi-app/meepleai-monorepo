# OPS-07: Alertmanager Configuration
# Multi-channel alerting for MeepleAI with API webhook integration
#
# Environment variables loaded from:
# - infra/secrets/email.secret: SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD, SMTP_FROM_EMAIL
# - infra/secrets/monitoring.secret: SLACK_WEBHOOK_URL
# - infra/env/alertmanager.env: SMTP_FROM, ALERT_EMAIL_TO, SECURITY_ALERT_EMAIL_TO

global:
  # Time to wait before sending notifications about resolved alerts
  resolve_timeout: 5m

  # SMTP configuration for email notifications
  # Credentials loaded from infra/secrets/email.secret via env_file
  smtp_smarthost: '${SMTP_HOST}:${SMTP_PORT}'
  smtp_from: '${SMTP_FROM_EMAIL}'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

  # Slack webhook URL (configure via environment variable)
  # Set SLACK_WEBHOOK_URL in your environment or .env file
  # slack_api_url: ${SLACK_WEBHOOK_URL}

# The root route on which each incoming alert enters
route:
  # Group alerts by these labels to reduce notification spam
  # Alerts with the same values for these labels will be grouped together
  group_by: ['alertname', 'service', 'severity']

  # How long to wait before sending the first notification for a group
  # This allows time to collect similar alerts into a single notification
  group_wait: 10s

  # How long to wait before sending notification about new alerts added to a group
  group_interval: 5m

  # How long to wait before re-sending notifications for unresolved alerts
  repeat_interval: 4h

  # Default receiver for all alerts (API webhook)
  receiver: 'meepleai-api-webhook'

  # Child routes for specific alert types
  routes:
    # Critical alerts -> immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 0s
      repeat_interval: 15m
      continue: true  # Also send to default receiver

    # Warning alerts -> throttled
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 30s
      repeat_interval: 2h

    # RAG/AI specific errors
    - match:
        category: rag
      receiver: 'ai-alerts'
      group_wait: 30s
      repeat_interval: 1h

    # Dependency health alerts (Postgres, Redis, Qdrant)
    - match:
        category: dependency
      receiver: 'dependency-alerts'
      group_wait: 10s
      repeat_interval: 30m

    # SEC-08: 2FA security alerts (brute force, replay attacks)
    - match:
        category: security
      receiver: '2fa-security-alerts'
      group_wait: 5s
      repeat_interval: 15m
      continue: true  # Also send to default receiver

# Receivers define where to send notifications
receivers:
  # OPS-07: MeepleAI API webhook receiver (primary)
  # Forwards all alerts to our AlertingService which handles multi-channel distribution
  - name: 'meepleai-api-webhook'
    webhook_configs:
      - url: 'http://api:8080/api/v1/alerts/prometheus'
        send_resolved: true
        http_config:
          follow_redirects: true
        max_alerts: 0  # No limit on batch size

  # Legacy receiver - console only (for development/fallback)
  - name: 'default'
    # No configuration needed - alerts appear in Alertmanager UI

  # Critical alerts - Email notifications enabled
  - name: 'critical-alerts'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        headers:
          Subject: '🚨 [CRITICAL] {{ .GroupLabels.alertname }} - MeepleAI'
        html: |
          <h2 style="color: #d93025;">🚨 CRITICAL ALERT</h2>
          <h3>{{ .GroupLabels.alertname }}</h3>
          {{ range .Alerts }}
          <div style="border-left: 4px solid #d93025; padding-left: 12px; margin: 16px 0;">
            <p><strong>Alert:</strong> {{ .Labels.alertname }}</p>
            <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
            <p><strong>Service:</strong> {{ .Labels.service }}</p>
            <p><strong>Description:</strong> {{ .Annotations.description }}</p>
            <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
            <p><strong>Started:</strong> {{ .StartsAt.Format "2006-01-02 15:04:05 MST" }}</p>
            {{ if .Annotations.dashboard_url }}
            <p><a href="{{ .Annotations.dashboard_url }}">View Dashboard</a></p>
            {{ end }}
            {{ if .Annotations.runbook_url }}
            <p><a href="{{ .Annotations.runbook_url }}">View Runbook</a></p>
            {{ end }}
          </div>
          {{ end }}
        send_resolved: true

    # SLACK: Uncomment to also send to Slack
    # slack_configs:
    #   - api_url: ${SLACK_WEBHOOK_URL}
    #     channel: '#alerts'
    #     title: '🚨 [CRITICAL] {{ .GroupLabels.alertname }}'

  # Warning alerts - Email notifications enabled
  - name: 'warning-alerts'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        headers:
          Subject: '⚠️ [WARNING] {{ .GroupLabels.alertname }} - MeepleAI'
        html: |
          <h2 style="color: #ea8600;">⚠️ WARNING ALERT</h2>
          <h3>{{ .GroupLabels.alertname }}</h3>
          {{ range .Alerts }}
          <div style="border-left: 4px solid #ea8600; padding-left: 12px; margin: 16px 0;">
            <p><strong>Alert:</strong> {{ .Labels.alertname }}</p>
            <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
            <p><strong>Description:</strong> {{ .Annotations.description }}</p>
            <p><strong>Started:</strong> {{ .StartsAt.Format "2006-01-02 15:04:05 MST" }}</p>
            {{ if .Annotations.dashboard_url }}
            <p><a href="{{ .Annotations.dashboard_url }}">View Dashboard</a></p>
            {{ end }}
          </div>
          {{ end }}
        send_resolved: true

  # AI/RAG specific alerts
  - name: 'ai-alerts'
    # Configure notifications here if needed

  # Dependency health alerts
  - name: 'dependency-alerts'
    # Configure notifications here if needed

  # SEC-08: 2FA Security alerts - Email + Slack notifications
  - name: '2fa-security-alerts'
    email_configs:
      - to: '${SECURITY_ALERT_EMAIL_TO}'
        headers:
          Subject: '🔐 [{{ .GroupLabels.severity | toUpper }}] 2FA Security Alert - {{ .GroupLabels.alertname }}'
        html: |
          <h2 style="color: {{ if eq .GroupLabels.severity "critical" }}#d93025{{ else }}#ea8600{{ end }};">
            🔐 2FA SECURITY ALERT
          </h2>
          <h3>{{ .GroupLabels.alertname }}</h3>
          {{ range .Alerts }}
          <div style="border-left: 4px solid {{ if eq .Labels.severity "critical" }}#d93025{{ else }}#ea8600{{ end }}; padding-left: 12px; margin: 16px 0;">
            <p><strong>Severity:</strong> {{ .Labels.severity | toUpper }}</p>
            <p><strong>Attack Type:</strong> {{ .Labels.attack_type }}</p>
            <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
            <p><strong>Description:</strong></p>
            <pre style="background: #f5f5f5; padding: 12px; border-radius: 4px;">{{ .Annotations.description }}</pre>
            <p><strong>Started:</strong> {{ .StartsAt.Format "2006-01-02 15:04:05 MST" }}</p>
            {{ if .Annotations.dashboard_url }}
            <p><a href="{{ .Annotations.dashboard_url }}" style="background: #1a73e8; color: white; padding: 8px 16px; text-decoration: none; border-radius: 4px;">View Dashboard</a></p>
            {{ end }}
            {{ if .Annotations.runbook_url }}
            <p><a href="{{ .Annotations.runbook_url }}">Incident Runbook</a></p>
            {{ end }}
          </div>
          {{ end }}
        send_resolved: true

    # SLACK: Enable for Slack notifications (requires SLACK_WEBHOOK_URL env var)
    # Uncomment and set SLACK_WEBHOOK_URL environment variable to enable
    # slack_configs:
    #   - api_url: '${SLACK_WEBHOOK_URL}'
    #     channel: '#security-alerts'
    #     username: 'MeepleAI Security'
    #     icon_emoji: ':shield:'
    #     title: '🔐 {{ .GroupLabels.severity | toUpper }}: {{ .GroupLabels.alertname }}'
    #     text: |
    #       {{ range .Alerts }}
    #       *Attack Type*: {{ .Labels.attack_type }}
    #       *Summary*: {{ .Annotations.summary }}
    #       *Description*: {{ .Annotations.description }}
    #       *Dashboard*: {{ .Annotations.dashboard_url }}
    #       {{ end }}
    #     send_resolved: true

# Inhibition rules - suppress certain alerts when others are firing
inhibit_rules:
  # Inhibit warning alerts if critical alert is firing for the same service
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'service']

  # Inhibit dependency alerts if the main service alert is firing
  - source_match:
      alertname: 'ServiceDown'
    target_match:
      category: dependency
    equal: ['service']
