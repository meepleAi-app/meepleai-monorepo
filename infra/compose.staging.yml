# Docker Compose - Staging Environment
# Production-like environment for pre-release testing

services:
  postgres:
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
      POSTGRES_DB: meepleai_staging
    volumes:
      - pgdata-staging:/var/lib/postgresql/data
      - ./init/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata-staging:/data

  qdrant:
    restart: unless-stopped
    volumes:
      - qdrantdata-staging:/qdrant/storage

  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ConnectionStrings__Postgres: "Host=postgres;Database=meepleai_staging;Username=meepleai;Password_File=/run/secrets/postgres-password"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    environment:
      NODE_ENV: staging
      NEXT_PUBLIC_API_BASE: ${STAGING_API_URL}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Full observability stack enabled
  grafana:
    restart: unless-stopped

  prometheus:
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=60d'  # Longer retention for staging
      - '--web.enable-lifecycle'

  jaeger:
    restart: unless-stopped

  seq:
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORDHASH=${SEQ_PASSWORD_HASH}

  alertmanager:
    restart: unless-stopped

volumes:
  pgdata-staging:
  redisdata-staging:
  qdrantdata-staging:
