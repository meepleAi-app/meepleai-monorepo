# Epic #4068: Nginx Configuration
# Production-ready reverse proxy with caching, rate limiting, and security headers

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=permission_api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=general_api:10m rate=1000r/m;

# Permission API cache zone (5-minute cache)
proxy_cache_path /var/cache/nginx/permissions levels=1:2 keys_zone=permission_cache:10m max_size=100m inactive=5m;

# Upstream servers
upstream meepleai_api {
    least_conn; # Load balancing: Least connections

    server api-1:8080 max_fails=3 fail_timeout=30s;
    server api-2:8080 max_fails=3 fail_timeout=30s;
    server api-3:8080 max_fails=3 fail_timeout=30s;

    # Health check (requires nginx_upstream_check_module)
    check interval=3000 rise=2 fall=3 timeout=1000 type=http;
    check_http_send "HEAD /health HTTP/1.0\r\n\r\n";
    check_http_expect_alive http_2xx http_3xx;
}

upstream meepleai_web {
    server web-1:3000;
    server web-2:3000;
}

# Main server block (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name app.meepleai.com api.meepleai.com;

    # SSL configuration
    ssl_certificate /etc/nginx/ssl/meepleai.com.crt;
    ssl_certificate_key /etc/nginx/ssl/meepleai.com.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers off;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Epic #4068: Permissions-Specific CSP
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss://api.meepleai.com; frame-ancestors 'none';" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # ========================================================================
    # Permission API Routes (Epic #4068)
    # ========================================================================

    # GET /api/v1/permissions/me - Cached for 5 minutes
    location = /api/v1/permissions/me {
        # Rate limiting: 100 req/min per IP
        limit_req zone=permission_api burst=10 nodelay;

        # Proxy to backend
        proxy_pass http://meepleai_api;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Caching (per-user, 5 minutes)
        proxy_cache permission_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri$http_authorization"; # Include auth header in key
        proxy_cache_valid 200 5m; # Cache 200 responses for 5 minutes
        proxy_cache_valid 403 1m; # Cache 403 (denied) for 1 minute
        proxy_cache_valid 401 0; # Don't cache 401 (unauthorized)

        # Cache headers
        add_header X-Cache-Status $upstream_cache_status always;

        # Cache bypass for admins (always fresh)
        proxy_cache_bypass $http_x_admin_bypass;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 10s;
    }

    # GET /api/v1/permissions/check - Cached for 5 minutes
    location ~ ^/api/v1/permissions/check {
        limit_req zone=permission_api burst=20 nodelay;

        proxy_pass http://meepleai_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Caching (per-user + feature)
        proxy_cache permission_cache;
        proxy_cache_key "$http_authorization$arg_feature$arg_state";
        proxy_cache_valid 200 5m;
        proxy_cache_valid 403 1m;

        add_header X-Cache-Status $upstream_cache_status always;

        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }

    # Other API routes (no caching, standard rate limit)
    location /api/ {
        limit_req zone=general_api burst=50 nodelay;

        proxy_pass http://meepleai_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # No caching for general API
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ========================================================================
    # Frontend Routes
    # ========================================================================

    location / {
        proxy_pass http://meepleai_web;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Next.js specific
        proxy_buffering off;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Static assets (long cache)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://meepleai_web;

        # Cache static assets for 1 year
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Disable access log for static files
        access_log off;
    }

    # ========================================================================
    # WebSocket (SignalR/SSE for Epic #4068 real-time updates)
    # ========================================================================

    location /hubs/permissions {
        proxy_pass http://meepleai_api;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Long timeout for WebSocket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Disable buffering for WebSocket
        proxy_buffering off;

        # Disable caching for WebSocket
        proxy_cache off;
    }

    # ========================================================================
    # Health Checks
    # ========================================================================

    location /health {
        proxy_pass http://meepleai_api;
        access_log off; # Don't log health checks
    }

    # Epic #4068 specific health check
    location /health/epic-4068 {
        proxy_pass http://meepleai_api;
        access_log off;
    }

    # ========================================================================
    # Monitoring
    # ========================================================================

    location /metrics {
        proxy_pass http://meepleai_api;

        # Restrict access to Prometheus scraper only
        allow 10.0.0.0/8; # Internal network
        deny all;

        access_log off;
    }

    # Nginx stub_status (internal only)
    location /nginx_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
        access_log off;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;

    server_name app.meepleai.com api.meepleai.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ============================================================================
# Logging Configuration
# ============================================================================

# Access log format (includes cache status, permission checks)
log_format epic4068 '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'cache=$upstream_cache_status '
                    'rt=$request_time '
                    'uct=$upstream_connect_time '
                    'uht=$upstream_header_time '
                    'urt=$upstream_response_time';

access_log /var/log/nginx/access.log epic4068;
error_log /var/log/nginx/error.log warn;

# ============================================================================
# Performance Tuning
# ============================================================================

# Worker processes (auto-detect CPU cores)
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll; # Linux-specific, efficient event model
    multi_accept on;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Buffer sizes
    client_body_buffer_size 128k;
    client_max_body_size 10m; # Epic #4068: PDF uploads
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # Timeouts
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;

    # Epic #4068: Permission cache configuration
    proxy_cache_lock on; # Prevent cache stampede
    proxy_cache_lock_timeout 5s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on; # Refresh cache in background

    # Include server blocks above
}
