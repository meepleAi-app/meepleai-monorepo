# Staging: meepleai.app deployment
# Server: deploy@204.168.135.69 (Hetzner CAX21 ARM64)
#
# Usage (post CF Tunnel cutover, T18 Phase 6):
#   docker compose -f docker-compose.yml -f compose.staging.yml \
#     --profile ai-essential --profile monitoring-essential up -d
# Edge ingress is via cloudflared service on VPS (not via Traefik in compose).
# For rollback see docs/operations/cf-tunnel-rollback.md.

services:
  # ===========================================================================
  # Core Infrastructure
  # ===========================================================================

  postgres:
    restart: always
    env_file: [./secrets/database.secret]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meepleai_staging}
      POSTGRES_USER: ${POSTGRES_USER:-meepleai}
    volumes:
      - pgdata-staging:/var/lib/postgresql/data
      - ./init/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    restart: always
    env_file: [./secrets/redis.secret]
    command: ["sh", "-c", "redis-server /etc/redis/redis.conf --requirepass $$REDIS_PASSWORD"]
    volumes:
      - redisdata-staging:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro

  # ===========================================================================
  # Application Services
  # ===========================================================================

  api:
    restart: always
    # Staging must NEVER fall back to the local `meepleai-api:latest` image
    # (built by compose.dev.yml). Manual restarts (`make staging-minimal`)
    # would otherwise silently run stale code. The deploy workflow injects
    # API_IMAGE from `needs.build.outputs.api_image`; for manual recovery on
    # the VPS use:
    #   export API_IMAGE=ghcr.io/meepleai-app/meepleai-monorepo/api:staging-<sha>
    image: ${API_IMAGE:?API_IMAGE env var required for staging — set to GHCR tag}
    pull_policy: always
    # CF Tunnel exposure: bind 8080 on localhost (IPv4 + IPv6 dual-stack)
    # cloudflared resolves localhost → ::1 first; without IPv6 binding it returns 502.
    ports:
      - "127.0.0.1:8080:8080"
      - "::1:8080:8080"
    env_file:
      - ./secrets/database.secret
      - ./secrets/jwt.secret
      - ./secrets/admin.secret
      - ./secrets/openrouter.secret
      - ./secrets/deepseek.secret
      - ./secrets/oauth.secret
      - ./secrets/redis.secret
      - ./secrets/embedding-service.secret
      - ./secrets/email.secret
      - ./secrets/storage.secret
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ASPNETCORE_URLS: http://+:8080
      SEED_PROFILE: Staging
      # F4 (hotfix #818): DataProtection keys must persist across container
      # restarts. Without persisted keys every API restart invalidates every
      # meepleai_user_role_v2 cookie. Path matches the named volume mount below.
      DATAPROTECTION__KEYSPATH: /app/dataprotection
      # DevOps wave 1: STAGING_ALLOWED_EMAILS loaded from admin.secret env_file above.
      # Empty value = open access (warning logged at startup). To populate:
      # echo "STAGING_ALLOWED_EMAILS=badsworm@gmail.com" >> infra/secrets/admin.secret
      SEED_BUCKET_NAME: ${SEED_BUCKET_NAME:-}
      SEED_BUCKET_ENDPOINT: ${SEED_BUCKET_ENDPOINT:-}
      SEED_BUCKET_REGION: ${SEED_BUCKET_REGION:-auto}
      SEED_BUCKET_FORCE_PATH_STYLE: ${SEED_BUCKET_FORCE_PATH_STYLE:-false}
      # SEED_BUCKET_ACCESS_KEY and SEED_BUCKET_SECRET_KEY are loaded from storage.secret
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-meepleai}
      POSTGRES_DB: ${POSTGRES_DB:-meepleai_staging}
      REDIS_HOST: redis
      EMBEDDING_PROVIDER: external
      Embedding__Provider: External
      LOCAL_EMBEDDING_URL: http://embedding-service:8000
      Embedding__LocalServiceUrl: http://embedding-service:8000
      RERANKER_URL: http://reranker-service:8003
      EMBEDDING_MODEL: intfloat/multilingual-e5-base
      Embedding__Model: intfloat/multilingual-e5-base
      Embedding__Dimensions: 768
      Authentication__OAuth__CallbackBaseUrl: "https://meepleai.app"
      Frontend__BaseUrl: "https://meepleai.app"
      Authentication__SessionCookie__Secure: "true"
      Authentication__SessionCookie__SameSite: "Lax"
      # Ollama disabled in staging — all LLM traffic goes to OpenRouter
      AI__Providers__Ollama__Enabled: "false"
      # AI extraction services — URLs must be valid for startup validation.
      # Services may not be running in minimal profile, but URLs must pass validation.
      PdfProcessing__Extractor__SmolDocling__ApiUrl: "http://smoldocling-service:8002"
      PdfProcessing__Extractor__Unstructured__ApiUrl: "http://unstructured-service:8001"
    volumes:
      - ./secrets:/app/infra/secrets:ro
      # F4: persisted DataProtection key ring (see DATAPROTECTION__KEYSPATH above).
      # Dedicated named volume — must NOT share with /app/pdf_uploads which is
      # rotated when uploads are pruned.
      - dataprotection-keys-staging:/app/dataprotection
    # Traefik labels removed — staging now via Cloudflare Tunnel (cloudflared service on VPS).
    # Routes meepleai.app/* and api.meepleai.app/* are configured in CF dashboard tunnel public hostnames.
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  web:
    restart: always
    # Same rationale as api.image above — explicit GHCR image required.
    image: ${WEB_IMAGE:?WEB_IMAGE env var required for staging — set to GHCR tag}
    pull_policy: always
    # CF Tunnel exposure: bind 3000 on localhost (IPv4 + IPv6 dual-stack)
    # cloudflared resolves localhost → ::1 first; without IPv6 binding it returns 502.
    ports:
      - "127.0.0.1:3000:3000"
      - "::1:3000:3000"
    build:
      args:
        NEXT_PUBLIC_API_BASE: "https://meepleai.app"
        NEXT_PUBLIC_APP_URL: "https://meepleai.app"
        NEXT_PUBLIC_GRAFANA_URL: /grafana
        # ADR-051 M2.1 — Mechanic Extractor AI Comprehension Validation.
        # NEXT_PUBLIC_* are inlined at build time by Next.js, so the flag
        # must be set both as a build arg AND a runtime env (below) for
        # SSR/server-rendered pages to read the same value. Default off
        # in staging until the calibration spike (Tasks 23-24) clears.
        NEXT_PUBLIC_MECHANIC_VALIDATION_ENABLED: "${NEXT_PUBLIC_MECHANIC_VALIDATION_ENABLED:-false}"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE: "https://meepleai.app"
      NEXT_PUBLIC_APP_URL: "https://meepleai.app"
      API_BASE_URL: http://api:8080
      LOKI_URL: http://loki:3100
      NEXT_PUBLIC_GRAFANA_URL: /grafana
      NEXT_PUBLIC_MECHANIC_VALIDATION_ENABLED: "${NEXT_PUBLIC_MECHANIC_VALIDATION_ENABLED:-false}"
    # Traefik labels removed — see api block above.
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ===========================================================================
  # AI Services — internal-only (post-PR #738: CF Tunnel handles edge, no public exposure)
  # Resource limits are reduced vs base compose (CAX21 has 8GB total).
  # Use 'make staging' only when AI features are needed; prefer 'make staging-core' otherwise.
  # ===========================================================================

  embedding-service:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Traefik labels removed (post CF Tunnel cutover). Internal service exposed only on docker network.

  reranker-service:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Traefik labels removed (post CF Tunnel cutover). Internal service exposed only on docker network.

  # Disabled in staging — PDF extraction uses local Docnet (see api.environment).
  # Re-enable with profile 'pdf-cloud-extractors' if switching Extractor:Provider.
  unstructured-service:
    profiles: [pdf-cloud-extractors]
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Traefik labels removed (post CF Tunnel cutover). Internal service exposed only on docker network.

  smoldocling-service:
    profiles: [pdf-cloud-extractors]
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    # Traefik labels removed (post CF Tunnel cutover). Internal service exposed only on docker network.

  orchestration-service:
    restart: always
    env_file:
      - ./secrets/database.secret
      - ./secrets/redis.secret
      - ./secrets/openrouter.secret
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Ollama excluded from staging: 4GB RAM reservation saved on CAX21 (8GB total).
  # All LLM traffic uses OpenRouter. Re-enable with profile 'ollama' if needed.
  ollama:
    profiles: [ollama-local-dev-only]

  ollama-pull:
    profiles: [ollama-local-dev-only]

  # ===========================================================================
  # Monitoring — exposed via CF Tunnel ingress (configured separately on VPS)
  # ===========================================================================

  grafana:
    restart: always
    env_file: [./secrets/monitoring.secret]
    # External access via Cloudflare Tunnel: grafana.meepleai.app → localhost:3001 → container :3000.
    # Behind CF Access policy meepleai-prod (owner-only).
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SERVER_ROOT_URL: "https://grafana.meepleai.app"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - grafana-staging:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro

  prometheus:
    restart: always
    # External access via Cloudflare Tunnel: prometheus.meepleai.app → localhost:9090 → container :9090.
    # Behind CF Access policy meepleai-prod (owner-only).
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=60d'
      - '--storage.tsdb.retention.size=5GB'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.staging.yml:/etc/prometheus/prometheus.yml:ro  # staging-specific labels
      - ./prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheus-staging:/prometheus

  alertmanager:
    restart: always

  n8n:
    restart: always

# Traefik service definition removed (PR #738, post CF Tunnel cutover, T18 Phase 6).
# Edge is now Cloudflare Tunnel (cloudflared on VPS). For rollback see
# docs/operations/cf-tunnel-rollback.md (compose.traefik.yml backup in /tmp/traefik-backup-*.tgz on VPS).

# =============================================================================
# Preserve existing staging volume names to avoid data loss
# =============================================================================
volumes:
  pgdata-staging:
    name: meepleai-pgdata-staging
  redisdata-staging:
    name: meepleai-redisdata-staging
  prometheus-staging:
    name: meepleai-prometheus-staging
  grafana-staging:
    name: meepleai-grafana-staging
  # F4 (hotfix #818): persistent DataProtection key ring for the API.
  # Mounted at /app/dataprotection in the api service and read via
  # DATAPROTECTION__KEYSPATH. Must survive container recreate; no PII inside,
  # but rotation is non-trivial — invalidates all meepleai_user_role_v2
  # cookies in the wild.
  dataprotection-keys-staging:
    name: meepleai-dataprotection-keys-staging
