version: 1

checks:
  - check_name: "Backend - Unit Tests"
    severity: blocker
    owner: backend-dev
    override_path: fix-forward
    pre_existing_in_main_dev: false
    notes: "xUnit suite."

  - check_name: "Frontend - A11y E2E"
    severity: warning
    owner: qa
    override_path: baseline-update
    pre_existing_in_main_dev: true
    notes: "#1094 baseline."

  - check_name: "Lychee Link Check"
    severity: informational
    owner: devops
    override_path: exception-comment
    pre_existing_in_main_dev: true
    notes: "Link rot."

fallback_patterns:
  - pattern: "^Backend - "
    severity: blocker
    owner: backend-dev
    override_path: fix-forward
    notes: "Catch-all backend integration."

  - pattern: "(?i)security|codeql"
    severity: blocker
    owner: devops
    override_path: revert
    notes: "Catch-all security."

bot:
  signature_header: "<!-- release-gate-bot:v1 -->"
  verdict_emoji:
    blocker: "❌"
    warning: "⚠️"
    informational: "ℹ️"
    unknown: "🆕"
  fallback_unknown:
    severity: warning
    owner: unknown
    override_path: exception-comment
