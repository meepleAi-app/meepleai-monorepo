# Epic #4068: Docker Compose Configuration
# Includes all services needed for permission system, caching, monitoring

version: '3.9'

services:
  # PostgreSQL with permission system indexes
  postgres:
    image: postgres:16-alpine
    container_name: meepleai-postgres-epic4068
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: meepleai
      # Performance tuning for permission queries
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Epic #4068: Custom postgres.conf for permission query optimization
      - ./infra/postgres/epic-4068-postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meepleai-network

  # Redis for permission caching (HybridCache backend)
  redis:
    image: redis:7-alpine
    container_name: meepleai-redis-epic4068
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly no
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - meepleai-network

  # Backend API with permission system
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: meepleai-api-epic4068
    environment:
      # Database
      - DATABASE_URL=Host=postgres;Database=meepleai;Username=postgres;Password=${DB_PASSWORD:-postgres}
      - REDIS_URL=redis:6379

      # Epic #4068: Permission system config
      - PERMISSION_CACHE_DURATION_MINUTES=5
      - PERMISSION_RATE_LIMIT_PER_MINUTE=100
      - PERMISSION_REGISTRY_CACHE_ENABLED=true

      # Feature flags
      - FEATURE_FLAG_EPIC_4068_ENABLED=true

      # Observability
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=meepleai-api-epic4068
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/epic-4068"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - meepleai-network

  # Frontend with Epic #4068 features
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: meepleai-web-epic4068
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080

      # Epic #4068: Frontend config
      - NEXT_PUBLIC_EPIC_4068_ENABLED=true
      - NEXT_PUBLIC_PERMISSION_CACHE_TIME_MS=300000
      - NEXT_PUBLIC_TAGS_ENABLED=true
      - NEXT_PUBLIC_AGENT_METADATA_ENABLED=true
      - NEXT_PUBLIC_SMART_TOOLTIPS_ENABLED=true
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - meepleai-network

  # Prometheus (metrics collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-epic4068
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./infra/monitoring/prometheus/epic-4068-prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - meepleai-network

  # Grafana (visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-epic4068
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - ./infra/monitoring/grafana/dashboards/epic-4068-complete-dashboard.json:/etc/grafana/provisioning/dashboards/epic4068.json:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - meepleai-network

  # Redis Commander (Redis management UI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander-epic4068
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - meepleai-network

volumes:
  postgres-data:
    name: meepleai-postgres-epic4068-data
  redis-data:
    name: meepleai-redis-epic4068-data
  prometheus-data:
    name: prometheus-epic4068-data
  grafana-data:
    name: grafana-epic4068-data

networks:
  meepleai-network:
    name: meepleai-epic4068-network
    driver: bridge

# ============================================================================
# Usage
# ============================================================================

# Start all services
# docker compose -f docker-compose.epic-4068.yml up -d

# View logs
# docker compose -f docker-compose.epic-4068.yml logs -f api

# Apply database migration
# docker compose -f docker-compose.epic-4068.yml exec api dotnet ef database update

# Run tests
# docker compose -f docker-compose.epic-4068.yml exec api dotnet test

# Access services:
# - API: http://localhost:8080
# - Web: http://localhost:3000
# - Grafana: http://localhost:3001 (admin/admin)
# - Prometheus: http://localhost:9090
# - Redis Commander: http://localhost:8081

# Stop all services
# docker compose -f docker-compose.epic-4068.yml down

# Clean everything (including volumes - DATA LOSS!)
# docker compose -f docker-compose.epic-4068.yml down -v
