name: Sync Branches After Production Release

on:
  push:
    branches: [main]

# Only allow one sync operation at a time
concurrency:
  group: sync-branches
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync-dev:
    name: Auto-Sync main → main-dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync main → main-dev
        run: |
          echo "🔄 Syncing main → main-dev after production release..."

          # Fetch latest changes
          git fetch origin main-dev

          # Checkout main-dev
          git checkout main-dev

          # Merge main into main-dev
          git merge origin/main --no-ff -m "chore: auto-sync main-dev with production release

Co-Authored-By: GitHub Actions <github-actions[bot]@users.noreply.github.com>"

          # Push changes
          git push origin main-dev

          echo "✅ Successfully synced main-dev with production"

      - name: Create Sync Summary
        if: success()
        run: |
          echo "## ✅ Branch Sync Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**main** → **main-dev** sync successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`$(git rev-parse --short HEAD)\`" >> $GITHUB_STEP_SUMMARY
          echo "**Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY

      - name: Notify on Failure
        if: failure()
        run: |
          echo "## ❌ Branch Sync Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Manual intervention required to sync main-dev with production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run manually:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "git checkout main-dev" >> $GITHUB_STEP_SUMMARY
          echo "git merge main --no-ff" >> $GITHUB_STEP_SUMMARY
          echo "git push origin main-dev" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

