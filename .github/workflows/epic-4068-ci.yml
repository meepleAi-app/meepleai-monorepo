# Epic #4068: CI/CD Pipeline

name: Epic #4068 - MeepleCard Enhancements

on:
  pull_request:
    branches: [main-dev, frontend-dev]
    paths:
      - 'apps/api/src/Api/BoundedContexts/Administration/**'
      - 'apps/api/src/Api/BoundedContexts/Authentication/Domain/**'
      - 'apps/api/src/Api/Routing/PermissionRoutes.cs'
      - 'apps/web/src/components/ui/tags/**'
      - 'apps/web/src/components/ui/agent/**'
      - 'apps/web/src/contexts/PermissionContext.tsx'
      - 'apps/web/src/types/permissions.ts'
      - 'apps/web/src/types/tags.ts'
      - 'apps/web/src/types/agent.ts'
      - 'tests/**/*Permission*.cs'
      - '.github/workflows/epic-4068-ci.yml'

  workflow_dispatch:
    inputs:
      run_all:
        description: 'Run all jobs (bypass path filtering)'
        required: false
        default: false
        type: boolean

concurrency:
  group: epic-4068-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '20.x'
  PNPM_VERSION: '9.x'

jobs:
  backend-unit-tests:
    name: Backend Unit Tests (Permission System)
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: |
          cd apps/api/src/Api
          dotnet restore

      - name: Build
        run: |
          cd apps/api/src/Api
          dotnet build --no-restore --configuration Release

      - name: Run Permission Unit Tests
        run: |
          cd apps/api/src/Api
          dotnet test --no-build --configuration Release \
            --filter "FullyQualifiedName~Permission" \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Run Administration Domain Tests
        run: |
          cd apps/api/src/Api
          dotnet test --no-build --configuration Release \
            --filter "Category=Unit&BoundedContext=Administration" \
            --logger "trx;LogFileName=admin-test-results.trx"

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-test-results
          path: |
            apps/api/src/Api/TestResults/*.trx
            apps/api/src/Api/TestResults/*/coverage.cobertura.xml

      - name: Code Coverage Report
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/api/src/Api/TestResults/*/coverage.cobertura.xml
          flags: backend,permission-system
          name: backend-permission-tests

      - name: Coverage Threshold Check
        run: |
          cd apps/api/src/Api
          dotnet test --no-build --configuration Release \
            --filter "FullyQualifiedName~Permission" \
            /p:CollectCoverage=true \
            /p:CoverageMinimum=90 \
            /p:ThresholdType=line
          # Fails if coverage < 90%

  backend-integration-tests:
    name: Backend Integration Tests (Permission API)
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: backend-unit-tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: meepleai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Apply Migrations
        run: |
          cd apps/api/src/Api
          dotnet ef database update --connection "Host=localhost;Database=meepleai_test;Username=postgres;Password=postgres"

      - name: Run Integration Tests
        env:
          DATABASE_URL: "Host=localhost;Database=meepleai_test;Username=postgres;Password=postgres"
        run: |
          cd apps/api/src/Api
          dotnet test --filter "Category=Integration&FullyQualifiedName~Permission" \
            --logger "trx;LogFileName=integration-test-results.trx"

  frontend-unit-tests:
    name: Frontend Unit Tests (Components)
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: |
          cd apps/web
          pnpm install --frozen-lockfile

      - name: Run Unit Tests
        run: |
          cd apps/web
          pnpm test -- --coverage \
            --coverageReporters=json \
            --coverageReporters=lcov \
            --coverageReporters=text \
            --coverageThreshold='{"global":{"branches":85,"functions":85,"lines":85,"statements":85}}'

      - name: Test Specific Components
        run: |
          cd apps/web
          pnpm test -- TagStrip TagBadge TagOverflow --verbose
          pnpm test -- Agent --verbose
          pnpm test -- Permission --verbose

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/web/coverage/lcov.info
          flags: frontend,epic-4068
          name: frontend-component-tests

  frontend-typecheck:
    name: TypeScript Type Check
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node & pnpm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install
        run: cd apps/web && pnpm install --frozen-lockfile

      - name: TypeCheck
        run: |
          cd apps/web
          pnpm typecheck 2>&1 | tee typecheck.log

      - name: Fail on Errors
        run: |
          cd apps/web
          if grep -q 'error TS' typecheck.log; then
            echo "❌ TypeScript errors found"
            exit 1
          fi

  frontend-lint:
    name: ESLint & Prettier
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4

      - run: cd apps/web && pnpm install --frozen-lockfile
      - run: cd apps/web && pnpm lint
      - run: cd apps/web && pnpm format:check

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: [frontend-unit-tests, frontend-typecheck]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: cd apps/web && pnpm install --frozen-lockfile

      - name: Install Playwright
        run: cd apps/web && pnpm exec playwright install --with-deps

      - name: Run E2E Tests
        run: |
          cd apps/web
          pnpm exec playwright test tests/e2e/epic-4068/ \
            --reporter=html \
            --reporter=json

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  accessibility-audit:
    name: Accessibility Audit (axe-core)
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: frontend-unit-tests

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - uses: pnpm/action-setup@v4

      - run: cd apps/web && pnpm install --frozen-lockfile
      - run: cd apps/web && pnpm exec playwright install chromium

      - name: Run Accessibility Tests
        run: |
          cd apps/web
          pnpm exec playwright test --grep @a11y

      - name: axe-core Scan
        run: |
          cd apps/web
          pnpm add -D @axe-core/cli
          pnpm exec axe http://localhost:3000/games --exit

      - name: Lighthouse CI
        run: |
          cd apps/web
          pnpm add -D @lhci/cli
          pnpm exec lhci autorun --collect.url=http://localhost:3000

      - name: Verify WCAG 2.1 AA
        run: |
          # Fail if any violations
          if [ -f lhci-results/accessibility-violations.json ]; then
            violations=$(jq '.length' lhci-results/accessibility-violations.json)
            if [ "$violations" -gt 0 ]; then
              echo "❌ $violations accessibility violations found"
              exit 1
            fi
          fi

  visual-regression:
    name: Visual Regression (Chromatic)
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: frontend-unit-tests

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for Chromatic

      - uses: actions/setup-node@v4
      - uses: pnpm/action-setup@v4

      - run: cd apps/web && pnpm install --frozen-lockfile

      - name: Build Storybook
        run: cd apps/web && pnpm build-storybook

      - name: Run Chromatic
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/web
          buildScriptName: build-storybook
          onlyChanged: true # Only test changed stories
          autoAcceptChanges: main-dev # Auto-approve on main-dev

  performance-tests:
    name: Performance Benchmarks
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: [frontend-unit-tests, backend-unit-tests]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - uses: pnpm/action-setup@v4

      - run: cd apps/web && pnpm install --frozen-lockfile

      - name: Run Performance Tests
        run: |
          cd apps/web
          pnpm test -- --grep performance

      - name: Tooltip Positioning Benchmark
        run: |
          cd apps/web
          pnpm exec node scripts/benchmark-tooltip-positioning.js > benchmark-results.json

      - name: Verify Performance Targets
        run: |
          # Parse benchmark results
          tooltip_avg=$(jq '.tooltipPositioning.average' apps/web/benchmark-results.json)

          # Assert: Tooltip positioning < 16ms
          if (( $(echo "$tooltip_avg > 16" | bc -l) )); then
            echo "❌ Tooltip positioning too slow: ${tooltip_avg}ms (target: <16ms)"
            exit 1
          fi

          echo "✅ Performance targets met: ${tooltip_avg}ms"

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v7
        with:
          name: performance-benchmarks
          path: apps/web/benchmark-results.json

  bundle-size-check:
    name: Bundle Size Impact Analysis
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: frontend-unit-tests

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - uses: pnpm/action-setup@v4

      - run: cd apps/web && pnpm install --frozen-lockfile

      - name: Build Production
        run: cd apps/web && pnpm build

      - name: Analyze Bundle
        run: |
          cd apps/web
          pnpm exec next-bundle-analyzer

      - name: Check Epic #4068 Impact
        run: |
          # Extract component sizes
          epic_size=$(jq '.epic4068.gzippedSize' apps/web/.next/analyze/bundle-stats.json)

          # Assert: Epic impact < 15KB gzipped
          if [ "$epic_size" -gt 15360 ]; then
            echo "❌ Epic #4068 bundle too large: ${epic_size} bytes (target: <15KB)"
            exit 1
          fi

          echo "✅ Bundle size within budget: ${epic_size} bytes"

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'apps/api'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: npm audit (Frontend)
        run: |
          cd apps/web
          pnpm audit --prod --audit-level=high

      - name: Snyk Test
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: apps/web --severity-threshold=high

  deployment-preview:
    name: Deploy Preview (Vercel)
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: [frontend-unit-tests, frontend-typecheck, frontend-lint]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web
          alias-domains: |
            epic-4068-pr-${{ github.event.pull_request.number }}.vercel.app

      - name: Comment Preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.name,
              body: `## 🚀 Preview Deployment\n\nEpic #4068 preview: https://epic-4068-pr-${{ github.event.pull_request.number }}.vercel.app\n\n**Test Accounts:**\n- Free: free@example.com\n- Pro: pro@example.com\n- Admin: admin@example.com\n\nPassword: \`password\``
            });

  summary:
    name: Test Summary
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: [backend-unit-tests, backend-integration-tests, frontend-unit-tests, e2e-tests, accessibility-audit, performance-tests, bundle-size-check]
    if: always()

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8

      - name: Generate Summary
        run: |
          echo "# Epic #4068 Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Backend Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.backend-unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: ${{ needs.backend-integration-tests.result }}" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Frontend Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.frontend-unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Tests: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Quality Gates" >> $GITHUB_STEP_SUMMARY
          echo "- Accessibility: ${{ needs.accessibility-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Performance: ${{ needs.performance-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Bundle Size: ${{ needs.bundle-size-check.result }}" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Overall Status" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.backend-unit-tests.result }}" == "success" ]] && \
             [[ "${{ needs.frontend-unit-tests.result }}" == "success" ]] && \
             [[ "${{ needs.accessibility-audit.result }}" == "success" ]]; then
            echo "✅ **All critical tests passed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some tests failed - review above**" >> $GITHUB_STEP_SUMMARY
          fi

  auto-merge-dependabot:
    name: Auto-Merge Dependabot (if tests pass)
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    needs: summary
    if: github.actor == 'dependabot[bot]' && needs.summary.result == 'success'

    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
