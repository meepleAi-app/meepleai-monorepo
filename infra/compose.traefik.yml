# Traefik reverse proxy — Linux only (staging/prod servers)
# Dev on Windows uses direct port binding, not Traefik.
#
# Usage (with staging):
#   docker compose -f docker-compose.yml -f compose.staging.yml -f compose.traefik.yml \
#     --profile ai --profile monitoring --profile proxy up -d

services:
  docker-socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:0.6
    container_name: meepleai-socket-proxy
    restart: always
    environment:
      CONTAINERS: 1
      SERVICES: 1
      TASKS: 0
      NETWORKS: 0
      POST: 0
      BUILD: 0
      COMMIT: 0
      EXEC: 0
      IMAGES: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - meepleai
    security_opt:
      - no-new-privileges=true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2375/version"]
      interval: 10s
      timeout: 5s
      retries: 3

  traefik:
    image: traefik:v3.6
    container_name: meepleai-traefik
    restart: always
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik_certs:/letsencrypt
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - meepleai
    security_opt:
      - no-new-privileges=true
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  traefik_certs:
