name: Fix Secret Line Endings

on:
  workflow_dispatch:

jobs:
  fix-secrets:
    name: Fix CRLF in secrets and restart API
    runs-on: ${{ vars.RUNNER && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    if: vars.DEPLOY_METHOD == 'ssh'
    steps:
      - name: Fix line endings and restart API
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
            set -e

            SECRETS_DIR="/opt/meepleai/repo/infra/secrets"

            echo "=== BEFORE: checking admin.secret for CRLF ==="
            cat -A "$SECRETS_DIR/admin.secret" | head -5 || true

            echo "=== Fixing CRLF in all .secret files ==="
            for f in "$SECRETS_DIR"/*.secret; do
              if file "$f" | grep -q CRLF 2>/dev/null || cat -A "$f" | grep -q $'\r'; then
                echo "  Fixing: $f"
                sed -i 's/\r$//' "$f"
              fi
            done

            echo "=== AFTER: checking admin.secret ==="
            cat -A "$SECRETS_DIR/admin.secret" | head -5 || true

            echo "=== Verifying INITIAL_ADMIN_EMAIL value ==="
            grep "^INITIAL_ADMIN_EMAIL=" "$SECRETS_DIR/admin.secret" | cat -A

            echo "=== Force-recreating API to pick up fixed secrets ==="
            cd /opt/meepleai/repo/infra
            set -a
            for f in secrets/*.secret; do source "$f" 2>/dev/null || true; done
            set +a
            docker compose -f docker-compose.yml -f compose.staging.yml -f compose.traefik.yml \
              --profile minimal up -d --no-deps --force-recreate api

            echo "=== Waiting for API to be healthy ==="
            for attempt in $(seq 1 20); do
              if curl -sf https://meepleai.app/health > /dev/null 2>&1; then
                echo "API healthy after ~$((attempt*5))s"
                break
              fi
              sleep 5
            done

            echo "=== Checking admin_count in DB ==="
            set -a; source "$SECRETS_DIR/database.secret"; set +a
            PG_USER="${POSTGRES_USER:-meepleai}"
            PG_DB="${POSTGRES_DB:-meepleai_db}"

            for attempt in $(seq 1 12); do
              sleep 5
              COUNT=$(docker exec meepleai-postgres psql -U "$PG_USER" "$PG_DB" -tAc \
                "SELECT count(*) FROM users WHERE \"Role\" = 'SuperAdmin';" 2>/dev/null || echo "QUERY_FAILED")
              echo "  Attempt $attempt: admin_count=$COUNT"
              if [ "$COUNT" = "1" ]; then
                echo "Admin user seeded!"
                break
              fi
            done

            echo "=== Testing login ==="
            ADMIN_EMAIL=$(grep "^ADMIN_EMAIL=" "$SECRETS_DIR/admin.secret" | cut -d= -f2)
            ADMIN_PASS=$(grep "^ADMIN_PASSWORD=" "$SECRETS_DIR/admin.secret" | cut -d= -f2)

            RESULT=$(curl -s -X POST https://meepleai.app/api/v1/auth/login \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"${ADMIN_EMAIL}\",\"password\":\"${ADMIN_PASS}\"}" 2>/dev/null || echo "CURL_FAILED")
            echo "Login result: $RESULT"

            if echo "$RESULT" | grep -q '"sessionToken"'; then
              echo "Admin login verified successfully!"
            elif echo "$RESULT" | grep -q '"requiresTwoFactor"'; then
              echo "Admin login successful (2FA required)"
            else
              echo "Login not yet successful - may need more time or further investigation"
            fi
